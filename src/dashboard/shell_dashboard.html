<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Freshket Dashboard</title>
<meta name="description" content="Freshket TL Dashboard — Territory & Team Intelligence">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- D3 (map only) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

<!-- Design tokens -->
<style>
<!-- INJECT_TOKENS -->
</style>

<!-- Dashboard styles -->
<style>
<!-- INJECT_STYLES_DASHBOARD -->
</style>
</head>
<body>

<!-- ── AUTH OVERLAY ─────────────────────────────────────── -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#FF385C"/>
        <path d="M8 14.5h12M14 8.5v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="auth-logo-name">Freshket</span>
    </div>
    <div class="auth-title">TL Dashboard</div>
    <div class="auth-sub">เข้าสู่ระบบเพื่อดู territory & team intelligence</div>
    <div id="auth-error" class="auth-error" style="display:none"></div>
    <input id="auth-email" class="ds-input" type="email" placeholder="อีเมล" autocomplete="email">
    <input id="auth-pass"  class="ds-input" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
    <button id="auth-btn" class="ds-btn ds-btn-primary" style="width:100%" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- ── APP SHELL ─────────────────────────────────────────── -->
<div id="app" class="app" style="display:none">

  <!-- TOPBAR -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#FF385C"/>
          <path d="M8 14.5h12M14 8.5v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="topbar-product">Freshket</span>
      </div>
      <div class="topbar-sep"></div>
      <span class="topbar-section" id="topbar-section">Dashboard</span>
    </div>
    <div class="topbar-center" id="topbar-controls">
      <!-- injected by JS -->
    </div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user" onclick="toggleUserMenu()">
        <div class="ds-avatar sm" id="user-avatar">?</div>
        <span class="topbar-user-name" id="user-name">...</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="user-menu" id="user-menu" style="display:none">
        <div class="user-menu-item" onclick="openSense()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
          เปิด Sense (mobile)
        </div>
        <div class="user-menu-divider"></div>
        <div class="user-menu-item danger" onclick="doLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          ออกจากระบบ
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN BODY -->
  <div class="main-body">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebar-nav">
        <button class="snav-btn active" data-view="map" onclick="setView('map',this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15M15 6v15"/></svg>
          <span>Map</span>
        </button>
        <button class="snav-btn" data-view="team" onclick="setView('team',this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>ทีม</span>
        </button>
        <button class="snav-btn" data-view="commission" onclick="setView('commission',this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          <span>Comm.</span>
        </button>
        <button class="snav-btn" data-view="skills" onclick="setView('skills',this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
          <span>Skills</span>
        </button>
      </nav>

      <!-- Sidebar content (view-dependent) -->
      <div class="sidebar-content" id="sidebar-content">
        <div class="sidebar-shimmer" id="sidebar-shimmer">
          <div class="ds-skel" style="height:52px;border-radius:var(--r-md);margin-bottom:8px"></div>
          <div class="ds-skel" style="height:3px;border-radius:2px;margin-bottom:16px"></div>
          <div class="ds-skel" style="height:14px;width:60%;border-radius:3px;margin-bottom:20px"></div>
          <div class="ds-skel" style="height:44px;border-radius:var(--r-md);margin-bottom:4px"></div>
          <div class="ds-skel" style="height:44px;border-radius:var(--r-md);margin-bottom:4px"></div>
          <div class="ds-skel" style="height:44px;border-radius:var(--r-md);margin-bottom:4px"></div>
          <div class="ds-skel" style="height:44px;border-radius:var(--r-md);margin-bottom:4px"></div>
          <div class="ds-skel" style="height:44px;border-radius:var(--r-md)"></div>
        </div>
      </div>
    </aside>

    <!-- CENTER (Map or content) -->
    <main class="center-panel" id="center-panel">
      <!-- Map view -->
      <div id="view-map" class="view active">
        <div class="map-toolbar" id="map-toolbar">
          <!-- injected by dash_map.js -->
        </div>
        <div class="map-container" id="map-container">
          <svg id="map-svg" width="100%" height="100%"></svg>
          <div class="map-legend" id="map-legend"></div>
          <div class="map-zoom-ctrl">
            <button class="zoom-btn" onclick="mapZoom(1.35)">+</button>
            <button class="zoom-btn" onclick="mapZoom(0.74)">−</button>
            <button class="zoom-btn" onclick="mapReset()" title="Reset view">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
          </div>
          <div class="map-tooltip" id="map-tooltip"></div>
        </div>
      </div>

      <!-- Team view -->
      <div id="view-team" class="view">
        <div class="view-header">
          <div class="view-eyebrow">TEAM VIEW</div>
          <div class="view-title" id="team-view-title">ภาพรวมทีม</div>
        </div>
        <div id="team-content" class="view-content"></div>
      </div>

      <!-- Commission view -->
      <div id="view-commission" class="view">
        <div class="view-header">
          <div class="view-eyebrow">COMMISSION</div>
          <div class="view-title">Commission Estimate</div>
        </div>
        <div id="commission-content" class="view-content"></div>
      </div>

      <!-- Skills view -->
      <div id="view-skills" class="view">
        <div class="view-header">
          <div class="view-eyebrow">SKILLS</div>
          <div class="view-title">Skills Progress</div>
        </div>
        <div id="skills-content" class="view-content"></div>
      </div>
    </main>

    <!-- RIGHT DETAIL PANEL -->
    <aside class="detail-panel" id="detail-panel">
      <button class="detail-close" onclick="closeDetail()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div id="detail-content"></div>
    </aside>

  </div><!-- main-body -->
</div><!-- app -->

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

</body>
</html>
