/* ── SKU swap row — explanatory, not actionable: no border-left color
   (that's reserved for the real risk/opportunity signals), no hover/click
   affordance, muted ฿ delta since it should read close to zero. */
.nrr-acct-swap-row {
  display: flex; align-items: center; gap: 14px; width: 100%;
  border-bottom: 1px solid var(--line); padding: 11px 6px;
}
.nrr-acct-swap-row:last-child { border-bottom: none; }
.nrr-acct-swap-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.nrr-acct-swap-pair { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.nrr-acct-swap-old { color: var(--ink2); text-decoration: line-through; text-decoration-color: var(--ink3); }
.nrr-acct-swap-arrow { color: var(--ink3); }
.nrr-acct-swap-new { color: var(--ink); }

/* ── Price drawer (v41) — browsable SKU price list + per-SKU chart.
   Buyer lens: price down = green (cheaper), up = --attention (vibrant
   orange cost warning — not the dull --sun-deep olive used elsewhere). */
.nrr-comm-ds .nrr-price-row-group { border-bottom: 1px solid var(--line); }
.nrr-comm-ds .nrr-price-row-group:last-of-type { border-bottom: none; }
.nrr-price-row { display: flex; align-items: center; gap: 12px; width: 100%; padding: 11px 2px; cursor: pointer; list-style: none; }
.nrr-price-row::-webkit-details-marker { display: none; }
.nrr-price-row-main { flex: 1; min-width: 0; }
.nrr-price-row-name { font-size: 14px; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-price-row-sub { font-size: 12px; color: var(--ink2); margin-top: 3px; }
.nrr-price-chg { font-weight: 700; }
/* v44: softer than .nrr-price-chg — a cumulative multi-month "creep" mark
   shown ONLY when no single-month move cleared 1% (so it never competes
   with the sharp badge, only fills the gap when that one is silent). */
.nrr-price-chg-creep { font-weight: 600; opacity: .75; }
.nrr-price-row-right { flex-shrink: 0; text-align: right; }
.nrr-price-row-spend { font-size: 14px; font-weight: 700; }
.nrr-price-chart { padding: 6px 2px 10px; }
.nrr-price-chart-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 4px; font-size: 12px; }
.nrr-price-chart-now { font-size: 17px; font-weight: 800; }
.nrr-price-chart-unit { font-size: 12px; color: var(--ink3); font-weight: 600; }
.nrr-price-chart-foot { display: flex; gap: 22px; margin-top: 8px; }
.nrr-price-chart-foot .num { font-size: 14px; font-weight: 700; }

/* ── Price drawer filter row (v42) — collapsed from 3 rows (cat pills,
   search, movement pills) into ONE: category <select> + search (grows) +
   a compact ▲/▼ toggle group, plus a ฿/〰 row-view toggle group. */
.nrr-price-filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.nrr-price-filter-row select.nrr-search { flex: none; width: auto; min-width: 0; max-width: 150px; }
.nrr-price-filter-row input.nrr-search { flex: 1; min-width: 0; }
.nrr-price-toggle-grp { display: flex; gap: 4px; flex: none; }
.nrr-price-toggle {
  padding: 8px 10px; border-radius: 10px; border: 1px solid var(--line);
  background: transparent; color: var(--ink2); font-size: 12.5px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 4px; line-height: 1;
  transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
}
.nrr-price-toggle:hover { border-color: var(--ink3); }
.nrr-price-toggle.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.nrr-price-row-spark { display: block; flex: none; }

/* ══ Portfolio Pulse (v45) — TV/signage morning board ═══════════════════════
   DELIBERATE exception to the app's "no fills / hairline-only" house rule:
   this view is meant to be read across a room off a lobby TV, so it uses big
   type + saturated color blocks. Scoped entirely under .nrr-pulseboard so it
   never leaks the signage look into the analyst views.
   v46: renamed from bare `.nrr-pulse` — that name COLLIDED with the pre-
   existing Dashboard "§1 Pulse hero" class (line ~226, a totally unrelated
   section), silently overriding its display/flex/gap/padding since v45
   shipped. Also given its OWN page container (`.nrr-pulse-page`, NOT
   `.nrr-page`) — that shared class caps every analyst view at 1020px, wrong
   for a landscape TV board which should use the full screen. */
.nrr-pulse-page { max-width: 1800px; margin: 0 auto; padding: 0 40px 60px; }
.nrr-pulseboard { display: flex; flex-direction: column; gap: 16px; padding: 4px 0 24px; }
.nrr-pulse-loading { padding: 60px 0; text-align: center; color: var(--ink3); font-size: 16px; }

.nrr-pulse-dateline { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.nrr-pulse-dateline-main { font-size: 30px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; }
/* v56: fs button now shares its corner with the new rotation-speed control —
   wrapped in one flex group so .nrr-pulse-dateline's own space-between still
   only ever sees 2 top-level children. */
.nrr-pulse-dateline-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.nrr-pulse-rot-ctrl { display: flex; align-items: center; gap: 8px; }
.nrr-pulse-rot-lbl { font-size: 12.5px; font-weight: 700; color: var(--ink3); white-space: nowrap; }
/* Hidden once genuinely fullscreen — a real TV screen shouldn't show
   interactive chrome, only the fs-exit button (kept, mirrors the pre-v56
   behavior) needs to stay reachable there. */
.nrr-pulse-fs-active .nrr-pulse-rot-ctrl { display: none; }
.nrr-pulse-fs-btn {
  padding: 9px 16px; border-radius: var(--r-pill); border: 1px solid var(--line);
  background: transparent; color: var(--ink2); font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: border-color 140ms ease, background 140ms ease;
}
.nrr-pulse-fs-btn:hover { border-color: var(--ink3); background: var(--fill); }
/* v47: TV fullscreen mode — hides the app's own masthead/nav (shared across
   every view) so the board is pure signage with no browser/app chrome
   competing for space; only active while genuinely in the Fullscreen API
   state (toggled via #nrr-pulse-fs-btn), auto-reverts on Escape/exit since
   that fires the same `fullscreenchange` listener that sets this class. */
.nrr-pulse-fs-active .nrr-masthead,
.nrr-pulse-fs-active .nrr-appnav-div,
.nrr-pulse-fs-active #nrr-subnav { display: none !important; }
.nrr-pulse-fs-active .nrr-pulse-page { max-width: 100vw; padding: 28px 48px; }
.nrr-pulse-dateline-sub { font-size: 14px; color: var(--ink3); font-weight: 600; }

/* Hero row — three big glance blocks */
.nrr-pulse-heroes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.nrr-pulse-hero { border-radius: var(--r-lg); padding: 22px 24px; color: #fff; min-height: 150px; display: flex; flex-direction: column; }
.nrr-pulse-hero.green { background: var(--green); }
.nrr-pulse-hero.up    { background: var(--green); }
.nrr-pulse-hero.down  { background: var(--coral); }
.nrr-pulse-hero.alert { background: var(--attention); }
.nrr-pulse-hero.calm  { background: var(--ink2); }
/* v57: label/num/sub used to be 3 direct children of the hero's own column
   flex + justify-content:space-between. Wrapped in one .nrr-pulse-hero-main
   so a hero WITH a list (.has-list) can switch to a row layout — main on
   the left, list on the right, sharing the box's existing height — instead
   of stacking the list full-width below (which just pushed the box taller
   and left the whole right half of the stat area blank). flex:1 here makes
   main fill all available space in the plain (no-list) case, same as
   before; .has-list overrides this to flex:none below. */
.nrr-pulse-hero-main { display: flex; flex-direction: column; justify-content: space-between; flex: 1; min-width: 0; }
.nrr-pulse-hero-lbl { font-size: 15px; font-weight: 700; opacity: 0.92; }
.nrr-pulse-hero-num { font-family: var(--font-num); font-size: 76px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
.nrr-pulse-hero-sub { font-size: 14px; font-weight: 600; opacity: 0.92; }
.nrr-pulse-today-chip { display: inline-block; background: rgba(255,255,255,0.24); border-radius: var(--r-pill); padding: 2px 10px; font-weight: 800; margin-left: 4px; }
/* v56/v57: green hero's "มาใหม่วันนี้" list + orange hero's top-3 risk list
   — one shared class for both since .nrr-pulse-hero already sets
   color:#fff for every hero variant. Sits BESIDE .nrr-pulse-hero-main (not
   stacked below it) via .has-list switching the box to a row: main keeps
   its natural width (flex:none), the list takes the rest (flex:1) and
   align-items:stretch (row default) makes both columns share the box's
   full height — main's own space-between then spreads label/num/sub across
   that height so it lines up with the list beside it, instead of leaving
   the whole right side blank. No max-height anywhere in this chain — the
   box is expected to grow a little if the list has more rows than the stat
   block is tall; the middle "โมเมนตัมสุทธิ" hero (no list, unaffected) still
   stretches to match via the heroes row's own grid align-items:stretch and
   just shows extra blank space, confirmed acceptable. */
.nrr-pulse-hero.has-list { flex-direction: row; align-items: stretch; gap: 22px; }
.nrr-pulse-hero.has-list .nrr-pulse-hero-main { flex: none; }
.nrr-pulse-hero-list {
  display: flex; flex-direction: column; justify-content: center; gap: 3px;
  flex: 1; min-width: 0; border-left: 1px solid rgba(255,255,255,0.28); padding-left: 22px;
}
.nrr-pulse-hero-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; font-weight: 700; padding: 2px 0; }
.nrr-pulse-hero-row-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.95; }
.nrr-pulse-hero-row-amt { font-family: var(--font-num); font-weight: 800; flex: none; }
.nrr-pulse-hero-row-more { font-size: 11px; font-weight: 700; opacity: 0.75; margin-top: 2px; }

/* Blocks (arrivals, sku, risk) — saturated left-accent panels */
.nrr-pulse-arrivals { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
/* v49: was 1fr 2fr (SKU block at 1/3 width) — widened per user feedback. */
.nrr-pulse-lower { display: grid; grid-template-columns: 1fr 1.3fr; gap: 14px; }
.nrr-pulse-block { border-radius: var(--r-md); padding: 18px 20px; background: var(--fill); border-left: 6px solid var(--ink3); min-width: 0; }
.nrr-pulse-hero { min-width: 0; }
.nrr-pulse-block.teal  { border-left-color: var(--mv-teal);     background: var(--mv-teal-soft); }
.nrr-pulse-block.leaf  { border-left-color: var(--mv-green-lt);  background: var(--mv-green-lt-soft); }
.nrr-pulse-block.sun   { border-left-color: var(--sun);          background: var(--sun-soft); }
.nrr-pulse-block.coral { border-left-color: var(--coral);        background: var(--coral-soft); }
.nrr-pulse-block.compact { display: flex; flex-direction: column; justify-content: center; }
.nrr-pulse-block-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.nrr-pulse-block-title { font-size: 17px; font-weight: 800; color: var(--ink); }
.nrr-pulse-block-tally { font-size: 15px; font-weight: 700; color: var(--ink2); font-family: var(--font-num); }
.nrr-pulse-block-caption { font-size: 12px; font-weight: 600; color: var(--ink3); margin: -6px 0 10px; line-height: 1.4; }
.nrr-pulse-list { display: flex; flex-direction: column; }
.nrr-pulse-empty { color: var(--ink3); font-size: 14px; padding: 10px 0; }

/* v46: fixed row height (was auto — a row whose meta line happened to wrap
   to 2 lines made THAT rotation window taller than others, so the whole
   box visibly resized as it cycled). Every row now clips to one line. */
.nrr-pulse-arr-row { display: flex; align-items: center; gap: 12px; height: 44px; border-bottom: 1px solid var(--line); }
.nrr-pulse-arr-row:last-child { border-bottom: none; }
.nrr-pulse-arr-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--ink3); opacity: 0.4; flex: none; }
.nrr-pulse-today-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--green-deep); flex: none; box-shadow: 0 0 0 0 rgba(0,128,101,0.6); animation: nrrPulseBeat 1.8s infinite; }
@keyframes nrrPulseBeat { 0% { box-shadow: 0 0 0 0 rgba(0,128,101,0.55); } 70% { box-shadow: 0 0 0 8px rgba(0,128,101,0); } 100% { box-shadow: 0 0 0 0 rgba(0,128,101,0); } }
.nrr-pulse-arr-main { flex: 1; min-width: 0; }
.nrr-pulse-arr-name { font-size: 16px; font-weight: 700; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-pulse-arr-sub { font-size: 11.5px; font-weight: 600; color: var(--ink3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* v50: was plain gray caption text — repurposed into a solid color-coded
   chip (color hashed per person in JS, _nrrPulseOwnerColor) so a KAM can
   learn "I'm this color" and spot their own rows across the whole board at
   a glance, instead of having to read every name. Shared by every list
   (Sales/Expansion/at-risk) — same person, same color, everywhere.
   v51 tried a fixed-width CHIP to stop column drift — wrong fix (made every
   chip the same size regardless of name, which read oddly stretched/padded
   for short names). v53: chip goes back to hugging its own text; instead a
   fixed-width, right-aligned SLOT wraps it, so the chip's right edge (the
   edge nearest the ฿ figure, the one the eye actually tracks) lands in the
   same column every row while its left edge is free to vary with the name. */
/* v54: width now set inline per-list (measured from real text, see
   _nrrPulseOwnerSlotWidth in nrr_pulse.js) — not a guessed constant here. */
.nrr-pulse-owner-slot { flex: none; display: flex; justify-content: flex-end; }
.nrr-pulse-owner-chip {
  display: inline-block; padding: 4px 11px; border-radius: var(--r-pill);
  font-size: 12px; font-weight: 800; color: #fff; letter-spacing: 0.01em;
  white-space: nowrap;
}
.nrr-pulse-arr-gmv { font-family: var(--font-num); font-size: 16px; font-weight: 800; color: var(--ink); flex: none; }

.nrr-pulse-sku-num { font-family: var(--font-num); font-size: 56px; font-weight: 800; line-height: 1; color: var(--sun-deep); margin: 4px 0 6px; }
.nrr-pulse-sku-sub { font-size: 13.5px; font-weight: 600; color: var(--ink2); }

/* v50: rebuilt to match .nrr-pulse-arr-row exactly (res_name primary /
   account_name secondary via .nrr-pulse-arr-main, owner chip) — only the
   trailing amount block stays risk-specific (฿ shortfall + its reason). */
.nrr-pulse-risk-row { display: flex; align-items: center; gap: 12px; height: 44px; border-bottom: 1px solid var(--line); }
.nrr-pulse-risk-row:last-child { border-bottom: none; }
/* v52: the chip fix (v51) wasn't the real cause — .nrr-pulse-risk-amt-wrap
   itself had NO fixed width (only `max-width` on the label inside it, which
   caps but doesn't force), so "เงียบ" (short) vs "ต่ำกว่าฐาน 45%" (long)
   rendered the whole wrap block at different widths row to row. Since
   .nrr-pulse-arr-main is flex:1 (fills whatever's left), a wider/narrower
   amt-wrap shifted how much space main actually got, which moved the owner
   chip's position between them — the chip was never the moving part, the
   block to its right was. Fixed width on the wrap stops the whole row's
   layout from depending on the reason text's length at all.
   v55: 132px was a GUESSED constant — same bug class as the owner slot
   (v53). For any row shorter than the guess, right-aligned text left dead
   space right next to the chip, reading as "chip far from the number".
   Width now set inline per-list from real measured text
   (_nrrPulseRiskAmtWidth in nrr_pulse.js) — no width here. */
.nrr-pulse-risk-amt-wrap { flex: none; text-align: right; }
.nrr-pulse-risk-amt { font-family: var(--font-num); font-size: 16px; font-weight: 800; color: var(--coral); }
.nrr-pulse-risk-amt-lbl { font-size: 10.5px; font-weight: 700; color: var(--ink3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

@media (max-width: 900px) {
  .nrr-pulse-heroes, .nrr-pulse-arrivals, .nrr-pulse-lower { grid-template-columns: 1fr; }
  .nrr-pulse-hero-num { font-size: 60px; }
}

/* ── Account view loading skeleton — page-shaped, not a single bar ─────── */
.nrr-acct-skel-mast { display: flex; align-items: center; gap: 12px; }
.nrr-acct-skel-trend { display: flex; align-items: flex-end; gap: 12px; height: 78px; margin: 18px 0 0; }
.nrr-acct-skel-bar { flex: 1; align-self: stretch; }
.nrr-acct-skel-bar:nth-child(1) { align-self: flex-end; height: 68%; }
.nrr-acct-skel-bar:nth-child(2) { align-self: flex-end; height: 45%; }
.nrr-acct-skel-bar:nth-child(3) { align-self: flex-end; height: 80%; }
.nrr-acct-skel-bar:nth-child(4) { align-self: flex-end; height: 55%; }
.nrr-acct-skel-bar:nth-child(5) { align-self: flex-end; height: 62%; }
.nrr-acct-skel-bar:nth-child(6) { align-self: flex-end; height: 40%; }
.nrr-acct-skel-bar:nth-child(7) { align-self: flex-end; height: 90%; }
.nrr-acct-skel-stats { display: flex; gap: 18px; margin-top: 24px; }
.nrr-acct-skel-stat { flex: 1; height: 78px; }
.nrr-acct-skel-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.nrr-acct-skel-row { height: 52px; }
@media (max-width: 640px) { .nrr-acct-skel-stats { flex-wrap: wrap; } .nrr-acct-skel-stat { flex: 1 1 45%; } }

/* ── AOV drawer callout — carries two axes at once (absolute tier via
   background wash + recent direction via the arrow), so it gets its own
   look instead of the generic .nrr-verdict every other drawer uses. */
.nrr-acct-aov-callout { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: var(--r-md); margin-bottom: 16px; }
.nrr-acct-aov-callout.low { background: var(--coral-soft); }
.nrr-acct-aov-callout.mid { background: var(--sun-soft); }
.nrr-acct-aov-callout.good, .nrr-acct-aov-callout.great { background: var(--green-soft); }
.nrr-acct-aov-arrow {
  flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; background: #fff;
  display: flex; align-items: center; justify-content: center; font-size: 15px; box-shadow: 0 1px 2px rgba(16, 21, 16, 0.08);
}
.nrr-acct-aov-arrow.up { color: var(--green-deep); }
.nrr-acct-aov-arrow.down { color: var(--coral); }
.nrr-acct-aov-callout-pct { font-size: 22px; font-weight: 800; line-height: 1; }
.nrr-acct-aov-callout-label { font-size: 12.5px; color: var(--ink2); margin-top: 3px; line-height: 1.4; }

/* ── Floating per-outlet tooltip — position:fixed, sibling of every other
   top-level container (see nrr_view.js's shell comment) so it can never
   be clipped by an ancestor's overflow rule, same reasoning as
   #nrr-slideover. ─────────────────────────────────────────────────────── */
.nrr-otip-backdrop { position: fixed; inset: 0; z-index: 210; display: none; }
.nrr-otip-backdrop.on { display: block; }
.nrr-otip {
  position: fixed; z-index: 211; width: 280px; max-height: 260px; overflow-y: auto;
  padding: 10px 4px; display: none;
}
.nrr-otip.on { display: block; }
.nrr-otip-head { font-size: 11px; font-weight: 700; color: var(--ink3); padding: 2px 14px 8px; text-transform: uppercase; letter-spacing: .04em; }
.nrr-otip-row { display: flex; justify-content: space-between; gap: 10px; padding: 6px 14px; font-size: 12.5px; }
.nrr-otip-row .n { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-otip-row .v { font-family: var(--font-num); font-weight: 700; color: var(--ink2); flex-shrink: 0; }
.nrr-otip-row .v.zero { color: var(--coral); }

/* ── Category full breakdown (inside #nrr-slideover) ───────────────────── */
.nrr-acct-catfull-row { margin-bottom: 11px; }
.nrr-acct-catfull-top { display: flex; align-items: center; gap: 8px; font-size: 12.5px; margin-bottom: 4px; }
.nrr-acct-catfull-sw { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.nrr-acct-catfull-track { height: 6px; border-radius: var(--r-pill); background: var(--fill); overflow: hidden; margin-left: 17px; }
.nrr-acct-catfull-fill { height: 100%; border-radius: var(--r-pill); }

/* ── Boot loader — covers the shell while nrrRefresh() fetches data on
   first load, so the user never sees the bare/half-rendered dashboard
   sections. A bouncing produce wave instead of a skeleton -- purely
   decorative, no data dependency. ── */
.nrr-boot-loader {
  position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;
}
.nrr-boot-icons { display: flex; gap: 10px; }
.nrr-boot-icon {
  font-size: 34px; line-height: 1;
  animation: nrrBootBounce 1.1s ease-in-out infinite;
}
.nrr-boot-icon:nth-child(1) { animation-delay: 0.00s; }
.nrr-boot-icon:nth-child(2) { animation-delay: 0.09s; }
.nrr-boot-icon:nth-child(3) { animation-delay: 0.18s; }
.nrr-boot-icon:nth-child(4) { animation-delay: 0.27s; }
.nrr-boot-icon:nth-child(5) { animation-delay: 0.36s; }
.nrr-boot-icon:nth-child(6) { animation-delay: 0.45s; }
.nrr-boot-icon:nth-child(7) { animation-delay: 0.54s; }
@keyframes nrrBootBounce {
  0%, 60%, 100% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-16px) scale(1.08); }
}
.nrr-boot-text { font-size: 13px; font-weight: 600; color: var(--ink2); letter-spacing: .01em; }
@media (prefers-reduced-motion: reduce) {
  .nrr-boot-icon { animation: none; }
}
</style>
</head>
<body>

<div id="nrr-auth-overlay">
  <div class="nrr-auth-card">
    <div class="eyebrow">FRESHKET</div>
    <div class="h1">NRR ไตรมาส</div>
    <div class="sub">Portfolio Notebook</div>
    <input type="email" id="nrr-auth-email" placeholder="อีเมล" autocomplete="username">
    <input type="password" id="nrr-auth-pass" placeholder="รหัสผ่าน" autocomplete="current-password">
    <div id="nrr-auth-error"></div>
    <button class="btn-primary" id="nrr-auth-btn" onclick="nrrDoLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="nrr-app"></div>

<div id="nrr-boot-loader" class="nrr-boot-loader" style="display:none">
  <div class="nrr-boot-icons">
    <span class="nrr-boot-icon">🍋</span>
    <span class="nrr-boot-icon">🍅</span>
    <span class="nrr-boot-icon">🥕</span>
    <span class="nrr-boot-icon">🍓</span>
    <span class="nrr-boot-icon">🧅</span>
    <span class="nrr-boot-icon">🥦</span>
    <span class="nrr-boot-icon">🥬</span>
  </div>
  <div class="nrr-boot-text">กำลังโหลดข้อมูล...</div>
</div>

<script>
// ── nrr_logic.js ──────────────────────────────────────────────────────────
// PORTED VERBATIM from src/07c_qnrr_view.js (lines 1-346, the _qnrrCompute
// engine) for the new /nrr Team Lead & VP notebook dashboard.
//
// DO NOT "fix" or simplify the logic below on your own judgement — every
// asymmetry here (comeback numerator-only, transfer_in/out symmetric base
// adjustment, core_nrr_churn reclassification) is an intentional business
// decision already validated against real numbers in Sense. If a number
// computed here ever disagrees with what Sense's own QNRR sheet shows for
// the same KAM/TL/period, the bug is almost certainly in nrr_data.js's CSV
// parsing or in how this file is called — re-diff against
// src/07c_qnrr_view.js before changing anything in _qnrrCompute itself.
//
// NOTE (2026-07-08, nrr_v10 + Sense v852): baseMap construction excludes rows
// whose _effectiveMovement is 'transfer_in' — without this, a transfer_in
// landing in the FIRST period month of the quarter had its base_gmv counted
// TWICE (once via baseMap, once via the symmetric transfer_in adjustment),
// inflating the base and deflating NRR% (2026-07 PM→KAM bulk move: 44
// outlets, ฿2.34M double-counted; Tape showed 92% instead of 99%). The same
// fix is applied in src/07c_qnrr_view.js (v852) — both engines are in sync.
// Details: docs/handoff-2026-07-08-nrr-transfer-in-fix.md
//
// NOTE (2026-07-14, waived-account feature): a deliberate, CONFIRMED
// exception to the "do not fix independently" rule above — this is a real
// feature addition (waived-account NRR exclusion), not an unreviewed bug
// fix, applied in lockstep with the identical diff in
// src/07c_qnrr_view.js's _qnrrCompute in the same commit. See
// nrr_exclusions.js for nrrAccountWaivedForPeriod().
//
// Consumes window.bulkQnrrData, built by nrr_data.js in the exact same shape
// Sense itself builds it in (src/02_data_pipeline.js, bulk-qnrr-single
// handler): { byKamEmail:{email:[row]}, byTlEmail:{email:[row]}, allRows:[],
// loaded:true }.
// ────────────────────────────────────────────────────────────────────────

var QNRR_CFG = {
  quarter:    '2026q3',
  base_month: '2026-06',
  q_months:   ['2026-07', '2026-08', '2026-09'],
  months_th:  {
    '2026-06': 'มิ.ย.', '2026-07': 'ก.ค.',
    '2026-08': 'ส.ค.',  '2026-09': 'ก.ย.'
  },
  csv_file:   'kam_rep_view.csv'
};
window.QNRR_CFG = QNRR_CFG;

// scope: 'kam' | 'tl' | 'admin'
// For 'tl'/'admin' scope, kamEmail may be the TL's own email (direct
// byTlEmail lookup, v817) or null/empty (pure org-wide, v850-fix — kamEmail
// is genuinely optional once scope !== 'kam').
function _qnrrCompute(kamEmail, scope) {
  scope = scope || 'kam';
  if (scope === 'kam' && !kamEmail) return null;
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return null;

  var myTlEmail = '';
  var kamRows = (qd.byKamEmail && qd.byKamEmail[kamEmail]) || [];
  if (kamRows.length) {
    myTlEmail = (kamRows.find(function (r) { return r.latest_tl_email; }) || {}).latest_tl_email || '';
  }
  // TL/Admin login directly — their own email may live in byTlEmail directly.
  if (!myTlEmail && qd.byTlEmail && qd.byTlEmail[kamEmail]) {
    myTlEmail = kamEmail;
  }

  var allRows;
  if (scope === 'tl' && myTlEmail && qd.byTlEmail && qd.byTlEmail[myTlEmail]) {
    allRows = qd.byTlEmail[myTlEmail];
  } else if (scope === 'tl' && !myTlEmail) {
    // Admin viewing "team" scope with no personal TL — org-wide fallback.
    allRows = qd.allRows || [];
  } else if (scope === 'admin') {
    allRows = qd.allRows || [];
  } else {
    allRows = kamRows;
  }
  if (!allRows || !allRows.length) return null;

  function _rowInScope(r) {
    if (scope === 'kam')   return r.latest_kam_email === kamEmail;
    if (scope === 'tl')    return myTlEmail ? r.latest_tl_email === myTlEmail : true;
    if (scope === 'admin') return true;
    return r.latest_kam_email === kamEmail;
  }

  function _effectiveMovement(r) {
    // core_nrr row with curr_gmv=0 IS a churned outlet this period — the raw
    // CSV never contains the literal 'core_nrr_churn' value.
    if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) {
      return 'core_nrr_churn';
    }
    if (scope === 'kam') return r.movement_type;

    // "org-wide, no portfolio boundary" applies both to scope==='admin' AND
    // to scope==='tl' with myTlEmail==='' (Admin viewing the "ทีม" toggle
    // without personally being a TL of any squad) — same resolved view.
    var isOrgWideView = (scope === 'admin') || (scope === 'tl' && !myTlEmail);
    if (isOrgWideView) {
      // No boundary between individual KAMs at this scope: a pure KAM<->KAM
      // reassignment never cost/gained the org anything, so it reads as
      // core_nrr regardless of squad. Moves involving PM/ADMIN/SALE are a
      // genuine portfolio-TYPE change and stay visible as transfer.
      var isPureKamMove = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
      if (isPureKamMove && r.movement_type === 'transfer_out') return null;
      if (isPureKamMove && r.movement_type === 'transfer_in')  return 'core_nrr';
      return r.movement_type;
    }

    // Same-squad transfer_in/out between KAMs → neutralize. Cross-squad, or
    // moves touching a non-KAM portfolio type → count normally.
    var sameTlBase   = r.base_tl_email && r.base_tl_email === myTlEmail;
    var sameTlPeriod = r.latest_tl_email === myTlEmail;
    var isPureKamMove2 = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
    var sameTeam     = sameTlBase && sameTlPeriod && isPureKamMove2;
    if (sameTeam && r.movement_type === 'transfer_out') return null;
    if (sameTeam && r.movement_type === 'transfer_in')  return 'core_nrr';
    return r.movement_type;
  }

  var scopedRows = allRows.filter(_rowInScope);
  if (!scopedRows.length) return null;

  var base_month = scopedRows[0].base_month || QNRR_CFG.base_month;
  var months   = [];
  var monthSet = {};
  scopedRows.forEach(function (r) {
    if (!monthSet[r.period_month]) { monthSet[r.period_month] = 1; months.push(r.period_month); }
  });
  months.sort();

  // ── Build baseMap from first period-month rows ──────────────────────────
  var baseMap = {};
  var baseMonthRows = scopedRows.filter(function (r) { return r.period_month === months[0]; });
  baseMonthRows.forEach(function (r) {
    // transfer_in excluded (like handover): its base_gmv belongs to the
    // PREVIOUS owner and is added exactly once by the symmetric transfer_in
    // adjustment below. Effective (not raw) movement, so a same-team
    // KAM↔KAM move reclassified to core_nrr at tl/admin scope stays in the
    // base — it was this scope's outlet in the base month already.
    if (r.base_gmv > 0 && !baseMap[r.outlet_id] && r.movement_type !== 'handover'
        && _effectiveMovement(r) !== 'transfer_in') {
      baseMap[r.outlet_id] = { gmv: r.base_gmv, days: r.base_days || 31, account_id: r.account_id };
    }
  });

  var base_gmv_original = 0;
  var base_norm_original = 0;
  Object.keys(baseMap).forEach(function (oid) {
    var b = baseMap[oid];
    base_gmv_original  += b.gmv;
    base_norm_original += b.gmv / b.days;
  });

  // ── Core-cohort transfer_out across the entire quarter (retroactive) ────
  var coreTransferOutSet = {};
  scopedRows.forEach(function (r) {
    var mv = _effectiveMovement(r);
    if (mv === 'transfer_out' && baseMap[r.outlet_id] && !coreTransferOutSet[r.outlet_id]) {
      var b = baseMap[r.outlet_id];
      coreTransferOutSet[r.outlet_id] = {
        gmv_norm: b.gmv / b.days,
        account_name: r.account_name || '',
        period_month: r.period_month
      };
    }
  });

  var transfer_out_base_norm = 0;
  var transfer_out_base_gmv  = 0;
  var transfer_out_outlets   = [];
  Object.keys(coreTransferOutSet).forEach(function (oid) {
    var t = coreTransferOutSet[oid];
    transfer_out_base_norm += t.gmv_norm;
    transfer_out_base_gmv  += baseMap[oid].gmv;
    transfer_out_outlets.push({ outlet_id: oid, gmv_norm: t.gmv_norm, account_name: t.account_name, period_month: t.period_month });
  });

  // ── transfer_in across the entire quarter — symmetric with transfer_out ──
  var coreTransferInSet = {};
  scopedRows.forEach(function (r) {
    var mv = _effectiveMovement(r);
    if (mv === 'transfer_in' && !coreTransferInSet[r.outlet_id]) {
      var b_gmv  = parseFloat(r.base_gmv) || 0;
      var b_days = parseFloat(r.base_days) || 31;
      coreTransferInSet[r.outlet_id] = {
        gmv: b_gmv, gmv_norm: b_gmv / b_days,
        account_name: r.account_name || '', period_month: r.period_month
      };
    }
  });
  var transfer_in_base_norm = 0;
  var transfer_in_base_gmv  = 0;
  var transfer_in_outlets   = [];
  Object.keys(coreTransferInSet).forEach(function (oid) {
    var t = coreTransferInSet[oid];
    transfer_in_base_norm += t.gmv_norm;
    transfer_in_base_gmv  += t.gmv;
    transfer_in_outlets.push({ outlet_id: oid, gmv_norm: t.gmv_norm, account_name: t.account_name, period_month: t.period_month });
  });

  var base_norm = base_norm_original - transfer_out_base_norm + transfer_in_base_norm;
  var base_gmv  = base_gmv_original  - transfer_out_base_gmv  + transfer_in_base_gmv;
  var cohort_outlets = Object.keys(baseMap).length;

  var handover_base_norm = 0;
  baseMonthRows.forEach(function (r) {
    if (r.movement_type === 'handover' && r.base_gmv > 0) {
      var base_d = parseFloat(r.base_days) || 31;
      handover_base_norm += (parseFloat(r.base_gmv) || 0) / base_d * 30;
    }
  });

  var MOVEMENTS = ['core_nrr', 'core_nrr_churn', 'handover', 'new_sales',
    'expansion', 'comeback', 'transfer_in', 'transfer_out'];

  var by_month = {};
  months.forEach(function (month) {
    var monthRows = scopedRows.filter(function (r) { return r.period_month === month; });
    var segments = {};
    var outlets  = {};
    MOVEMENTS.forEach(function (m) { segments[m] = 0; outlets[m] = 0; });

    var seenOutlets = {};
    var nrr_curr_norm = 0;
    var core_nrr_base_sum = 0;

    monthRows.forEach(function (r) {
      var mv = _effectiveMovement(r);
      if (!mv) return;
      var base_d = parseFloat(r.base_days) || 31;
      var curr_d = parseFloat(r.curr_days) || 30;
      var gmvVal = (mv === 'core_nrr_churn' || mv === 'transfer_out')
        ? (parseFloat(r.base_gmv) || 0) / base_d * 30
        : (parseFloat(r.curr_gmv) || 0) / curr_d * 30;
      segments[mv] = (segments[mv] || 0) + gmvVal;
      outlets[mv]  = (outlets[mv]  || 0) + 1;

      if (mv === 'core_nrr') {
        core_nrr_base_sum += (parseFloat(r.base_gmv) || 0) / base_d * 30;
      }

      // Waived accounts (nrr_exclusions, approved for this exact
      // period_month) still count toward GMV/segments/outlets above — only
      // excluded from the NRR numerator (here) and denominator
      // (effectiveBaseNorm below).
      var waived = typeof nrrAccountWaivedForPeriod === 'function' &&
        nrrAccountWaivedForPeriod(r.account_id, month);

      if (!waived && (mv === 'core_nrr' || mv === 'core_nrr_churn' || mv === 'transfer_in') && r.base_gmv > 0) {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          var curr_days = r.curr_days || 30;
          nrr_curr_norm += curr_days > 0 ? r.curr_gmv / curr_days : 0;
        }
      }

      // Comeback: pure upside added only to the numerator against an
      // unchanged base (comeback outlets have base_gmv=0 by definition —
      // never in baseMap, never touch the denominator). Intentionally
      // asymmetric with transfer_in, which adds to BOTH sides.
      if (!waived && mv === 'comeback') {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          var curr_days_cb = r.curr_days || 30;
          nrr_curr_norm += curr_days_cb > 0 ? r.curr_gmv / curr_days_cb : 0;
        }
      }
    });

    // Waived-account base contribution removed per-month (unlike
    // transfer_out/in, which are quarter-wide and already baked into
    // base_norm above) — a waiver applies to one specific month only.
    var effectiveBaseNorm = base_norm;
    if (typeof nrrAccountWaivedForPeriod === 'function') {
      Object.keys(baseMap).forEach(function (oid) {
        var b = baseMap[oid];
        if (b.account_id && nrrAccountWaivedForPeriod(b.account_id, month)) {
          effectiveBaseNorm -= (b.gmv / b.days);
        }
      });
    }

    var nrr_pct = effectiveBaseNorm > 0 ? Math.round(nrr_curr_norm / effectiveBaseNorm * 100) : null;

    var total_gmv = MOVEMENTS
      .filter(function (m) { return m !== 'transfer_out' && m !== 'core_nrr_churn'; })
      .reduce(function (s, m) { return s + (segments[m] || 0); }, 0);

    var curr_days_sample = monthRows.find(function (r) { return r.curr_days > 0; });
    var curr_days = curr_days_sample ? curr_days_sample.curr_days : 30;
    var contraction = (segments.core_nrr || 0) - core_nrr_base_sum;

    var monthParts  = month.split('-');
    var daysInMonth = new Date(parseInt(monthParts[0], 10), parseInt(monthParts[1], 10), 0).getDate();
    var isPartial   = curr_days > 0 && curr_days < daysInMonth - 2;

    by_month[month] = {
      nrr_pct: nrr_pct, effective_base_norm: effectiveBaseNorm, total_gmv: total_gmv, segments: segments, outlets: outlets,
      rows: monthRows, curr_days: curr_days, days_in_month: daysInMonth,
      is_partial: isPartial, core_nrr_base: core_nrr_base_sum, contraction: contraction
    };
  });

  return {
    quarter: QNRR_CFG.quarter,
    base_month: base_month,
    months: months,
    base_gmv: base_gmv,
    base_norm: base_norm,
    base_norm_original: base_norm_original,
    transfer_out_base_norm: transfer_out_base_norm,
    transfer_out_outlets: transfer_out_outlets,
    transfer_in_base_norm: transfer_in_base_norm,
    transfer_in_outlets: transfer_in_outlets,
    handover_base_norm: handover_base_norm,
    cohort_outlets: cohort_outlets,
    by_month: by_month
  };
}
window._qnrrCompute = _qnrrCompute;

// ── nrrComputeBucket — PM/Admin portfolio-view NRR, grouped by account_type ──
// PM/Admin data (pm_view.csv / admin_view.csv) has NO kam/tl email columns at
// all — there is no per-person or per-team ownership concept for these two
// portfolio types, only account_type (SA/MC vs Chain). This is NOT a port
// from Sense (nothing in Sense computes PM/Admin NRR today) — it's the same
// %NRR formula as _qnrrCompute above, re-targeted to filter by
// nrrAccountBucket(row) === bucket instead of kam/tl email.
//
// Deliberately simpler than _qnrrCompute in two ways:
//  1. No _effectiveMovement-style neutralization — there's no "same-team
//     transfer" concept across account_type buckets, so every transfer_in/
//     transfer_out counts at face value, always.
//  2. No filtering by current_portfolio — exactly like rep_view rows are
//     never filtered by current_portfolio in _qnrrCompute, pm_view.csv /
//     admin_view.csv rows already represent "this portfolio's movement
//     story" end to end (including rows where current_portfolio shows the
//     outlet left to KAM/SALE this quarter) — filtering them out would
//     incorrectly drop real transfer_out/in adjustments.
//
// rows: the full allRows array from bulkPmData or bulkAdminData.
// bucket: 'chain' | 'sa_mc' | 'other' (see nrrAccountBucket in nrr_data.js).
function nrrComputeBucket(rows, bucket) {
  if (!rows || !rows.length) return null;
  var bucketRows = rows.filter(function (r) { return nrrAccountBucket(r) === bucket; });
  return nrrComputeRowsPool(bucketRows, bucket);
}
window.nrrComputeBucket = nrrComputeBucket;

// ── nrrComputeRowsPool — the pooled-rows NRR formula itself (v5 extract) ──
// Extracted verbatim from nrrComputeBucket so the SAME formula also serves
// the VP view (vp_view.csv: all three portfolios pooled, no bucket filter).
// The formula is naturally correct for VP: transfer_out still subtracts
// from the denominator, and the transfer_in adjustment computes to zero on
// its own because VP rows contain no transfer_in (verified in the Q2 vp
// SQL — inter-portfolio moves are invisible inside one pool).
function nrrComputeRowsPool(bucketRows, bucketLabel) {
  if (!bucketRows || !bucketRows.length) return null;

  function effMv(r) {
    if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) return 'core_nrr_churn';
    return r.movement_type;
  }

  var months = [];
  var monthSet = {};
  bucketRows.forEach(function (r) {
    if (!monthSet[r.period_month]) { monthSet[r.period_month] = 1; months.push(r.period_month); }
  });
  months.sort();
  var baseMonth = months[0];

  var baseMap = {};
  bucketRows.filter(function (r) { return r.period_month === baseMonth; }).forEach(function (r) {
    // Same month-1 transfer_in exclusion as _qnrrCompute's baseMap (see the
    // divergence note in the file header) — pm_view.csv carries inbound
    // transfer_in rows too, so the pool base double-counts identically.
    if (r.base_gmv > 0 && !baseMap[r.outlet_id] && r.movement_type !== 'handover'
        && effMv(r) !== 'transfer_in') {
      baseMap[r.outlet_id] = { gmv: r.base_gmv, days: r.base_days || 31, account_id: r.account_id };
    }
  });

  var base_norm_original = 0;
  Object.keys(baseMap).forEach(function (oid) { base_norm_original += baseMap[oid].gmv / baseMap[oid].days; });

  var transferOutNorm = 0;
  var transfer_out_outlets = [];
  var seenOut = {};
  bucketRows.forEach(function (r) {
    if (effMv(r) === 'transfer_out' && baseMap[r.outlet_id] && !seenOut[r.outlet_id]) {
      seenOut[r.outlet_id] = true;
      transferOutNorm += baseMap[r.outlet_id].gmv / baseMap[r.outlet_id].days;
      transfer_out_outlets.push({ outlet_id: r.outlet_id, account_name: r.account_name || '', period_month: r.period_month });
    }
  });

  var transferInNorm = 0;
  var transfer_in_outlets = [];
  var seenIn = {};
  bucketRows.forEach(function (r) {
    if (effMv(r) === 'transfer_in' && !seenIn[r.outlet_id]) {
      seenIn[r.outlet_id] = true;
      var b_gmv = parseFloat(r.base_gmv) || 0;
      var b_days = parseFloat(r.base_days) || 31;
      transferInNorm += b_gmv / b_days;
      transfer_in_outlets.push({ outlet_id: r.outlet_id, account_name: r.account_name || '', period_month: r.period_month });
    }
  });

  var base_norm = base_norm_original - transferOutNorm + transferInNorm;
  var cohort_outlets = Object.keys(baseMap).length;

  // Handover base — base-month GMV of handover-cohort outlets, ×30
  // normalized. Mirrors _qnrrCompute's handover_base_norm so the shared
  // chart's base-column slate segment and the "cohort มิ.ย." table row
  // reconcile for PM/Admin/VP views too (v5 addition; was silently 0 for
  // bucket results in v4).
  var handover_base_norm = 0;
  bucketRows.filter(function (r) { return r.period_month === baseMonth; }).forEach(function (r) {
    if (r.movement_type === 'handover' && r.base_gmv > 0) {
      var hb_d = parseFloat(r.base_days) || 31;
      handover_base_norm += (parseFloat(r.base_gmv) || 0) / hb_d * 30;
    }
  });

  var by_month = {};
  months.forEach(function (month) {
    var monthRows = bucketRows.filter(function (r) { return r.period_month === month; });
    var segments = {}; var outlets = {};
    ['core_nrr', 'core_nrr_churn', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in', 'transfer_out'].forEach(function (m) {
      segments[m] = 0; outlets[m] = 0;
    });
    var seenOutlets = {};
    var nrr_curr_norm = 0;

    monthRows.forEach(function (r) {
      var mv = effMv(r);
      var base_d = parseFloat(r.base_days) || 31;
      var curr_d = parseFloat(r.curr_days) || 30;
      var gmvVal = (mv === 'core_nrr_churn' || mv === 'transfer_out')
        ? (parseFloat(r.base_gmv) || 0) / base_d * 30
        : (parseFloat(r.curr_gmv) || 0) / curr_d * 30;
      segments[mv] = (segments[mv] || 0) + gmvVal;
      outlets[mv] = (outlets[mv] || 0) + 1;

      var waived = typeof nrrAccountWaivedForPeriod === 'function' &&
        nrrAccountWaivedForPeriod(r.account_id, month);

      if (!waived && (mv === 'core_nrr' || mv === 'core_nrr_churn' || mv === 'transfer_in') && r.base_gmv > 0) {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          nrr_curr_norm += r.curr_days > 0 ? r.curr_gmv / r.curr_days : 0;
        }
      }
      if (!waived && mv === 'comeback' && !seenOutlets[r.outlet_id]) {
        seenOutlets[r.outlet_id] = true;
        nrr_curr_norm += r.curr_days > 0 ? r.curr_gmv / r.curr_days : 0;
      }
    });

    var effectiveBaseNorm = base_norm;
    if (typeof nrrAccountWaivedForPeriod === 'function') {
      Object.keys(baseMap).forEach(function (oid) {
        var b = baseMap[oid];
        if (b.account_id && nrrAccountWaivedForPeriod(b.account_id, month)) {
          effectiveBaseNorm -= (b.gmv / b.days);
        }
      });
    }

    var nrr_pct = effectiveBaseNorm > 0 ? Math.round(nrr_curr_norm / effectiveBaseNorm * 100) : null;

    // v4 additive fields mirroring _qnrrCompute's month block, so the
    // shared movement chart/table + expansion components can consume both
    // result shapes identically. (This function is NOT a Sense port — safe
    // to extend, per header comment. _qnrrCompute stays frozen.)
    var total_gmv = ['core_nrr', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in']
      .reduce(function (s, m) { return s + (segments[m] || 0); }, 0);
    var curr_days_sample = monthRows.find(function (r) { return r.curr_days > 0; });
    var curr_days = curr_days_sample ? curr_days_sample.curr_days : 30;
    var monthParts = month.split('-');
    var daysInMonth = new Date(parseInt(monthParts[0], 10), parseInt(monthParts[1], 10), 0).getDate();
    var isPartial = curr_days > 0 && curr_days < daysInMonth - 2;

    by_month[month] = {
      nrr_pct: nrr_pct, effective_base_norm: effectiveBaseNorm, segments: segments, outlets: outlets,
      rows: monthRows, total_gmv: total_gmv,
      curr_days: curr_days, days_in_month: daysInMonth, is_partial: isPartial
    };
  });

  return {
    bucket: bucketLabel || null,
    // baseMonth above is the first PERIOD month (used only to pick which
    // rows carry the base cohort). The actual base month label is the
    // quarter config's fixed base month — same convention as _qnrrCompute.
    base_month: QNRR_CFG.base_month,
    base_norm: base_norm,
    base_norm_original: base_norm_original,
    transfer_out_base_norm: transferOutNorm,
    transfer_out_outlets: transfer_out_outlets,
    transfer_in_base_norm: transferInNorm,
    transfer_in_outlets: transfer_in_outlets,
    handover_base_norm: handover_base_norm,
    cohort_outlets: cohort_outlets,
    months: months,
    by_month: by_month
  };
}
window.nrrComputeRowsPool = nrrComputeRowsPool;

// ── nrrClassifyRow — standalone per-row classifier for outlet-level UI ──
// _effectiveMovement above is a closure private to _qnrrCompute (matches
// Sense's own source exactly, on purpose — do not touch it). The drill-down
// UI (movement badges on individual outlet rows) needs the same
// classification available OUTSIDE that closure, so this is a parameterized
// copy of the identical logic. If _effectiveMovement above ever changes,
// this must change too, in lockstep.
function nrrClassifyRow(r, scope, myTlEmail) {
  if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) {
    return 'core_nrr_churn';
  }
  if (scope === 'kam') return r.movement_type;

  var isOrgWideView = (scope === 'admin') || (scope === 'tl' && !myTlEmail);
  if (isOrgWideView) {
    var isPureKamMoveOrg = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
    if (isPureKamMoveOrg && r.movement_type === 'transfer_out') return null;
    if (isPureKamMoveOrg && r.movement_type === 'transfer_in')  return 'core_nrr';
    return r.movement_type;
  }

  var sameTlBase   = r.base_tl_email && r.base_tl_email === myTlEmail;
  var sameTlPeriod = r.latest_tl_email === myTlEmail;
  var isPureKamMove = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
  var sameTeam = sameTlBase && sameTlPeriod && isPureKamMove;
  if (sameTeam && r.movement_type === 'transfer_out') return null;
  if (sameTeam && r.movement_type === 'transfer_in')  return 'core_nrr';
  return r.movement_type;
}
window.nrrClassifyRow = nrrClassifyRow;

<script>
// ── nrr_data.js — R2 CSV fetch + parse for /nrr ──────────────────────────
// parseCSVRow ported verbatim from src/02_data_pipeline.js (repo-wide
// convention — no external CSV library anywhere in this codebase).
// The bulkQnrrData shape built here matches EXACTLY what Sense's own
// bulk-qnrr-single handler builds (src/02_data_pipeline.js:1120-1176),
// including the 29-column order, so nrr_logic.js's ported _qnrrCompute
// works unmodified against it.

var R2_BASE = 'https://pub-12078d17646340808024e8cc95504995.r2.dev';

window.bulkQnrrData = { loaded: false };

function parseCSVRow(row) {
  var fields = []; var cur = ''; var inQ = false;
  for (var i = 0; i < row.length; i++) {
    var c = row[i];
    if (inQ) {
      if (c === '"' && row[i + 1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cur += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
  }
  fields.push(cur.trim());
  return fields;
}

function _nrrParseQnrrCsv(text) {

  var byKamEmail = {}, byTlEmail = {}, allRows = [];

    if (!p[0] || !p[1]) return;
    var row = {
      period_month:            (p[0] || '').trim(),
      movement_type:           (p[1] || '').trim(),
      transfer_scope:          (p[2] || '').trim(),
      current_portfolio:       (p[3] || '').trim(),
      current_staff_owner:     (p[4] || '').trim(),
      base_portfolio:          (p[5] || '').trim(),
      base_staff_owner:        (p[6] || '').trim(),
      outlet_id:               (p[7] || '').trim(),
      account_id:              (p[8] || '').trim(),
      account_name:            (p[9] || '').trim(),
      res_name:                (p[10] || '').trim(),
      account_type:            (p[11] || '').trim(),
      cohort_month:            (p[12] || '').trim(),
      curr_gmv:                parseFloat(p[13]) || 0,
      base_gmv:                parseFloat(p[14]) || 0,
      base_days:               parseInt(p[15], 10) || 31,
      curr_days:               parseInt(p[16], 10) || 30,

    };

    // data) are intentionally left out of the per-person indices but still
    // land in allRows — org/admin-scope aggregation must never depend on a
    // per-person key being present (see docs on the v840-class bug).
    if (row.latest_kam_email) {

}

// an explicit "PM/Admin data not available yet" state, never fail silently
// (this file is genuinely not uploaded to R2 as of first implementation —
// confirmed 404 when checked directly).
async function _nrrFetchPortfolioCsv(filename) {
  var url = R2_BASE + '/' + filename + '?cb=' + Date.now();
  try {
    var res = await fetch(url);
    if (res.status === 404) return { allRows: [], loaded: false, notFound: true };
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    var allRows = _nrrParsePortfolioCsv(text);
    // Staleness guard (added 2026-07-09): pm_view.csv/admin_view.csv are
    // each regenerated by a separate BigQuery run + manual R2 upload, not
    // wired to any auto-refresh — a run gets skipped and nobody notices
    // until the numbers look off (caught for admin_view: it silently held
    // 2026-Q2 data — Apr/May/Jun — three months INTO Q3). Flag it loudly
    // instead of quietly rendering last quarter's movement as "current."
    var months = Array.from(new Set(allRows.map(function (r) { return r.period_month; })));
    var isStale = months.length > 0 && !months.some(function (m) { return QNRR_CFG.q_months.indexOf(m) > -1; });
    return { allRows: allRows, loaded: true, loadedAt: Date.now(), months: months, isStale: isStale };
  } catch (e) {
    console.warn('[nrr] failed to load ' + filename, e);
    return { allRows: [], loaded: false, error: e.message };
  }
}

// Mirrors src/02_data_pipeline.js's per-KAM bundle handler exactly: same
// R2_BASE, same safe-key derivation, same "no kam_email column" format
// (that column only exists in the ALL-KAMs bulk file, not the per-KAM one —
// confirmed by reading the real parser, not assumed from the SQL header
// comment, which describes the bulk file's 7 cols, not this 6-col one).
var nrrUpsellBundleCache = {}; // { [email]: {data, baselineGroups, loaded} }
var nrrUpsellBundleInFlight = {};

function _nrrKamSafeKey(email) {
  return (email || '').toLowerCase().replace(/[^a-z0-9]/g, '_');
}

var _TH_MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                  'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

function nrrThMonthLabel(d) { return _TH_MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543); }

// Every existing last_order_date consumer just echoes the raw ISO string —
// this is a deliberate new convention for the churn drawer specifically,
// since "29 มิ.ย." reads far better next to a Thai-labeled ฿ amount than
// "2026-06-29" does. Day-level only (no year) to match the month chips'
// own terseness.
function nrrShortThaiDate(iso) {
  var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
  if (!m) return null;
  var mIdx = parseInt(m[2], 10) - 1;
  if (mIdx < 0 || mIdx > 11) return null;
  return parseInt(m[3], 10) + ' ' + _TH_MONTHS[mIdx];
}
window.nrrShortThaiDate = nrrShortThaiDate;

// v860-fix (2026-07-13): this comment used to say P1's baseline
// "deliberately floats with today's date, faithfully replicating" the real
// engine — that was true before commit 44c8bee, but the real engine's own
// P1 baseline now FREEZES to the quarter's base month in quarterly mode
// (02_data_pipeline.js:1061-1065, the `_q3cBaseMonth` branch). This was a
// real, unfixed divergence between /nrr's drill-down and Sense's actual
// payout math — found during a repo-wide commission-quarterly-alignment
// audit. Now mirrors that branch exactly: pass baseMonthIso (/nrr always
// does — QNRR_CFG.base_month is always set) to freeze the window; the
// rolling fallback below only exists for signature parity with the real
// engine, which still supports a non-quarterly mode /nrr doesn't need.
function nrrP1BaselineLabels(baseMonthIso) {
  var set = {};
  if (baseMonthIso) {
    var p = baseMonthIso.split('-');
    var yr = parseInt(p[0], 10), mo = parseInt(p[1], 10);
    [0, 1, 2].forEach(function (i) {
      var d = new Date(yr, mo - 1 - i, 1);
      set[nrrThMonthLabel(d)] = true;
    });
    return set;
  }
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  [1, 2, 3].forEach(function (i) {
    var d = new Date(lag.getFullYear(), lag.getMonth() - i, 1);
    set[nrrThMonthLabel(d)] = true;
  });
  return set;
}

// Mirrors 07a_commission_engine.js's _commElapsedQuarterLabels exactly —
// every ELAPSED month of the quarter (base_month+1, +2, +3, capped at
// today's lag-1 date) — so /nrr's P1/P3 drill-down can sum a real
// cumulative streak instead of evaluating only the current month.
function _nrrCommElapsedQuarterLabels(baseMonthIso) {
  if (!baseMonthIso) return [];
  var parts = baseMonthIso.split('-');
  var baseYr = parseInt(parts[0], 10), baseMo = parseInt(parts[1], 10);
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  var out = [];
  for (var i = 1; i <= 3; i++) {
    var d = new Date(baseYr, baseMo - 1 + i, 1);
    if (d > lag) break;
    out.push(nrrThMonthLabel(d));
  }
  return out;
}
window._nrrCommElapsedQuarterLabels = _nrrCommElapsedQuarterLabels;

function nrrCommCurrentMonthLabel() {
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  return nrrThMonthLabel(lag);
}

// Quarterly-pinned window: labels for baseMonthIso ('2026-06') and the
// (count-1) months before it — matches 07a_commission_engine.js's
// _commBaseMonthLabels(baseMonthOverride, count) exactly.
function nrrP3WindowLabels(baseMonthIso, count) {
  var parts = baseMonthIso.split('-');
  var yr = parseInt(parts[0], 10), mo = parseInt(parts[1], 10); // mo is 1-based
  var out = [];
  for (var i = 0; i < count; i++) {
    var d = new Date(yr, mo - 1 - i, 1);
    out.push(nrrThMonthLabel(d));
  }
  return out;
}
window.nrrP3WindowLabels = nrrP3WindowLabels;
window.nrrCommCurrentMonthLabel = nrrCommCurrentMonthLabel;

function nrrDaysInLabel(label) {
  try {
    var parts = label.split(' ');
    var mIdx = _TH_MONTHS.indexOf(parts[0]);
    var year = parseInt(parts[1], 10) - 543;
    if (mIdx < 0 || !year) return 30;
    return new Date(year, mIdx + 1, 0).getDate();
  } catch (e) { return 30; }
}
window.nrrDaysInLabel = nrrDaysInLabel;

async function nrrFetchUpsellBundle(kamEmail, baseMonthIso) {
  if (nrrUpsellBundleCache[kamEmail] && nrrUpsellBundleCache[kamEmail].loaded) return nrrUpsellBundleCache[kamEmail];
  if (nrrUpsellBundleInFlight[kamEmail]) return nrrUpsellBundleInFlight[kamEmail];
  var safeKey = _nrrKamSafeKey(kamEmail);
  var url = R2_BASE + '/sense_upsell_' + safeKey + '.csv?cb=' + Date.now();
  var p = (async function () {
    try {
      var res = await fetch(url);
      if (res.status === 404) return { data: {}, baselineGroups: {}, loaded: false, notFound: true };
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = await res.text();
      var lines = text.trim().split(/\r?\n/).filter(function (l) { return l.trim(); });
      if (lines.length && /account_id/i.test(lines[0])) lines = lines.slice(1);

      var p1Labels = nrrP1BaselineLabels(baseMonthIso);
      var currLabel = nrrCommCurrentMonthLabel();
      var data = {};             // accountId -> outletId -> groupKey -> monthLabel -> {existingGmv,totalGmv}
      var baselineGroups = {};   // accountId -> outletId -> Set-like object of groupKey -> true

      lines.forEach(function (l) {
        // Per-KAM bundle has NO kam_email column: account_id, outlet_id,
        // month_label, group_key, existing_gmv, total_gmv (6 cols).
        var p = parseCSVRow(l);
        var accountId = (p[0] || '').trim();
        var outletId = (p[1] || '').trim();
        var monthLabel = (p[2] || '').trim();
        var groupKey = (p[3] || '').trim();
        var existingGmv = parseFloat(p[4]) || 0;
        var totalGmv = parseFloat(p[5]) || 0;
        if (!accountId || !outletId || !monthLabel || !groupKey) return;

        if (!data[accountId]) data[accountId] = {};
        if (!data[accountId][outletId]) data[accountId][outletId] = {};
        if (!data[accountId][outletId][groupKey]) data[accountId][outletId][groupKey] = {};
        data[accountId][outletId][groupKey][monthLabel] = { existingGmv: existingGmv, totalGmv: totalGmv };

        // v860-fix: mirrors 02_data_pipeline.js:1104-1111's v854 fix — in
        // quarterly mode (baseMonthIso set) p1Labels is already a closed,
        // past-bounded window ending at the frozen base month, so it can
        // never include the row being tested by construction. Skip the
        // !==currLabel guard entirely in that mode (it exists only to stop
        // rolling mode's "current month" from counting as its own
        // baseline, and on the quarter's own day-1 the lag anchor still
        // reads base_month itself, wrongly colliding with it otherwise).
        if ((baseMonthIso || monthLabel !== currLabel) && totalGmv > 0 && p1Labels[monthLabel]) {
          if (!baselineGroups[accountId]) baselineGroups[accountId] = {};
          if (!baselineGroups[accountId][outletId]) baselineGroups[accountId][outletId] = {};
          baselineGroups[accountId][outletId][groupKey] = true;
        }
      });

      var bundle = { data: data, baselineGroups: baselineGroups, loaded: true, loadedAt: Date.now() };
      nrrUpsellBundleCache[kamEmail] = bundle;
      return bundle;
    } catch (e) {
      console.warn('[nrr] failed to load upsell bundle for ' + kamEmail, e);
      return { data: {}, baselineGroups: {}, loaded: false, error: e.message };
    } finally {
      delete nrrUpsellBundleInFlight[kamEmail];
    }
  })();
  nrrUpsellBundleInFlight[kamEmail] = p;
  return p;
}

// v4 (2026-07-13): portview.csv is a single current-state snapshot with no
// date/period column otherwise — data_asof_date (= the SQL's own lag_date)
// is the only signal the app has for "how fresh is this file." Computed
// once per fetch (not per-row, every row shares the same value) so
// nrrStalePortviewBannerHtml can render one banner without re-deriving this
// on every call. daysBehind=0 means "run today" (asOfDate = yesterday,
// matching the same day-1 lag convention used everywhere else in /nrr);
// null means the CSV predates this column (un-re-run) — banner skips
// entirely rather than guessing, same 404-graceful precedent as other
// new columns added to existing CSVs this session.
function _nrrPortviewAsOfDate(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T00:00:00');
  return isNaN(d.getTime()) ? null : d;
}
function _nrrPortviewDaysBehind(asOfDate) {
  if (!asOfDate) return null;
  var expected = new Date();
  expected.setDate(expected.getDate() - 1);
  expected.setHours(0, 0, 0, 0);
  return Math.round((expected - asOfDate) / 86400000);
}

  // already carries month_label per row; staleness just means "the latest

function _nrrBulkHistoryExpectedLatestMonth() {
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  var closed = new Date(lag.getFullYear(), lag.getMonth(), 1);
  closed.setMonth(closed.getMonth() - 1);
  return nrrThMonthLabel(closed);
}
