    other: _nrrActualizeResult(nrrComputeBucket(ad.allRows, 'other'))
  };
}
window.nrrAdminResult = nrrAdminResult;

// ── v5: VP pooled result — ALL portfolios as one book ────────────────────
// Same formula as the buckets (nrrComputeRowsPool), no bucket filter.
function nrrVpResult() {
  var vd = window.bulkVpData;
  if (!vd || !vd.loaded || !vd.allRows.length) return null;
  return _nrrActualizeResult(nrrComputeRowsPool(vd.allRows, 'vp'));
}
window.nrrVpResult = nrrVpResult;

// ── v5: handover cohort model (replicates Sense's verified pattern) ──────
// movement_type already encodes the cohort split at the SQL level:
//   'handover'  = new_user_exp_date in the base month → "cohort มิ.ย."
//   'new_sales' = exp date during the quarter → one cohort per the FIRST
//                 period_month the outlet appears in (claim-dedup), with
//                 its GMV carried forward into later months.
// Returns:
// {
//   handover:    { by_month: {m: {gmv, outlets:[{row,movement}]}} },
//   new_cohorts: [ { cohort_month, by_month: {m: {gmv, outlets}} } ]  // non-empty only
// }
function nrrHandoverCohorts(result) {
  var model = { handover: { by_month: {} }, new_cohorts: [] };
  if (!result || !result.months) return model;

  result.months.forEach(function (month) {
    var bm = result.by_month[month];
    var outlets = (bm.rows || []).filter(function (r) { return r.movement_type === 'handover'; })
      .map(function (r) { return { row: r, movement: 'handover' }; });
    var gmv = outlets.reduce(function (s, o) {
      var d = parseFloat(o.row.curr_days) || 30;
      return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * nrrDaysIn(o.row.period_month) : 0);
    }, 0);
    model.handover.by_month[month] = { gmv: gmv, outlets: outlets };
  });

  // new_sales cohorts: claim each outlet into the first month it appears.
  var claimed = {}; // outlet_id -> cohort_month
  result.months.forEach(function (month) {
    (result.by_month[month].rows || []).forEach(function (r) {
      if (r.movement_type === 'new_sales' && !claimed[r.outlet_id]) claimed[r.outlet_id] = month;
    });
  });
  var cohortMonths = {};
  Object.keys(claimed).forEach(function (oid) { cohortMonths[claimed[oid]] = true; });

  Object.keys(cohortMonths).sort().forEach(function (cm) {
    var cohort = { cohort_month: cm, by_month: {} };
    result.months.forEach(function (month) {
      if (month < cm) { cohort.by_month[month] = null; return; } // "—" before cohort month
      var outlets = (result.by_month[month].rows || []).filter(function (r) {
        return r.movement_type === 'new_sales' && claimed[r.outlet_id] === cm;
      }).map(function (r) { return { row: r, movement: 'new_sales' }; });
      var gmv = outlets.reduce(function (s, o) {
        var d = parseFloat(o.row.curr_days) || 30;
        return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * nrrDaysIn(o.row.period_month) : 0);
      }, 0);
      cohort.by_month[month] = { gmv: gmv, outlets: outlets };
    });
    model.new_cohorts.push(cohort);
  });

  return model;
}
window.nrrHandoverCohorts = nrrHandoverCohorts;

// VP "Total Portfolio" — 3 separate %NRR (KAM/PM/Admin), never blended into
// one number (per user's explicit answer), plus one combined GMV figure.
function nrrTotalPortfolio() {
  var kam = nrrOrgResult();
  var kamPeriod = nrrCurrentPeriod(kam);
  var kamBm = kam && kamPeriod ? kam.by_month[kamPeriod] : null;
  var kamPct = kamBm ? kamBm.nrr_pct : null;
  var kamGmv = kam ? Math.round((kamBm && kamBm.effective_base_norm != null ? kamBm.effective_base_norm : kam.base_norm) * nrrBaseDays()) : 0;

  var pm = nrrPmResult();
  var pmPct = _nrrBlendedBucketPct(pm);
  var pmGmv = _nrrBlendedBucketGmv(pm);

  var admin = nrrAdminResult();
  var adminPct = _nrrBlendedBucketPct(admin);
  var adminGmv = _nrrBlendedBucketGmv(admin);

  return {
    kam: { pct: kamPct, gmv: kamGmv },
    pm: { pct: pmPct, gmv: pmGmv },
    admin: { pct: adminPct, gmv: adminGmv },
    total_gmv: kamGmv + pmGmv + adminGmv
  };
}
window.nrrTotalPortfolio = nrrTotalPortfolio;

// For a PM/Admin section's own headline %NRR (e.g. "PM overall"), blend its
// chain+sa_mc+other buckets back into one pooled numerator/denominator —
// this is a within-portfolio blend (chain+sa_mc are both still "PM"), not
// the KAM/PM/Admin cross-portfolio blend the user explicitly said NOT to do.
function _nrrBlendedBucketPct(bucketResult) {
  if (!bucketResult) return null;
  var buckets = ['chain', 'sa_mc', 'other'];
  var num = 0, den = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (!r) return;
    var period = nrrCurrentPeriod(r);
    var bm = period ? r.by_month[period] : null;
    if (!bm || bm.nrr_pct == null) return;
    var w = bm.effective_base_norm != null ? bm.effective_base_norm : r.base_norm;
    den += w;
    num += (bm.nrr_pct / 100) * w;
  });
  return den > 0 ? Math.round(num / den * 100) : null;
}

function _nrrBlendedBucketGmv(bucketResult) {
  if (!bucketResult) return 0;
  var buckets = ['chain', 'sa_mc', 'other'];
  var total = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (!r) return;
    var period = nrrCurrentPeriod(r);
    var bm = period ? r.by_month[period] : null;
    total += Math.round((bm && bm.effective_base_norm != null ? bm.effective_base_norm : r.base_norm) * nrrBaseDays());
  });
  return total;
}
</script>
<script>
// ── nrr_commission.js — commission $ tie-in ──────────────────────────────
// Deliberately does NOT re-implement _commBuildKamPayout/_commBuildTlPayout
// (src/07a_commission_engine.js) — that engine pulls in most of Sense's
// global state (bulkUpsellData, portviewBulkData, governance policy from
// Supabase, gate/cap rules...) and re-deriving it here would risk getting
// real payout numbers subtly wrong outside its native environment.
//
// Instead: query commission_payout_snapshots directly, the SAME table and
// SAME query shape src/dashboard/dash_commission.js already uses. These
// rows are the authoritative, pre-computed output of that engine — under
// quarterly commission mode (confirmed live in the codebase, v829+), each
// period_month's snapshot already reflects that month's payout computed
// from the current quarter's %NRR. We read, never recompute.
//
// Caveat surfaced in the UI (section 8 methodology note): a period_month's
// payout_amount is that MONTH's installment under quarterly NRR mode, not
// a lump quarter-end total — commission is paid out monthly all quarter.

var nrrCommSnapshots = null; // { byEmail: {email: [rows]} , loaded }

async function nrrFetchCommissionSnapshots() {
  if (nrrCommSnapshots && nrrCommSnapshots.loaded) return nrrCommSnapshots;
  if (!supa) { nrrCommSnapshots = { byEmail: {}, loaded: false, error: 'no_auth' }; return nrrCommSnapshots; }
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .in('period_month', QNRR_CFG.q_months);
    var rows = resp.data || [];
    var byEmail = {};
    rows.forEach(function (r) {
      var key = r.beneficiary_email;
      if (!key) return;
      if (!byEmail[key]) byEmail[key] = [];
      byEmail[key].push(r);
    });
    nrrCommSnapshots = { byEmail: byEmail, rows: rows, loaded: true };
  } catch (e) {
    console.warn('[nrr] commission snapshot fetch failed', e);
    nrrCommSnapshots = { byEmail: {}, loaded: false, error: e.message };
  }
  return nrrCommSnapshots;
}
window.nrrFetchCommissionSnapshots = nrrFetchCommissionSnapshots;

// Latest available quarter-month snapshot for one beneficiary email.
function nrrLatestSnapshotFor(email) {
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return null;
  var rows = (nrrCommSnapshots.byEmail[email] || []).slice();
  if (!rows.length) return null;
  rows.sort(function (a, b) { return a.period_month < b.period_month ? 1 : -1; });
  return rows[0];
}
window.nrrLatestSnapshotFor = nrrLatestSnapshotFor;

// Sum of latest-available-month payouts across a list of emails (used for
// the org/team commission KPI tiles in section 5).
function nrrSumLatestPayouts(emails) {
  var total = 0; var found = 0; var missing = 0;
  emails.forEach(function (email) {
    var snap = nrrLatestSnapshotFor(email);
    if (snap && snap.payout_amount != null) { total += Number(snap.payout_amount) || 0; found++; }
    else missing++;
  });
  return { total: total, found: found, missing: missing };
}
window.nrrSumLatestPayouts = nrrSumLatestPayouts;

// All available quarter-month snapshots for one email, keyed by period_month
// (nrrLatestSnapshotFor only returns the single latest — the trend strip
// needs all three quarter months to draw its bars).
function nrrSnapshotsForEmailAcrossMonths(email) {
  var out = {};
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return out;
  (nrrCommSnapshots.byEmail[email] || []).forEach(function (r) { out[r.period_month] = r; });
  return out;
}
window.nrrSnapshotsForEmailAcrossMonths = nrrSnapshotsForEmailAcrossMonths;

// ── Live rates/thresholds (target_settings) — footnote only, never used to
// alter a displayed payout number. Mirrors 07a_commission_engine.js's
// _commGetConfig key pattern exactly: '{metricCode}_params' -> JSON object.
var nrrCommRatesCache = null; // { byKey: {key: parsedValue}, loaded }

async function nrrFetchCommissionRates() {
  if (nrrCommRatesCache && nrrCommRatesCache.loaded) return nrrCommRatesCache;
  if (!supa) { nrrCommRatesCache = { byKey: {}, loaded: false, error: 'no_auth' }; return nrrCommRatesCache; }
  try {
    var resp = await supa.from('target_settings').select('key,value');
    var rows = resp.data || [];
    var byKey = {};
    rows.forEach(function (s) {
      if (/_params$/.test(s.key)) {
        try { byKey[s.key] = JSON.parse(s.value); }
        catch (e) { byKey[s.key] = s.value; }
      } else {
        byKey[s.key] = s.value;
      }
    });
    nrrCommRatesCache = { byKey: byKey, loaded: true };
  } catch (e) {
    console.warn('[nrr] target_settings fetch failed', e);
    nrrCommRatesCache = { byKey: {}, loaded: false, error: e.message };
  }
  return nrrCommRatesCache;
}
window.nrrFetchCommissionRates = nrrFetchCommissionRates;

function nrrCommRateGet(metricCode, paramName, fallback) {
  var raw = nrrCommRatesCache && nrrCommRatesCache.byKey ? nrrCommRatesCache.byKey[metricCode + '_params'] : null;
  if (raw && typeof raw === 'object' && raw[paramName] != null) return raw[paramName];
  return fallback;
}
window.nrrCommRateGet = nrrCommRateGet;

// ── Estimate engine v2 (2026-07-09) — mirrors the REAL payout structure ──
// The v1 estimator (ported from the retired TL dashboard) was a
// %-of-team-GMV scheme from an older Sales-TL plan — against today's
// fixed-amount tier plans it produced absurd numbers (฿834K for a TL whose
// real payout tops out at ฿50K×mult). v2 replicates what the Cockpit's
// engine actually does at Compute time, from the same live sources:
//
//   TL : NRR tier payout (commission_rule_tiers, e.g. 0/8K/12K/30K/50K)
//        × team upsell multiplier (tl_upsell_mult_params tiers on
//          team upsell GMV ÷ team base GMV, from sense_upsell_team.csv)
//   KAM: NRR tier payout (0/5K/10K)
//        + P1/P3 SKU comm + outlet comm (rates × sense_upsell_team.csv GMVs)
//        × NRR gate cap (gmv_gate_params: <95%→0, 95–98%→cap_1, ≥98%→1)
//        — handover retention NOT estimated (needs per-account handover
//          data); flagged in the returned note.
//
// Still a clearly-labeled ESTIMATE for unlocked periods only — %NRR is the
// MTD run-rate, upsell GMVs refresh on the team CSV's cadence.

// Plan tier tables + per-period assignments (4 small tables, fetched once).
var nrrCommPlansCache = { tiersByPlan: {}, assignments: {}, loaded: false };
async function nrrFetchCommissionPlans() {
  if (nrrCommPlansCache.loaded) return nrrCommPlansCache;
  try {
    var res = await Promise.all([
      supa.from('commission_plans').select('id,plan_code,beneficiary_role,status'),
      supa.from('commission_rules').select('id,plan_id,metric_code,active'),
      supa.from('commission_rule_tiers').select('rule_id,tier_order,min_value,max_value,payout_value'),
      supa.from('commission_plan_assignments').select('period_month,assignment_scope,assignee_key,plan_code')
    ]);
    var plans = res[0].data || [], rules = res[1].data || [];
    var tiers = res[2].data || [], assigns = res[3].data || [];
    var planById = {};
    plans.forEach(function (p) { planById[p.id] = p; });
    var tiersByPlan = {};
    rules.forEach(function (r) {
      if (r.metric_code !== 'nrr' || r.active === false) return;
      var plan = planById[r.plan_id];
      if (!plan) return;
      tiersByPlan[plan.plan_code] = tiers
        .filter(function (t) { return t.rule_id === r.id; })
        .sort(function (a, b) { return (a.tier_order || 0) - (b.tier_order || 0); });
    });
    var assignments = {};
    assigns.forEach(function (a) {
      assignments[a.period_month + '|' + a.assignment_scope + '|' + a.assignee_key] = a.plan_code;
    });
    nrrCommPlansCache = { tiersByPlan: tiersByPlan, assignments: assignments, loaded: true };
  } catch (e) {
    console.warn('[nrr] commission plans fetch failed', e);
    nrrCommPlansCache = { tiersByPlan: {}, assignments: {}, loaded: false, error: e.message };
  }
  return nrrCommPlansCache;
}
window.nrrFetchCommissionPlans = nrrFetchCommissionPlans;

// Engine's hardcoded fallback tiers (_commDefaultTiers) — used only if the
// plan tables can't be fetched, so the estimate degrades to STD not to 0.
function nrrCommDefaultTiers(role) {
  return role === 'tl'
    ? [{ min_value: null, max_value: 98.5, payout_value: 0 },
       { min_value: 98.5, max_value: 99,   payout_value: 0 },
       { min_value: 99,   max_value: 100,  payout_value: 8000 },
       { min_value: 100,  max_value: 102,  payout_value: 12000 },
       { min_value: 102,  max_value: 104,  payout_value: 30000 },
       { min_value: 104,  max_value: null, payout_value: 50000 }]
    : [{ min_value: null, max_value: 100,  payout_value: 0 },
       { min_value: 100,  max_value: 103,  payout_value: 5000 },
       { min_value: 103,  max_value: null, payout_value: 10000 }];
}

// Tier match — same open-interval convention as _commMatchTierByCode:
// pct >= min (null = open) && pct < max (null = open).
function nrrCommTierPayout(role, email, period, pct) {
  if (pct == null || isNaN(pct)) return 0;
  var std = role === 'tl' ? 'TL_NRR_STD' : 'KAM_NRR_STD';
  var code = nrrCommPlansCache.assignments[period + '|' + role + '|' + email] || std;
  var tiers = nrrCommPlansCache.tiersByPlan[code] || nrrCommPlansCache.tiersByPlan[std];
  if (!tiers || !tiers.length) tiers = nrrCommDefaultTiers(role);
  for (var i = 0; i < tiers.length; i++) {
    var t = tiers[i];
    var minOk = t.min_value == null || t.min_value === '' || pct >= Number(t.min_value);
    var maxOk = t.max_value == null || t.max_value === '' || pct < Number(t.max_value);
    if (minOk && maxOk) return Number(t.payout_value || 0);
  }
  return 0;
}
window.nrrCommTierPayout = nrrCommTierPayout;

// Full tier ladder with current/next flags + the pp gap to the next tier —
// feeds both the KAM/TL self-view tier chip+progress bar and the drawer's
// "วิธีคิดค่าคอมฯ" table. Reuses the exact same tier source/matching
// convention as nrrCommTierPayout (never a second source of truth).
function nrrCommTierTable(role, email, period, pct) {
  var std = role === 'tl' ? 'TL_NRR_STD' : 'KAM_NRR_STD';
  var code = nrrCommPlansCache.assignments[period + '|' + role + '|' + email] || std;
  var tiers = nrrCommPlansCache.tiersByPlan[code] || nrrCommPlansCache.tiersByPlan[std];
  if (!tiers || !tiers.length) tiers = nrrCommDefaultTiers(role);
  tiers = tiers.slice().sort(function (a, b) { return (Number(a.min_value) || -Infinity) - (Number(b.min_value) || -Infinity); });

  var currentIdx = -1;
  if (pct != null && !isNaN(pct)) {
    for (var i = 0; i < tiers.length; i++) {
      var t = tiers[i];
      var minOk = t.min_value == null || t.min_value === '' || pct >= Number(t.min_value);
      var maxOk = t.max_value == null || t.max_value === '' || pct < Number(t.max_value);
      if (minOk && maxOk) { currentIdx = i; break; }
    }
  }
  var nextIdx = currentIdx >= 0 && currentIdx < tiers.length - 1 ? currentIdx + 1 : -1;
  var rows = tiers.map(function (t, i) {
    return { min: t.min_value, max: t.max_value, payout: Number(t.payout_value || 0), label: t.payout_label || '',
      isCurrent: i === currentIdx, isNext: i === nextIdx };
  });
  var gapPp = (nextIdx >= 0 && pct != null) ? Math.max(0, Math.ceil(Number(tiers[nextIdx].min_value) - pct)) : null;
  return { tiers: rows, currentTier: currentIdx >= 0 ? rows[currentIdx] : null, nextTier: nextIdx >= 0 ? rows[nextIdx] : null, gapPp: gapPp };
}
window.nrrCommTierTable = nrrCommTierTable;

// Converts an estimate object (nrrEstimateTlCommission/nrrEstimateKamCommission's
// return shape) into an ordered list of "receipt" steps — one line per
// term of the real formula ((nrr_payout [+ upsell_comm]) × gate_cap [×
// team multiplier for TL] + handover.payout) — so the drawer can render
// the exact arithmetic instead of a paraphrased note. drillKey lets the
// renderer wire each line to its matching account-level section (or null
// for lines with no account list, e.g. the NRR tier line itself).
function nrrCommEstimateReceiptSteps(est) {
  if (!est) return [];
  var steps = [{ kind: 'add', first: true, label: 'NRR (' + est.pct + '%)', amount: est.nrr_payout, drillKey: 'nrr' }];
  if (est.kind === 'kam') {
    // v16: every component of the real formula gets its OWN line — always,
    // even at ฿0 — so the receipt never has a missing term and "why is
    // expansion separate from upsell" stops being a question (they're
    // visible siblings). Handover included at ฿0 too ("ไม่มีเดือนนี้").
    // A receipt must ADD UP exactly on screen: the last component absorbs
    // the per-line rounding remainder so Σ(lines) === subtotal to the baht.
    var p1r = est.p1_comm || 0, p3r = est.p3_comm || 0;
    var outR = (est.upsell_comm || 0) - p1r - p3r;
    var hoPay = (est.handover && est.handover.payout) || 0;
    steps.push({ kind: 'add', label: 'Upsell P1 · สินค้าใหม่', amount: p1r, drillKey: 'p1' });
    steps.push({ kind: 'add', label: 'Upsell P3 · สินค้าโต', amount: p3r, drillKey: 'p3' });
    steps.push({ kind: 'add', label: 'Expansion · ร้านขยาย 0.5%', amount: outR, drillKey: 'expansion' });
    // Handover is INSIDE the gate (engine 07a:691) — show it as a component
    // above the subtotal, then multiply the whole subtotal by the gate.
    steps.push({ kind: 'add', label: 'Handover · retention', amount: hoPay,
      meta: est.handover && est.handover.accounts ? est.handover.accounts + ' ร้าน · retention ' + est.handover.retention_pct + '%' : 'ไม่มีเดือนนี้',
      drillKey: est.handover && est.handover.detail && est.handover.detail.length ? 'handover' : null });
    steps.push({ kind: 'subtotal', label: 'รวมก่อน Gate', amount: est.nrr_payout + (est.upsell_comm || 0) + hoPay });
    steps.push({ kind: 'multiply', label: 'NRR Gate (' + est.pct + '% ' + (est.gate_cap >= 1 ? '≥' : '<') + ' ' + (est.gate_threshold || 98) + '%)', factor: est.gate_cap });
  } else {
    steps.push({ kind: 'multiply', label: 'ตัวคูณ upsell ทีม (' + (est.upsell_pct != null ? est.upsell_pct.toFixed(1) : '0.0') + '% ของฐาน)', factor: est.multiplier, drillKey: 'mult' });
  }
  steps.push({ kind: 'total', label: 'รวมค่าคอมฯ', amount: est.est });
  return steps;
}
window.nrrCommEstimateReceiptSteps = nrrCommEstimateReceiptSteps;

// Same receipt shape, sourced from a LOCKED snapshot's breakdown jsonb
// instead of a live estimate — field names match _commBuildSnapshotRows()
// (07a_commission_engine.js) exactly. Keeps one receipt renderer for both
// locked and unlocked periods — the whole point of this redesign is that
// both look the same.
function nrrCommSnapshotReceiptSteps(bd) {
  if (!bd) return [];
  var steps = [{ kind: 'add', first: true, label: 'NRR (' + (bd.nrr_pct != null ? bd.nrr_pct + '%' : '—') + ')', amount: bd.nrr_payout || 0, drillKey: 'nrr' }];
  if (bd.type === 'kam_full') {
    var sku = bd.upsell_sku || {};
    var upsell = ((sku.p1 && sku.p1.comm) || 0) + ((sku.p3 && sku.p3.comm) || 0) + ((bd.upsell_outlet && bd.upsell_outlet.commission) || 0);
    // Same add-up-exactly rule as the estimate steps: round P1/P3, the
    // Expansion line absorbs the remainder so Σ(lines) === subtotal.
    var p1Comm = Math.round((sku.p1 && sku.p1.comm) || 0);
    var p3Comm = Math.round((sku.p3 && sku.p3.comm) || 0);
    var outletComm = Math.round(upsell) - p1Comm - p3Comm;
    var hoPay = (bd.handover && bd.handover.payout) || 0;
    steps.push({ kind: 'add', label: 'Upsell P1 · สินค้าใหม่', amount: p1Comm, drillKey: 'p1' });
    steps.push({ kind: 'add', label: 'Upsell P3 · สินค้าโต', amount: p3Comm, drillKey: 'p3' });
    steps.push({ kind: 'add', label: 'Expansion · ร้านขยาย 0.5%', amount: outletComm, drillKey: 'expansion' });
    // Handover is INSIDE the gate (engine 07a:691) — component above the
    // subtotal, whole subtotal then ×gate to reach final_payout.
    steps.push({ kind: 'add', label: 'Handover · retention', amount: hoPay,
      meta: bd.handover && bd.handover.accounts ? bd.handover.accounts + ' ร้าน · retention ' + bd.handover.retention_pct + '%' : 'ไม่มีเดือนนี้',
      drillKey: bd.handover && bd.handover.detail && bd.handover.detail.length ? 'handover' : null });
    steps.push({ kind: 'subtotal', label: 'รวมก่อน Gate', amount: (bd.nrr_payout || 0) + upsell + hoPay });
    var gcap = bd.gmv_gate ? bd.gmv_gate.cap_multiplier : 1;
    steps.push({ kind: 'multiply', label: 'NRR Gate' + (bd.nrr_pct != null ? ' (' + bd.nrr_pct + '%)' : ''), factor: gcap });
  } else {
    var mult = bd.upsell_mult;
    steps.push({ kind: 'multiply', label: 'ตัวคูณ upsell ทีม', factor: typeof mult === 'object' ? mult.multiplier : parseFloat(mult) || 1, drillKey: 'mult' });
  }
  steps.push({ kind: 'total', label: 'รวมค่าคอมฯ', amount: bd.final_payout != null ? bd.final_payout : 0 });
  return steps;
}
window.nrrCommSnapshotReceiptSteps = nrrCommSnapshotReceiptSteps;

// sense_upsell_team.csv — per-KAM quarter-to-date upsell GMV totals
// (kam_email, p1_gmv, p3_incremental, outlet_gmv, tl_upsell_base). ~100KB.
var nrrUpsellTeamCache = { byEmail: {}, loaded: false };
async function nrrFetchUpsellTeamCsv() {
  if (nrrUpsellTeamCache.loaded) return nrrUpsellTeamCache;
  try {
    var resp = await fetch(R2_BASE + '/sense_upsell_team.csv?cb=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var lines = (await resp.text()).split('\n').filter(function (l) { return l.trim(); });
    var byEmail = {};
    for (var i = 1; i < lines.length; i++) {
      var c = parseCSVRow(lines[i]);
      byEmail[(c[0] || '').trim().toLowerCase()] = {
        p1_gmv: parseFloat(c[1]) || 0, p3_incremental: parseFloat(c[2]) || 0,
        outlet_gmv: parseFloat(c[3]) || 0, tl_upsell_base: parseFloat(c[4]) || 0
      };
    }
    nrrUpsellTeamCache = { byEmail: byEmail, loaded: true };
  } catch (e) {
    console.warn('[nrr] sense_upsell_team.csv fetch failed', e);
    nrrUpsellTeamCache = { byEmail: {}, loaded: false, error: e.message };
  }
  return nrrUpsellTeamCache;
}
window.nrrFetchUpsellTeamCsv = nrrFetchUpsellTeamCsv;

// Multiplier tiers from live target_settings (tl_upsell_mult_params),
// engine-default fallback baked in.
function nrrCommTeamMultiplier(upsellPct) {
  var raw = nrrCommRatesCache && nrrCommRatesCache.byKey ? nrrCommRatesCache.byKey.tl_upsell_mult_params : null;
  var tiers = raw && raw.tiers ? raw.tiers : [
    { min_pct: 0, max_pct: 1.99, multiplier: 1.00 }, { min_pct: 2, max_pct: 2.99, multiplier: 1.20 },
    { min_pct: 3, max_pct: 3.99, multiplier: 1.35 }, { min_pct: 4, max_pct: 4.99, multiplier: 1.50 },
    { min_pct: 5, max_pct: null, multiplier: 1.80 }];
  var mult = 1.0;
  tiers.forEach(function (t) {
    if (upsellPct >= (t.min_pct || 0) && (t.max_pct == null || upsellPct <= t.max_pct)) mult = t.multiplier;
  });
  return mult;
}

// pct: governed %NRR for the beneficiary (run-rate for the open month).
function nrrEstimateTlCommission(tlEmail, period, pct) {
  if (pct == null) return null;
  var nrrPayout = nrrCommTierPayout('tl', tlEmail, period, pct);
  var teamUpsell = 0, teamBase = 0;
  (typeof nrrListKamsForTeam === 'function' ? nrrListKamsForTeam(tlEmail) : []).forEach(function (k) {
    var row = nrrUpsellTeamCache.byEmail[(k.email || '').toLowerCase()];
    if (row) teamUpsell += row.tl_upsell_base;
    var kr = nrrKamResult(k.email);
    if (kr) teamBase += kr.base_gmv || 0;
  });
  var upsellPct = teamBase > 0 ? teamUpsell / teamBase * 100 : 0;
  var mult = nrrCommTeamMultiplier(upsellPct);
  return {
    kind: 'tl', pct: pct, nrr_payout: nrrPayout,
    upsell_pct: upsellPct, multiplier: mult,
    est: Math.round(nrrPayout * mult),
    note: 'NRR tier ฿' + nrrPayout.toLocaleString('en-US') + ' × ' + mult + 'x (upsell ทีม ' + upsellPct.toFixed(1) + '%)'
  };
}
window.nrrEstimateTlCommission = nrrEstimateTlCommission;

// ── Handover retention — live drill-down for the drawer ─────────────────
// portview_handover.csv is org-wide (all KAMs, one row per handed-over
// account) — fetched once, filtered per-KAM client-side. Mirrors
// _commComputeHandoverRetention's shape/columns exactly (07a_commission_
// engine.js:440) but period-relative (transfer_month = the month BEFORE
// the period being viewed) instead of relative to real "today", since
// /nrr's drawer can be opened for any period, not just the live one.
var nrrHandoverCsvCache = { rows: [], loaded: false };
async function nrrFetchHandoverCsv() {
  if (nrrHandoverCsvCache.loaded) return nrrHandoverCsvCache;
  try {
    var resp = await fetch(R2_BASE + '/portview_handover.csv?cb=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var lines = (await resp.text()).split('\n').filter(function (l) { return l.trim(); });
    var header = parseCSVRow(lines[0]);
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var c = parseCSVRow(lines[i]), o = {};
      header.forEach(function (h, idx) { o[h] = c[idx]; });
      rows.push(o);
    }
    nrrHandoverCsvCache = { rows: rows, loaded: true };
  } catch (e) {
    console.warn('[nrr] portview_handover.csv fetch failed', e);
    nrrHandoverCsvCache = { rows: [], loaded: false, error: e.message };
  }
  return nrrHandoverCsvCache;
}
window.nrrFetchHandoverCsv = nrrFetchHandoverCsv;

function _nrrPrevMonthOf(period) {
  var p = (period || '').split('-');
  if (p.length !== 2) return '';
  var d = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1 - 1, 1); // -1 for 0-index, -1 for prev month
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// Returns { accounts, baseline_gmv, current_gmv, retention_pct, tier, payout, detail }
// detail: [{ name, account_id, baseline, current, transfer_month }]
function nrrComputeHandoverForKam(kamEmail, period) {
  var EMPTY = { accounts: 0, baseline_gmv: 0, current_gmv: 0, retention_pct: 0, payout: 0, detail: [] };
  var qd = window.bulkQnrrData;
  var kamRows = (qd && qd.byKamEmail && qd.byKamEmail[kamEmail]) || [];
  var kamName = kamRows.length ? (kamRows[0].latest_staff_owner || '') : '';
  if (!kamName || !nrrHandoverCsvCache.loaded) return EMPTY;

  var prevMonth = _nrrPrevMonthOf(period);
  var rows = nrrHandoverCsvCache.rows.filter(function (r) {
    return (r.new_kam_name || '').trim() === kamName &&
      (r.prev_owner || '').toUpperCase() === 'SALE' &&
      (r.transfer_month || '') === prevMonth;
  });
  if (!rows.length) return EMPTY;

  var baselineNorm = 0, perfNorm = 0, baselineGmv = 0, currentGmv = 0;
  var detail = rows.map(function (r) {
    var b = parseFloat(r.baseline_gmv) || 0, p = parseFloat(r.perf_gmv) || 0;
    var bd = parseFloat(r.baseline_days_in_month) || 30, pd = parseFloat(r.perf_days_in_month) || 30;
    baselineNorm += b / bd * 30; perfNorm += p / pd * 30;
    baselineGmv += b; currentGmv += p;
    return { name: r.account_name || r.account_id, account_id: r.account_id, baseline: b, current: p, transfer_month: r.transfer_month };
  });
  var retentionPct = baselineNorm > 0 ? Math.round(perfNorm / baselineNorm * 100) : 0;

  var t2Pct = nrrCommRateGet('handover', 'tier2_pct', 100);
  var t3Pct = nrrCommRateGet('handover', 'tier3_pct', 120);
  var t2Pay = nrrCommRateGet('handover', 'tier2_payout', 2500);
  var t3Bonus = nrrCommRateGet('handover', 'tier3_bonus', 2500);
  var payout = retentionPct >= t3Pct ? t2Pay + t3Bonus : retentionPct >= t2Pct ? t2Pay : 0;

  return { accounts: rows.length, baseline_gmv: baselineGmv, current_gmv: currentGmv, retention_pct: retentionPct, payout: payout, detail: detail };
}
window.nrrComputeHandoverForKam = nrrComputeHandoverForKam;

function nrrEstimateKamCommission(kamEmail, period, pct) {
  if (pct == null) return null;
  var nrrPayout = nrrCommTierPayout('kam', kamEmail, period, pct);
  var row = nrrUpsellTeamCache.byEmail[(kamEmail || '').toLowerCase()] || { p1_gmv: 0, p3_incremental: 0, outlet_gmv: 0 };
  var p1Rate = nrrCommRateGet('upsell_sku', 'p1_rate', 0.01);
  var p3Rate = nrrCommRateGet('upsell_sku', 'p3_rate', 0.01);
  var outRate = nrrCommRateGet('upsell_outlet', 'rate', 0.005);
  // Components kept separate (v16) — the receipt renders one line per
  // component; only the arithmetic below combines them.
  var p1Comm = row.p1_gmv * p1Rate;
  var p3Comm = row.p3_incremental * p3Rate;
  var outletComm = row.outlet_gmv * outRate;
  var upsellComm = p1Comm + p3Comm + outletComm;
  // NRR gate — same thresholds/caps the engine applies (_commComputeGmvGate).
  // Handover IS gated: the real engine (_commBuildKamPayout,
  // 07a_commission_engine.js:688-692) folds handover.payout into the
  // subtotal FIRST, then multiplies the whole thing by the gate cap:
  //   subtotal = nrr + upsell(sku+outlet) + handover
  //   final    = round(subtotal × cap)
  // (An earlier port added handover OUTSIDE the gate; that was wrong —
  // the two "verification" rows it cited both happened to be cases where
  // the formulas coincide, Dent handover=0 and Pop gate=1.0, so the
  // gate<1 AND handover>0 case was never actually exercised. Fixed
  // 2026-07-09 to match the engine that generates locked payroll.)
  var t1 = nrrCommRateGet('gmv_gate', 'threshold_1', 98);
  var t2 = nrrCommRateGet('gmv_gate', 'threshold_2', 95);
  var cap = 1.0;
  if (pct < t2) cap = nrrCommRateGet('gmv_gate', 'cap_2', 0);
  else if (pct < t1) cap = nrrCommRateGet('gmv_gate', 'cap_1', 0.3);
  var handover = nrrComputeHandoverForKam(kamEmail, period);
  return {
    kind: 'kam', pct: pct, nrr_payout: nrrPayout,
    p1_comm: Math.round(p1Comm), p3_comm: Math.round(p3Comm), outlet_comm: Math.round(outletComm),
    upsell_comm: Math.round(upsellComm),
    gate_threshold: t1, gate_cap: cap, handover: handover,
    est: Math.round((nrrPayout + upsellComm + handover.payout) * cap),
    note: '(NRR ฿' + nrrPayout.toLocaleString('en-US') + ' + upsell ฿' + Math.round(upsellComm).toLocaleString('en-US') +
      (handover.payout ? ' + handover ฿' + handover.payout.toLocaleString('en-US') : '') + ')' +
      (cap < 1 ? ' × gate ' + cap + 'x' : '')
  };
}
window.nrrEstimateKamCommission = nrrEstimateKamCommission;

// ── Commission V2 — P1/P3 upsell classification ──────────────────────────
// Verbatim port of _commComputeUpsellSku() (07a_commission_engine.js:176-318)
// against the lean per-KAM bundle nrrFetchUpsellBundle() builds. Read-only,
// on-demand, drill-down-supporting math — never used to alter a displayed
// payout number (that always comes from the locked snapshot or the pace
// estimate). expansionOutletIds: Set<string> of outlet IDs already earning
// the 0.5% outlet commission, excluded here — /nrr derives this for free
// from its own already-loaded QNRR rows (movement_type === 'expansion'),
// no extra fetch needed.
// v860-fix (2026-07-13): was hardcoded to evaluate ONLY currLabel — no
// cumulative-quarter logic existed here at all, unlike the real engine's
// v836 fix (_commComputeUpsellSku + _commElapsedQuarterLabels,
// 07a_commission_engine.js:177-194,294-340). A shop holding an elevated
// purchase level for 3 months would show only 1 month's worth here while
// Sense's own numbers (and the locked snapshot, once it exists) reflected
// the full cumulative streak — found during a repo-wide commission-
// alignment audit. Now mirrors that exact algorithm: classify EVERY
// elapsed quarter month, keep only the trailing unbroken qualifying
// streak, sum it. In non-quarterly use (baseMonthIso falsy — /nrr never
// actually calls it that way today) evalLabels degenerates to exactly
// [currLabel], i.e. the original single-month behavior, unchanged.
function nrrComputeUpsellSku(expansionOutletIds, bundle, baseMonthIso) {
  var EMPTY = { p1: { gmv: 0, comm: 0, groups: [] }, p3: { gmv_incremental: 0, comm: 0, groups: [] },
                total_comm: 0, total_gmv_eligible: 0 };
  if (!bundle || !bundle.loaded) return EMPTY;
  var expIds = expansionOutletIds instanceof Set ? expansionOutletIds : new Set();
  var data = bundle.data || {};
  var baselineGroups = bundle.baselineGroups || {};

  var p1Rate    = nrrCommRateGet('upsell_sku', 'p1_rate', 0.01);
  var p3Rate    = nrrCommRateGet('upsell_sku', 'p3_rate', 0.01);
  var p3Thresh  = nrrCommRateGet('upsell_sku', 'p3_threshold_pct', 2.00);
  var p3MinIncr = nrrCommRateGet('upsell_sku', 'p3_min_incremental', 8000);
  var p1MinGmv  = nrrCommRateGet('upsell_sku', 'p1_min_gmv', 5000);

  var currLabel = nrrCommCurrentMonthLabel();
  var p3Labels = nrrP3WindowLabels(baseMonthIso, 3);
  var evalLabels = baseMonthIso ? _nrrCommElapsedQuarterLabels(baseMonthIso) : [currLabel];

  var p1Groups = [], p3Groups = [];

  Object.keys(data).forEach(function (accountId) {
    var outletMap = data[accountId];
    var baselineByOutlet = baselineGroups[accountId] || {};

    Object.keys(outletMap).forEach(function (outletId) {
      if (expIds.has(String(outletId))) return; // earns 0.5% via outlet commission instead
      var outletGroups = outletMap[outletId];
      var outletBaseline = baselineByOutlet[outletId] || {};

      Object.keys(outletGroups).forEach(function (groupKey) {
        var monthData = outletGroups[groupKey];
        // v860-fix: isP1 is a STABLE property of this (account,outlet,
        // groupKey) triple once the baseline is frozen (quarterly mode
        // never updates outletBaseline mid-quarter) — matches the real
        // engine's identical reasoning, so classifying once outside the
        // per-month loop below is correct, not an approximation.
        var isP1 = !outletBaseline[groupKey];

        var perMonth = evalLabels.map(function (lbl) {
          var row = monthData[lbl];
          if (!row) return { label: lbl, qualifies: false, contribution: 0 };
          var rawTotalGmv = row.totalGmv || 0;
          var rawExistingGmv = row.existingGmv || 0;
          if (isP1) {
            if (rawTotalGmv >= p1MinGmv) return { label: lbl, qualifies: true, contribution: rawTotalGmv };
            return { label: lbl, qualifies: false, contribution: 0 };
          }
          var maxBaseline = 0, maxBaselineMonth = p3Labels[0];
          p3Labels.forEach(function (l) {
            var lRow = monthData[l];
            if (!lRow) return;
            var d = nrrDaysInLabel(l);
            var norm30 = d > 0 ? lRow.totalGmv / d * 30 : lRow.totalGmv;
            if (norm30 > maxBaseline) { maxBaseline = norm30; maxBaselineMonth = l; }
          });
          if (rawExistingGmv > maxBaseline * p3Thresh) {
            var incremental = rawExistingGmv - maxBaseline;
            if (incremental >= p3MinIncr) {
              return { label: lbl, qualifies: true, contribution: incremental,
                       existing_curr: rawExistingGmv, max_baseline: maxBaseline, max_baseline_month: maxBaselineMonth };
            }
          }
          return { label: lbl, qualifies: false, contribution: 0 };
        });

        // Streak = every month AFTER the most recent gap (a month that
        // failed to qualify, or had no purchase row at all). No gap ever
        // → streak starts at the first evaluated month. Degenerates to the
        // single-entry perMonth array in non-quarterly use.
        var lastGapIdx = -1;
        perMonth.forEach(function (m, i) { if (!m.qualifies) lastGapIdx = i; });
        var streak = perMonth.slice(lastGapIdx + 1);
        if (streak.length === 0) return;

        var cumAmount = streak.reduce(function (s, m) { return s + m.contribution; }, 0);
        var last = streak[streak.length - 1];

        if (isP1) {
          p1Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey, total_gmv: cumAmount, commission: cumAmount * p1Rate });
        } else {
          p3Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey,
            existing_curr: last.existing_curr, max_baseline: last.max_baseline, max_baseline_month: last.max_baseline_month,
            incremental: cumAmount, commission: cumAmount * p3Rate });
        }
      });
    });
  });

  var p1Gmv = p1Groups.reduce(function (s, g) { return s + g.total_gmv; }, 0);
  var p1Comm = p1Groups.reduce(function (s, g) { return s + g.commission; }, 0);
  var p3Incr = p3Groups.reduce(function (s, g) { return s + g.incremental; }, 0);
  var p3Comm = p3Groups.reduce(function (s, g) { return s + g.commission; }, 0);

  return {
    p1: { gmv: p1Gmv, comm: p1Comm, groups: p1Groups },
    p3: { gmv_incremental: p3Incr, comm: p3Comm, groups: p3Groups },
    total_comm: p1Comm + p3Comm,
    total_gmv_eligible: p1Gmv + p3Incr
  };
}
window.nrrComputeUpsellSku = nrrComputeUpsellSku;

// ── Full Table view (history) — arbitrary period, not limited to the
// current quarter's QNRR_CFG.q_months. Same table/columns as
// nrrFetchCommissionSnapshots, just without the quarter filter, so any
// locked/draft period ever computed in Sense can be browsed here. Cached
// per period_month so switching the dropdown back and forth is instant.
var nrrCommAvailablePeriods = null; // [ '2026-06', '2026-05', ... ] desc
var nrrCommPeriodCache = {}; // { [period_month]: { rows, loaded } }

async function nrrFetchAvailablePeriods() {
  if (nrrCommAvailablePeriods) return nrrCommAvailablePeriods;
  if (!supa) return [];
  try {
    var resp = await supa.from('commission_payout_snapshots').select('period_month');
    var seen = {};
    (resp.data || []).forEach(function (r) { if (r.period_month) seen[r.period_month] = true; });
    nrrCommAvailablePeriods = Object.keys(seen).sort().reverse();
  } catch (e) {
    console.warn('[nrr] failed to load available commission periods', e);
    nrrCommAvailablePeriods = [];
  }
  return nrrCommAvailablePeriods;
}
window.nrrFetchAvailablePeriods = nrrFetchAvailablePeriods;

async function nrrFetchSnapshotsForPeriod(periodMonth) {
  if (nrrCommPeriodCache[periodMonth] && nrrCommPeriodCache[periodMonth].loaded) return nrrCommPeriodCache[periodMonth];
  if (!supa) return { rows: [], loaded: false, error: 'no_auth' };
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .eq('period_month', periodMonth);
    var out = { rows: resp.data || [], loaded: true };
    nrrCommPeriodCache[periodMonth] = out;
    return out;
  } catch (e) {
    console.warn('[nrr] failed to load snapshots for ' + periodMonth, e);
    return { rows: [], loaded: false, error: e.message };
  }
}
window.nrrFetchSnapshotsForPeriod = nrrFetchSnapshotsForPeriod;
</script>
<script>
// ── nrr_exclusions.js — Waived Account (NRR Exclusion) feature ───────────
// Reads/writes the `nrr_exclusions` Supabase table (shared with Sense —
// Sense's own request/approve UI has been retired in favor of this one,
// per the 2026-07-14 waived-account plan; Sense's engine still READS this
// table via _nrrAccountWaivedForPeriod in src/07a_commission_engine.js).
//
// Same defensive pattern as nrr_notes.js: if the table/RLS isn't reachable,
// set nrrExclusionsAvailable = false once and every affordance hides
// itself rather than showing a broken control.
//
// nrrAccountWaivedForPeriod(accountId, periodMonth) is the one shared
// predicate nrr_logic.js's _qnrrCompute/nrrComputeBucket/nrrComputeRowsPool
// call — must be loaded (nrrFetchExclusions) BEFORE nrrRenderAll() ever
// runs, same timing requirement as nrrFetchCommissionSnapshots (see
// nrrRefresh() in nrr_view.js).

var nrrExclusionsAvailable = null; // null = not checked yet, true/false once known
var nrrExclusionsCache = []; // raw rows for the current quarter's months

var NRR_EXCLUSION_REASONS = [
  { code: 'renovation_closed',   label: 'ร้านปิดปรับปรุงชั่วคราว' },
  { code: 'school_term_break',   label: 'โรงเรียนปิดเทอม' },
  { code: 'business_closed',     label: 'ธุรกิจปิดกิจการ' },
  { code: 'overdue_debt',        label: 'ค้างชำระหนี้เกิน 1 ล้านบาท' }
];
window.NRR_EXCLUSION_REASONS = NRR_EXCLUSION_REASONS;

function nrrExclusionReasonLabel(code) {
  var found = NRR_EXCLUSION_REASONS.find(function (r) { return r.code === code; });
  return found ? found.label : (code || '—');
}
window.nrrExclusionReasonLabel = nrrExclusionReasonLabel;

function nrrExclusionStatusLabel(status) {
  if (status === 'approved') return 'อนุมัติแล้ว';
  if (status === 'rejected') return 'ปฏิเสธ';
  if (status === 'submitted') return 'รออนุมัติ';
  return status || '—';
}
window.nrrExclusionStatusLabel = nrrExclusionStatusLabel;

async function nrrFetchExclusions(force) {
  if (!force && nrrExclusionsAvailable === true) return nrrExclusionsCache;
  if (!supa) { nrrExclusionsAvailable = false; return nrrExclusionsCache; }
  try {
    var resp = await supa.from('nrr_exclusions')
      .select('id,period_month,account_id,outlet_id,target_kam_email,target_tl_email,reason_code,reason_text,status,requested_by,requested_at,reviewed_by,reviewed_at,review_note,base_gmv,estimated_base_gmv')
      .in('period_month', QNRR_CFG.q_months);
    if (resp.error) throw resp.error;
    nrrExclusionsAvailable = true;
    nrrExclusionsCache = resp.data || [];
  } catch (e) {
    // Table missing, RLS denies, or any other error — feature unavailable,
    // fail quiet (same convention as nrr_notes.js).
    nrrExclusionsAvailable = false;
    console.warn('[nrr] exclusions unavailable:', e.message || e);
  }
  return nrrExclusionsCache;
}
window.nrrFetchExclusions = nrrFetchExclusions;

// The one shared predicate every NRR compute function in nrr_logic.js calls.
function nrrAccountWaivedForPeriod(accountId, periodMonth) {
  if (!accountId || !periodMonth) return false;
  return (nrrExclusionsCache || []).some(function (x) {
    return x.status === 'approved' && x.account_id === accountId && x.period_month === periodMonth;
  });
}
window.nrrAccountWaivedForPeriod = nrrAccountWaivedForPeriod;

function nrrExclusionsForAccount(accountId) {
  return (nrrExclusionsCache || []).filter(function (x) { return x.account_id === accountId; });
}
window.nrrExclusionsForAccount = nrrExclusionsForAccount;

// "Today's" period_month (lag-1, same convention as Sense's
// _nrrExclusionCurrentPeriod), clamped to the active quarter. Deliberately
// independent of any specific KAM's _qnrrCompute result -- the account
// page previously derived this via nrrCurrentPeriod(nrrKamResult(kamEmail)),
// which silently returned null (hiding the request button entirely, no
// error) whenever that KAM had no rows in kam_rep_view.csv for any reason.
// Requesting a waiver for "this month" shouldn't depend on whether that
// KAM's cohort happened to compute successfully.
function nrrExclusionCurrentPeriod() {
  var now = new Date();
  var lag1 = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  var lagYM = lag1.getFullYear() + '-' + String(lag1.getMonth() + 1).padStart(2, '0');
  var q = QNRR_CFG.q_months;
  return q.indexOf(lagYM) > -1 ? lagYM : q[q.length - 1];
}
window.nrrExclusionCurrentPeriod = nrrExclusionCurrentPeriod;

// A period is locked once ANY commission_payout_snapshots row for it is
// 'final' — same signal Sense's own lock/compute cycle uses (confirmed
// live: May/June 2026 already 'final', July onward not yet). Reuses
// nrr_commission.js's existing fetcher/cache rather than a second query.
function nrrIsPeriodLocked(periodMonth) {
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return false; // unknown -> don't block
  return (nrrCommSnapshots.rows || []).some(function (r) {
    return r.period_month === periodMonth && r.snapshot_status === 'final';
  });
}
window.nrrIsPeriodLocked = nrrIsPeriodLocked;

async function nrrRequestExclusion(accountId, periodMonth, reasonCode, reasonText, targetKamEmail, targetTlEmail, baseGmv) {
  if (!supa || !nrrProfile) return { ok: false, error: 'not_authenticated' };
  if (nrrIsPeriodLocked(periodMonth)) return { ok: false, error: 'period_locked' };
  if (nrrExclusionsForAccount(accountId).some(function (x) { return x.period_month === periodMonth && x.status !== 'rejected'; })) {
    return { ok: false, error: 'already_requested' };
  }
  try {
    var row = {
      period_month: periodMonth,
      account_id: accountId,
      target_kam_email: targetKamEmail || null,
      target_tl_email: targetTlEmail || null,
      reason_code: reasonCode,
      reason_text: reasonText || null,
      status: 'submitted',
      requested_by: nrrProfile.email,
      requested_at: new Date().toISOString(),
      base_gmv: baseGmv || null,
      estimated_base_gmv: baseGmv || null
    };
    var resp = await supa.from('nrr_exclusions').insert(row).select('*').single();
    if (resp.error) throw resp.error;
    nrrExclusionsCache.push(resp.data || row);
    return { ok: true, row: resp.data || row };
  } catch (e) {
    console.warn('[nrr] exclusion request failed', e);
    return { ok: false, error: e.message || String(e) };
  }
}
window.nrrRequestExclusion = nrrRequestExclusion;

// Admin-only in practice — also enforced at the RLS layer (a non-admin's
// UPDATE attempt that would move status away from 'submitted' is rejected
// by the DB itself, per the 2026-07-14 migration), this app-level check is
// just so the button never appears to a TL in the first place.
async function nrrReviewExclusion(id, status, reviewNote) {
  if (!supa || !nrrProfile || nrrProfile.role !== 'admin') return { ok: false, error: 'not_authorized' };
  try {
    var resp = await supa.from('nrr_exclusions')
      .update({ status: status, reviewed_by: nrrProfile.email, reviewed_at: new Date().toISOString(), review_note: reviewNote || null })
      .eq('id', id)
      .select('*')
      .single();
    if (resp.error) throw resp.error;
    nrrExclusionsCache = (nrrExclusionsCache || []).map(function (r) { return r.id === id ? (resp.data || Object.assign({}, r, { status: status })) : r; });
    return { ok: true };
  } catch (e) {
    console.warn('[nrr] exclusion review failed', e);
    return { ok: false, error: e.message || String(e) };
  }
}
window.nrrReviewExclusion = nrrReviewExclusion;
</script>
<script>
// ── nrr_waivers.js — #/waivers: Waived Account request/approve queue ─────
// TL sees their own team's requests (read-only history); Admin sees a
// pending queue across all teams with Approve/Reject. Data comes from
// nrr_exclusions.js's nrrExclusionsCache (already fetched in nrrRefresh()
// before any view renders) -- this file is presentation only.

function nrrRenderWaiversView(route) {
  var body = document.getElementById('nrr-waivers-body');
  if (!body) return;
  // portview.csv resolves account_id -> account_name (_nrrAccountNameFor
  // below) -- it's normally only fetched when the Account/Portfolio view
  // renders, so landing on #/waivers directly (without visiting either
  // first) previously showed raw UUIDs instead of names.
  Promise.all([nrrFetchExclusions(), nrrFetchPortviewCsv()]).then(function () {
    body.innerHTML = nrrWaiversPageHtml();
  });
}
nrrRouterRegister('waivers', nrrRenderWaiversView);
window.nrrRenderWaiversView = nrrRenderWaiversView;

function _nrrAccountNameFor(accountId) {
  var pv = window.bulkPortviewData;
  if (!pv || !pv.allRows) return accountId;
  var row = pv.allRows.find(function (r) { return r.account_id === accountId; });
  return row ? (row.account_name || accountId) : accountId;
}

function nrrWaiversPageHtml() {
  var isAdmin = nrrProfile && nrrProfile.role === 'admin';
  var title = isAdmin ? 'คำขอยกเว้น NRR (ทั้งบริษัท)' : 'คำขอยกเว้น NRR ของทีมฉัน';
  // This page is history/review only -- the actual "request" control lives
  // on each account's own page (#/account/:id), since a waiver is inherently
  // tied to one specific account+month. Say so up front (TL especially) so
  // landing here doesn't read as a dead end.
  var howTo = '<div class="micro" style="margin-top:6px;color:var(--ink2)">' +
    (isAdmin
      ? 'อนุมัติ/ปฏิเสธคำขอได้ที่นี่ — TL ส่งคำขอจากหน้าร้านค้านั้นๆ ใน Portfolio'
      : 'หน้านี้แสดงประวัติคำขอเท่านั้น — วิธีขอยกเว้นใหม่: เข้าไปที่หน้าร้านค้านั้นๆ (Portfolio → เลือกร้าน) แล้วกดปุ่ม "ขอยกเว้น NRR เดือนนี้"') +
    '</div>';

  if (nrrExclusionsAvailable === false) {
    return '<div class="h2">' + title + '</div>' +
      '<div class="micro" style="margin-top:8px">ฟีเจอร์นี้ยังไม่พร้อมใช้งาน — ตาราง/สิทธิ์เข้าถึงยังไม่ถูกตั้งค่าใน Supabase</div>';
  }

  var rows = (nrrExclusionsCache || []).slice();
  if (!isAdmin) {
    rows = rows.filter(function (x) { return x.target_tl_email === (nrrProfile && nrrProfile.email); });
  }
  rows.sort(function (a, b) { return (a.requested_at || '') < (b.requested_at || '') ? 1 : -1; });

  var pending = rows.filter(function (x) { return x.status === 'submitted'; });
  var approved = rows.filter(function (x) { return x.status === 'approved'; });
  var rejected = rows.filter(function (x) { return x.status === 'rejected'; });

  return '<div class="h2">' + title + '</div>' +
    howTo +
    '<div class="nrr-waivers-kpis">' +
    '<div class="nrr-waivers-kpi"><div class="num">' + pending.length + '</div><div class="micro">รออนุมัติ</div></div>' +
    '<div class="nrr-waivers-kpi"><div class="num">' + approved.length + '</div><div class="micro">อนุมัติแล้ว</div></div>' +
    '<div class="nrr-waivers-kpi"><div class="num">' + rejected.length + '</div><div class="micro">ปฏิเสธ</div></div>' +
    '</div>' +
    (rows.length

      : '<div class="ds-empty" style="margin-top:12px"><div class="ds-empty-title">ยังไม่มีคำขอยกเว้น NRR</div></div>');
}

function nrrWaiverRowHtml(r, isAdmin) {
  var monthLabel = QNRR_CFG.months_th[r.period_month] || r.period_month;
  var acctName = _nrrAccountNameFor(r.account_id);

      actions = '<div class="micro" style="color:var(--ink3);margin-top:6px">เดือน ' + nrrEsc(monthLabel) + ' Lock แล้ว — อนุมัติ/ปฏิเสธไม่ได้แล้ว</div>';
    } else {

        '<button class="nrr-exclusion-cancel-btn" data-action="waiver-reject" data-id="' + nrrEsc(r.id) + '">Reject</button>' +

    '<span class="nrr-waiver-status ' + r.status + '">' + nrrExclusionStatusLabel(r.status) + '</span>' +
    '</div>' +
    '<div class="micro">เดือน ' + nrrEsc(monthLabel) + ' · เหตุผล: ' + nrrEsc(nrrExclusionReasonLabel(r.reason_code)) +
    (r.target_tl_email ? ' · TL ' + nrrEsc(r.target_tl_email) : '') +
    (r.target_kam_email ? ' · KAM ' + nrrEsc(r.target_kam_email) : '') + '</div>' +
    (r.reason_text ? '<div class="micro" style="margin-top:4px;color:var(--ink2)">' + nrrEsc(r.reason_text) + '</div>' : '') +

}

function nrrHandleWaiversClick(e) {
  var btn = e.target.closest('[data-action="waiver-approve"],[data-action="waiver-reject"]');
  if (!btn) return;
  var status = btn.dataset.action === 'waiver-approve' ? 'approved' : 'rejected';
  btn.disabled = true;
  nrrReviewExclusion(btn.dataset.id, status).then(function (res) {
    if (!res.ok && typeof nrrToast === 'function') nrrToast('อัปเดตไม่สำเร็จ: ' + (res.error || ''));

window.nrrHandleWaiversClick = nrrHandleWaiversClick;

<script>
// ── nrr_portfolio.js — Portfolio layer pure logic (Phase B, 2026-07-09) ──
// Pace/filter logic over window.bulkPortviewData (nrr_data.js). Deliberately
// a separate file from nrr_commission.js — this is account-level pace/churn
// signal, not commission math, even though both feed the same Portfolio view.
//
// Baseline decision (round 2, 2026-07-09 — do not "fix" this back to Sense's
// own convention without re-reading this note): Sense's real portview pace
// (06_portview_teamview.js:2-51, computePaceSignal) uses a ROLLING average
// of the trailing 1-3 months as baseline. /nrr deliberately does NOT copy
// that — every other number on this page (%NRR, commission) is anchored to
// the quarter's FIXED base_month (QNRR_CFG.base_month) for the whole
// quarter, so account-level pace uses that SAME fixed month too. Otherwise
// two baselines would silently disagree once the quarter moves past its
// first month. See plan doc "Phase B round 2" for the full reasoning.

var _NRR_TH_MONTHS_ORDER = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                            'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

function _nrrParseThLabel(label) {
  var parts = (label || '').split(' ');
  var mIdx = _NRR_TH_MONTHS_ORDER.indexOf(parts[0]);
  var year = parseInt(parts[1], 10) - 543;
  return { mIdx: mIdx, year: year, key: (mIdx > -1 && year) ? year * 12 + mIdx : null };
}

// Thai label for QNRR_CFG.base_month ('2026-06' -> 'มิ.ย. 2569') — reuses
// nrrThMonthLabel() (nrr_data.js) so the label format always matches what
// bulk_history.csv actually contains.
function nrrBaseMonthThLabel() {
  var p = QNRR_CFG.base_month.split('-');
  return nrrThMonthLabel(new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, 1));
}
window.nrrBaseMonthThLabel = nrrBaseMonthThLabel;

// pct/cls thresholds mirror Sense's own portview pace banding (100/95/90);
// baseline_gmv is this account's GMV in the quarter's fixed base month
// (bulk_history.csv), NOT a rolling average and NOT portview.csv's
// last_month_gmv (that column drifts month-to-month within the quarter —
// see header note above). runrate_gmv stays from portview.csv, precomputed
// server-side — never re-derived here.
function nrrPaceSignal(row) {
  if (!row) return { pct: null, cls: 'unknown', label: '—', baseline_gmv: 0 };
  var hist = (window.bulkHistoryData && window.bulkHistoryData.byAccountId[row.account_id]) || [];
  var baseLabel = nrrBaseMonthThLabel();
  var baseRow = hist.filter(function (h) { return h.month_label === baseLabel; })[0];
  if (!baseRow || !baseRow.gmv) {
    return { pct: null, cls: 'new', label: 'ร้านใหม่', baseline_gmv: 0 };
  }
  var pct = row.runrate_gmv / baseRow.gmv * 100;
  var cls = pct >= 100 ? 'great' : pct >= 95 ? 'safe' : pct >= 90 ? 'warn' : 'danger';
  // 'expected' = "should have by today if tracking baseline exactly"
  // (Sense's computePaceSignal field of the same name) — Portfolio's row
  // view doesn't show it (no room), the Account page hero does.
  var expected = baseRow.gmv * (row.days_elapsed / (row.days_in_month || 30));
  return { pct: pct, cls: cls, label: Math.round(pct) + '%', baseline_gmv: baseRow.gmv, expected: expected };
}
window.nrrPaceSignal = nrrPaceSignal;

// One KAM's accounts, pace signal attached, sorted worst-pace-first (the
// accounts most worth a rep's attention surface at the top of their list).
function nrrPortfolioRowsFor(kamEmail) {
  var pv = window.bulkPortviewData;
  if (!pv || !pv.loaded) return [];
  return (pv.byKamEmail[kamEmail] || [])
    .map(function (r) { return { row: r, pace: nrrPaceSignal(r) }; })
    .sort(function (a, b) {
      var pa = a.pace.pct == null ? -1 : a.pace.pct;
      var pb = b.pace.pct == null ? -1 : b.pace.pct;
      return pa - pb;
    });
}
window.nrrPortfolioRowsFor = nrrPortfolioRowsFor;

// Portfolio-level risk summary — same grouping Sense's ON TRACK/MONITOR/
// AT RISK boxes use (06_portview_teamview.js:1580-1700: group by
// paceSignal.cls, value = surplus above baseline for the ok bucket, or
// shortfall below baseline for warn/danger) — but against /nrr's own
// fixed-base-month baseline, not Sense's rolling one. Accounts with no
// baseline (cls 'new') are excluded — there's nothing to compare them to.
function nrrPortfolioRiskSummary(kamEmail) {
  var buckets = {
    ok:     { count: 0, value: 0 },
    warn:   { count: 0, value: 0 },
    danger: { count: 0, value: 0 }
  };
  nrrPortfolioRowsFor(kamEmail).forEach(function (item) {
    if (item.pace.pct == null) return;
    var runrate = item.row.runrate_gmv || 0, baseline = item.pace.baseline_gmv || 0;
    if (item.pace.cls === 'great' || item.pace.cls === 'safe') {
      buckets.ok.count++;
      buckets.ok.value += Math.max(0, runrate - baseline);
    } else if (item.pace.cls === 'warn') {
      buckets.warn.count++;
      buckets.warn.value += Math.max(0, baseline - runrate);
    } else {
      buckets.danger.count++;
      buckets.danger.value += Math.max(0, baseline - runrate);
    }
  });
  return buckets;
}
window.nrrPortfolioRiskSummary = nrrPortfolioRiskSummary;

// Mini 6-month bar chart per account (Sense's _buildSparkline pattern,
// 06_portview_teamview.js:987-1017, ghost/solid two-tone last bar) — the
// 5 closed months come straight from bulk_history.csv; the current
// (open) month comes from the portview row itself (bulk_history.csv never
// contains the in-progress month). The quarter base month gets a small
// marker so it's visible which bar the pace% above is actually measured
// against.
function nrrAcctSparklineHtml(row, pace) {
  var hist = (window.bulkHistoryData && window.bulkHistoryData.byAccountId[row.account_id]) || [];
  var baseLabel = nrrBaseMonthThLabel();
  var closed = hist.slice().sort(function (a, b) {
    return (_nrrParseThLabel(a.month_label).key || 0) - (_nrrParseThLabel(b.month_label).key || 0);
  }).slice(-5);

  var bars = closed.map(function (h) {
    return { label: h.month_label, v: h.gmv, isBase: h.month_label === baseLabel, mtd: null };
  });
  bars.push({ label: 'MTD', v: row.runrate_gmv || 0, mtd: row.gmv_to_date || 0, isBase: false, isCurrent: true });

  var maxV = Math.max.apply(null, [1].concat(bars.map(function (b) { return b.v; })));
  var H = 26;
  var color = pace.pct == null ? 'var(--ink3)' : nrrThresholdColorVar(pace.pct);
  var barsHtml = bars.map(function (b) {
    var h = Math.max(2, Math.round((b.v / maxV) * H));
    var inner;
    if (b.isCurrent && b.mtd != null && b.v > b.mtd) {
      var solidH = Math.max(1, Math.round((b.mtd / maxV) * H));
      var hatchH = Math.max(1, h - solidH);
      inner = '<div class="nrr-spark-hatch" style="height:' + hatchH + 'px;background:repeating-linear-gradient(-45deg,rgba(255,255,255,0.5) 0 2px,rgba(255,255,255,0) 2px 5px),' + color + '"></div>' +
        '<div class="nrr-spark-seg" style="height:' + solidH + 'px;background:' + color + '"></div>';
    } else {
      // Base month gets an INSET top marker (box-shadow — draws inside
      // the box, adds no height) instead of the old trailing mark element
      // below the bar. That trailing element made the base column's total
      // height greater than its neighbors; since columns bottom-align,
      // the extra height pushed the base bar itself UP, making it look
      // taller/bigger than its real value (2026-07-09 — same bug shape
      // already fixed once in the Account view's own trend chart).
      inner = '<div class="nrr-spark-seg" style="height:' + h + 'px;background:' + color + (b.isBase ? ';box-shadow:inset 0 2px 0 var(--ink)' : '') + '"></div>';
    }
    return '<div class="nrr-spark-col' + (b.isBase ? ' base' : '') + '" title="' + nrrEsc(b.label + ': ' + nrrFmtGMV(b.v) + (b.isBase ? ' (เดือนฐาน)' : '')) + '">' +
      '<div class="nrr-spark-stack">' + inner + '</div>' +
      '</div>';
  }).join('');
  return '<div class="nrr-spark">' + barsHtml + '</div>';
}
window.nrrAcctSparklineHtml = nrrAcctSparklineHtml;
</script>
<script>
// ── nrr_account.js — Account view (Phase C, 2026-07-09) pure logic ──────
// Feeds #/account/:id. Two SKU signal systems, ported from two DIFFERENT
// Sense functions — do not merge them, they answer different questions:
//   nrrSkuPositiveSignals — live "what's growing this month" (new/growing
//     SKUs), run-rate projected so a partial month is judged fairly.
//     Ported from __legacyRenderKamThisMonthFallback (05_kam_view.js:617-701).
//   nrrSkuCycleSignals — "what's overdue relative to ITS OWN normal
//     reorder cadence" (near/gone), interval-aware so a SKU normally
//     bought every 20 days isn't falsely flagged on day 8. Ported from
//     computeChurnSignals (05_kam_view.js:63-170) — only the 'gone'/'near'
//     branches; Sense also has 'approaching'/'not_yet'/'slow' which are
//     NOT ported here (out of scope for this phase, see plan doc).

var NRR_CAT_MASTER = [
  { n: 'DG Food', c: 'var(--cat-1)' }, { n: 'Processed Food', c: 'var(--cat-2)' },
  { n: 'Vegetable', c: 'var(--cat-3)' }, { n: 'Meat', c: 'var(--cat-4)' },
  { n: 'Fish & Seafood', c: 'var(--cat-5)' }, { n: 'Egg', c: 'var(--cat-6)' },
  { n: 'Fruit', c: 'var(--cat-7)' }, { n: 'Beverage Non-alcohol', c: 'var(--cat-8)' },
  { n: 'Beverage Alcohol', c: 'var(--cat-9)' }, { n: 'DG Non-food', c: 'var(--cat-10)' }
];
window.NRR_CAT_MASTER = NRR_CAT_MASTER;

// { cur, last } Thai month labels — same lag-1-day anchor convention as
// nrrCommCurrentMonthLabel() (nrr_commission.js) so "current month" agrees
// everywhere in the app.
function _nrrAccountMonthLabels() {
  var cur = nrrCommCurrentMonthLabel();
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  var last = nrrThMonthLabel(new Date(lag.getFullYear(), lag.getMonth() - 1, 1));
  return { cur: cur, last: last };
}

function _nrrPortviewRowFor(accountId) {
  var pv = window.bulkPortviewData;
  if (!pv || !pv.loaded) return null;
  return pv.allRows.filter(function (r) { return r.account_id === accountId; })[0] || null;
}

function _nrrSkusRowsForMonth(accountId, kamEmail, monthLabel) {
  var bundle = nrrSenseSkusCache[kamEmail];
  if (!bundle || !bundle.loaded) return [];
  return (bundle.byAccountId[accountId] || []).filter(function (r) { return r.month_label === monthLabel; });
}

// Shared month-over-month item diff — nrrSkuPositiveSignals, nrrSkuCycleSignals
// and nrrSkuSwapPairs all read from this ONE computation instead of each
// rebuilding curByItem/lastByItem independently, so they can never drift
// apart on what counts as "new"/"dropped" this month.
function nrrSkuMonthDiff(accountId, kamEmail) {
  var labels = _nrrAccountMonthLabels();
  var curRows = _nrrSkusRowsForMonth(accountId, kamEmail, labels.cur);
  var lastRows = _nrrSkusRowsForMonth(accountId, kamEmail, labels.last);
  var curByItem = {}, lastByItem = {};
  curRows.forEach(function (r) { curByItem[r.item_id] = r; });
  lastRows.forEach(function (r) { lastByItem[r.item_id] = r; });
  // Dropped = ordered last month, no row at all this month. Small noise
  // floor (฿300) so a one-off trivial last-month purchase doesn't generate
  // a swap candidate — the signal lists' own display thresholds (below)
  // are separate and unaffected by this floor.
  var droppedItems = lastRows.filter(function (r) { return !curByItem[r.item_id] && r.gmv_ex_vat > 300; });

  // Items present both months with meaningful projected growth — same
  // rule nrrSkuPositiveSignals uses for its own "growing" bucket (>=20%
  // projected run-rate vs last month, current GMV>2000), computed once
  // here so the swap detector can ALSO consider these as swap-partner
  // candidates (2026-07-11: a real production account showed a dropped
  // SKU's volume landing on an ALREADY-EXISTING sibling pack size that
  // was simply growing, not a brand-new item — the swap detector's
  // original "dropped + genuinely new only" scope missed this).
  var acctRow = _nrrPortviewRowFor(accountId);
  var daysElapsed = (acctRow && acctRow.days_elapsed) || 1;
  var daysInMonth = (acctRow && acctRow.days_in_month) || 30;
  var ratio = daysElapsed > 0 ? daysInMonth / daysElapsed : 1;
  var growingItems = [];
  curRows.forEach(function (r) {
    var last = lastByItem[r.item_id];
    if (!last || !last.gmv_ex_vat) return;
    var proj = r.gmv_ex_vat * ratio;
    var chgPct = (proj - last.gmv_ex_vat) / last.gmv_ex_vat;
    if (chgPct >= 0.20 && r.gmv_ex_vat > 2000) growingItems.push(r);
  });

  return { curRows: curRows, lastRows: lastRows, curByItem: curByItem, lastByItem: lastByItem, droppedItems: droppedItems, growingItems: growingItems };
}
window.nrrSkuMonthDiff = nrrSkuMonthDiff;

// ── SKU swap detection — rule-based, NO AI (ported from Sense's own
// deterministic "SKU Verify" fallback scorer, src/05_kam_view.js:3096-3167 —
// same thresholds, same Thai stopword list, same form-conflict rules).
// Runs automatically on every Account page render, narrowed to a SINGLE
// high-confidence tier (no medium/annotate tier — a match either moves out
// of the risk/opportunity lists entirely, or it isn't treated as a swap at
// all): egg-grade-number match, OR same family (subclass) + name similarity
// >=0.4 + no form conflict + comparable quantity.
//
// Sense's version is human-reviewed (a KAM eyeballs each pair before it
// affects anything visible); this version runs unsupervised and reshapes
// real risk/opportunity numbers, so it adds one gate Sense's doesn't need:
// magnitude comparability. Decided 2026-07-11 (see plan doc) to gate this
// on QUANTITY (qty_kg), not GMV — a genuine pack-size swap (1kg pack -> 5kg
// pack, same product) keeps roughly the same purchased volume while its
// GMV can legitimately jump 4-5x, so a GMV-based gate would wrongly reject
// real pack-size swaps. Falls back to a GMV-ratio check only when qty_kg
// is missing/zero on either side.
var _NRR_SKU_TH_DIGITS = { '๐':'0','๑':'1','๒':'2','๓':'3','๔':'4','๕':'5','๖':'6','๗':'7','๘':'8','๙':'9' };
function _nrrSkuToAsciiDigits(s) {
  return String(s || '').replace(/[๐-๙]/g, function (d) { return _NRR_SKU_TH_DIGITS[d] || d; });
}
function _nrrSkuNormName(s) {
  return _nrrSkuToAsciiDigits(s).toLowerCase()
    .replace(/[()\[\]{}]/g, ' ')
    .replace(/[·•|,:;_\-/\\]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function _nrrSkuCompact(s) { return _nrrSkuNormName(s).replace(/\s+/g, ''); }
function _nrrSkuEggKey(name) {
  var n = _nrrSkuNormName(name), c = _nrrSkuCompact(name);
  if (n.indexOf('ไข่') < 0 && c.indexOf('egg') < 0) return '';
  var m = n.match(/เบอร์\s*(\d+)/) || c.match(/เบอร์(\d+)/) || n.match(/no\.?\s*(\d+)/) || c.match(/no(\d+)/);
  if (m && m[1]) return 'egg:no' + m[1];
  if (c.indexOf('เบอร์หนึ่ง') >= 0) return 'egg:no1';
  return 'egg:unknown';
}
function _nrrSkuFamilyKey(name, subclass) {
  var e = _nrrSkuEggKey(name);
  if (e && e !== 'egg:unknown') return e;
  var sub = _nrrSkuNormName(subclass || '');
  return sub ? 'sub:' + sub : '';
}
// Generic preservation-state/quality/sourcing qualifiers — describe HOW a
// product is kept/graded/sourced, not WHAT it is, so they must not count
// toward name similarity. Added 2026-07-11 after a real false positive:
// "ปีกไก่กลาง (แช่แข็ง) ตราเบทาโกร" (frozen chicken wing) matched "ขาไก่
// (ตัดเล็บ) (แช่แข็ง)" (frozen chicken leg) as a "swap" — the ONLY token
// the two names shared was "แช่แข็ง" (frozen), a word that appears on
// countless unrelated frozen products. formConflict's frozen/แช่แข็ง group
// doesn't catch this: it only fires on a MISMATCH (one frozen, one not),
// not when both sides share the same generic state word. This is a
// curated list, not a provably complete one — extend it if further
// mismatches like this turn up in real use (see plan doc).
// 2026-07-11 round 2: two more real false positives — "ควินัวขาว ออแกนิค
// ตรากรีนไลฟ์" (quinoa) matched "เมล็ดเจีย ออแกนิค ตรากรีนไลฟ์" (chia
// seeds), and two different Monin syrup FLAVORS matched via "เพียวเร่"
// (puree format) + brand. Root cause, both times: the brand-word filter
// below only ever matched a token that WAS EXACTLY "ตรา"/"brand"/"ยี่ห้อ"
// — but real product names always FUSE the brand into one token
// ("ตรากรีนไลฟ์", "ตราโมนิน", "ตราเบทาโกร" — every single example seen
// this session), so the brand filter has never actually fired in
// practice. Once the brand token is (wrongly) left in, two otherwise-
// unrelated products sharing a brand look deceptively similar. Fixed by
// PREFIX-matching brand tokens instead of exact-matching them. Also found
// "ออร์แกนิค" (the word added below) doesn't match the real spelling
// variant "ออแกนิค" (no ร์) actually used in the data — added both.
var _NRR_SKU_QUALIFIER_STOPWORDS = [
  'แช่แข็ง', 'frozen', 'แช่เย็น', 'chilled', 'สด', 'ทั้งตัว', 'คัดพิเศษ',
  'เกรดเอ', 'เกรด', 'ออร์แกนิค', 'ออแกนิค', 'ตัดแต่ง', 'นำเข้า',
  'เพียวเร่', 'คอนเซนเทรต'
];
var _NRR_SKU_BRAND_PREFIX_RE = /^(ตรา|brand|ยี่ห้อ)/;
function _nrrSkuTokens(name) {
  return _nrrSkuNormName(name).split(' ').filter(function (t) {
    return t && !/^\d+$/.test(t) && !_NRR_SKU_BRAND_PREFIX_RE.test(t)
      && _NRR_SKU_QUALIFIER_STOPWORDS.indexOf(t) === -1;
  });
}
function _nrrSkuJaccard(a, b) {
  var tokA = _nrrSkuTokens(a), tokB = _nrrSkuTokens(b);
  if (!tokA.length || !tokB.length) return 0;
  var setA = {}; tokA.forEach(function (t) { setA[t] = true; });
  var setB = {}; tokB.forEach(function (t) { setB[t] = true; });
  var sizeA = Object.keys(setA).length, sizeB = Object.keys(setB).length;
  var inter = 0;
  Object.keys(setA).forEach(function (t) { if (setB[t]) inter++; });
  return inter / Math.max(1, sizeA + sizeB - inter);
}
function _nrrSkuFormConflict(a, b) {
  var aa = _nrrSkuCompact(a), bb = _nrrSkuCompact(b);
  var groups = [['บด', 'สับ'], ['ชิ้น', 'แผ่น', 'สไลซ์'], ['ผง'], ['น้ำ'], ['แช่แข็ง', 'frozen']];
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var ha = g.some(function (x) { return aa.indexOf(x) >= 0; });
    var hb = g.some(function (x) { return bb.indexOf(x) >= 0; });
    if ((ha || hb) && ha !== hb) return true;
  }
  return false;
}
function _nrrSkuMagnitudeOk(pair) {
  var qtyA = parseFloat(pair.droppedQty) || 0, qtyB = parseFloat(pair.newQty) || 0;
  if (qtyA > 0 && qtyB > 0) {
    var qr = qtyB / qtyA;
    return qr >= 0.4 && qr <= 2.5;
  }

  if ((m = s.match(/(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*(?:g\.?|กรัม)(?:\b|\/|$|\s|,)/i))) { var k = parseFloat(m[1]) * parseFloat(m[2]) / 1000; return k > 0 ? { kg: k } : null; }
  if ((m = s.match(/(\d+(?:\.\d+)?)\s*(?:g\.?|กรัม)(?:\b|\/|$|\s|,)/i))) { var k2 = parseFloat(m[1]) / 1000; return k2 > 0 ? { kg: k2 } : null; }
  if ((m = s.match(/(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*(?:l(?:iter|itre)?|ลิตร|lt)\b/i))) return { liter: parseFloat(m[1]) * parseFloat(m[2]) };
  if ((m = s.match(/(\d+(?:\.\d+)?)\s*(?:l(?:iter|itre)?|ลิตร|lt)\b/i))) return { liter: parseFloat(m[1]) };
  if ((m = s.match(/(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*(?:ml|cc)\b/i))) return { liter: parseFloat(m[1]) * parseFloat(m[2]) / 1000 };
  if ((m = s.match(/(\d+(?:\.\d+)?)\s*(?:ml|cc)\b/i))) return { liter: parseFloat(m[1]) / 1000 };

}
function _nrrPkDetectBasis(s, unitPrice, kgPrice) {
  s = (s || '').toLowerCase();
  if (/\d+\s*(g\b|g\.|กรัม|kg\b)/.test(s)) return 'per_kg';
  if (/\d+\s*(ml|ลิตร|liter)\b/.test(s)) return 'per_unit_volume';
  if (/\b(l\/|\/l\b)/.test(s) && !/\bkg\b/.test(s)) return 'per_unit_volume';
  if (/กระป๋อง|ขวด|ลัง|แพ็ค|can|bottle|case|carton|piece|pcs|ชิ้น/.test(s)) return 'per_unit_count';
  if (unitPrice > 0 && kgPrice > 0 && Math.abs(unitPrice - kgPrice) / kgPrice > 0.4) return 'per_unit_count';
  return 'per_kg';
}
function _nrrPkUnitLabel(s) {
  s = (s || '').toLowerCase();
  if (s.indexOf('ถัง') >= 0) return 'ถัง';
  if (s.indexOf('ลัง') >= 0 || s.indexOf('case') >= 0 || s.indexOf('carton') >= 0) return 'ลัง';
  if (s.indexOf('กระป๋อง') >= 0 || s.indexOf('can') >= 0) return 'กระป๋อง';
  if (s.indexOf('ขวด') >= 0 || s.indexOf('bottle') >= 0) return 'ขวด';
  if (s.indexOf('แพ็ค') >= 0 || s.indexOf('แพ็ก') >= 0 || s.indexOf('pack') >= 0) return 'แพ็ค';
  if (s.indexOf('ชิ้น') >= 0 || s.indexOf('pcs') >= 0 || s.indexOf('piece') >= 0) return 'ชิ้น';
  if (s.indexOf('โหล') >= 0 || s.indexOf('dozen') >= 0) return 'โหล';
  if (/ml|ลิตร|liter/.test(s)) return 'ขวด';
  var t = (s || '').trim();
  return (t && t.length <= 20) ? t : 'ชิ้น';
}
function nrrSkuDisplayPrice(row) {
  var packSize = row.pack_size || '', dug = row.default_unit_group || '';
  var unitPrice = row.unit_price || 0, avgPiece = row.avg_piece_price || 0;
  var eaName = row.ea_unit_name || '', eaVal = row.universal_ea_value || 0;
  var rangeKg = _nrrPkRangeKgMax(packSize);
  var packU = dug !== 'WEIGHT' ? _nrrPkPackUnits(packSize) : null;
  var dp, du, div;
  if (dug === 'WEIGHT') { dp = unitPrice; du = 'กก.'; div = 1; }
  else if (rangeKg && avgPiece > 0) { dp = avgPiece / rangeKg; du = 'กก.'; div = rangeKg; }
  else if (packU && packU.kg > 0) { dp = unitPrice / packU.kg; du = 'กก.'; div = packU.kg; }
  else if (packU && packU.liter > 0) { dp = unitPrice / packU.liter; du = 'ลิตร'; div = packU.liter; }
  else if (eaName === 'แกลลอน' && eaVal > 0) { var lg = eaVal * 3.785; dp = unitPrice / lg; du = 'ลิตร'; div = lg; }
  else if (eaName === 'ปี๊บ' && eaVal > 0) { var lp = eaVal * 16; dp = unitPrice / lp; du = 'ลิตร'; div = lp; }
  else if ((dug === 'EACH' || dug === 'VOLUME') && eaName && eaVal > 0) { var base = avgPiece > 0 ? avgPiece : unitPrice; dp = base / eaVal; du = eaName; div = eaVal; }
  else {
    var dstr = packSize || ((row.subclass || '') + ' ' + (row.item_name_th || ''));
    var basis = _nrrPkDetectBasis(dstr, avgPiece, unitPrice);
    var hasUp = basis !== 'per_kg' && avgPiece > 0;
    dp = hasUp ? avgPiece : unitPrice; du = hasUp ? _nrrPkUnitLabel(dstr) : 'กก.'; div = 1;
  }
  if (!dp || dp <= 0) { dp = unitPrice; du = 'กก.'; div = 1; }
  return { displayPrice: Math.round(dp * 100) / 100, displayUnit: du, divisor: div || 1 };
}
window.nrrSkuDisplayPrice = nrrSkuDisplayPrice;

// ── Price list (v41) — ALL of this account's current-month SKUs, GMV-sorted,
// each with a normalized ฿/หน่วย, monthly spend, MoM %change, and a merged
// 6-month price history (sense_skus recent + bulk_price older, both converted
// to the display unit via the same divisor). Drives the reworked price
// drawer + tile. Built off sense_skus (which HAS the live MTD month + names +
// pack), so it never goes dark mid-month like the old bulk_price-gated path,
// and never shows a raw SKU code (every listed item has a name by
// construction).
// v60: targetLabel lets the drawer browse a specific past month instead of
// always locking to "current, else last" — allRows already carries every
// month sense_skus exports (currently MTD + 2 full prior months), this was
// purely a JS filter, not a data limit (confirmed via Explore investigation
// 2026-07-13). Falls back to the old cur/last behavior when targetLabel is
// omitted or isn't actually present for this account, so every existing
// caller keeps working unchanged.
function nrrAccountPriceList(accountId, kamEmail, targetLabel) {
  var skuBundle = nrrSenseSkusCache[kamEmail];
  if (!skuBundle || !skuBundle.loaded) return null;
  var allRows = skuBundle.byAccountId[accountId] || [];
  if (!allRows.length) return { items: [], useLabel: null, availableMonths: [] };
  var labels = _nrrAccountMonthLabels();
  var hasCur = allRows.some(function (r) { return r.month_label === labels.cur; });
  var monthSet = {};
  allRows.forEach(function (r) { if (r.month_label) monthSet[r.month_label] = true; });
  var availableMonths = Object.keys(monthSet).sort(function (a, b) {
    return (_nrrParseThLabel(b).key || 0) - (_nrrParseThLabel(a).key || 0); // newest first
  });
  var useLabel = (targetLabel && monthSet[targetLabel]) ? targetLabel : (hasCur ? labels.cur : labels.last);

  var metaByItem = {}, skuMonthsByItem = {};
  allRows.forEach(function (r) {
    (skuMonthsByItem[r.item_id] = skuMonthsByItem[r.item_id] || {})[r.month_label] = r;
    if (!metaByItem[r.item_id] || r.month_label === useLabel) metaByItem[r.item_id] = r;
  });
  var priceByItem = (window.bulkPriceData && window.bulkPriceData.loaded && window.bulkPriceData.byAccountItem[accountId]) || {};

  var curRows = allRows.filter(function (r) { return r.month_label === useLabel; });
  var items = curRows.map(function (cur) {
    var meta = metaByItem[cur.item_id] || cur;
    var disp = nrrSkuDisplayPrice(meta);
    var div = disp.divisor || 1;
    // merged monthly display-price history, dedup by month; sense_skus wins
    // over bulk_price for a shared month (it's the same-basis source we
    // computed `div` from). Current month forced to the proper displayPrice
    // so the row headline and the chart's last point always agree.
    var hist = {};
    (priceByItem[cur.item_id] || []).forEach(function (p) { if (p.unit_price > 0) hist[p.month_label] = p.unit_price / div; });
    Object.keys(skuMonthsByItem[cur.item_id] || {}).forEach(function (ml) {
      var sr = skuMonthsByItem[cur.item_id][ml];
      if (sr.unit_price > 0) hist[ml] = sr.unit_price / div;
    });
    if (disp.displayPrice > 0) hist[useLabel] = disp.displayPrice;
    var history = Object.keys(hist).map(function (ml) { return { month_label: ml, price: hist[ml] }; })
      .sort(function (a, b) { return (_nrrParseThLabel(a.month_label).key || 0) - (_nrrParseThLabel(b.month_label).key || 0); })
      .slice(-6);
    var chgPct = null;
    for (var i = history.length - 1; i >= 1; i--) {
      if (history[i].month_label === useLabel) {
        var prevP = history[i - 1].price;
        if (prevP > 0) chgPct = (history[i].price - prevP) / prevP * 100;
        break;
      }
    }
    return {
      item_id: cur.item_id, name: cur.item_name_th || cur.item_id, pack_size: cur.pack_size,
      dept: cur.dept, gmv: cur.gmv_ex_vat, qty_kg: cur.qty_kg,
      displayPrice: disp.displayPrice, displayUnit: disp.displayUnit,
      chgPct: chgPct, history: history

  });
