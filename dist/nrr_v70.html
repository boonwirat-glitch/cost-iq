function _nrrPulseWindow(items, idx, max) {
  if (!items.length || items.length <= max) return items;
  var out = [];
  for (var i = 0; i < max; i++) out.push(items[(idx + i) % items.length]);
  return out;
}

function _nrrPulseArrivalRowsHtml(items, max) {
  if (!items.length) return '<div class="nrr-pulse-empty">— ยังไม่มีเดือนนี้ —</div>';
  // v54: measured once from the FULL list (not the rotating window) so the
  // owner column's width never changes as rotation cycles through names.
  var slotW = _nrrPulseOwnerSlotWidth(items, 'owner');
  return _nrrPulseWindow(items, nrrPulseState.rotIdx, max).map(function (x) {
    // v46: primary = outlet/branch name (x.name), secondary = the full legal
    // entity name ONLY when it genuinely differs (x.sub) — was showing the
    // long combined-entity name as the primary line, which is what made
    // rows like "บริษัท ปตท. ... (มหาชน) ... & บริษัท ..." unreadable on a TV.
    return '<div class="nrr-pulse-arr-row">' +
      (x.isToday ? '<span class="nrr-pulse-today-dot" title="เปิดบิลแรกเมื่อวาน"></span>' : '<span class="nrr-pulse-arr-dot"></span>') +
      '<div class="nrr-pulse-arr-main">' +
      '<div class="nrr-pulse-arr-name">' + nrrEsc(x.name) + '</div>' +
      (x.sub ? '<div class="nrr-pulse-arr-sub">' + nrrEsc(x.sub) + '</div>' : '') +
      '</div>' +
      _nrrPulseOwnerChip(x.owner, slotW) +
      '<div class="nrr-pulse-arr-gmv">' + nrrFmtGMV(x.gmv) + '</div>' +
      '</div>';
  }).join('');
}

// v46: ranked, named new-SKU rows (once new_skus_portfolio.csv is uploaded)
// — reuses the arrival-row layout since it's the same "dot + name + ฿" shape.
function _nrrPulseSkuRowsHtml(items, max) {
  if (!items.length) return '<div class="nrr-pulse-empty">— ไม่มีข้อมูล —</div>';
  return _nrrPulseWindow(items, nrrPulseState.rotIdx, max).map(function (x) {
    return '<div class="nrr-pulse-arr-row">' +
      '<span class="nrr-pulse-arr-dot"></span>' +
      '<div class="nrr-pulse-arr-main"><div class="nrr-pulse-arr-name">' + nrrEsc(x.name) + '</div></div>' +
      '<div class="nrr-pulse-arr-gmv">' + nrrFmtGMV(x.gmv) + '</div>' +
      '</div>';
  }).join('');
}

// v50: rebuilt to match the arrival rows' own layout exactly (same request
// as the Expansion fix) — res_name primary / account_name secondary, owner
// chip on the right. The ฿ figure is the SHORTFALL vs the quarter's fixed
// baseline (baseline − run-rate, never the account's actual MTD spend) —
// was previously labeled with a vague "เสี่ยงเสีย"; now the actual reason
// ("ต่ำกว่าฐาน N%" / "เงียบ") sits directly under the number instead, so the
// number and its cause read together instead of needing a separate legend.
function _nrrPulseRiskRowsHtml(items, max) {
  if (!items.length) return '<div class="nrr-pulse-empty">— ไม่มีร้านที่ต้องตามด่วน —</div>';
  var slotW = _nrrPulseOwnerSlotWidth(items, 'kam');
  var amtW = _nrrPulseRiskAmtWidth(items);
  return _nrrPulseWindow(items, nrrPulseState.rotIdx, max).map(function (x) {
    return '<div class="nrr-pulse-risk-row">' +
      '<div class="nrr-pulse-arr-main">' +
      '<div class="nrr-pulse-arr-name">' + nrrEsc(x.name) + '</div>' +
      (x.sub ? '<div class="nrr-pulse-arr-sub">' + nrrEsc(x.sub) + '</div>' : '') +
      '</div>' +
      _nrrPulseOwnerChip(x.kam, slotW) +
      '<div class="nrr-pulse-risk-amt-wrap" style="width:' + amtW + 'px"><div class="nrr-pulse-risk-amt">−' + nrrFmtGMV(x.risk) + '</div>' +
      '<div class="nrr-pulse-risk-amt-lbl">' + nrrEsc(x.reason) + '</div></div>' +
      '</div>';
  }).join('');
}

// Re-fill only the rotating list containers (called by main render + rotation
// timer) so rotation never rebuilds the whole page.
function _nrrPulseFillLists() {
  var m = nrrPulseState.model;
  if (!m) return;
  var s = document.getElementById('nrr-pulse-sales-list');
  if (s) s.innerHTML = _nrrPulseArrivalRowsHtml(m.sales.items, _nrrPulseEffMax(NRR_PULSE_ARR_MAX));
  var e = document.getElementById('nrr-pulse-exp-list');
  if (e) e.innerHTML = _nrrPulseArrivalRowsHtml(m.expansion.items, _nrrPulseEffMax(NRR_PULSE_ARR_MAX));
  var r = document.getElementById('nrr-pulse-risk-list');
  if (r) r.innerHTML = _nrrPulseRiskRowsHtml(m.risk, _nrrPulseEffMax(NRR_PULSE_RISK_MAX));
  var sk = document.getElementById('nrr-pulse-sku-list');
  if (sk) sk.innerHTML = _nrrPulseSkuRowsHtml(m.newSkuItems, _nrrPulseEffMax(NRR_PULSE_ARR_MAX));
}

function _nrrPulseArrivalsHtml(m) {
  return '<div class="nrr-pulse-arrivals">' +
    '<div class="nrr-pulse-block teal">' +
    '<div class="nrr-pulse-block-head"><span class="nrr-pulse-block-title">มาใหม่ · จาก Sales</span>' +
    '<span class="nrr-pulse-block-tally">' + m.sales.count + ' ร้าน · ' + nrrFmtGMV(m.sales.gmv) + '</span></div>' +
    '<div class="nrr-pulse-list" id="nrr-pulse-sales-list"></div>' +
    '</div>' +
    '<div class="nrr-pulse-block leaf">' +
    '<div class="nrr-pulse-block-head"><span class="nrr-pulse-block-title">มาใหม่ · จาก Expansion</span>' +
    '<span class="nrr-pulse-block-tally">' + m.expansion.count + ' สาขา · ' + nrrFmtGMV(m.expansion.gmv) + '</span></div>' +
    '<div class="nrr-pulse-list" id="nrr-pulse-exp-list"></div>' +
    '</div>' +
    '</div>';
}

function _nrrPulseLowerHtml(m) {
  // v46: named + ranked once new_skus_portfolio.csv is uploaded (sql/
  // new_skus_portfolio.sql); falls back to the v1 bare count otherwise —
  // 404-graceful, same precedent as the Sales fix before its SQL reran.
  // v47: show a real "N SKU" count (not just ฿) + a plain-language caption
  // explaining what "new" means — user asked "how many SKU are new, and
  // what does new even mean, in simple words." Definition, spelled out:
  // an item counts once a SHOP buys it for the first time this month
  // (didn't buy it last month) and spends at least ฿1,000 on it — summed
  // across every shop in the portfolio.
  var skuBlock = m.newSkuItems.length
    ? '<div class="nrr-pulse-block sun">' +
      '<div class="nrr-pulse-block-head"><span class="nrr-pulse-block-title">สินค้าใหม่ที่ขายได้</span>' +
      '<span class="nrr-pulse-block-tally">' + m.newSkuCount + ' SKU · ' + nrrFmtGMV(m.newSkuGmv) + '</span></div>' +
      '<div class="nrr-pulse-block-caption">สินค้าที่ร้านเริ่มซื้อเดือนนี้ — เดือนก่อนไม่เคยซื้อ และซื้อแล้วอย่างน้อย ฿1,000/ร้าน</div>' +
      '<div class="nrr-pulse-list" id="nrr-pulse-sku-list"></div>' +
      '</div>'
    : '<div class="nrr-pulse-block sun compact">' +
      '<div class="nrr-pulse-block-title">สินค้าใหม่ที่ขายได้</div>' +
      '<div class="nrr-pulse-sku-num">＋' + m.newSkuAdded.toLocaleString() + '</div>' +
      '<div class="nrr-pulse-sku-sub">จำนวน SKU ที่ร้านต่างๆ ซื้อเพิ่มเดือนนี้ (นับรวมทั้ง portfolio)</div>' +
      '</div>';
  return '<div class="nrr-pulse-lower">' +
    skuBlock +
    // at-risk list — v48: total ฿ at risk across ALL 156 (not just the
    // rotating rows shown), + a caption defining "ฐาน" so the whole block
    // reads as clearly as the SKU block next to it.
    '<div class="nrr-pulse-block coral">' +
    '<div class="nrr-pulse-block-head"><span class="nrr-pulse-block-title">ต้องดูแล — เงียบ / ยอดตก</span>' +
    '<span class="nrr-pulse-block-tally">' + m.dangerCount + ' ร้าน · −' + nrrFmtGMV(m.riskTotal) + '</span></div>' +
    '<div class="nrr-pulse-block-caption">ยอดวิ่ง (run-rate) ต่ำกว่าฐานไตรมาส (มิ.ย.) หรือหยุดสั่งซื้อไปแล้ว</div>' +
    '<div class="nrr-pulse-list" id="nrr-pulse-risk-list"></div>' +
    '</div>' +
    '</div>';
}

function nrrRenderPulseView() {
  var page = document.getElementById('nrr-pulse-page');
  if (!page) return;
  // Ensure the portfolio-level data this page needs is loaded (dashboard init
  // only fetches movement/company data; portview + history come from the
  // portfolio/account flows). Idempotent + cached — safe to await every entry.
  page.innerHTML = '<div class="nrr-pulse-loading">กำลังโหลดภาพรวม...</div>';
  Promise.all([
    (typeof nrrFetchQnrrCsv === 'function' ? nrrFetchQnrrCsv(false) : Promise.resolve()),
    (typeof nrrFetchPortviewCsv === 'function' ? nrrFetchPortviewCsv(false) : Promise.resolve()),
    (typeof nrrFetchBulkHistoryCsv === 'function' ? nrrFetchBulkHistoryCsv(false) : Promise.resolve()),
    (typeof nrrFetchSalesPipelineCsv === 'function' ? nrrFetchSalesPipelineCsv(false) : Promise.resolve()),
    (typeof nrrFetchNewSkusPortfolioCsv === 'function' ? nrrFetchNewSkusPortfolioCsv(false) : Promise.resolve())
  ]).then(function () {
    if (!nrrCurrentRoute || nrrCurrentRoute.view !== 'pulse') return; // navigated away mid-fetch
    _nrrPulseRender();
    _nrrPulseArmTimers();
  });
}
window.nrrRenderPulseView = nrrRenderPulseView;

function _nrrPulseRender() {
  var page = document.getElementById('nrr-pulse-page');
  if (!page) return;
  var m = nrrPulseModel();
  nrrPulseState.model = m;
  if (!m) {
    page.innerHTML = '<div class="nrr-pulse-loading">ยังไม่มีข้อมูลภาพรวม</div>';
    return;
  }
  page.innerHTML =
    '<div class="nrr-pulseboard">' +
    _nrrPulseDatelineHtml(m) +
    (typeof nrrStalePortviewBannerHtml === 'function' ? nrrStalePortviewBannerHtml() : '') +
    (typeof nrrStaleBulkHistoryBannerHtml === 'function' ? nrrStaleBulkHistoryBannerHtml() : '') +
    _nrrPulseHeroHtml(m) +
    _nrrPulseArrivalsHtml(m) +
    _nrrPulseLowerHtml(m) +
    '</div>';
  _nrrPulseFillLists();
  // celebratory count-up on the two integer heroes
  page.querySelectorAll('.nrr-pulse-hero-num[data-count]').forEach(function (el) {
    var target = parseInt(el.dataset.count, 10) || 0;
    nrrCountUp(el, target, 800, function (n) { return Math.round(n).toLocaleString(); });
  });
  var fsBtn = document.getElementById('nrr-pulse-fs-btn');
  if (fsBtn) fsBtn.addEventListener('click', _nrrPulseToggleFullscreen);
  var rotSeg = document.getElementById('nrr-pulse-rot-seg');
  if (rotSeg) rotSeg.addEventListener('click', function (e) {
    var btn = e.target.closest('button[data-rotms]');
    if (!btn) return;
    var ms = parseInt(btn.dataset.rotms, 10);
    if (!ms || ms === nrrPulseState.rotMs) return;
    nrrPulseState.rotMs = ms;
    rotSeg.querySelectorAll('button').forEach(function (b) {
      b.classList.toggle('on', parseInt(b.dataset.rotms, 10) === ms);
    });
    // re-arm with the new interval — _nrrPulseArmTimers always clears both
    // timers first, so this also resets the 10-min refresh countdown; a
    // harmless side effect (refresh lands up to ~10min later, worst case),
    // not worth splitting into two separate arm functions for this scope.
    _nrrPulseArmTimers();
  });
}

// ── Timers (auto-refresh + spotlight rotation) ──────────────────────────────
// Only run while #/pulse is the active view; self-clear otherwise so nothing
// leaks when the user (or a wall TV kiosk) navigates away.
function _nrrPulseArmTimers() {
  _nrrPulseClearTimers();
  _nrrPulseRotTimer = setInterval(function () {
    if (!nrrCurrentRoute || nrrCurrentRoute.view !== 'pulse') { _nrrPulseClearTimers(); return; }
    nrrPulseState.rotIdx += Math.max(_nrrPulseEffMax(NRR_PULSE_ARR_MAX), _nrrPulseEffMax(NRR_PULSE_RISK_MAX));
    _nrrPulseFillLists();
  }, nrrPulseState.rotMs);
  _nrrPulseRefreshTimer = setInterval(function () {
    if (!nrrCurrentRoute || nrrCurrentRoute.view !== 'pulse') { _nrrPulseClearTimers(); return; }
    Promise.all([
      nrrFetchQnrrCsv(true),
      nrrFetchPortviewCsv(true),
      nrrFetchBulkHistoryCsv(true),
      nrrFetchSalesPipelineCsv(true),
      nrrFetchNewSkusPortfolioCsv(true)
    ]).then(function () {
      if (!nrrCurrentRoute || nrrCurrentRoute.view !== 'pulse') return;
      _nrrPulseRender();
    });
  }, NRR_PULSE_REFRESH_MS);
}
function _nrrPulseClearTimers() {
  if (_nrrPulseRotTimer) { clearInterval(_nrrPulseRotTimer); _nrrPulseRotTimer = null; }
  if (_nrrPulseRefreshTimer) { clearInterval(_nrrPulseRefreshTimer); _nrrPulseRefreshTimer = null; }
  // Leaving #/pulse always exits TV fullscreen too — same cleanup hook.
  if (document.fullscreenElement) (document.exitFullscreen() || Promise.resolve()).catch(function () {});
}

// ── Route registration (nrr_router.js is injected before this module) ────────
nrrRouterRegister('pulse', nrrRenderPulseView);
window.nrrRenderPulseView = nrrRenderPulseView;
</script>
<script>
// ── nrr_notes.js — TL/Admin notes on churn/comeback outlets ──────────────
// Reads/writes the `nrr_outlet_notes` Supabase table. This table does NOT
// exist yet as of first implementation — the exact CREATE TABLE + RLS
// policy SQL lives in the plan doc and must be run manually in the
// Supabase SQL editor before this feature does anything. Every function
// here is defensive: if the table/policy is missing, we detect that once,
// set nrrNotesAvailable = false, and the UI hides the "add note" affordance
// entirely rather than showing a broken button or spamming errors.

var nrrNotesAvailable = null; // null = not checked yet, true/false once known
var nrrNotesCache = {}; // outlet_id -> [{note, author_email, created_at}]

async function nrrFetchNotesForOutlets(outletIds, periodMonth) {
  nrrNotesCache = {};
  if (!outletIds.length || !supa) return nrrNotesCache;
  try {
    var resp = await supa.from('nrr_outlet_notes')
      .select('outlet_id,note,author_email,movement_type,created_at')
      .in('outlet_id', outletIds)
      .eq('period_month', periodMonth)
      .order('created_at', { ascending: false });
    if (resp.error) throw resp.error;
    nrrNotesAvailable = true;
    (resp.data || []).forEach(function (n) {
      if (!nrrNotesCache[n.outlet_id]) nrrNotesCache[n.outlet_id] = [];
      nrrNotesCache[n.outlet_id].push(n);
    });
  } catch (e) {
    // Table missing, RLS denies, or any other error — feature unavailable,
    // fail quiet. Logged once for whoever's debugging, not shown to user.
    nrrNotesAvailable = false;
    console.warn('[nrr] outlet notes unavailable (table likely not migrated yet):', e.message || e);
  }
  return nrrNotesCache;
}
window.nrrFetchNotesForOutlets = nrrFetchNotesForOutlets;

async function nrrSaveNote(outletId, periodMonth, quarterId, movementType, noteText) {
  if (!supa || !nrrProfile) return { ok: false, error: 'not_authenticated' };
  try {
    var resp = await supa.from('nrr_outlet_notes').insert({
      outlet_id: outletId,
      period_month: periodMonth,
      quarter_id: quarterId,
      movement_type: movementType,
      author_email: nrrProfile.email,
      note: noteText
    });
    if (resp.error) throw resp.error;
    return { ok: true };
  } catch (e) {
    console.warn('[nrr] failed to save outlet note', e);
    return { ok: false, error: e.message || String(e) };
  }
}
window.nrrSaveNote = nrrSaveNote;
</script>
<script>
// ── nrr_components.js — render helpers (v4) ──────────────────────────────

var MV_LABEL = {
  core_nrr: 'Core NRR', core_nrr_churn: 'Churn', comeback: 'Comeback',
  transfer_in: 'Transfer in', transfer_out: 'Transfer out',
  handover: 'Handover', new_sales: 'New sales', expansion: 'Expansion'
};

// v4 categorical palette — a SEPARATE system from status colors (green/sun/
// coral thresholds). Gains = green family, losses = coral family, portfolio
// plumbing = neutral cool hues. sun/amber is reserved for threshold-warning
// status and must never appear as a category color (see nrr_tokens.css).
var MV_COLOR = {
  core_nrr: 'var(--green)',
  expansion: 'var(--mv-green-lt)',
  comeback: 'var(--mv-teal)',
  transfer_in: 'var(--mv-violet)',
  handover: 'var(--mv-slate)',
  new_sales: 'var(--mv-slate)',
  core_nrr_churn: 'var(--coral)',
  transfer_out: 'var(--mv-clay)'
};
var MV_TAG_CLASS = {
  core_nrr: 'green', expansion: 'mv-green-lt', comeback: 'mv-teal',
  transfer_in: 'mv-violet', handover: 'mv-slate', new_sales: 'mv-slate',
  core_nrr_churn: 'coral', transfer_out: 'mv-clay'
};

// Stack order for the gains side of the chart (bottom → top).
var STACK_ORDER = ['core_nrr', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in'];
// Losses hang below the zero line (top → bottom).
var LOSS_ORDER = ['core_nrr_churn', 'transfer_out'];

function nrrEsc(s) {
  return String(s || '').replace(/[&<>'"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c];
  });
}

function nrrStatTileHtml(id, label, valueAttr) {
  return '<div class="nrr-kpi-tile"><div class="nrr-kpi-value num" id="' + id + '" ' + (valueAttr || '') + '>—</div>' +
    '<div class="nrr-kpi-label">' + nrrEsc(label) + '</div></div>';
}

function nrrTag(movementType) {
  var cls = MV_TAG_CLASS[movementType] || 'muted';
  return '<span class="tag ' + cls + '">' + nrrEsc(MV_LABEL[movementType] || movementType) + '</span>';
}

// v8: small color dot in front of a name — replaces the movement-type text
// pill in outlet/account rows. A pill's width varies with label length
// ("Core NRR" vs "Churn"), which both eats space and nudges row height
// when it wraps; a fixed-size dot never does either, and keeps every row's
// name starting at the same x position regardless of movement type.
// Hover still reveals the exact label via title, so nothing is lost.
function nrrMvDotHtml(movementType) {
  if (!movementType) return '<span class="nrr-mv-dot nrr-mv-dot-mixed" title="หลายประเภท"></span>';
  var color = MV_COLOR[movementType] || 'var(--ink3)';
  var label = MV_LABEL[movementType] || movementType;
  return '<span class="nrr-mv-dot" style="background:' + color + '" title="' + nrrEsc(label) + '"></span>';
}
window.nrrMvDotHtml = nrrMvDotHtml;

// ── v4: number-triple renderer — ONE convention everywhere ───────────────
// run-rate = primary (the number the quarter is judged on), ~ prefix +
// dotted underline while the month is partial; MTD = evidence, plain ink;
// base = yardstick, muted. When the month completes, ~/dots drop and MTD
// equals run-rate, so the secondary line collapses to just the base.
function nrrRunRateTooltip(triple) {
  return 'Run-rate: MTD ÷ ' + triple.curr_days + ' วัน × 30 — ประมาณการถึงสิ้นเดือน';
}

// ── v5: per-outlet momentum vs its own base ───────────────────────────────
// Banding verified on real data (51% up / 21% flat / 28% down at day 6):
// >1.10 growth, 0.90–1.10 flat (no mark — flat is the absence of signal),
// <0.90 shrinking. base=0 with revenue = pure gain (comeback/expansion).
function nrrMomentum(base, runRate) {
  if (base > 0) {
    var ratio = runRate / base;
    if (ratio > 1.10) return { cls: 'nrr-sig-up', glyph: '▲' };
    if (ratio < 0.90) return { cls: 'nrr-sig-down', glyph: '▼' };
    return { cls: '', glyph: '' };
  }
  if (runRate > 0) return { cls: 'nrr-sig-up', glyph: '▲' };
  return { cls: '', glyph: '' };
}
window.nrrMomentum = nrrMomentum;

function nrrTripleHtml(size, triple, opts) {
  if (!triple) return '<span class="micro">—</span>';
  opts = opts || {};
  var p = triple.is_partial;
  var rr = (p ? '~' : '') + nrrFmtGMV(triple.run_rate);
  var rrTitle = p ? ' title="' + nrrEsc(nrrRunRateTooltip(triple)) + '"' : '';
  var rrCls = 'nrr-rr' + (p ? ' nrr-rr-proj' : '');

  if (size === 'lg') {
    return '<div class="nrr-triple-lg">' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">ฐาน</div><div class="num nrr-triple-base">' + nrrFmtGMV(triple.base) + '</div></div>' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">MTD · ' + triple.curr_days + '/' + triple.days_in_month + ' วัน</div><div class="num nrr-triple-mtd">' + nrrFmtGMV(triple.mtd) + '</div></div>' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">' + (p ? 'คาดการณ์สิ้นเดือน' : 'ทั้งเดือน') + '</div><div class="num nrr-triple-rr ' + rrCls + '"' + rrTitle + '>' + rr + '</div></div>' +
      '</div>';
  }
  // md / sm — two-line right-aligned stack. Momentum signal applies ONLY at
  // sm (outlet rows / account headers) — md/lg surfaces already carry
  // threshold-colored %NRR, doubling the signal there would be noise.
  var szCls = size === 'sm' ? 'nrr-triple-sm' : 'nrr-triple-md';
  var sigHtml = '';
  var sigCls = '';
  if (size === 'sm' && opts.signal) {
    var sig = nrrMomentum(triple.base, triple.run_rate);
    sigCls = sig.cls ? ' ' + sig.cls : '';
    sigHtml = sig.glyph ? '<span class="nrr-sig-glyph">' + sig.glyph + '</span>' : '';
  }
  var line2 = p
    ? 'MTD ' + nrrFmtGMV(triple.mtd) + ' · ฐาน ' + nrrFmtGMV(triple.base)
    : 'ฐาน ' + nrrFmtGMV(triple.base);
  return '<div class="' + szCls + '"><div class="num ' + rrCls + sigCls + '"' + rrTitle + '>' + sigHtml + rr + '</div>' +
    '<div class="nrr-triple-sub">' + line2 + '</div></div>';
}
window.nrrTripleHtml = nrrTripleHtml;

// ── v4: unified outlet row — used by slide-over AND movement expansions ──
// One grid for every row (20px chevron slot / text / 150px numbers) so all
// names share the same left edge — this is the alignment fix.
// opts: {showKam, indent, negative} — negative = show lost base (coral).
function nrrOutletRowHtml(o, opts) {
  opts = opts || {};
  var r = o.row;
  var kamMeta = opts.showKam && r.latest_staff_owner
    ? '<span class="nrr-outlet-kam">' + nrrEsc(r.latest_staff_owner) + '</span> · '
    : '';
  // Transfer attribution (verified: base_* = origin, current_* = destination;
  // blank staff owner = the unattributed Admin pool).
  var transferMeta = '';
  if (o.movement === 'transfer_out') {
    transferMeta = ' · <span class="nrr-transfer-attr">→ ' + nrrEsc(r.current_staff_owner || 'Admin pool') + ' (' + nrrEsc(r.current_portfolio || 'ADMIN') + ')</span>';
  } else if (o.movement === 'transfer_in') {
    transferMeta = ' · <span class="nrr-transfer-attr">← ' + nrrEsc(r.base_staff_owner || 'Admin pool') + ' (' + nrrEsc(r.base_portfolio || 'ADMIN') + ')</span>';
  }
  var numbersHtml;
  if (opts.negative) {
    var lost = Math.round((parseFloat(r.base_gmv) || 0) / (parseFloat(r.base_days) || 31) * nrrBaseDays());
    // Last order date — sourced from bulk_outlets.csv (nrrOutletLastOrderDate),
    // lazily fetched by nrrOpenSlideoverMovement only for negative (churn/
    // transfer_out) drawers. Omitted silently if not loaded/no rows yet —
    // no loading placeholder, it just pops in on the next re-render.
    // Scoped to THIS row's own outlet_id, not the whole account_id — a
    // chain account can have one branch churn while a sibling branch is
    // still active, and an account-wide max would show the sibling's date.
    var lastOrderIso = (r.account_id && r.outlet_id) ? nrrOutletLastOrderDate(r.account_id, r.outlet_id) : null;
    var lastOrderTh = lastOrderIso ? nrrShortThaiDate(lastOrderIso) : null;
    var dateSub = lastOrderTh ? ' · สั่งล่าสุด ' + nrrEsc(lastOrderTh) : '';
    numbersHtml = '<div class="num nrr-lost">−' + nrrFmtGMV(lost) + '</div><div class="nrr-triple-sub">ฐานที่หาย' + dateSub + '</div>';
  } else {
    var currD = parseFloat(r.curr_days) || 30;
    var mtd = parseFloat(r.curr_gmv) || 0;
    numbersHtml = nrrTripleHtml('sm', {
      base: Math.round(parseFloat(r.base_gmv) || 0),
      mtd: Math.round(mtd),
      run_rate: Math.round(currD > 0 ? mtd / currD * nrrDaysIn(r.period_month) : 0),
      curr_days: currD, days_in_month: nrrDaysIn(r.period_month),
      is_partial: true
    }, { signal: true });
  }
  // Whole row is a link into Account view (Phase C) when we have an
  // account_id to link to — was a plain <div> before (dashboard drawers
  // didn't reach that far); an outlet showing here as churned/at-risk is
  // exactly when someone wants to drill in, and #/account/:id already
  // exists and gracefully shows "ไม่พบร้านนี้" for the rare account not in
  // portview.csv (e.g. fully inactive), so linking unconditionally is safe.
  var isLink = !!r.account_id;
  var tag = isLink ? 'a' : 'div';
  var hrefAttr = isLink ? ' href="#/account/' + encodeURIComponent(r.account_id) + '"' : '';
  return '<' + tag + ' class="nrr-row' + (isLink ? ' nrr-row-linked' : '') + (opts.indent ? ' nrr-row-branch' : '') + '"' + hrefAttr + '>' +
    '<div class="nrr-row-chev"></div>' +
    '<div class="nrr-row-text nrr-row-text-dot">' + nrrMvDotHtml(o.movement) +
    '<div><span class="nrr-row-name">' + nrrEsc(r.res_name || r.account_name) + '</span>' +
    '<div class="nrr-row-meta">' + kamMeta + nrrEsc(r.account_name || '') + transferMeta + '</div></div></div>' +
    '<div class="nrr-row-nums">' + numbersHtml + '</div>' +
    '</' + tag + '>';
}
window.nrrOutletRowHtml = nrrOutletRowHtml;

// ── v4/v6: movement chart — two views over the same columns ─────────────
// "ทั้งไตรมาส" (quarter/totals, default): base + one column per month, bar
// height = actual total GMV (run-rate/hatched while partial) — churn is
// NOT baked into this bar (a totals view where losses subtract from height
// makes the bar taller than the real number, which is misleading); churn
// shows in the table and in the delta view instead.
// "การเปลี่ยนแปลง" (delta): the original ChartMogul-style above/below-zero
// view — gains stack up, losses (churn/transfer_out) hang below zero.
// opts: {scopeCtx, showKam, onCellClick(mv, cohort, month)} — v6: clicking
// a cell now opens the slide-over directly (see nrrOpenSlideoverMovement)
// instead of an inline expansion row.
var _nrrMvChartMode = {}; // chartContainerId -> 'quarter' | 'delta'

function _nrrQuarterColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment) {
  var H = 190;
  var maxVal = baseAdjusted + handoverBase;
  var runRates = columns.map(function (c) {
    if (c.isBase) return baseAdjusted + handoverBase;
    var triple = nrrMonthTriple(result, c.month);
    return triple ? triple.run_rate : 0;
  });
  runRates.forEach(function (v) { if (v > maxVal) maxVal = v; });
  var pxPer = maxVal > 0 ? H / maxVal : 0;

  var colsHtml = columns.map(function (c) {
    if (c.isBase) {
      var coreH = Math.max(4, Math.round(baseAdjusted * pxPer));
      var hovH = handoverBase > 0 ? Math.max(3, Math.round(handoverBase * pxPer)) : 0;
      var segs = (hovH ? '<div class="nrr-qcol-seg" style="height:' + hovH + 'px;background:var(--mv-slate);opacity:.45"></div>' : '') +
        '<div class="nrr-qcol-seg" style="height:' + coreH + 'px;background:var(--green);opacity:.35"></div>';
      return '<div class="nrr-qcol">' +
        '<div class="nrr-qcol-cap num">' + nrrFmtGMV(baseAdjusted + handoverBase) + (hasAdjustment ? '<span class="tag muted" style="margin-left:4px">adj</span>' : '') + '</div>' +
        '<div class="nrr-qcol-stack">' + segs + '</div>' +
        '<div class="nrr-qcol-label">' + nrrEsc(c.label) + '</div>' +
        '<div class="nrr-qcol-nrr">&nbsp;</div></div>';
    }
    var bm = result.by_month[c.month];
    var triple = nrrMonthTriple(result, c.month);
    var runRate = triple ? triple.run_rate : 0;
    var mtd = triple ? triple.mtd : 0;
    var isPartial = !!(triple && triple.is_partial);
    // v7-fix: bm.segments[mv] is ALREADY a 30-day run-rate figure
    // (curr_gmv/curr_days*30, see nrr_logic.js) — segments sum to ~run_rate.
    // Column geometry must be: total height = run_rate exactly, where the
    // SOLID portion sums to MTD (each segment scaled down proportionally so
    // relative proportions stay visible) and the hatch fills the remaining
    // (run_rate − MTD). Two earlier attempts got this wrong: clipping
    // sequentially against MTD hid every segment after core_nrr; stacking
    // at full height AND adding the hatch double-counted (column rendered
    // ~2× taller than its own cap label).
    var segTotal = STACK_ORDER.reduce(function (s, mv) { return s + ((bm && bm.segments[mv]) || 0); }, 0);
    var solidScale = (isPartial && segTotal > 0) ? (mtd / segTotal) : 1;
    var upSegs = STACK_ORDER.map(function (mv) {
      var gmv = (bm && bm.segments[mv]) || 0;
      if (gmv <= 0) return '';
      var h = Math.max(2, Math.round(gmv * solidScale * pxPer));
      return '<div class="nrr-qcol-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></div>';
    }).join('');
    var hatchHtml = '';
    if (isPartial && runRate > mtd) {
      var hatchH = Math.max(2, Math.round((runRate - mtd) * pxPer));
      hatchHtml = '<div class="nrr-qcol-hatch" style="height:' + hatchH + 'px" title="' + nrrEsc('ส่วนคาดการณ์ (run-rate − MTD)') + '"></div>';
    }
    var pct = bm ? bm.nrr_pct : null;
    return '<div class="nrr-qcol">' +
      '<div class="nrr-qcol-cap num" style="color:' + (isPartial ? 'var(--green-deep)' : 'var(--ink)') + '">' + (isPartial ? '~' : '') + nrrFmtGMV(runRate) + '</div>' +
      '<div class="nrr-qcol-stack">' + hatchHtml + upSegs + '</div>' +
      '<div class="nrr-qcol-label">' + nrrEsc(c.label) + '</div>' +
      '<div class="nrr-qcol-nrr num" style="color:' + nrrThresholdColorVar(pct) + '">' + (pct == null ? '—' : (isPartial ? '~' : '') + pct + '%') + '</div></div>';
  }).join('');
  return '<div class="nrr-qchart">' + colsHtml + '</div>' +
    '<div class="micro" style="margin-top:10px">ลายเฉียง = ส่วนคาดการณ์ของเดือนที่ยังไม่จบ (run-rate − MTD) · churn ไม่รวมในความสูงแท่ง ดูที่ตารางด้านล่าง</div>';
}

function _nrrDeltaColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment) {
  // Shared scale: gains side sized by the tallest positive stack, losses
  // side by the deepest loss stack — same ฿-per-px on both sides.
  var maxUp = baseAdjusted + handoverBase;
  var maxDown = 0;
  columns.forEach(function (c) {
    if (c.isBase) return;
    var bm = result.by_month[c.month];
    if (!bm) return;
    var up = STACK_ORDER.reduce(function (s, mv) { return s + (bm.segments[mv] || 0); }, 0);
    var down = LOSS_ORDER.reduce(function (s, mv) { return s + (bm.segments[mv] || 0); }, 0);
    if (up > maxUp) maxUp = up;
    if (down > maxDown) maxDown = down;
  });
  var UP_H = 150;
  var pxPer = maxUp > 0 ? UP_H / maxUp : 0;
  var DOWN_H = Math.min(90, Math.max(maxDown > 0 ? 24 : 0, Math.round(maxDown * pxPer)));
  var downPxPer = maxDown > 0 ? DOWN_H / maxDown : 0;

  var colsHtml = columns.map(function (c) {
    var upSegs = '', downSegs = '', hatchHtml = '', topLabel, subLabel, downLabel = '';
    if (c.isBase) {
      var coreH = Math.max(4, Math.round(baseAdjusted * pxPer));
      var hovH = handoverBase > 0 ? Math.max(3, Math.round(handoverBase * pxPer)) : 0;
      upSegs =
        (hovH ? '<div class="nrr-col-seg" style="height:' + hovH + 'px;background:var(--mv-slate)"></div>' : '') +
        '<div class="nrr-col-seg" style="height:' + coreH + 'px;background:var(--green)"></div>';
      topLabel = nrrFmtGMV(baseAdjusted) + (hasAdjustment ? '<span class="tag muted" style="margin-left:4px">adj</span>' : '');
      subLabel = result.cohort_outlets + ' สาขา';
    } else {
      var bm = result.by_month[c.month];
      var upTotal = 0;
      upSegs = STACK_ORDER.map(function (mv) {
        var gmv = (bm && bm.segments[mv]) || 0;
        if (gmv <= 0) return '';
        upTotal += gmv;
        var h = Math.max(3, Math.round(gmv * pxPer));
        return '<div class="nrr-col-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></div>';
      }).join('');
      var downTotal = 0;
      downSegs = LOSS_ORDER.map(function (mv) {
        var gmv = (bm && bm.segments[mv]) || 0;
        if (gmv <= 0) return '';
        downTotal += gmv;
        var h = Math.max(3, Math.round(gmv * downPxPer));
        return '<div class="nrr-col-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--coral)') + '"></div>';
      }).join('');
      if (downTotal > 0) downLabel = '<div class="nrr-col-down-label num">−' + nrrFmtGMV(downTotal) + '</div>';

      // Hatched projection overlay: portion of the gains stack above MTD.
      var triple = nrrMonthTriple(result, c.month);
      if (triple && triple.is_partial && triple.run_rate > triple.mtd && upTotal > 0) {
        var hatchH = Math.min(Math.round(upTotal * pxPer), Math.max(2, Math.round((triple.run_rate - triple.mtd) * pxPer)));
        hatchHtml = '<div class="nrr-col-hatch" style="height:' + hatchH + 'px" title="' + nrrEsc('ส่วนคาดการณ์ (run-rate − MTD)') + '"></div>';
      }
      // v7-fix: this view answers "เปลี่ยนไปเท่าไหร่" — its headline is the
      // NET change vs the (adjusted) base, not the same gross run-rate the
      // quarter view already shows. Signed + colored so the two views are
      // numerically distinct at a glance.
      var netChange = triple ? triple.run_rate - (baseAdjusted + handoverBase) : null;
      if (netChange == null) topLabel = '—';
      else {
        var netCls = netChange >= 0 ? 'var(--green-deep)' : 'var(--coral)';
        topLabel = '<span style="color:' + netCls + '">' + (triple.is_partial ? '~' : '') + (netChange >= 0 ? '+' : '−') + nrrFmtGMV(Math.abs(netChange)) + '</span>';
      }
      var activeOutlets = bm ? (bm.outlets.core_nrr || 0) : 0;
      subLabel = activeOutlets + ' สาขา' + (triple && triple.is_partial ? ' · MTD ' + nrrFmtGMV(triple.mtd) : '');
    }
    return '<div class="nrr-col">' +
      '<div class="nrr-col-top num">' + topLabel + '</div>' +
      '<div class="nrr-col-up" style="height:' + UP_H + 'px">' + hatchHtml + upSegs + '</div>' +
      (DOWN_H > 0 ? '<div class="nrr-col-down" style="height:' + DOWN_H + 'px">' + downSegs + '</div>' + downLabel : '') +
      '<div class="nrr-col-label">' + nrrEsc(c.label) + '</div>' +
      '<div class="micro">' + subLabel + '</div></div>';
  }).join('');
  return '<div class="nrr-col-chart">' + colsHtml + '</div>';
}

function nrrRenderMovementChart(chartContainerId, tableContainerId, result, opts) {
  opts = opts || {};
  var chartEl = document.getElementById(chartContainerId);
  var tableEl = document.getElementById(tableContainerId);
  if (!chartEl || !tableEl) return;
  if (!result || !result.months || !result.months.length) {
    chartEl.innerHTML = '<div class="micro">ไม่มีข้อมูล</div>';
    tableEl.innerHTML = '';
    return;
  }

  var baseAdjusted = Math.round(result.base_norm * nrrBaseDays());
  var baseOriginal = Math.round((result.base_norm_original || result.base_norm) * nrrBaseDays());
  var handoverBase = Math.round(result.handover_base_norm || 0);
  var hasAdjustment = (result.transfer_out_base_norm || 0) > 0 || (result.transfer_in_base_norm || 0) > 0;

  var columns = [{ label: 'ฐาน (' + (QNRR_CFG.months_th[result.base_month] || result.base_month) + ')', isBase: true }];
  result.months.forEach(function (m) { columns.push({ label: QNRR_CFG.months_th[m] || m, month: m, isBase: false }); });

  if (!_nrrMvChartMode[chartContainerId]) _nrrMvChartMode[chartContainerId] = 'quarter';
  var mode = _nrrMvChartMode[chartContainerId];
  var modeHtml = '<div class="mode">' +
    '<button' + (mode === 'quarter' ? ' class="on"' : '') + ' data-chart-mode="quarter">ทั้งไตรมาส</button>' +
    '<button' + (mode === 'delta' ? ' class="on"' : '') + ' data-chart-mode="delta">การเปลี่ยนแปลง</button>' +
    '</div>';
  var chartBodyHtml = mode === 'quarter'
    ? _nrrQuarterColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment)
    : _nrrDeltaColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment);
  chartEl.innerHTML = modeHtml + '<div class="nrr-chart-body">' + chartBodyHtml + '</div>' + nrrLegendHtml();
  chartEl.querySelectorAll('[data-chart-mode]').forEach(function (b) {
    b.addEventListener('click', function () {
      _nrrMvChartMode[chartContainerId] = b.dataset.chartMode;
      nrrRenderMovementChart(chartContainerId, tableContainerId, result, opts);
    });
  });

  // ── Breakdown table — every non-zero cell clickable → inline expansion ──
  // Handover & New renders as a cohort block (Sense's verified pattern):
  // parent row = handover + new_sales combined; "└ cohort <base>" sub-row =
  // handover rows (exp date in base month); one "└ cohort <m>" sub-row per
  // non-empty new_sales cohort (claim-dedup by first appearance month,
  // carry-forward afterwards, "—" before).
  var cohortModel = nrrHandoverCohorts(result);

  function cellBtn(rowKey, cohort, month, cls, display) {
    return '<td class="num-cell"><button class="nrr-cell-btn" data-mv="' + rowKey + '" data-cohort="' + nrrEsc(cohort || '') + '" data-month="' + nrrEsc(month) + '" style="color:var(--' + cls + ')">' + display + '</button></td>';
  }
  var DASH = '<td class="micro">—</td>';

  var TABLE_ROWS = [
    { key: 'core_nrr', label: 'Core NRR active', cls: 'green' },
    { key: 'core_nrr_churn', label: '↳ Churn', cls: 'coral', sub: true, negative: true },
    { key: 'expansion', label: 'Expansion', cls: 'mv-green-lt' },
    { key: 'comeback', label: 'Comeback', cls: 'mv-teal' },
    { key: 'transfer_in', label: 'Transfer in', cls: 'mv-violet' },
    { key: 'transfer_out', label: 'Transfer out', cls: 'mv-clay', negative: true }
  ];
  var colCount = columns.length + 1;
  var theadHtml = '<tr><th>Movement</th>' + columns.map(function (c) { return '<th>' + nrrEsc(c.label) + '</th>'; }).join('') + '</tr>';

  function simpleRowHtml(row) {
    var cells = columns.map(function (c) {
      if (c.isBase) {
        if (row.key === 'core_nrr') return '<td class="num-cell">' + nrrFmtGMV(baseAdjusted) + '</td>';
        return DASH;
      }
      var bm = result.by_month[c.month];
      var v = bm ? (bm.segments[row.key] || 0) : 0;
      var n = bm ? (bm.outlets[row.key] || 0) : 0;
      if (v === 0 && n === 0) return DASH;
      var display = row.negative ? '−' + nrrFmtGMV(v) : nrrFmtGMV(v);
      return cellBtn(row.key, '', c.month, row.cls, display);
    }).join('');
    return '<tr data-mv-row="' + row.key + '"' + (row.sub ? ' class="nrr-table-subrow"' : '') + '><td>' + row.label + '</td>' + cells + '</tr>';
  }

  function handoverBlockHtml() {
    var baseLabel = QNRR_CFG.months_th[result.base_month] || result.base_month;
    // Parent row: handover + new_sales combined per month.
    var parentCells = columns.map(function (c) {
      if (c.isBase) return handoverBase > 0 ? '<td class="num-cell">' + nrrFmtGMV(handoverBase) + '</td>' : DASH;
      var bm = result.by_month[c.month];
      var v = bm ? (bm.segments.handover || 0) + (bm.segments.new_sales || 0) : 0;
      var n = bm ? (bm.outlets.handover || 0) + (bm.outlets.new_sales || 0) : 0;
      if (v === 0 && n === 0) return DASH;
      return cellBtn('handover_new', '', c.month, 'mv-slate', nrrFmtGMV(v));
    }).join('');
    var html = '<tr data-mv-row="handover_new"><td>Handover &amp; New</td>' + parentCells + '</tr>';

    // Base cohort sub-row (handover rows) — only when it has anything.
    var hasHandover = handoverBase > 0 || result.months.some(function (m) {
      return (cohortModel.handover.by_month[m] || {}).outlets && cohortModel.handover.by_month[m].outlets.length > 0;
    });
    if (hasHandover) {
      var hovCells = columns.map(function (c) {
        if (c.isBase) return handoverBase > 0 ? '<td class="num-cell">' + nrrFmtGMV(handoverBase) + '</td>' : DASH;
        var cm = cohortModel.handover.by_month[c.month];
        if (!cm || !cm.outlets.length) return DASH;
        return cellBtn('handover_new', 'base', c.month, 'mv-slate', nrrFmtGMV(cm.gmv));
      }).join('');
      html += '<tr data-mv-row="handover_new:base" class="nrr-table-subrow"><td>└ cohort ' + nrrEsc(baseLabel) + '</td>' + hovCells + '</tr>';
    }

    // New-sales cohort sub-rows — only non-empty cohorts render.
    cohortModel.new_cohorts.forEach(function (cohort) {
      var label = QNRR_CFG.months_th[cohort.cohort_month] || cohort.cohort_month;
      var cells = columns.map(function (c) {
        if (c.isBase) return DASH;
        var cm = cohort.by_month[c.month];
        if (!cm || !cm.outlets.length) return DASH; // null before cohort month → "—"
        return cellBtn('handover_new', cohort.cohort_month, c.month, 'mv-slate', nrrFmtGMV(cm.gmv));
      }).join('');
      html += '<tr data-mv-row="handover_new:' + nrrEsc(cohort.cohort_month) + '" class="nrr-table-subrow"><td>└ cohort ' + nrrEsc(label) + '</td>' + cells + '</tr>';
    });
    return html;
  }

  var tbodyHtml =
    simpleRowHtml(TABLE_ROWS[0]) + simpleRowHtml(TABLE_ROWS[1]) +
    handoverBlockHtml() +
    TABLE_ROWS.slice(2).map(simpleRowHtml).join('');
  var totalRow = '<tr class="nrr-table-total"><td>Total GMV</td>' + columns.map(function (c) {
    if (c.isBase) return '<td class="num-cell">' + nrrFmtGMV(baseAdjusted + handoverBase) + '</td>';
    var bm = result.by_month[c.month];
    return '<td class="num-cell">' + (bm ? nrrFmtGMV(bm.total_gmv) : '—') + '</td>';
  }).join('') + '</tr>';

  var adjNote = '';
  if (hasAdjustment) {
    adjNote = '<div class="micro" style="margin-top:8px">ฐานปรับจาก ' + nrrFmtGMV(baseOriginal) + ' → ' + nrrFmtGMV(baseAdjusted) +
      (result.transfer_out_base_norm > 0 ? ' (หัก ' + result.transfer_out_outlets.length + ' outlet ย้ายออก −' + nrrFmtGMV(Math.round(result.transfer_out_base_norm * nrrBaseDays())) + ')' : '') +
      (result.transfer_in_base_norm > 0 ? ' (บวก ' + result.transfer_in_outlets.length + ' outlet ย้ายเข้า +' + nrrFmtGMV(Math.round(result.transfer_in_base_norm * nrrBaseDays())) + ')' : '') +
      '</div>';
  }
  tableEl.innerHTML = '<table class="nrr-table nrr-mv-table"><thead>' + theadHtml + '</thead><tbody>' + tbodyHtml + totalRow + '</tbody></table>' + adjNote;

  // v6: click delegation — every non-zero cell opens the slide-over
  // directly (movement mode) instead of an inline expansion row. Bound
  // once per container; _nrrMvOpts is refreshed on every render so the
  // handler always resolves against the current result/scope.
  if (!tableEl._nrrMvBound) {
    tableEl._nrrMvBound = true;
    tableEl.addEventListener('click', function (e) {
      var btn = e.target.closest('.nrr-cell-btn');
      if (!btn) return;
      var o = tableEl._nrrMvOpts;
      if (!o || !o.onCellClick) return;
      var outlets = _nrrResolveMvOutlets(o, btn.dataset.mv, btn.dataset.cohort || '', btn.dataset.month);
      var prev = tableEl.querySelector('.nrr-cell-btn.on');
      if (prev) prev.classList.remove('on');
      btn.classList.add('on');
      o.onCellClick(btn.dataset.mv, btn.dataset.cohort || '', btn.dataset.month, outlets);
    });
  }
  tableEl._nrrMvOpts = { result: result, scopeCtx: opts.scopeCtx, showKam: opts.showKam, onCellClick: opts.onCellClick, cohortModel: cohortModel };
}
window.nrrRenderMovementChart = nrrRenderMovementChart;

// Resolve the outlet list behind one cell — plain movements come from
// nrrOutletsForMovement; handover_new cells come from the cohort model so
// counts/sums reconcile with the cohort sub-rows by construction.
function _nrrResolveMvOutlets(o, mv, cohort, month) {
  if (mv !== 'handover_new') return nrrOutletsForMovement(o.result, month, mv, o.scopeCtx);
  var cm = o.cohortModel;
  if (cohort === 'base') return (cm.handover.by_month[month] || {}).outlets || [];
  if (cohort) {
    var c = cm.new_cohorts.find(function (x) { return x.cohort_month === cohort; });
    return c && c.by_month[month] ? c.by_month[month].outlets : [];
  }
  // parent = handover + all new_sales cohorts for that month
  var all = ((cm.handover.by_month[month] || {}).outlets || []).slice();
  cm.new_cohorts.forEach(function (c) {
    if (c.by_month[month]) all = all.concat(c.by_month[month].outlets);
  });
  return all;
}

// v6: cohort-aware label helper — used by nrrOpenSlideoverMovement so the
// slide-over title matches what the old inline-expansion header used to say.
function nrrMovementCellLabel(mv, cohort, month) {
  var tagMv = mv === 'handover_new' ? 'handover' : mv;
  var label = mv === 'handover_new' ? 'Handover & New' : (MV_LABEL[tagMv] || tagMv);
  var cohortLabel = '';
  if (mv === 'handover_new' && cohort) {
    cohortLabel = ' · cohort ' + (cohort === 'base' ? (QNRR_CFG.months_th[QNRR_CFG.base_month] || QNRR_CFG.base_month) : (QNRR_CFG.months_th[cohort] || cohort));
  }
  return label + cohortLabel;
}
window.nrrMovementCellLabel = nrrMovementCellLabel;

// ── v6: composition bar — the fix for "only green and white". A single
// glanceable strip under the Pulse hero showing the categorical palette's
// proportions immediately, so the page doesn't read monochrome before the
// user scrolls down to the movement chart. Not a strict ledger (churn/
// transfer_out are losses shown as their own slice, not subtracted) — it's
// a "color signature of the business right now," visible in 5 seconds.
var COMPO_DEFS = [
  { key: 'core_nrr', label: 'Core NRR' },
  { key: 'core_nrr_churn', label: 'Churn' },
  { key: 'handover_new', label: 'Handover & New' },
  { key: 'comeback', label: 'Comeback' },
  { key: 'expansion', label: 'Expansion' },
  { key: 'transfer_in', label: 'Transfer in' },
  { key: 'transfer_out', label: 'Transfer out' }
];
function _nrrCompoColor(key) { return key === 'handover_new' ? MV_COLOR.handover : (MV_COLOR[key] || 'var(--ink3)'); }
function _nrrCompoValue(segs, key) {
  if (key === 'handover_new') return (segs.handover || 0) + (segs.new_sales || 0);
  return segs[key] || 0;
}

function nrrCompositionBarHtml(result, period) {
  var bm = result && period ? result.by_month[period] : null;
  if (!bm) return '';
  var items = COMPO_DEFS.map(function (d) {
    return { key: d.key, label: d.label, v: Math.abs(_nrrCompoValue(bm.segments, d.key)) };
  }).filter(function (x) { return x.v > 0; });
  var total = items.reduce(function (s, x) { return s + x.v; }, 0);
  if (!total) return '';

  var barHtml = items.map(function (x) {
    return '<i style="width:' + (x.v / total * 100).toFixed(2) + '%;background:' + _nrrCompoColor(x.key) + '" title="' + nrrEsc(x.label) + '"></i>';
  }).join('');
  var keyHtml = items.map(function (x) {
    var neg = x.key === 'core_nrr_churn' || x.key === 'transfer_out';
    return '<span class="nrr-compo-k"><i style="background:' + _nrrCompoColor(x.key) + '"></i>' + nrrEsc(x.label) +
      ' <b class="num">' + (neg ? '−' : '') + nrrFmtGMV(x.v) + '</b></span>';
  }).join('');
  var baseLabel = nrrFmtGMV(Math.round((result.base_norm || 0) * nrrBaseDays()));
  return '<div class="nrr-compo">' +
    '<div class="nrr-compo-lbl">องค์ประกอบของฐาน ' + baseLabel + '</div>' +
    '<div class="nrr-compo-bar">' + barHtml + '</div>' +
    '<div class="nrr-compo-key">' + keyHtml + '</div>' +
    '</div>';
}
window.nrrCompositionBarHtml = nrrCompositionBarHtml;

function nrrLegendHtml() {
  var legendMvs = ['core_nrr', 'handover', 'expansion', 'comeback', 'transfer_in', 'core_nrr_churn', 'transfer_out'];
  return '<div class="nrr-movement-legend">' + legendMvs.map(function (mv) {
    return '<div class="nrr-movement-legend-item"><span class="nrr-movement-legend-dot" style="background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></span>' + (MV_LABEL[mv] || mv) + '</div>';
  }).join('') + '</div>';
}

// ── Threshold coloring (STATUS system — separate from category palette) ──
// ≥100% green, 90-99% amber/sun, <90% coral.
function nrrThresholdColorVar(pct) {
  if (pct == null) return 'var(--ink3)';
  if (pct >= 100) return 'var(--green-deep)'; // text-safe (Raw Papaya) — --green (Cabbage) is the fill/glyph role, too low-contrast for text
  if (pct >= 90) return 'var(--sun-deep)';
  return 'var(--coral)';
}
window.nrrThresholdColorVar = nrrThresholdColorVar;

// ── CSV export — client-side only, UTF-8 BOM so Thai opens right in Excel.
function nrrExportCsv(filename, headers, rows) {
  var esc = function (v) {
    v = String(v == null ? '' : v);
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  };
  var lines = [headers.map(esc).join(',')].concat(rows.map(function (r) { return r.map(esc).join(','); }));
  var csv = '﻿' + lines.join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
window.nrrExportCsv = nrrExportCsv;

// ── Copy-to-clipboard — for pasting a quick summary into Slack/email.
async function nrrCopyText(text, btnEl) {
  try {
    await navigator.clipboard.writeText(text);
    if (btnEl) {
      var orig = btnEl.textContent;
      btnEl.textContent = 'คัดลอกแล้ว ✓';
      setTimeout(function () { btnEl.textContent = orig; }, 1600);
    }
  } catch (e) {
    console.warn('[nrr] clipboard copy failed', e);
  }
}
window.nrrCopyText = nrrCopyText;
</script>
<script>
// ── nrr_view.js — page controller (v4 "Answer First") ────────────────────
// Narrative order: Pulse hero → Team Scoreboard → Movement (KAM) → KAM
// Leaderboard → PM → Admin → Commission strip → footnote. Every section
// answers ONE user question; the hero answers "are we okay?" in one glance.
// All numbers come from pure compute functions (nrr_logic/nrr_aggregate) —
// this file is presentation + interaction state only.

var nrrState = {
  period: null,        // selected quarter month, drives every section
  selectedTeam: null,  // admin's currently-inspected team in the leaderboard
  // v5: movement multi-view switcher — survives month-chip re-renders.
  mvView: {
    portfolio: null,   // 'vp' | 'kam' | 'pm' | 'admin' (null = pick default on first render)
    kamKey: 'org',     // 'org' | 'tl:<email>' | 'kam:<email>' (KAM tab)
    pmBucket: 'chain',
    adminBucket: 'chain'
  }
  // v28: company/sales moved to their own views (#/company, #/sales) —
  // their state lives in nrrCompanyState (nrr_company.js).
};
var nrrSlideoverState = { mode: 'kam', movementFilter: 'all', momentumFilter: 'all', kamFilter: 'all', search: '' };
var nrrSlideoverOutlets = [];
var nrrLastComparison = null;
var nrrLastKamRows = null;
var nrrLastTeamName = '';

async function nrrInitApp() {
  var app = document.getElementById('nrr-app');
  app.innerHTML = nrrShellHtml();
  // Cover the just-built (still empty) shell while nrrRefresh() below fetches
  // real data -- otherwise the user briefly sees bare section headers with
  // no rows (the "half-broken" look reported live 2026-07-14).
  var _bootLoader = document.getElementById('nrr-boot-loader');
  if (_bootLoader) _bootLoader.style.display = 'flex';
  document.getElementById('nrr-refresh-btn').addEventListener('click', function () { nrrRefresh(true); });
  document.getElementById('nrr-slideover-body').addEventListener('click', function (e) {
    nrrHandleNoteAffClick(e);
    nrrHandleNoteSaveClick(e);
    var retryBtn = e.target.closest('.nrr-comm-retry-upsell-btn');
    if (retryBtn && nrrCommDrawerState) {
      ['nrr-comm-drawer-p1-body', 'nrr-comm-drawer-p3-body'].forEach(function (id) {
        var t = document.getElementById(id);
        if (t) t.innerHTML = '<div class="ds-skel" style="margin-bottom:8px"></div><div class="ds-skel" style="width:65%"></div>';
      });
      delete nrrUpsellBundleCache[retryBtn.dataset.email];
      var snap = nrrLatestSnapshotFor(nrrCommDrawerState.kamEmail);
      var bd = snap && snap.breakdown ? snap.breakdown : null;

        .filter(function (o) { return o.movement === 'expansion'; });

    }
  });
  document.getElementById('nrr-slideover-body').addEventListener('keydown', nrrHandleNoteInputKeydown);
  document.getElementById('nrr-slideover-backdrop').addEventListener('click', nrrCloseSlideover);
  document.getElementById('nrr-slideover-close').addEventListener('click', nrrCloseSlideover);
  document.getElementById('nrr-slideover-search').addEventListener('input', function (e) {
    nrrSlideoverState.search = e.target.value.trim().toLowerCase();
    nrrRenderSlideoverBody();
  });
  document.getElementById('nrr-comm-strip').addEventListener('click', function (e) {
    var drillBtn = e.target.closest('.nrr-comm-drill-btn');
    if (drillBtn) { nrrOpenCommissionDrawer(drillBtn.dataset.email, drillBtn.dataset.name, drillBtn.dataset.period); return; }
    var tabBtn = e.target.closest('.nrr-comm-tab');
    if (tabBtn) { nrrCommViewMode = tabBtn.dataset.mode; nrrRenderCommissionSection(); return; }
  });
  document.getElementById('nrr-comm-strip').addEventListener('change', function (e) {
    if (e.target.id !== 'nrr-comm-period-select') return;
    nrrCommSelectedPeriod = e.target.value;
    nrrRenderCommissionFullTable(nrrCommSelectedPeriod);
  });
  document.getElementById('nrr-portfolio-body').addEventListener('click', nrrHandlePortfolioClick);
  document.getElementById('nrr-portfolio-body').addEventListener('input', nrrHandlePortfolioInput);
  document.getElementById('nrr-portfolio-body').addEventListener('change', nrrHandlePortfolioChange);
  document.getElementById('nrr-account-body').addEventListener('click', nrrHandleAccountBodyClick);
  document.getElementById('nrr-otip-backdrop').addEventListener('click', nrrCloseAccountOutletTip);
  var _waiversBody = document.getElementById('nrr-waivers-body');
  if (_waiversBody && typeof nrrHandleWaiversClick === 'function') _waiversBody.addEventListener('click', nrrHandleWaiversClick);
  // v28: company/sales views (admin-only, containers always present —
  // router guard redirects non-admins before these could ever render)
  var _coPage = document.getElementById('nrr-company-page');
  if (_coPage && typeof nrrHandleCompanyClick === 'function') _coPage.addEventListener('click', nrrHandleCompanyClick);
  var _slPage = document.getElementById('nrr-sales-page');
  if (_slPage && typeof nrrHandleSalesClick === 'function') _slPage.addEventListener('click', nrrHandleSalesClick);

  // ── Router wiring — see nrr_router.js ──
  nrrRouterRegister('dashboard', function () {
    // Dashboard DOM stays rendered by nrrRenderAll(); nothing to re-render
    // on route entry. Re-arm the scrollspy in case sections re-appeared.
    nrrInitScrollspy();
  });
  nrrRouterRegister('portfolio', nrrRenderPortfolioLayerView);
  nrrRouterRegister('account', nrrRenderAccountView);

  await nrrRefresh(false);
  nrrHandleRoute();
  if (_bootLoader) _bootLoader.style.display = 'none';
}

// ── Portfolio layer view (Phase B, 2026-07-09) ───────────────────────────
// rep: own portfolio only. tl: own team, with a KAM switcher. admin: every
// KAM, switcher grouped by team. All three render the SAME two blocks —
// self-summary (commission receipt, reused verbatim from the drawer) +
// account card list (portview.csv) — "ภาษาเดียวกัน" across every role.
var nrrPortfolioState = { email: null, search: '', paceFilter: { ok: false, warn: false, danger: false }, skuFilter: false };

// { email, name } list this profile is allowed to switch between — also
// what nrr_router.js's TL guard checks against, so "what the switcher
// offers" and "what the URL guard allows" never drift apart.
function nrrPortfolioSwitcherList() {
  if (nrrProfile.role === 'admin') {
    var out = [];
    nrrListTeams().forEach(function (t) {
      nrrListKamsForTeam(t.email).forEach(function (k) { out.push({ email: k.email, name: k.name, team: t.name }); });
    });
    return out;
  }
  if (nrrProfile.role === 'tl') return nrrListKamsForTeam(nrrProfile.email).map(function (k) { return { email: k.email, name: k.name, team: nrrProfile.name }; });
  return [];
}

function nrrPortfolioSwitcherHtml(list, selectedEmail) {
  if (nrrProfile.role === 'rep' || !list.length) return '';
  var optionsHtml;
  if (nrrProfile.role === 'admin') {
    var byTeam = {};
    list.forEach(function (k) { (byTeam[k.team] = byTeam[k.team] || []).push(k); });
    optionsHtml = Object.keys(byTeam).sort(function (a, b) { return a.localeCompare(b, 'th'); }).map(function (team) {
      return '<optgroup label="' + nrrEsc(team) + '">' + byTeam[team].map(function (k) {
        return '<option value="' + nrrEsc(k.email) + '"' + (k.email === selectedEmail ? ' selected' : '') + '>' + nrrEsc(k.name) + '</option>';
      }).join('') + '</optgroup>';
    }).join('');
  } else {
    optionsHtml = list.map(function (k) {
      return '<option value="' + nrrEsc(k.email) + '"' + (k.email === selectedEmail ? ' selected' : '') + '>' + nrrEsc(k.name) + '</option>';
    }).join('');
  }
  return '<select class="nrr-search" id="nrr-port-kam-select" style="cursor:pointer">' + optionsHtml + '</select>';
}

// Plain-language status word alongside pace% (Sense pattern, ported from
// 06_portview_teamview.js's _statusLabel — never rely on color alone).
function nrrPaceStatusWord(pace) {
  if (pace.pct == null) return { text: 'ไม่มีฐานเทียบ', color: 'var(--ink3)' };
  if (pace.cls === 'great' || pace.cls === 'safe') return { text: 'ตามเป้า', color: 'var(--green-deep)' };
  if (pace.cls === 'warn') return { text: 'เฝ้าดู', color: 'var(--sun-deep)' };
  return { text: 'น่าเป็นห่วง', color: 'var(--coral)' };
}

// churned_sku_count/last_month_sku_count reframed POSITIVE (round 2,
// 2026-07-09) — "SKU ที่กลับมาสั่งซ้ำ" (last_month_sku_count - churned)
// out of last month's SKU base, not "SKU ที่หลุด." Same early-month-bias
// caveat as before (portview compares last month's orders against THIS
// month's MTD, so early in the month a lot of normal-cadence SKUs haven't
// re-ordered yet) — framing it as "ordered" instead of "churned" and
// escalating color only when the reorder rate is actually LOW (inverted
// from round 1: high ratio = good = quiet, low ratio = bad = coral) reads
// far less alarmist while showing the exact same underlying numbers.
function nrrSkuGapSeverity(row) {
  var m = row.last_month_sku_count || 0;
  if (m <= 0) return null;
  var ordered = Math.max(0, m - (row.churned_sku_count || 0));
  var ratio = ordered / m;
  var cls = ratio >= 0.75 ? 'quiet' : ratio >= 0.5 ? 'warn' : 'danger';
  return { ordered: ordered, m: m, cls: cls };
}

function nrrAcctRowHtml(item, opts) {
  opts = opts || {};
  var r = item.row, pace = item.pace;
  var color = pace.pct == null ? 'var(--ink3)' : nrrThresholdColorVar(pace.pct);
  var status = nrrPaceStatusWord(pace);
  var gap = nrrSkuGapSeverity(r);
  var gapHtml = gap
    ? '<span class="nrr-acct-flag ' + gap.cls + '">สั่งแล้ว ' + gap.ordered + '/' + gap.m + ' SKU</span>' : '';
  var missingHtml = r.missing_cat_count > 0
    ? '<span class="nrr-acct-flag">ไม่มีหมวด ' + r.missing_cat_count + '</span>' : '';
  // showKam (v31, company-wide search results): the per-KAM grid never
  // needs this — you already picked the KAM — but a cross-KAM search
  // result list is meaningless without saying who owns each hit.
  var kamHtml = opts.showKam && r.kam_name ? '<span class="micro">· KAM: ' + nrrEsc(r.kam_name) + '</span>' : '';
  // Whole row is a link into Account view (Phase C) — was intentionally
  // absent in Phase B ("ไม่มีปุ่ม/ลิงก์เข้า account detail" — the view didn't
  // exist yet, an affordance that goes nowhere is worse than none). Now
  // that #/account/:id is real, the row is the natural click target
  // (matches Sense's own "tap the card to open the account" gesture).
  return '<a class="nrr-acct-row" href="#/account/' + encodeURIComponent(r.account_id) + '" style="border-left-color:' + color + '">' +
    '<div class="nrr-acct-row-left">' +
    '<div class="nrr-acct-row-name">' + nrrEsc(r.account_name || r.account_id) + '</div>' +
    '<div class="nrr-acct-row-meta"><span class="num">' + nrrFmtGMV(r.runrate_gmv) + '</span><span class="micro">run-rate</span>' +
    '<span class="micro">/ ' + (pace.pct != null ? nrrFmtGMV(pace.baseline_gmv) : '—') + ' เดือนฐาน</span>' +
    '<span class="micro">· ดูแล ' + (r.days_with_current_kam || 0) + ' วัน</span>' + kamHtml + '</div>' +
    (gapHtml || missingHtml ? '<div class="nrr-acct-row-flags">' + gapHtml + missingHtml + '</div>' : '') +
    '</div>' +
    '<div class="nrr-acct-row-right">' +
    '<span class="num nrr-acct-row-pace" style="color:' + color + '">' + pace.label + '</span>' +
    '<span class="nrr-acct-row-status" style="color:' + status.color + '">' + nrrEsc(status.text) + '</span>' +
    nrrAcctSparklineHtml(r, pace) +
    '</div>' +
    '</a>';
}

// Portfolio-level risk summary — Sense's ON TRACK/MONITOR/AT RISK boxes
// (06_portview_teamview.js:1580-1700), ported as a count+value stat strip.
// Round 3 (2026-07-09): the tiles ARE the pace filter now — click one or
// more to narrow the list to those buckets (multi-select, OR'd); none
// selected = show everything. Replaces the old separate "ทั้งหมด"/"ต่ำกว่า
// pace" chips, which were redundant with what these tiles already show.
function nrrPortfolioRiskSummaryHtml(kamEmail) {
  var b = nrrPortfolioRiskSummary(kamEmail);
  var anySelected = nrrPortfolioState.paceFilter.ok || nrrPortfolioState.paceFilter.warn || nrrPortfolioState.paceFilter.danger;
  function tile(key, color, label, count, value, sign) {
    var selected = nrrPortfolioState.paceFilter[key];
    return '<div class="nrr-risk-tile ' + key + (selected ? ' selected' : '') + '" data-risk-filter="' + key + '">' +
      '<div class="nrr-risk-tile-label" style="color:' + color + '">' + nrrEsc(label) + ' <span class="num">' + count + ' ร้าน</span></div>' +
      '<div class="num nrr-risk-tile-value" style="color:' + color + '">' + sign + nrrFmtGMV(value) + '</div>' +
      '</div>';
  }
  return '<div class="nrr-risk-strip' + (anySelected ? ' has-selection' : '') + '" id="nrr-port-risk-strip">' +
    tile('ok', 'var(--green-deep)', 'ตามเป้า', b.ok.count, b.ok.value, '+') +
    tile('warn', 'var(--sun-deep)', 'เฝ้าดู', b.warn.count, b.warn.value, '-') +
    tile('danger', 'var(--coral)', 'น่าเป็นห่วง', b.danger.count, b.danger.value, '-') +
    '</div>';
}

// Filters/sorts this KAM's accounts against the current search+filter
// state. Split from the shell (below) so typing in the search box only
// repaints the grid, not the input itself (which would drop focus/cursor
// position).
function nrrPortfolioAcctGridHtml(email) {
  var pf = nrrPortfolioState.paceFilter;
  var anyPaceSelected = pf.ok || pf.warn || pf.danger;
  var filtered = nrrPortfolioRowsFor(email).filter(function (item) {
    if (anyPaceSelected) {
      var bucket = (item.pace.cls === 'great' || item.pace.cls === 'safe') ? 'ok' : (item.pace.cls === 'warn' ? 'warn' : (item.pace.cls === 'danger' ? 'danger' : null));
      if (!bucket || !pf[bucket]) return false;
    }
    if (nrrPortfolioState.skuFilter) {
      var gap = nrrSkuGapSeverity(item.row);
      if (!gap || gap.cls === 'quiet') return false;
    }
    if (nrrPortfolioState.search && item.row.account_name.toLowerCase().indexOf(nrrPortfolioState.search) === -1) return false;
    return true;
  });
  return filtered.length
    ? '<div class="nrr-acct-list">' + filtered.map(nrrAcctRowHtml).join('') + '</div>'
    : '<div class="ds-empty"><div class="ds-empty-title">ไม่พบร้านที่ตรงกับตัวกรอง</div></div>';
}

function nrrPortfolioAcctListHtml(email) {
  var all = nrrPortfolioRowsFor(email);
  var skuChip = '<button type="button" class="nrr-chip' + (nrrPortfolioState.skuFilter ? ' on' : '') + '" data-port-filter="churn">สั่งซ้ำต่ำ</button>';
  return '<div class="nrr-panel-head" style="margin-top:8px"><div class="h2" style="font-size:18px">ร้านในมือ (' + all.length + ')</div></div>' +
    nrrPortfolioRiskSummaryHtml(email) +
    '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;margin-top:14px">' +
    '<input class="nrr-search" id="nrr-port-search" placeholder="ค้นหาร้าน..." value="' + nrrEsc(nrrPortfolioState.search) + '">' +
    '</div>' +
    '<div class="nrr-chip-row" id="nrr-port-chips">' + skuChip + '</div>' +
    '<div id="nrr-port-acct-grid">' + nrrPortfolioAcctGridHtml(email) + '</div>';
}

// NRR/GMV hero — this is the primary "how am I doing" answer for the page
// (round 2, 2026-07-09: promoted above the commission section, which used
// to lead — money is a downstream consequence of this number, not the
// headline). Reuses nrrMonthTriple/nrrTripleHtml exactly as the dashboard
// does elsewhere in this app — one convention, no new component.
function nrrPortfolioPulseHtml(email, period) {
  var result = nrrKamResult(email);
  var bm = result && period ? result.by_month[period] : null;
  var pct = bm ? bm.nrr_pct : null;
  var triple = nrrMonthTriple(result, period);
  return '<div class="nrr-port-pulse">' +
    '<div class="eyebrow">%NRR · ' + nrrEsc(QNRR_CFG.months_th[period] || period) + '</div>' +
    '<div class="num nrr-port-pulse-pct" style="color:' + (pct != null ? nrrThresholdColorVar(pct) : 'var(--ink3)') + '">' + (pct != null ? pct + '%' : '—') + '</div>' +
    nrrTripleHtml('lg', triple) +
    '</div>';
}

// ── Company-wide account search (v31) ────────────────────────────────────
// The per-KAM search box (nrr-port-search, below) only ever filters inside
// whichever ONE KAM is currently selected — useless if you don't already
// know who owns the shop you're looking for (e.g. spotting a churned
// account by name in a dashboard drawer and wanting to jump straight to
// its Account page without hunting through every KAM's switcher entry).
// admin/tl only — a rep has exactly one portfolio already, nothing to
// search across.
var nrrPortfolioGlobalSearch = '';

function nrrPortfolioGlobalResultsHtml() {
  var q = nrrPortfolioGlobalSearch;
  if (!q) return '';
  var pv = window.bulkPortviewData;
  if (!pv || !pv.loaded) return '';
  var matches = pv.allRows.filter(function (r) {
    return (r.account_name || '').toLowerCase().indexOf(q) > -1;
  });
  if (!matches.length) {
    return '<div class="ds-empty" style="margin-top:8px"><div class="ds-empty-title">ไม่พบร้านที่ตรงกับ "' + nrrEsc(q) + '"</div></div>';
  }
  var shown = matches.slice(0, 30);
  var itemsHtml = shown.map(function (r) { return nrrAcctRowHtml({ row: r, pace: nrrPaceSignal(r) }, { showKam: true }); }).join('');
  var moreHtml = matches.length > shown.length
    ? '<div class="micro" style="margin-top:8px">พบทั้งหมด ' + matches.length.toLocaleString() + ' ร้าน แสดง ' + shown.length + ' รายการแรก — พิมพ์ให้เจาะจงขึ้นเพื่อผลลัพธ์แม่นยำกว่านี้</div>' : '';
  return '<div class="nrr-acct-list" style="margin-top:8px">' + itemsHtml + '</div>' + moreHtml;
}

function nrrPortfolioGlobalSearchHtml() {

function nrrHandlePortfolioClick(e) {

    nrrLoadCommissionUpsellSection(retryBtn.dataset.email, bundle.expansionOutletIds, bundle.bd, 'nrr-port-p1-body', 'nrr-port-p3-body',

// ── Account view (Phase C, 2026-07-09) ───────────────────────────────────

var nrrAccountState = { accountId: null, kamEmail: null, trendMonths: null, showAllPos: false, showAllRisk: false, branchFilter: [], monthFilter: null, exclusionFormOpen: false, exclusionFormError: null };

// Shaped like the real page (mast/hero/stat-row/two lists), not one flat
