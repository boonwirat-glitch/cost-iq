<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NRR ไตรมาส — Portfolio Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ── nrr_tokens.css — "Fresh Canvas" design tokens ─────────────────────
   Adopted verbatim from the user-supplied Fresh Canvas spec, as the
   deliberately distinct visual language for this one page. This page is
   its own standalone HTML document (own build_nrr.py output) so there is
   no shared-document collision risk with design/tokens.css used by Sense
   and /dashboard — plain token names are used as written in the spec,
   not namespaced, to stay a direct, easily-audited match against it. */

:root {
  /* Neutral / Ink — v6: raised the contrast/size floor. ink2 is now the
     level for anything that's still real content (row meta, satellite
     labels) — ink3 is reserved for pure decoration (timestamps, disabled
     state) and must never be the only signal on content a human needs to
     read. See DESIGN-SYSTEM-V2 for the full rationale. */
  --bg: #ffffff;
  --fill: #f5f6f4;
  --fill-deep: #eceeea;
  --ink: #161a16;
  --ink2: #4a524a;
  --ink3: #8a9088;
  --ink-deep: #1d4849;
  --line: rgba(22, 26, 22, 0.08);

  /* Green — v6: split into a surface/glyph role (Cabbage, brighter, used for
     fills/glyphs/lines/chart strokes/washes) and a text/ink role (Raw
     Papaya, deep enough to stay legible as text at any size — Cabbage on
     white fails WCAG AA for small text). Same pattern the momentum signal
     already used (glyph color vs ink color), now applied to the brand
     accent. --green/--green-deep/--green-soft keep their old names so every
     existing call site (tags, thresholds, chart core segment) picks up the
     new hues for free. */
  --green: #00ce7c;        /* Cabbage — fills, glyphs, active states, chart strokes */
  --green-deep: #008065;   /* Raw Papaya — text/ink role: hero %, positive deltas, tag text */
  --green-soft: rgba(0, 206, 124, 0.10);

  /* Sun/Amber → v6: "insight" role — the color of narration (verdict
     sentences, takeaway highlights), distinct from data itself. */
  --sun: #c99a12;
  --sun-deep: #a67f0e;
  --sun-soft: #fff6d6;
  --peach: #fb8b5b;

  /* v6: "attention" role — needs-a-decision, not necessarily bad (that's
     coral's job) but wants a human to look (e.g. a churned outlet with no
     note yet). */
  --attention: #d9631f;
  --attention-soft: #fdebdd;

  /* Coral — negative values / disadvantaged comparison only */
  --coral: #e0533a;
  --coral-soft: #fdece7;

  /* Movement categorical palette (v4) — a SEPARATE system from the status
     colors above (green/sun/coral thresholds). Research-grounded rules:
     gains live in the green family, losses in the coral family, portfolio
     plumbing gets neutral cool hues, and sun/amber is RESERVED for
     threshold-warning status — never used as a category color. Saturation
     is deliberately tiered (green > teal > violet > slate) so the stack
     reads ordered, not rainbow. */
  --mv-green-lt: #58bb8a;        /* expansion — tint of the green anchor */
  --mv-green-lt-soft: #e7f5ee;
  --mv-teal: #1295a8;            /* comeback — returning tide */
  --mv-teal-soft: #e2f3f5;
  --mv-violet: #7b6bc9;          /* transfer_in — administrative move */
  --mv-violet-soft: #eeebf9;
  --mv-slate: #7d8ca3;           /* handover — quiet background info */
  --mv-slate-soft: #eef1f5;
  --mv-clay: #b0442b;            /* transfer_out — coral family, earthier */
  --mv-clay-soft: #f6e7e2;

  /* Category palette (Phase C, 2026-07-09) — a THIRD categorical system,
     separate from status (green/sun/coral thresholds) and from the
     movement palette above (same precedent: movement got its own lane in
     v4, this is the account-view equivalent for Freshket's 10 product
     categories). Order matches _CAT_MASTER (nrr_account.js), ported from
     02_data_pipeline.js:2 in both Sense and this repo. Bought category =
     full color; not-yet-bought = same hue at low opacity (set at the
     call site, not baked into these tokens) — never gray, so "hasn't
     bought this" reads as "this category exists" not "no data." */
  --cat-1: #8a6d3b;  /* DG Food */
  --cat-2: #a35d8f;  /* Processed Food */
  --cat-3: #4f9153;  /* Vegetable */
  --cat-4: #b5473f;  /* Meat */
  --cat-5: #3d7ea6;  /* Fish & Seafood */
  --cat-6: #c98a2e;  /* Egg */
  --cat-7: #cf6b3e;  /* Fruit */
  --cat-8: #2f9ba0;  /* Beverage Non-alcohol */
  --cat-9: #7a6bb0;  /* Beverage Alcohol */
  --cat-10: #6b7280; /* DG Non-food */

  /* Commission-type palette (Round 5, 2026-07-09) — a FOURTH categorical
     system, one hue per component of the KAM commission formula, used as a
     leading color cue on each receipt line so the eye can track "which
     kind of money is this" down the breakdown. Same precedent as the
     movement and category palettes above (each got its own lane); kept
     clear of status green/sun/coral, which stay reserved for NRR%
     thresholds. Order = receipt order (NRR → P1 → P3 → Expansion →
     Handover). Expansion/Handover intentionally echo the movement
     palette's expansion/handover hues for cross-app consistency. */
  --comm-nrr: #2f7d62;           /* NRR — the core retained-revenue payout */
  --comm-nrr-soft: #e6f2ec;
  --comm-p1: #c56a2c;            /* Upsell P1 — new products */
  --comm-p1-soft: #f8e9dc;
  --comm-p3: #b58a1f;            /* Upsell P3 — growing products */
  --comm-p3-soft: #f6eecd;
  --comm-expansion: #3d8bb0;     /* Expansion — new outlets (cool, "spread") */
  --comm-expansion-soft: #e4eff5;
  --comm-handover: #7d8ca3;      /* Handover — retention bonus (quiet slate) */
  --comm-handover-soft: #eef1f5;

  /* Radii */
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-pill: 999px;

  /* Spacing (feel-based, not strict grid) */
  --sp-1: 10px;
  --sp-2: 12px;
  --sp-3: 14px;
  --sp-4: 16px;
  --sp-5: 18px;
  --sp-6: 20px;
  --sp-7: 22px;

  /* Fonts — loaded via Google Fonts <link> in shell_nrr.html */
  --font-ui: 'Anuphan', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-num: 'Space Grotesk', var(--font-ui);
}
</style>
<style>
/* ── nrr_base.css — typography, 3-tier surfaces, buttons, chips ────────
   Desktop adaptation of the Fresh Canvas mobile spec (section 10):
   - font sizes +2px vs the mobile scale, ratios between levels preserved
   - hover states added to .panel/.fill and buttons (mobile has none)
   - top bar instead of bottom nav; no bottom-sheet grab handles here */

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}
#nrr-app { display: none; }

/* ── Typography — v6 graduated scale (Display/H1/H2/Body-strong/Body/
   Meta/Micro), no gap large enough to feel like two different apps.
   --green is the surface/glyph role (Cabbage) — never used as text color
   here; --green-deep (Raw Papaya) is the text-safe variant. ─────────── */
.eyebrow {
  font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--green-deep);
}
.h1 { font-size: 29px; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; margin: 0; }
.h2 { font-size: 22px; font-weight: 700; line-height: 1.35; margin: 0; }
.t-strong { font-size: 16px; font-weight: 600; color: var(--ink); }
.sub { font-size: 15px; font-weight: 400; line-height: 1.65; color: var(--ink2); margin: 0; }
/* meta = real content that must be readable (row subtitles, counts) —
   13px minimum, ink2, never the faint/tiny ink3+11px combo that reads as
   illegible-by-design. micro = pure decoration only (timestamps, disabled
   state, placeholder copy) — the one level allowed to be skimmed past. */
.meta { font-size: 13px; font-weight: 500; color: var(--ink2); }
.micro { font-size: 13px; font-weight: 400; color: var(--ink3); }
.num {
  font-family: var(--font-num); font-weight: 700; letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.nrr-pop { animation: nrrPop 420ms cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes nrrPop { 0% { transform: scale(1); } 50% { transform: scale(1.22); } 100% { transform: scale(1); } }

/* ── Surface system — 3 tiers, do not mix ─────────────────────────── */
.panel {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  transition: box-shadow 150ms ease;
}
.panel.hoverable:hover { box-shadow: 0 2px 10px rgba(16, 21, 16, 0.06); }

.fill {
  background: var(--fill);
  border-radius: var(--r-md);
  transition: background 150ms ease;
}
.fill.hoverable:hover { background: var(--fill-deep); }

.float {
  background: var(--bg);
  border-radius: var(--r-lg);
  border: 1px solid rgba(16, 21, 16, 0.04);
  box-shadow: 0 6px 20px rgba(16, 21, 16, 0.10), 0 24px 56px rgba(16, 21, 16, 0.14);
}

/* ── Buttons ───────────────────────────────────────────────────────── */
.btn-primary {
  padding: 12px 20px; border: none; border-radius: 18px;
  background: var(--green-deep); color: #fff; /* Papaya, not Cabbage — white text needs the deep variant for contrast */
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  box-shadow: 0 8px 24px rgba(0, 128, 101, 0.28);
  transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
  cursor: pointer;
}
.btn-primary:hover { filter: brightness(1.05); }
.btn-primary:active { transform: scale(0.97); }
/* v7 mockup-parity: secondary actions are quiet border pills (iOS filter-
   trigger language), not gray filled blocks — gray fills were the single
   biggest contributor to the "boxes everywhere" look. */
.btn-secondary {
  padding: 8px 16px; border: 1px solid var(--line); border-radius: 999px;
  background: transparent; color: var(--ink2);
  font-family: var(--font-ui); font-size: 13.5px; font-weight: 600;
  transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
  cursor: pointer;
}
.btn-secondary:hover { border-color: var(--ink3); color: var(--ink); }
.btn-secondary:active { transform: scale(0.97); }

/* ── Chip / tag ───────────────────────────────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: var(--r-pill);
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.tag.green { background: var(--green-soft); color: var(--green-deep); }
.tag.coral { background: var(--coral-soft); color: var(--coral); }
.tag.sun   { background: var(--sun-soft); color: var(--sun-deep); }
.tag.muted { background: var(--fill); color: var(--ink2); }
.tag.attention { background: var(--attention-soft); color: var(--attention); } /* v6: "needs a look" — e.g. churn with no note yet */

/* v6: insight — the color of narration (verdict sentences, takeaway
   highlights), distinct from data itself. */
.nrr-insight { color: var(--sun-deep); font-weight: 700; }
.nrr-highlight { background: linear-gradient(transparent 55%, var(--sun-soft) 55%); padding: 0 2px; font-weight: 600; color: var(--ink); }

/* ── Segmented control — v7 mockup-parity: transparent track with a
   hairline border, pill radius; active = Cabbage fill + dark-jalapeno
   text (the ink-deep pairing keeps AA contrast on the bright green).
   Used by both the top subnav and the movement portfolio switcher. ── */
.seg {
  display: inline-flex; background: transparent;
  border: 1px solid var(--line); border-radius: 999px; padding: 3px; gap: 2px;
}
.seg button, .seg a {
  border: none; background: transparent; padding: 7px 16px; border-radius: 999px;
  font-family: var(--font-ui); font-size: 13.5px; font-weight: 600; color: var(--ink2);
  cursor: pointer; text-decoration: none;
  transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
.seg button.on, .seg a.on { background: var(--green); color: var(--ink-deep); font-weight: 700; }
.seg button:not(.on):hover, .seg a:not(.on):hover { color: var(--ink); }

/* ── Auth overlay (kept minimal, matches app tone) ───────────────── */
#nrr-auth-overlay {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 500;
}
.nrr-auth-card { width: 340px; display: flex; flex-direction: column; gap: 12px; }
.nrr-auth-card input {
  width: 100%; padding: 12px 14px; border-radius: var(--r-md); border: 1px solid var(--line);
  font-family: var(--font-ui); font-size: 14px; background: var(--fill);
}
#nrr-auth-error {
  display: none; background: var(--coral-soft); color: var(--coral);
  border-radius: var(--r-sm); padding: 10px 12px; font-size: 13px;
}
</style>
<style>
/* ── nrr_components.css — page layout + components (v7 mockup-parity) ───
   The page is ONE white canvas: no panel/card wrappers around sections;
   sections separate with whitespace + a hairline top rule (mockup's .sec
   pattern). The slide-over remains the only surface with a real shadow. */

.nrr-page { max-width: 1020px; margin: 0 auto; padding: 0 32px 100px; display: flex; flex-direction: column; }

/* Masthead — quiet: white, hairline bottom rule, NO shadow (mockup .mast) */
.nrr-masthead {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); border-bottom: 1px solid var(--line);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.nrr-masthead-title { display: flex; flex-direction: column; gap: 2px; }
.nrr-masthead-title .eyebrow { font-size: 12px; letter-spacing: 0.1em; }
.nrr-masthead-h { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; }
.nrr-masthead-actions { display: flex; align-items: center; gap: 14px; }

/* Logged-in-as chip — who + what role, so it's obvious at a glance whose
   view this is (matters most when switching test accounts / demoing). */
.nrr-profile-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; font-weight: 600; color: var(--ink2);
  background: var(--fill); border-radius: var(--r-pill); padding: 5px 10px 5px 8px;
  white-space: nowrap;
}
.nrr-profile-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.nrr-profile-role {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
  color: var(--green-deep); background: var(--green-soft); border-radius: var(--r-pill);
  padding: 2px 7px; margin-left: 2px;
}

/* Sub-nav shares .seg styling (nrr_base.css) — no extra track here. */
.nrr-subnav { }
.nrr-month-capsule { white-space: nowrap; }

/* App-level nav (Dashboard · Portfolio) + in-page scrollspy subnav sit
   together; the router hides the subnav outside the dashboard view.
   DESIGN LANGUAGE SPLIT (2026-07-09): the appnav answers "คุณอยู่หน้าไหน" —
   text tabs with a Cabbage underline (place). The .seg pills answer
   "มองผ่านเลนส์ไหน" — filters/toggles within a page. Never style one as
   the other; the two must read as different kinds of control at a glance. */
.nrr-masthead-nav { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.nrr-appnav { display: flex; align-items: center; gap: 22px; }
.nrr-appnav a {
  position: relative; text-decoration: none;
  font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
  color: var(--ink3); padding: 6px 2px 9px;
  transition: color 0.15s ease;
}
.nrr-appnav a:hover { color: var(--ink2); }
.nrr-appnav a.on { color: var(--ink); }
.nrr-appnav a.on::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0;
  height: 3px; border-radius: 2px; background: var(--green);
}
.nrr-appnav-div { width: 1px; height: 22px; background: var(--line); }

/* Router views — siblings toggled with [hidden]; !important beats any
   display rule a child layout class might set later. */
.nrr-view[hidden] { display: none !important; }

/* Data-staleness banner — a portfolio CSV (pm/admin/vp_view.csv) holding a
   past quarter's rows, silently mislabeled as current (2026-07-09 finding:
   admin_view.csv sat 3 months stale while pm/vp_view.csv were current).
   Loud on purpose — this is a "don't trust the number above" signal. */
.nrr-stale-banner {
  background: var(--coral-soft); border: 1px solid var(--coral);
  border-radius: var(--r-sm); padding: 10px 14px; margin: 10px 0;
  font-size: 13px; color: var(--ink); line-height: 1.5;
}

/* Waived Account (NRR Exclusion) feature — account-page transparency badge
   ("which months were adjusted and why") + inline TL request form. */
.nrr-exclusion-banner {
  border-radius: var(--r-sm); padding: 9px 14px; margin: 8px 0;
  font-size: 13px; line-height: 1.5;
}
.nrr-exclusion-banner.approved { background: var(--attention-soft); border: 1px solid var(--attention); color: var(--ink); }
.nrr-exclusion-banner.pending  { background: var(--sun-soft); border: 1px solid var(--sun); color: var(--ink); }
.nrr-exclusion-request-btn {
  font-size: 12.5px; font-weight: 600; color: var(--green-deep);
  background: var(--green-soft); border: none; border-radius: var(--r-pill);
  padding: 6px 14px; margin: 6px 0; cursor: pointer;
}
.nrr-exclusion-form {
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: 12px 14px; margin: 8px 0; background: var(--bg);
}
.nrr-exclusion-reasons { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.nrr-exclusion-reason-opt { font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.nrr-exclusion-note {
  width: 100%; box-sizing: border-box; font-size: 13px; font-family: inherit;
  border: 1px solid var(--line); border-radius: var(--r-sm); padding: 8px;
  resize: vertical; margin-bottom: 8px;
}
.nrr-exclusion-form-actions { display: flex; justify-content: flex-end; gap: 8px; }
.nrr-exclusion-cancel-btn, .nrr-exclusion-submit-btn {
  font-size: 12.5px; font-weight: 600; border-radius: var(--r-pill);
  padding: 6px 14px; cursor: pointer; border: none;
}
.nrr-exclusion-cancel-btn { background: transparent; color: var(--ink2); border: 1px solid var(--line); }
.nrr-exclusion-submit-btn { background: var(--green-deep); color: #fff; }

/* #/waivers — Admin approve/reject queue + TL request history */
.nrr-waivers-kpis { display: flex; gap: 20px; margin: 10px 0 18px; }
.nrr-waivers-kpi .num { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
.nrr-waiver-card {
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: 12px 14px; margin-bottom: 10px;
}
.nrr-waiver-card.approved { border-left: 3px solid var(--attention); }
.nrr-waiver-card.rejected { border-left: 3px solid var(--ink3); opacity: .7; }
.nrr-waiver-card.submitted { border-left: 3px solid var(--sun); }
.nrr-waiver-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.nrr-waiver-acct { font-size: 14.5px; font-weight: 600; color: var(--ink); text-decoration: none; }
.nrr-waiver-acct:hover { text-decoration: underline; }
.nrr-waiver-status { font-size: 11.5px; font-weight: 700; border-radius: var(--r-pill); padding: 3px 10px; flex-shrink: 0; }
.nrr-waiver-status.approved { background: var(--attention-soft); color: var(--attention); }
.nrr-waiver-status.submitted { background: var(--sun-soft); color: var(--sun-deep); }
.nrr-waiver-status.rejected { background: rgba(0,0,0,.06); color: var(--ink3); }
.nrr-waiver-actions { display: flex; gap: 8px; margin-top: 10px; }

/* Sales handover-pipeline forecast chips — urgency status, not identity;
   border color carries the meaning, text label always present alongside.
   (v29: superseded by the pipeline table's .nrr-pipe-cell for #/sales, but
   left in place — a compact chip summary is a reasonable future reuse.) */
.nrr-pipeline-chip {
  border: 1.5px solid var(--line); border-radius: var(--r-md);
  padding: 10px 12px; text-align: left; cursor: pointer;
  background: transparent; font: inherit; color: var(--ink);
  transition: background 0.12s ease;
}
.nrr-pipeline-chip:hover { background: var(--fill); }
.nrr-pipe-cell:hover { background: var(--fill); }

/* Denser row height for wide multi-month tables (company audit table,
   sales actuals/pipeline table) — same .nrr-table base, tighter padding. */
.nrr-table-compact td, .nrr-table-compact th { padding: 7px 12px; }

/* Sticky first (label) column — horizontal scroll on a wide month table no
   longer loses the row label off-screen. Needs an opaque background so
   scrolled content doesn't show through underneath. */
.nrr-table-sticky-col th:first-child, .nrr-table-sticky-col td:first-child {
  position: sticky; left: 0; background: var(--bg); z-index: 1;
}
.nrr-table-sticky-col thead th { position: sticky; top: 0; background: var(--bg); z-index: 2; }
.nrr-table-sticky-col thead th:first-child { z-index: 3; }

/* ── Company view (#/company, v28) — squad race chart + cards ──────────── */
/* Grouped monthly columns: Chain vs SA/MC pairs. Same div-column language
   as .nrr-qchart; the hatch overlay carries the same "projected remainder"
   meaning as .nrr-qcol-hatch (background set inline per squad hue). */
.nrr-cochart { display: flex; align-items: flex-end; gap: 8px; padding: 8px 4px 0; overflow-x: auto; }
.nrr-cogroup { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 52px; max-width: 84px; }
.nrr-cogroup-cols { display: flex; align-items: flex-end; justify-content: center; gap: 4px; width: 100%; }
.nrr-cocol {
  display: flex; flex-direction: column; justify-content: flex-end;
  width: 28px; max-width: 34px; border-radius: 6px 6px 2px 2px; overflow: hidden;
}
.nrr-cocol-seg { width: 100%; }
.nrr-cogroup-caps { display: flex; justify-content: center; text-align: center; gap: 8px; font-size: 12.5px; font-weight: 700; line-height: 1.2; }
.nrr-cogroup-label { font-size: 12.5px; font-weight: 600; color: var(--ink2); margin-top: 2px; white-space: nowrap; }
.nrr-co-legend { display: flex; gap: 16px; align-items: center; font-size: 12.5px; color: var(--ink2); margin: 4px 0 8px; flex-wrap: wrap; }
.nrr-co-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
/* "waiting in Sales' hands" line inside a squad card */
.nrr-squad-handover { margin-top: 14px; font-size: 13px; color: var(--ink2); }
.nrr-squad-handover a { color: var(--green-deep); font-weight: 600; text-decoration: none; margin-left: 6px; }

/* B2C's own slim row below the two squad cards (kept out of the card grid
   so Chain/SA-MC can each spread full-width) */
.nrr-b2c-row {
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
}

/* ── Sales pipeline drawer rows (#/sales, v28) — slideover custom body ── */
.nrr-pipe-row {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 10px 2px; border-bottom: 1px solid var(--line);
}
.nrr-pipe-main { min-width: 0; }
.nrr-pipe-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-pipe-gmv { font-size: 14px; font-weight: 700; white-space: nowrap; }
.nrr-pipe-more { margin: 4px auto; }

/* First responsive pass — the portfolio layer is rep-facing (mobile-first
   users); the dashboard stays desktop-first. Masthead must not overflow. */
@media (max-width: 640px) {
  .nrr-masthead { padding: 12px 16px; gap: 10px; }
  .nrr-masthead-h { font-size: 18px; }
  .nrr-masthead-actions { gap: 8px; }
  .nrr-masthead-actions #nrr-sync-status { display: none; }
  .nrr-page { padding: 0 16px 80px; }
  .nrr-section { padding: 28px 0; }
}

/* ── Portfolio layer (Phase B, 2026-07-09) — account row list. Vertical
   list (not a multi-column grid, per 2026-07-09 redesign) mirrors Sense's
   own portview card pattern (name/meta left, pace%+status word fixed
   right, worst-pace-first) but stays in /nrr's own "no boxes, hairline
   rows" visual language (.ds-row convention) instead of Sense's bordered
   card. Compose from existing tokens only: --line hairline, --font-num for
   figures, nrrThresholdColorVar() JS helper for the pace color (no new
   color mapping — same green/sun/coral convention as the rest of /nrr). */
.nrr-acct-list { display: flex; flex-direction: column; margin-top: 4px; }
.nrr-acct-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  padding: 12px 4px 12px 12px; border-bottom: 1px solid var(--line);
  border-left: 3px solid var(--ink3);
  text-decoration: none; color: inherit; cursor: pointer;
  transition: background 140ms ease;
}
.nrr-acct-row:hover { background: var(--green-soft); }
.nrr-acct-list .nrr-acct-row:last-child { border-bottom: none; }
.nrr-acct-row-left { min-width: 0; flex: 1; }
.nrr-acct-row-name { font-size: 15px; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-acct-row-meta { display: flex; align-items: baseline; gap: 6px; margin-top: 3px; color: var(--ink2); font-size: 13px; }
.nrr-acct-row-flags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.nrr-acct-flag { font-size: 11.5px; font-weight: 600; padding: 2px 8px; border-radius: var(--r-pill); background: var(--fill); color: var(--ink2); }
.nrr-acct-flag.warn { background: var(--sun-soft); color: var(--sun-deep); }
.nrr-acct-flag.danger { background: var(--coral-soft); color: var(--coral); }
.nrr-acct-row-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; min-width: 84px; }
.nrr-acct-row-pace { font-size: 17px; font-weight: 700; }
.nrr-acct-row-status { font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
@media (max-width: 640px) {
  .nrr-acct-row { flex-wrap: wrap; }
  .nrr-acct-row-right { flex-direction: row; align-items: baseline; min-width: 0; }
}

/* ── Portfolio pulse (round 2) — %NRR + base/MTD/run-rate triple, reuses
   .nrr-triple-lg exactly as the dashboard does (nrrTripleHtml('lg', ...)) —
   no new number-display component, just a bigger %NRR above it. */
.nrr-port-pulse { margin: 10px 0 26px; text-align: center; }
.nrr-port-pulse-pct { font-size: 48px; font-weight: 800; line-height: 1.0; letter-spacing: -0.02em; margin: 4px 0 14px; }
.nrr-port-pulse .nrr-triple-lg { justify-content: center; }

/* ── Risk summary strip (round 2/3) — Sense's ON TRACK/MONITOR/AT RISK
   boxes, ported as 3 quiet stat tiles (no card shadows — /nrr's own "no
   boxes" language, just a hairline + a tint strong enough to read the 3
   apart). Round 3: the tiles double as the pace filter — clickable,
   multi-select (OR'd), a colored ring marks "selected", the other two
   dim so it's obvious a filter is narrowing the list below. */
.nrr-risk-strip { display: flex; gap: 10px; flex-wrap: wrap; }
.nrr-risk-tile {
  flex: 1; min-width: 140px; border-radius: var(--r-md); padding: 10px 14px; background: var(--fill);
  cursor: pointer; border: 2px solid transparent; transition: opacity 140ms ease, border-color 140ms ease;
}
.nrr-risk-tile:hover { opacity: 0.85; }
.nrr-risk-tile.ok { background: var(--green-soft); }
.nrr-risk-tile.warn { background: var(--sun-soft); }
.nrr-risk-tile.danger { background: var(--coral-soft); }
.nrr-risk-tile.ok.selected { border-color: var(--green-deep); }
.nrr-risk-tile.warn.selected { border-color: var(--sun-deep); }
.nrr-risk-tile.danger.selected { border-color: var(--coral); }
.nrr-risk-strip.has-selection .nrr-risk-tile:not(.selected) { opacity: 0.4; }
.nrr-risk-tile-label { font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; gap: 8px; }
.nrr-risk-tile-value { font-size: 19px; font-weight: 700; margin-top: 4px; }

/* ── Per-account sparkline (round 2) — ported technique from Sense's
   _buildSparkline (06_portview_teamview.js:987-1017): 5 closed months
   (bulk_history.csv) + current month two-tone (solid=MTD, hatch=projected
   remainder), reusing the SAME hatch pattern as .nrr-qcol-hatch above so
   /nrr doesn't grow a second "projected" visual language. Round 3: lives
   under the pace%/status word in the row's right column (not the left,
   under the flags) to save vertical space — same reason it's capped
   narrower here than a standalone chart would be. */
.nrr-spark { display: flex; align-items: flex-end; gap: 2px; height: 22px; margin-top: 6px; width: 100px; }
.nrr-spark-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.nrr-spark-stack { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 22px; border-radius: 2px 2px 1px 1px; overflow: hidden; }
.nrr-spark-seg { width: 100%; opacity: 0.55; }
.nrr-spark-hatch { width: 100%; }

/* fade-up entrance + section rhythm: whitespace + hairline, not boxes */
.nrr-section {
  opacity: 0; transform: translateY(20px);
  animation: nrrFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  padding: 40px 0;
  border-top: 1px solid var(--line);
}
.nrr-section:first-child { border-top: none; padding-top: 32px; }
@keyframes nrrFadeUp { to { opacity: 1; transform: translateY(0); } }

.nrr-panel-body { padding: 0; }
.nrr-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; flex-wrap: wrap; }
.nrr-panel-head .h2 { font-size: 26px; letter-spacing: -0.01em; } /* typography carries hierarchy, not boxes */
.nrr-takeaway { margin-bottom: 20px; font-size: 14px !important; color: var(--ink2) !important; }

/* ── §1 Pulse hero ─────────────────────────────────────────────────────── */
.nrr-pulse { display: grid; grid-template-columns: minmax(260px, 1.1fr) minmax(320px, 1.4fr) auto; gap: 28px; align-items: center; }
@media (max-width: 1000px) { .nrr-pulse { grid-template-columns: 1fr; } }
.nrr-pulse-pct { font-size: 64px; font-weight: 800; line-height: 1.0; letter-spacing: -0.025em; margin: 6px 0 4px; }
/* v6: verdict is narration, distinct from data — the "insight" wash. */
.nrr-verdict {
  display: inline-block; font-size: 15px; font-weight: 500; color: var(--ink);
  background: var(--sun-soft); border-radius: 10px; padding: 7px 13px;
  margin: 6px 0 4px; line-height: 1.5;
}
.nrr-pulse-satellites { display: flex; gap: 20px; margin-top: 12px; font-size: 14px; font-weight: 500; color: var(--ink2); }
.nrr-pulse-satellites span { display: inline-flex; align-items: center; gap: 7px; }
.nrr-pulse-satellites b { font-size: 15px; margin-left: 2px; color: var(--ink); }
.nrr-sat-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--green); display: inline-block; }

/* ── v6: composition bar — see nrrCompositionBarHtml ──────────────────── */
.nrr-compo { margin-top: 22px; }
.nrr-compo-lbl { font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 8px; }
.nrr-compo-bar { display: flex; height: 9px; border-radius: 999px; overflow: hidden; gap: 2px; }
.nrr-compo-bar i { display: block; height: 100%; transition: transform 150ms ease; }
.nrr-compo-bar i:hover { transform: scaleY(1.6); }
.nrr-compo-key { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.nrr-compo-k { font-size: 12.5px; font-weight: 500; color: var(--ink2); display: inline-flex; align-items: center; gap: 6px; }
.nrr-compo-k i { width: 8px; height: 8px; border-radius: 3px; flex: none; display: inline-block; }
.nrr-compo-k b { font-weight: 700; color: var(--ink); }
.nrr-pulse-months { display: flex; flex-direction: column; gap: 8px; }
.nrr-month-chip {
  border: 1px solid var(--line); background: var(--bg); border-radius: var(--r-pill);
  padding: 8px 18px; font-family: var(--font-ui); font-size: 13.5px; font-weight: 600; color: var(--ink2);
  cursor: pointer; position: relative; overflow: hidden; transition: background 150ms ease, color 150ms ease;
}
.nrr-month-chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.nrr-month-chip:disabled { opacity: 0.35; cursor: default; }
.nrr-month-progress { display: block; height: 3px; background: var(--fill-deep); border-radius: 2px; margin-top: 5px; }
.nrr-month-chip.on .nrr-month-progress { background: rgba(255,255,255,0.25); }
.nrr-month-progress span { display: block; height: 100%; background: var(--green); border-radius: 2px; }

/* ── Number-triple pattern ─────────────────────────────────────────────── */
.nrr-rr-proj { border-bottom: 1px dotted var(--ink3); }
.nrr-triple-lg { display: flex; gap: 0; }
.nrr-triple-lg .nrr-triple-cell { padding: 0 22px; border-left: 1px solid var(--line); }
.nrr-triple-lg .nrr-triple-cell:first-child { border-left: none; padding-left: 0; }
.nrr-triple-label { font-size: 12px; color: var(--ink3); font-weight: 600; margin-bottom: 3px; white-space: nowrap; }
.nrr-triple-base { font-size: 20px; color: var(--ink3); }
.nrr-triple-mtd { font-size: 20px; color: var(--ink); }
.nrr-triple-rr { font-size: 28px; color: var(--ink); }
.nrr-triple-md, .nrr-triple-sm { text-align: right; }
.nrr-triple-md > .num { font-size: 14px; font-weight: 700; }
.nrr-triple-sm > .num { font-size: 13px; font-weight: 700; }
.nrr-triple-sub { font-size: 11.5px; color: var(--ink2); margin-top: 1px; white-space: nowrap; }
.nrr-lost { font-size: 13px; font-weight: 700; color: var(--coral); }

/* v5: per-outlet momentum signal (sm triples only) */
.nrr-sig-up { color: var(--green-deep) !important; }
.nrr-sig-down { color: var(--coral) !important; }
.nrr-sig-glyph { font-size: 9px; margin-right: 2px; vertical-align: 1px; }
.nrr-transfer-attr { color: var(--ink2); font-weight: 600; }

/* ── §2 Team split — v7 mockup-parity: divider halves, NOT cards ───────── */
.nrr-team-cards { display: flex; }
.nrr-team { flex: 1; padding: 6px 32px 0 0; }
.nrr-team + .nrr-team { padding-left: 32px; border-left: 1px solid var(--line); }
.nrr-team-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.nrr-team-nm { font-size: 15px; font-weight: 700; }
.nrr-team-badge {
  font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
  background: var(--green-soft); color: var(--green-deep);
}
.nrr-team-pct { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; margin-bottom: 8px; }
.nrr-team-sub { font-size: 13px; font-weight: 500; color: var(--ink2); }
.nrr-team-acts { display: flex; gap: 20px; margin-top: 14px; }
.nrr-team-acts a { font-size: 13.5px; font-weight: 600; color: var(--green-deep); text-decoration: none; }
.nrr-team-acts a:hover { text-decoration: underline; }
@media (max-width: 760px) {
  .nrr-team-cards { flex-direction: column; }
  .nrr-team + .nrr-team { padding-left: 0; border-left: none; border-top: 1px solid var(--line); padding-top: 18px; margin-top: 18px; }
}

/* ── KPI tiles — v6: de-boxed. Was ".fill" per-tile (a grid of pale gray
   boxes — the exact "everything is a card" antipattern). Typography +
   a divider between siblings now carries the grouping instead. ──────── */
.nrr-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
@media (max-width: 900px) { .nrr-kpi-grid { grid-template-columns: repeat(2, 1fr); } }
.nrr-kpi-tile { padding: 4px 24px; display: flex; flex-direction: column; gap: 6px; border-left: 1px solid var(--line); }
.nrr-kpi-tile:first-child { border-left: none; padding-left: 0; }
.nrr-kpi-value { font-size: 32px; line-height: 1.1; }
.nrr-kpi-label { font-size: 13px; color: var(--ink2); font-weight: 600; }

/* ── Tables ────────────────────────────────────────────────────────────── */
.nrr-table { width: 100%; border-collapse: collapse; }
.nrr-table th {
  text-align: left; font-size: 12px; font-weight: 700; color: var(--ink3);
  text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--line);
  user-select: none;
}
.nrr-table td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 14.5px; }
.nrr-table tbody tr { transition: background 120ms ease; }
#nrr-kams-tbody tr { cursor: pointer; transition: background 140ms ease; }
#nrr-kams-tbody tr:hover { background: var(--green-soft); }
.nrr-table .num-cell { font-family: var(--font-num); font-weight: 700; font-variant-numeric: tabular-nums; }
.nrr-table-subrow td:first-child { padding-left: 26px; color: var(--ink2); font-size: 13.5px; }
.nrr-table-total td { border-top: 1.5px solid var(--ink); border-bottom: none; font-weight: 700; }

/* ── v6: quarter/delta mode toggle (spring-ish, matches .seg language) ── */
.mode { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; padding: 3px; gap: 2px; margin: 4px 0 16px; }
.mode button {
  border: none; background: transparent; font-family: var(--font-ui);
  font-size: 13px; font-weight: 600; color: var(--ink2);
  padding: 7px 16px; border-radius: 999px; cursor: pointer;
  transition: background 180ms cubic-bezier(0.16, 1, 0.3, 1), color 180ms ease;
}
.mode button.on { background: var(--ink); color: #fff; }
.nrr-chart-body { animation: nrrFadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

/* ── v6: quarter (totals) view — churn is NOT baked into bar height; a
   totals bar that subtracts losses would read taller than the real
   number. Columns are flex:1 (fills the section width == "centered",
   never hugs the left edge). ────────────────────────────────────────── */
.nrr-qchart { display: flex; align-items: flex-end; gap: 24px; padding: 8px 4px 0; }
.nrr-qcol { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 90px; }
.nrr-qcol-cap { font-size: 15px; font-weight: 700; white-space: nowrap; }
.nrr-qcol-stack {
  display: flex; flex-direction: column; justify-content: flex-end; width: 100%; max-width: 108px;
  border-radius: 8px 8px 3px 3px; overflow: hidden;
}
.nrr-qcol-stack .nrr-qcol-seg:first-child { border-radius: 8px 8px 0 0; }
.nrr-qcol-seg { width: 100%; }
/* hatch is prepended in the DOM before the real segments, so with
   justify-content:flex-end it lands visually on top — same technique as
   the delta view's .nrr-col-hatch. */
.nrr-qcol-hatch {
  width: 100%; border-radius: 8px 8px 0 0;
  background: repeating-linear-gradient(-45deg, rgba(255,255,255,0.4) 0 3px, rgba(255,255,255,0) 3px 9px), var(--green);
}
.nrr-qcol-label { font-size: 13px; font-weight: 600; color: var(--ink2); margin-top: 2px; }
.nrr-qcol-nrr { font-size: 13px; font-weight: 700; }

/* ── Movement chart (delta view): above/below zero + hatched projection ── */
.nrr-col-chart { display: flex; align-items: flex-start; gap: 18px; padding: 8px 4px 0; }
.nrr-col { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 72px; }
.nrr-col-top { font-weight: 700; font-size: 13px; white-space: nowrap; font-variant-numeric: tabular-nums; }
.nrr-col-up {
  display: flex; flex-direction: column; justify-content: flex-end;
  width: 100%; max-width: 84px; position: relative;
  border-bottom: 1.5px solid var(--ink2); /* the zero line */
}
.nrr-col-up .nrr-col-seg:first-of-type { border-radius: 6px 6px 0 0; }
.nrr-col-down { display: flex; flex-direction: column; justify-content: flex-start; width: 100%; max-width: 84px; }
.nrr-col-down .nrr-col-seg:last-child { border-radius: 0 0 6px 6px; }
.nrr-col-seg { width: 100%; }
.nrr-col-hatch {
  position: absolute; top: auto; left: 0; right: 0; pointer-events: auto; z-index: 2;
  /* v5: lighter veil — thinner stripes, lower alpha, wider period so the
     segment colors dominate and the projection reads as translucent. */
  background: repeating-linear-gradient(45deg, rgba(255,255,255,0.32) 0 3px, rgba(255,255,255,0) 3px 9px);
}
.nrr-col-up .nrr-col-hatch { top: 0; }
.nrr-col-down-label { font-size: 11.5px; font-weight: 700; color: var(--coral); }
.nrr-col-label { font-size: 13px; font-weight: 600; color: var(--ink2); }
.nrr-movement-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.nrr-movement-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink2); }
.nrr-movement-legend-dot { width: 9px; height: 9px; border-radius: 50%; }

/* v6: clickable movement cells → open the slide-over directly (no more
   inline expansion row). Hover = underline hint; .on = a quiet ring on
   whichever cell most recently opened the slide-over. */
.nrr-cell-btn {
  background: none; border: none; padding: 2px 4px; margin: -2px -4px;
  font: inherit; font-family: var(--font-num); font-weight: 700; font-variant-numeric: tabular-nums;
  cursor: pointer; border-radius: 6px; transition: color 140ms ease;
}
.nrr-cell-btn:hover { text-decoration: underline dotted; color: var(--green-deep); }
.nrr-cell-btn.on { box-shadow: inset 0 0 0 2px var(--green); }

/* ── Unified outlet row grid — THE alignment fix ──────────────────────── */
.nrr-row {
  display: grid; grid-template-columns: 20px 1fr 150px; column-gap: 10px;
  align-items: center; padding: 10px 0;
}
.nrr-row-linked { text-decoration: none; color: inherit; cursor: pointer; }
.nrr-row-linked:hover { background: var(--green-soft); }
.nrr-row + .nrr-row, .nrr-row-with-notes + .nrr-row, .nrr-row + .nrr-row-with-notes, .nrr-row-with-notes + .nrr-row-with-notes { border-top: 1px solid var(--line); }
.nrr-row-chev { width: 20px; text-align: center; color: var(--ink3); }
.nrr-chev-icon { display: inline-block; transition: transform 150ms ease; font-size: 15px; }
.nrr-acct-group[open] > summary .nrr-chev-icon { transform: rotate(90deg); }
.nrr-row-text { min-width: 0; }
.nrr-row-name { font-size: 15px; font-weight: 600; color: var(--ink); }
.nrr-row-branch .nrr-row-name { font-size: 14px; font-weight: 500; color: var(--ink2); }
/* v6: this is real content (account name, KAM owner) — was 11.5px/ink3,
   the exact "too faint to read" combo. Now meets the 13px/ink2 floor. */
.nrr-row-meta { font-size: 13px; font-weight: 500; color: var(--ink2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nrr-outlet-kam { color: var(--ink2); font-weight: 600; }
.nrr-row-nums { text-align: right; font-variant-numeric: tabular-nums; }
.nrr-row .tag { margin-left: 6px; vertical-align: 1px; }

/* v8: movement-type dot — replaces the text pill after the name. A fixed-
   size flex item (not inline text) so the name+meta block always starts
   at the same x regardless of dot presence, and the meta line lands under
   the NAME, not under the dot, on every row type (outlet, branch, and the
   multi-branch account summary alike). */
.nrr-row-text-dot { display: flex; align-items: flex-start; gap: 9px; min-width: 0; }
.nrr-row-text-dot > div { min-width: 0; } /* the name+meta stack */
.nrr-mv-dot {
  flex: none; width: 7px; height: 7px; border-radius: 999px;
  margin-top: 6px; /* optically centers against the 15px name line-height */
}
.nrr-row-branch .nrr-mv-dot { margin-top: 5px; width: 6px; height: 6px; }
.nrr-mv-dot-mixed { background: var(--ink3); }

/* Account group (details) — summary is itself a .nrr-row */
.nrr-acct-group { border-bottom: 1px solid var(--line); }
.nrr-acct-group:last-child { border-bottom: none; }
.nrr-acct-group summary { list-style: none; cursor: pointer; }
.nrr-acct-group summary::-webkit-details-marker { display: none; }
/* v6: was a filled+bordered box (fill + border-left + radius) — the
   "container per group" pattern. Indentation + lighter type now does the
   containment; a hairline left rule is the only remaining structure. */
.nrr-branch-block {
  margin: 0 0 4px 9px; padding-left: 15px;
  border-left: 1.5px solid var(--line);
}
.nrr-branch-block .nrr-row { border-top: none; padding: 7px 0; }
.nrr-row-branch .nrr-row-chev { visibility: hidden; }
.nrr-row-with-notes .nrr-row-notes { margin: 0 0 8px 30px; }

/* ── Note affordance — v6: quiet, reveal-on-intent, never a permanent box.
   Was an always-rendered input+button on every single row (the biggest
   single offender for "feels boxy") — now a plain text label that only
   grows into an input once someone deliberately clicks it. ─────────────── */
.nrr-notes { margin-top: 2px; }
.nrr-note-line { font-size: 13px; color: var(--ink2); font-style: italic; line-height: 1.5; }
.nrr-note-line::before { content: '❝ '; color: var(--ink3); font-style: normal; }
.nrr-note-author { color: var(--ink3); font-style: normal; }
.nrr-note-aff {
  font-size: 13px; font-weight: 500; color: var(--ink3); cursor: text;
  transition: color 140ms ease; display: inline-block; margin-top: 2px;
}
.nrr-note-aff:hover { color: var(--green-deep); }
.nrr-note-input-row { display: flex; gap: 8px; margin-top: 6px; }
.nrr-note-input-row[hidden] { display: none; } /* class display:flex beats the UA [hidden] rule on specificity — restore it explicitly */
.nrr-note-input {
  flex: 1; border: none; background: var(--fill); border-radius: 10px;
  font-family: var(--font-ui); font-size: 13px; padding: 8px 12px; color: var(--ink);
  outline: none; transition: background 140ms ease, box-shadow 140ms ease;
}
.nrr-note-input:focus { background: #fff; box-shadow: 0 0 0 2px var(--green); }
.nrr-note-save {
  border: none; background: var(--green-deep); color: #fff; border-radius: 10px;
  font-family: var(--font-ui); font-size: 12.5px; font-weight: 700; padding: 0 14px;
  cursor: pointer; transition: filter 140ms ease;
}
.nrr-note-save:hover { filter: brightness(1.08); }

/* ── §5/§6 collapsible movement module ────────────────────────────────── */
.nrr-module { margin-top: 16px; border: 1px solid var(--line); border-radius: var(--r-md); }
.nrr-module summary {
  list-style: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; font-size: 14px; flex-wrap: wrap;
}
.nrr-module summary::-webkit-details-marker { display: none; }
.nrr-module-chev { display: inline-block; transition: transform 150ms ease; color: var(--ink3); }
.nrr-module[open] > summary .nrr-module-chev { transform: rotate(90deg); }
.nrr-module-stats { margin-left: auto; font-size: 13px; font-variant-numeric: tabular-nums; }
.nrr-module-body { padding: 6px 16px 16px; border-top: 1px solid var(--line); }
.nrr-bucket-seg { margin-bottom: 14px; }

/* ── §7 commission section ────────────────────────────────────────────── */
.nrr-comm-strip { padding: 16px 24px; }
.nrr-comm-row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.nrr-comm-total { font-size: 26px; font-weight: 700; }

/* ══════════════════════════════════════════════════════════════════════
   Commission V2.1 — /nrr-native skin ("Fresh Canvas" tokens) + the money
   signature: (1) status stamps ESTIMATE/DRAFT/FINAL, (2) statement-density
   audit table, (3) money in Space Grotesk --green-deep with muted zeros.
   Class names kept from V2 (ds-hero, ds-row, ...) so the JS markup layer
   is stable — but .nrr-comm-ds is now just a namespace: every value below
   references THIS page's own tokens (nrr_tokens.css), never
   design/tokens.css — that system belongs to Sense//dashboard, and using
   it here made Commission read as foreign to the page (V2 mistake).
   ══════════════════════════════════════════════════════════════════════ */
.nrr-comm-ds { font-family: var(--font-ui); color: var(--ink); }
.nrr-comm-ds .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; }

/* ── signature #1: status stamps — money state as a first-class citizen ──
   ESTIMATE = outline (ยังไม่ใช่เงินจริง) · DRAFT = sun fill (รอล็อก) ·
   FINAL = green fill (ล็อกแล้ว, ตราประทับ "จ่ายแล้ว" บนใบเสร็จ) */
.nrr-comm-stamp {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: var(--r-pill); padding: 2px 10px; vertical-align: middle; line-height: 1.5;
}
.nrr-comm-stamp.est   { color: var(--sun-deep);   border: 1px solid var(--sun-deep); background: transparent; }
.nrr-comm-stamp.draft { color: var(--sun-deep);   background: var(--sun-soft); }
.nrr-comm-stamp.final { color: var(--green-deep); background: var(--green-soft); }
.nrr-comm-stamp.sm    { font-size: 10px; padding: 1px 7px; letter-spacing: 0.06em; }

/* ── hero — big type on the white canvas, same register as .nrr-pulse ── */
.nrr-comm-ds .ds-hero { margin-bottom: 26px; }
.nrr-comm-ds .ds-hero-eyebrow {
  font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--green-deep); display: flex; align-items: center; gap: 10px;
}
.nrr-comm-ds .ds-hero-number {
  font-family: var(--font-num); font-size: 52px; font-weight: 800; line-height: 1.05;
  letter-spacing: -0.02em; margin: 8px 0 4px; color: var(--green-deep);
  font-variant-numeric: tabular-nums;
}
.nrr-comm-ds .ds-hero-sub { font-size: 13px; color: var(--ink3); }

/* ── section headers — page eyebrow + hairline ── */
.nrr-comm-ds .ds-section-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 8px; border-bottom: 1px solid var(--line); margin-bottom: 12px;
}
.nrr-comm-ds .ds-eyebrow { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-deep); }
.nrr-comm-ds .ds-section-count { font-family: var(--font-num); font-size: 13px; font-weight: 700; color: var(--ink3); }

/* ── trend spark — Cabbage green solid / fill-deep pending ── */
.nrr-comm-ds .ds-spark { display: flex; align-items: flex-end; gap: 12px; height: 56px; margin-top: 10px; max-width: 340px; }
.nrr-comm-ds .ds-spark-bar { flex: 1; min-height: 6px; border-radius: 6px 6px 3px 3px; background: var(--fill-deep); }
.nrr-comm-ds .ds-spark-bar.active { background: var(--green); }
/* estimate bar — sun hatch, matching the ESTIMATE stamp's "ยังไม่ใช่เงินจริง" language */
.nrr-comm-ds .ds-spark-bar.est {
  background: repeating-linear-gradient(135deg, var(--sun-soft), var(--sun-soft) 4px, rgba(166, 127, 14, 0.35) 4px, rgba(166, 127, 14, 0.35) 6px);
  border: 1px solid var(--sun-deep);
}
.nrr-comm-ds .ds-spark-labels { display: flex; gap: 12px; margin-top: 6px; max-width: 340px; }
.nrr-comm-ds .ds-spark-labels span { flex: 1; text-align: center; font-size: 12px; font-weight: 600; color: var(--ink3); }

/* ── summary rows (details/summary, same rhythm as .nrr-row lists) ── */
.nrr-comm-ds .ds-row { display: flex; align-items: center; min-height: 52px; padding: 8px 0; border-bottom: 1px solid var(--line); gap: 12px; }
.nrr-comm-ds details:last-of-type > summary.ds-row { border-bottom: none; }
.nrr-comm-ds .ds-row.hover { cursor: pointer; transition: background 140ms ease; }
.nrr-comm-ds .ds-row.hover:hover { background: var(--green-soft); }

/* v60: branch/outlet filter picker — reuses the outlet drawer's own row
   list, each row becomes a checkbox label instead of a plain row. */
.nrr-acct-branch-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 0 10px; flex-wrap: wrap; }
.nrr-acct-branch-clear {
  border: 1px solid var(--line); background: transparent; border-radius: var(--r-pill);
  padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--green-deep);
  cursor: pointer; white-space: nowrap; transition: background 140ms ease;
}
.nrr-acct-branch-clear:hover { background: var(--green-soft); }
.nrr-acct-branch-row { cursor: pointer; transition: background 140ms ease; }
.nrr-acct-branch-row:hover { background: var(--fill); }
.nrr-acct-branch-chk { flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--green-deep); cursor: pointer; }
.nrr-acct-branch-filter-tag { font-size: 11.5px; font-weight: 700; color: var(--green-deep); background: var(--green-soft); border-radius: var(--r-pill); padding: 4px 10px; display: inline-block; margin-top: 8px; }
/* v62: month-filter tag — sits above the AOV/สาขา/หมวดสินค้า stat row when a
   past trend-chart bar is selected, mirrors the branch-filter tag's look. */
.nrr-acct-month-filter-tag { font-size: 11.5px; font-weight: 700; color: var(--green-deep); background: var(--green-soft); border-radius: var(--r-pill); padding: 4px 10px; display: inline-block; margin-bottom: 8px; }
.nrr-comm-ds .ds-row-name { font-size: 15px; font-weight: 600; color: var(--ink); flex: 1; min-width: 0; }
.nrr-comm-ds .ds-row-meta { font-size: 13px; font-weight: 500; color: var(--ink2); }
.nrr-comm-ds .ds-row-value { font-family: var(--font-num); font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }

/* ── stat rows (breakdown label/value) ── */
.nrr-comm-ds .ds-stat-row { display: flex; align-items: baseline; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--line); gap: 16px; max-width: 420px; }
.nrr-comm-ds .ds-stat-row:last-child { border-bottom: none; }

/* Nested KAM list (team row -> KAM rows) and the drawer's outlet/upsell/
   handover section rows use the FULL available width — .ds-stat-row's
   420px cap is right for a single label:value stat, wrong for a list row
   that also carries a drill-through button (was reading squeezed/mobile
   inside a 1020px-wide page, user flagged 2026-07-09). */
.nrr-comm-ds .nrr-comm-kam-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--line); gap: 16px;
}
.nrr-comm-ds .nrr-comm-kam-row:last-child { border-bottom: none; }
.nrr-comm-ds .nrr-comm-kam-row-right { display: flex; gap: 14px; align-items: center; flex-shrink: 0; }
/* KAM rows are now <button> (click → open drawer, 2026-07-09). Reset the
   native button chrome but keep each rule's own border-bottom hairline. */
.nrr-comm-ds button.ds-row, .nrr-comm-ds button.nrr-comm-kam-row {
  width: 100%; border-top: none; border-left: none; border-right: none;
  background: none; font: inherit; color: inherit; cursor: pointer;
}
.nrr-comm-ds button.ds-row.hover:hover, .nrr-comm-ds button.nrr-comm-kam-row:hover { background: var(--green-soft); }
.nrr-comm-ds .ds-stat-label { font-size: 13.5px; color: var(--ink2); }
.nrr-comm-ds .ds-stat-value { font-family: var(--font-num); font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--ink); }

/* ── Tier achievement (Sense hit/bonus/miss pattern, Fresh Canvas tokens —
   2026-07-09 redesign). A SECOND status axis from the est/draft/final
   stamp: that says "is this locked yet", this says "did the tier land". */
.nrr-comm-ds .nrr-comm-tier-block { margin: 14px 0 20px; }
.nrr-comm-ds .nrr-comm-tier-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.nrr-comm-ds .nrr-comm-tier-chip {
  display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.03em; padding: 3px 10px; border-radius: var(--r-pill);
}
.nrr-comm-ds .nrr-comm-tier-chip.hit { background: var(--green-soft); color: var(--green-deep); }
.nrr-comm-ds .nrr-comm-tier-chip.bonus { background: var(--sun-soft); color: var(--sun-deep); }
.nrr-comm-ds .nrr-comm-tier-chip.miss { background: var(--coral-soft); color: var(--coral); }
.nrr-comm-ds .nrr-comm-progress { height: 6px; border-radius: var(--r-pill); background: var(--fill-deep); overflow: hidden; margin-bottom: 8px; }
.nrr-comm-ds .nrr-comm-progress-fill { height: 100%; background: var(--green); border-radius: var(--r-pill); transition: width 0.3s ease; }
.nrr-comm-ds .nrr-comm-next-step { font-size: 13px; color: var(--ink2); }

/* ── Compact tier indicator for the summary rows (row list + KAM-in-team
   list) — same chip, a thinner progress bar, no next-step text (that's
   drawer-only detail; the row just needs a glanceable status). ── */
.nrr-comm-ds .nrr-comm-tier-mini { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.nrr-comm-ds .nrr-comm-tier-mini .nrr-comm-progress { flex: 1; max-width: 90px; height: 4px; margin-bottom: 0; }
.nrr-comm-ds .nrr-comm-tier-mini .nrr-comm-tier-chip { font-size: 10.5px; padding: 2px 8px; }

/* ── Receipt — the running-total "why is my number this" statement.
   v16 layout: FOUR fixed columns on every line —
     [chevron 16px][operator 20px][label · flex 1, LEFT][amount · right]
   — the operator (+/×) is its own column so labels start at the same x on
   every line (fixes the v15 bug where flex space-between floated labels
   toward the center). Line hierarchy is carried by weight/color at
   >=13.5px real-content sizes, never by shrinking text. Expandable lines
   use the native <details> idiom (.nrr-acct-group precedent). ── */
.nrr-comm-ds .nrr-comm-receipt { margin: 4px 0 20px; max-width: 560px; }
.nrr-comm-ds .nrr-comm-receipt-line,
.nrr-comm-ds details.nrr-comm-receipt-line > summary {
  display: grid; grid-template-columns: 16px 20px minmax(0, 1fr) auto;
  align-items: baseline; gap: 2px;
  padding: 8px 0 8px 11px; font-size: 14px; color: var(--ink);
  border-left: 3px solid transparent; border-radius: 1px;
}
/* Round 5: commission-type color cue — a slim left accent per component
   line (transparent by default so every line stays aligned). */
.nrr-comm-ds .nrr-comm-receipt-line[data-comm-type="nrr"],
.nrr-comm-ds details.nrr-comm-receipt-line[data-comm-type="nrr"] > summary { border-left-color: var(--comm-nrr); }
.nrr-comm-ds .nrr-comm-receipt-line[data-comm-type="p1"],
.nrr-comm-ds details.nrr-comm-receipt-line[data-comm-type="p1"] > summary { border-left-color: var(--comm-p1); }
.nrr-comm-ds .nrr-comm-receipt-line[data-comm-type="p3"],
.nrr-comm-ds details.nrr-comm-receipt-line[data-comm-type="p3"] > summary { border-left-color: var(--comm-p3); }
.nrr-comm-ds .nrr-comm-receipt-line[data-comm-type="expansion"],
.nrr-comm-ds details.nrr-comm-receipt-line[data-comm-type="expansion"] > summary { border-left-color: var(--comm-expansion); }
.nrr-comm-ds .nrr-comm-receipt-line[data-comm-type="handover"],
.nrr-comm-ds details.nrr-comm-receipt-line[data-comm-type="handover"] > summary { border-left-color: var(--comm-handover); }
.nrr-comm-ds .nrr-rcpt-chev { color: var(--ink3); transition: transform 0.15s ease; transform-origin: 40% 50%; }
.nrr-comm-ds .nrr-rcpt-op { color: var(--ink2); font-family: var(--font-num); font-weight: 700; }
.nrr-comm-ds .nrr-rcpt-label { min-width: 0; }
.nrr-comm-ds .nrr-rcpt-meta { color: var(--ink2); font-size: 13px; margin-left: 6px; }
.nrr-comm-ds .nrr-rcpt-amt { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
.nrr-comm-ds .nrr-comm-receipt-line.op,
.nrr-comm-ds details.nrr-comm-receipt-line.op > summary { color: var(--ink2); }
.nrr-comm-ds .nrr-comm-receipt-line.subtotal { color: var(--ink2); font-size: 13.5px; }
.nrr-comm-ds .nrr-comm-receipt-line.total { font-size: 17px; font-weight: 700; color: var(--green-deep); padding-top: 10px; }
.nrr-comm-ds .nrr-comm-receipt-rule { border-top: 1px solid var(--line); margin-top: 4px; }
.nrr-comm-ds .nrr-comm-receipt-rule.total { border-top: 1.5px solid var(--ink); margin-top: 8px; }
.nrr-comm-ds details.nrr-comm-receipt-line { display: block; padding: 0; }
.nrr-comm-ds details.nrr-comm-receipt-line > summary { cursor: pointer; list-style: none; }
.nrr-comm-ds details.nrr-comm-receipt-line > summary::-webkit-details-marker { display: none; }
.nrr-comm-ds details.nrr-comm-receipt-line[open] > summary .nrr-rcpt-chev { transform: rotate(90deg); }
.nrr-comm-ds .nrr-comm-receipt-detail { padding: 2px 0 12px 36px; border-left: 2px solid var(--line); margin-left: 7px; }
/* One-line rule note inside a drill (e.g. "P1/P3 นับเฉพาะร้านนอกกลุ่ม
   Expansion") — real content, so .meta treatment (13px ink2), not micro. */
.nrr-comm-ds .nrr-rcpt-note { font-size: 13px; color: var(--ink2); padding: 4px 0 8px; }

/* ── ghost button (drill-down link) — pill, page chip language ── */
.nrr-comm-ds .ds-btn {
  display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px;
  border-radius: var(--r-pill); font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  border: 1px solid var(--line); cursor: pointer; background: var(--bg); color: var(--green-deep);
  transition: background 140ms ease; margin-top: 8px;
}
.nrr-comm-ds .ds-btn-ghost:hover { background: var(--green-soft); }

/* ── empty state — unscoped (2026-07-09): was `.nrr-comm-ds .ds-empty`,
   but .ds-empty/.ds-skel are used all over nrr_view.js (Portfolio's
   filtered-list empty state, Account view's not-found state, signal
   lists' "ไม่มีรายการ") outside the commission drawer wrapper, where the
   scoped rule silently didn't apply — rendering as unstyled plain text /
   a truly blank box with zero background, which on this mostly-white page
   read as "the page went blank." Same fix for both. ─────────────────── */
.ds-empty { display: flex; flex-direction: column; align-items: center; padding: 22px 16px; text-align: center; }
.ds-empty-icon { width: 26px; height: 26px; color: var(--ink3); margin-bottom: 8px; }
.ds-empty-title { font-size: 13.5px; font-weight: 600; color: var(--ink2); margin-bottom: 2px; }
.ds-empty-desc { font-size: 13px; color: var(--ink3); max-width: 300px; }

/* ── loading skeleton — unscoped, see .ds-empty comment above ── */
.ds-skel { background: linear-gradient(90deg, var(--fill) 25%, var(--fill-deep) 50%, var(--fill) 75%); background-size: 200% 100%; border-radius: var(--r-sm); animation: nrrCommSkelShimmer 1.5s infinite; height: 16px; }
@keyframes nrrCommSkelShimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

/* ── expand/collapse chevron (same language as .nrr-acct-group) ── */
.nrr-comm-ds details > summary { list-style: none; cursor: pointer; }
.nrr-comm-ds details > summary::-webkit-details-marker { display: none; }
.nrr-comm-ds .ds-chev { display: inline-block; font-size: 15px; color: var(--ink3); transition: transform 150ms ease; flex-shrink: 0; }
.nrr-comm-ds details[open] > summary .ds-chev { transform: rotate(90deg); }
.nrr-comm-ds .ds-row-detail { padding: 6px 0 16px 27px; }

/* ── drawer helpers ── */
.nrr-comm-ds .nrr-comm-drawer-section { margin-bottom: 26px; }
.nrr-comm-ds .nrr-comm-recon-note { font-size: 13px; color: var(--sun-deep); background: var(--sun-soft); border-radius: var(--r-sm); padding: 8px 12px; margin-top: 10px; }
.nrr-comm-ds .nrr-comm-note-dot { cursor: help; color: var(--sun-deep); font-size: 12px; font-family: var(--font-ui); }

/* ── tabs use the page's global .mode component (no custom styling) ──
   period dropdown: month-chip pill language */
.nrr-comm-ds .nrr-comm-fullhead { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.nrr-comm-ds .nrr-comm-period-select {
  height: 36px; padding: 0 14px; border-radius: var(--r-pill); border: 1px solid var(--line);
  background: var(--bg); font-family: var(--font-ui); font-size: 13.5px; font-weight: 600; color: var(--ink2);
}

/* ── signature #2: "statement" table — denser than .nrr-table because the
   job is auditing, not reading flow; hairlines only, no box wrapper ── */
.nrr-comm-ds .nrr-comm-fulltable-wrap { overflow-x: auto; margin-bottom: 10px; }
.nrr-comm-ds table.nrr-comm-fulltable { width: 100%; border-collapse: collapse; white-space: nowrap; }
.nrr-comm-ds table.nrr-comm-fulltable th {
  text-align: right; font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--ink3); padding: 8px 10px; border-bottom: 1px solid var(--line); user-select: none;
}
.nrr-comm-ds table.nrr-comm-fulltable th:first-child { text-align: left; padding-left: 0; }
.nrr-comm-ds table.nrr-comm-fulltable td {
  text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top;
  font-family: var(--font-num); font-size: 13px; font-variant-numeric: tabular-nums; color: var(--ink);
}
.nrr-comm-ds table.nrr-comm-fulltable td:first-child { text-align: left; padding-left: 0; font-family: var(--font-ui); font-size: 13.5px; font-weight: 600; }
.nrr-comm-ds table.nrr-comm-fulltable tr:last-child td { border-bottom: none; }
.nrr-comm-ds table.nrr-comm-fulltable tr.nrr-comm-total-row td { border-top: 1.5px solid var(--ink); border-bottom: none; font-weight: 700; }
.nrr-comm-ds .nrr-comm-cell-meta { font-size: 11px; font-weight: 400; font-family: var(--font-ui); color: var(--ink3); margin-top: 1px; }

/* ── signature #3: money rendering — จำนวนเงินจริงเขียวเข้ม, ศูนย์จาง ── */
.nrr-comm-ds table.nrr-comm-fulltable td b { font-weight: 700; color: var(--green-deep); }
.nrr-comm-ds .nrr-comm-zero { color: var(--ink3); font-weight: 400; }
.nrr-comm-ds .nrr-comm-final { font-weight: 700; color: var(--green-deep); background: var(--green-soft); }
.nrr-comm-ds .nrr-comm-gate-0, .nrr-comm-ds .nrr-comm-gate-mid, .nrr-comm-ds .nrr-comm-gate-full {
  display: inline-block; border-radius: var(--r-pill); padding: 2px 9px; font-weight: 700; font-size: 12px;
}
.nrr-comm-ds .nrr-comm-gate-0    { background: var(--coral-soft); color: var(--coral); }
.nrr-comm-ds .nrr-comm-gate-mid  { background: var(--sun-soft);   color: var(--sun-deep); }
.nrr-comm-ds .nrr-comm-gate-full { background: var(--green-soft); color: var(--green-deep); }

/* ── Slide-over (640px, 3 modes) ──────────────────────────────────────── */
#nrr-slideover-backdrop {
  position: fixed; inset: 0; background: rgba(16, 21, 18, 0.45); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity 220ms ease;
}
#nrr-slideover-backdrop.on { opacity: 1; pointer-events: auto; }
#nrr-slideover {
  position: fixed; top: 0; right: 0; height: 100%; width: 640px; max-width: 92vw;
  z-index: 201; transform: translateX(105%);
  transition: transform 380ms cubic-bezier(0.34, 1.2, 0.64, 1);
  display: flex; flex-direction: column;
  border-radius: 20px 0 0 20px; /* v7: rounded leading edge like the mockup sheet */
}
#nrr-slideover.on { transform: translateX(0); }
/* v7 mockup-parity sheet header: 19px title, meta line, round hover-circle ✕ */
.nrr-slideover-head { padding: 22px 24px 8px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.nrr-sh-title { font-size: 19px; font-weight: 700; line-height: 1.35; }
.nrr-sh-close {
  width: 32px; height: 32px; border-radius: 999px; border: none; background: transparent;
  font-size: 15px; color: var(--ink2); cursor: pointer; flex: none;
  display: flex; align-items: center; justify-content: center;
  transition: background 140ms ease;
}
.nrr-sh-close:hover { background: rgba(22, 26, 22, 0.06); }
.nrr-slideover-body { flex: 1; overflow-y: auto; padding: 6px 24px 24px; }

/* ── Search + chips — v7 mockup-parity: borderless fill input, Cabbage
   focus ring (pale fill is allowed ONLY on interactive controls) ─────── */
.nrr-search {
  padding: 10px 15px; border-radius: 12px; border: none;
  background: rgba(22, 26, 22, 0.05); color: var(--ink);
  font-family: var(--font-ui); font-size: 13.5px; min-width: 180px;
  transition: background 140ms ease, box-shadow 140ms ease;
}
.nrr-search:focus { outline: none; background: #fff; box-shadow: 0 0 0 2px var(--green); }
.nrr-chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
/* v6: filter/sort is a deliberate action, not a permanent fixture — a
   border-only pill (like an iOS filter trigger) instead of a filled chip
   that competes visually with real data everywhere it appears. */
.nrr-chip {
  padding: 7px 14px; border-radius: var(--r-pill); border: 1px solid var(--line);
  background: transparent; color: var(--ink2); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
}
.nrr-chip:hover { border-color: var(--ink3); }
.nrr-chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── Movement tag classes (categorical palette) ───────────────────────── */
.tag.mv-green-lt { background: var(--mv-green-lt-soft); color: #2e7d55; }
.tag.mv-teal { background: var(--mv-teal-soft); color: var(--mv-teal); }
.tag.mv-violet { background: var(--mv-violet-soft); color: var(--mv-violet); }
.tag.mv-slate { background: var(--mv-slate-soft); color: #5a687e; }
.tag.mv-clay { background: var(--mv-clay-soft); color: var(--mv-clay); }

/* v5: movement view switcher */
.nrr-mv-switch { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.nrr-mv-switch select { max-width: 220px; }
select.nrr-search { appearance: auto; cursor: pointer; }

/* Footer + skeleton */
.nrr-footnote { font-size: 12.5px; color: var(--ink2); line-height: 1.7; }
.nrr-skel { background: linear-gradient(90deg, var(--fill) 25%, var(--fill-deep) 37%, var(--fill) 63%); background-size: 400% 100%; animation: nrrShimmer 1.4s ease infinite; border-radius: 8px; }
@keyframes nrrShimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0 50%; } }

/* ══ Account view (Phase C, 2026-07-09) ═══════════════════════════════════
   Reuses the app's existing visual language throughout — .nrr-triple-lg's
   hairline-cell pattern (not filled boxes, see the "boxes everywhere" note
   at the top of nrr_base.css), .ds-row for signal rows, .float for the
   floating tooltip, #nrr-slideover (unchanged) for stat-cell detail. */

.nrr-acct-mast { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.nrr-acct-back {
  width: 30px; height: 30px; border-radius: 50%; background: none; border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center; color: var(--ink2); flex-shrink: 0;
  text-decoration: none; transition: border-color 140ms ease;
}
.nrr-acct-back:hover { border-color: var(--ink3); }
.nrr-acct-type-chip { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: var(--r-pill); border: 1px solid var(--line); color: var(--ink2); margin-left: 6px; text-transform: none; letter-spacing: 0; }

/* ── Hero: MTD headline + linear pace bar + 6-month trend chart ────────── */
.nrr-acct-hero { margin-bottom: 6px; }
.nrr-acct-hero-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
.nrr-acct-hero-num { font-size: 32px; font-weight: 700; line-height: 1; }
.nrr-acct-hero-side { text-align: right; flex-shrink: 0; }
.nrr-acct-hero-side-v { font-size: 15px; font-weight: 700; }

.nrr-acct-pace-row { display: flex; align-items: center; gap: 12px; padding: 14px 0 12px; }
.nrr-acct-pace-track { flex: 1; position: relative; height: 9px; border-radius: var(--r-pill); background: var(--fill-deep); }
.nrr-acct-pace-fill { position: absolute; inset: 0; border-radius: var(--r-pill); }
.nrr-acct-pace-expect { position: absolute; top: -4px; bottom: -4px; width: 2.5px; background: var(--ink); border-radius: 1px; }

/* v40: no fixed height on the outer container (that caused columns to
   overflow up into the pace bar) — height lives on .nrr-acct-trend-bar-track
   only, set inline. Natural-height outer + a normal top margin cleanly
   separates the chart from the pace bar above. */
.nrr-acct-trend { display: flex; align-items: flex-end; gap: 12px; margin: 24px 0 0; padding: 0 2px; }
.nrr-acct-trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; background: none; padding: 0; font-family: var(--font-ui); }
.nrr-acct-trend-caps { display: flex; flex-direction: column; align-items: center; margin-bottom: 6px; line-height: 1.2; }
.nrr-acct-trend-val { font-size: 11.5px; font-weight: 700; color: var(--ink2); white-space: nowrap; font-variant-numeric: tabular-nums; }
.nrr-acct-trend-col.current .nrr-acct-trend-val { color: var(--green-deep); }
.nrr-acct-trend-val2 { font-size: 10px; font-weight: 600; color: var(--ink3); white-space: nowrap; font-variant-numeric: tabular-nums; }
.nrr-acct-trend-col.sel .nrr-acct-trend-val { color: var(--ink); }
/* Rendered (invisible) on EVERY column, not just the base month — see
   nrrRenderAccountTrendChart's comment. .nrr-acct-trend uses align-items:
   flex-end with no fixed column height, so if only the base column had
   this extra line its taller box would get pushed up to keep bottoms
   level, visually shifting its number/bar. visibility (not display, which
   would remove the reserved space back; not opacity, which would still
   expose the hidden text to screen readers) keeps every column's height
   identical while only actually showing the tag on .base. */
.nrr-acct-trend-basetag { display: block; visibility: hidden; font-size: 8.5px; font-weight: 700; letter-spacing: .03em; color: var(--ink3); margin-top: 1px; }
.nrr-acct-trend-col.base .nrr-acct-trend-basetag { visibility: visible; }
.nrr-acct-trend-col.base .nrr-acct-trend-lbl { font-weight: 700; color: var(--ink2); }
@media (max-width: 640px) { .nrr-acct-trend-val { font-size: 9.5px; } .nrr-acct-trend-val2 { font-size: 8.5px; } .nrr-acct-trend { gap: 6px; } }
.nrr-acct-trend-bar-track { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; border-radius: 4px 4px 1px 1px; overflow: hidden; }
/* Closed-month bars are real GMV, not "no data" — must not use --fill-deep
   (the app-wide "empty/unknown" neutral, same reasoning as category
   coverage's faded-not-gray rule). Muted green at the .nrr-spark-seg
   opacity precedent (0.55); current/selected months bump to full color
   via inline style / .sel below. */
.nrr-acct-trend-bar { width: 100%; background: var(--green); opacity: .5; transition: background 140ms ease, opacity 140ms ease; }
.nrr-acct-trend-col.sel .nrr-acct-trend-bar { opacity: .8; }
.nrr-acct-trend-lbl { font-size: 10.5px; color: var(--ink3); margin-top: 6px; font-weight: 600; white-space: nowrap; }
.nrr-acct-trend-col.sel .nrr-acct-trend-lbl { color: var(--ink); }
.nrr-acct-trend-summary { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0 0; border-top: 1px solid var(--line); margin-top: 14px; font-size: 12.5px; color: var(--ink2); }
.nrr-acct-trend-amt { font-size: 14px; font-weight: 700; color: var(--ink); }
.nrr-acct-trend-amt-sub { font-size: 12px; font-weight: 600; color: var(--ink3); }

/* ── Stat row — 4 hairline cells, .nrr-triple-lg's own pattern. Made more
   prominent per feedback via a colored top-accent strip (status-coded per
   cell, not decoration) + bigger numbers — still no background fill, so
   it stays in the app's "hairline, not boxes" language. */
.nrr-acct-stat-row { display: flex; margin-top: 24px; }
.nrr-acct-stat-cell {
  flex: 1; padding: 14px 18px 16px; border-left: 1px solid var(--line); border-right: none; border-bottom: none;
  border-top: 3px solid var(--ink3);
  text-align: left; background: none; cursor: pointer; font-family: var(--font-ui); color: var(--ink);
  display: flex; flex-direction: column; gap: 6px; transition: background 140ms ease;
}
.nrr-acct-stat-cell:first-child { border-left: none; }
.nrr-acct-stat-cell:hover { background: var(--fill); }
.nrr-acct-stat-lbl { font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--ink3); display: flex; justify-content: space-between; text-transform: uppercase; }
.nrr-acct-stat-val { font-size: 21px; font-weight: 800; line-height: 1.1; letter-spacing: -0.01em; }
.nrr-acct-stat-sub { font-size: 11px; color: var(--ink2); line-height: 1.35; }
.nrr-acct-spark-svg { width: 100%; height: 18px; }
.nrr-acct-outlet-dots { display: flex; gap: 4px; flex-wrap: wrap; }
.nrr-acct-outlet-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: block; }
/* "new" needs its own visual weight, not just a different hue lost among
   many small dots — ring + slightly larger so it reads as "look here"
   at a glance, not just a color someone has to decode. */
.nrr-acct-outlet-dots span.new { width: 8px; height: 8px; background: var(--sun); box-shadow: 0 0 0 2px var(--sun-soft), 0 0 0 3px var(--sun); margin: 0 1px; }
.nrr-acct-outlet-dots span.quiet { background: var(--coral); opacity: .6; }
.nrr-acct-outlet-stack, .nrr-acct-price-div { display: flex; height: 8px; border-radius: var(--r-pill); overflow: hidden; }
.nrr-acct-outlet-stack i, .nrr-acct-price-div i { display: block; height: 100%; }
.nrr-acct-cat-swatches { display: flex; gap: 3px; flex-wrap: wrap; }
.nrr-acct-cat-swatches i { width: 9px; height: 9px; border-radius: 2px; display: block; }
@media (max-width: 640px) {
  .nrr-acct-stat-row { flex-wrap: wrap; }
  .nrr-acct-stat-cell { flex: 1 1 50%; }
  .nrr-acct-stat-cell:nth-child(odd) { border-left: none; }
}

/* ── Net verdict — two soft-tint headline blocks (Round 5, 2026-07-09).
   A deliberate exception to the app's "no fills" rule for these two
   summary totals only: the user wanted them clearly MORE prominent than,
   and visually distinct from, the thin left-border signal rows below.
   Tint + big number does that without turning the whole page boxy. */
.nrr-acct-net { display: flex; gap: 12px; margin-top: 22px; }
.nrr-acct-net-block { flex: 1; padding: 14px 16px; border-radius: var(--r-md); }
.nrr-acct-net-block.up { background: var(--green-soft); }
.nrr-acct-net-block.down { background: var(--coral-soft); }
.nrr-acct-net-hd { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; }
.nrr-acct-net-block.up .nrr-acct-net-hd { color: var(--green-deep); }
.nrr-acct-net-block.down .nrr-acct-net-hd { color: var(--coral); }
.nrr-acct-net-tri { font-size: 10px; }
.nrr-acct-net-amt { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; margin: 6px 0 2px; }
.nrr-acct-net-block.up .nrr-acct-net-amt { color: var(--green-deep); }
.nrr-acct-net-block.down .nrr-acct-net-amt { color: var(--coral); }
.nrr-acct-net-sub { font-size: 12px; color: var(--ink2); }
@media (max-width: 480px) { .nrr-acct-net { flex-direction: column; } }

/* ── Signal lists — always single column (2-col was tried and reverted:
   user feedback 2026-07-09 said the side-by-side split made the two
   lists harder to scan, not easier — a single ranked list per section
   reads better even when it runs long). ─────────────────────────────── */
.nrr-acct-signal-cols { display: flex; flex-direction: column; margin-top: 26px; gap: 28px; }
.nrr-acct-signal-title.pos { color: var(--green-deep); }
.nrr-acct-signal-title.watch { color: var(--sun-deep); }

/* Each SKU is its own clickable row (tap anywhere → outlet breakdown,
   not a separate button) — colored left border repeats the badge color
   as a scan cue down the list, same motif as Portfolio's .nrr-acct-row
   pace border. Generous padding + hairline separation gives each row
   room to breathe without becoming a filled "box" (still just a border,
   no background fill by default — see nrr_base.css's "boxes everywhere"
   warning). */
.nrr-acct-sig-row {
  display: flex; align-items: center; gap: 14px; width: 100%;
  border: none; border-left: 3px solid var(--ink3); border-bottom: 1px solid var(--line);
  background: none; text-align: left; cursor: pointer; font-family: var(--font-ui); color: var(--ink);
  padding: 13px 6px 13px 13px; transition: background 140ms ease;
}
.nrr-acct-sig-row:hover { background: var(--fill); }
.nrr-acct-sig-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.nrr-acct-sig-name { font-size: 14.5px; font-weight: 600; line-height: 1.4; }
.nrr-acct-sig-line2 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.nrr-acct-sig-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: var(--r-pill); flex-shrink: 0; white-space: nowrap; }
.nrr-acct-sig-badge.new, .nrr-acct-sig-badge.growing { background: var(--green-soft); color: var(--green-deep); }
.nrr-acct-sig-badge.near { background: var(--sun-soft); color: var(--sun-deep); }
.nrr-acct-sig-badge.gone { background: var(--coral-soft); color: var(--coral); }
.nrr-acct-sig-meta { font-size: 12px; color: var(--ink2); }
.nrr-acct-sig-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; min-width: 78px; }
.nrr-acct-sig-amt { font-size: 15px; font-weight: 700; }
.nrr-acct-sig-unit { font-size: 10px; font-weight: 600; color: var(--ink3); }
.nrr-acct-sig-chev { color: var(--ink3); font-size: 16px; flex-shrink: 0; }
