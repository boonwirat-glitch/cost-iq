// ── Format helpers ────────────────────────────────────────────────────
function nrrFmtGMV(v) {
  if (v == null || isNaN(v)) return '—';
  var neg = v < 0; v = Math.abs(v);
  var s;
  if (v >= 1e6) s = '฿' + (v / 1e6).toFixed(1) + 'M';
  else if (v >= 1e3) s = '฿' + Math.round(v / 1e3) + 'K';
  else s = '฿' + Math.round(v).toLocaleString();
  return neg ? '-' + s : s;
}
window.nrrFmtGMV = nrrFmtGMV;

function nrrFmtPct(v) { return v != null ? v + '%' : '—'; }
window.nrrFmtPct = nrrFmtPct;

function nrrFmtDelta(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v + 'pp';
}
window.nrrFmtDelta = nrrFmtDelta;

// ── CountUp — cubic ease-out, ported from src/06_portview_teamview.js ──
function nrrCountUp(el, target, duration, formatter) {
  duration = duration || 900;
  formatter = formatter || function (n) { return Math.round(n).toLocaleString(); };
  if (!el) return;
  if (target === 0) { el.textContent = formatter(0); return; }
  var start = performance.now();
  var startVal = 0;
  function tick(t) {
    var p = Math.min((t - start) / duration, 1);
    var eased = 1 - Math.pow(1 - p, 3);
    el.textContent = formatter(startVal + eased * (target - startVal));
    if (p < 1) requestAnimationFrame(tick);
    else {
      el.classList.add('nrr-pop');
      setTimeout(function () { el.classList.remove('nrr-pop'); }, 420);
    }
  }
  requestAnimationFrame(tick);
}
window.nrrCountUp = nrrCountUp;
</script>
<script>
// ── nrr_aggregate.js — org / team / KAM / outlet rollups ─────────────────
// All rollups are computed client-side from the single flat CSV, by calling
// the ported _qnrrCompute (nrr_logic.js) at the appropriate scope — never
// by re-filtering/re-classifying rows independently, so movement badges
// shown anywhere in the UI always agree with the totals in the sections
// above them.
//
// Deliberate scope choice (see plan notes): a KAM's own %NRR shown in the
// Team -> KAM drill-down is computed at scope='kam' (their personal number,
// identical to what they see in Sense). The movement badges on the outlets
// listed under that KAM use scope='tl' (the enclosing team's lens) so the
// colors/categories reconcile with the team-level movement breakdown above.
// At the KAM -> Outlet level, everything switches to that KAM's own
// scope='kam' lens (inspecting one person's book on its own terms).

function nrrCurrentPeriod(result) {
  if (!result || !result.months || !result.months.length) return null;
  // Prefer the latest month that actually has row data; QNRR_CFG.q_months
  // may list months that haven't started yet (e.g. Aug/Sep before they
  // occur) — result.months only contains months present in the CSV.
  return result.months[result.months.length - 1];
}
window.nrrCurrentPeriod = nrrCurrentPeriod;

function nrrOrgResult() {
  return _qnrrCompute(null, 'admin');
}
window.nrrOrgResult = nrrOrgResult;

function nrrTeamResult(tlEmail) {
  return _qnrrCompute(tlEmail, 'tl');
}
window.nrrTeamResult = nrrTeamResult;

function nrrKamResult(kamEmail) {
  return _qnrrCompute(kamEmail, 'kam');
}
window.nrrKamResult = nrrKamResult;

// Cross-team comparison rows for section 3 (admin only), sorted by %NRR desc.
function nrrTeamComparison() {
  var teams = nrrListTeams();
  var org = nrrOrgResult();
  var orgPeriod = nrrCurrentPeriod(org);
  var orgPct = org && orgPeriod ? org.by_month[orgPeriod].nrr_pct : null;

  var rows = teams.map(function (t) {
    var result = nrrTeamResult(t.email);
    var period = nrrCurrentPeriod(result);
    var bm = result && period ? result.by_month[period] : null;
    var outletCount = 0;
    if (bm) {
      ['core_nrr', 'core_nrr_churn', 'comeback', 'transfer_in'].forEach(function (m) {
        outletCount += bm.outlets[m] || 0;
      });
    }
    return {
      tl_email: t.email,
      tl_name: t.name,
      nrr_pct: bm ? bm.nrr_pct : null,
      base_gmv: result ? Math.round(result.base_norm * 30) : 0,
      outlet_count: outletCount,
      delta_vs_org: (bm && bm.nrr_pct != null && orgPct != null) ? bm.nrr_pct - orgPct : null,
      period: period,
      result: result
    };
  }).filter(function (r) { return r.result; });

  rows.sort(function (a, b) {
    if (a.nrr_pct == null) return 1;
    if (b.nrr_pct == null) return -1;
    return b.nrr_pct - a.nrr_pct;
  });
  return { org_pct: orgPct, org_period: orgPeriod, org_result: org, rows: rows };
}
window.nrrTeamComparison = nrrTeamComparison;

// Movement breakdown (counts + GMV) for a given compute result + period —
// feeds section 4 (org-level or per-team).
function nrrMovementBreakdown(result, period) {
  var MOVEMENTS = ['core_nrr', 'core_nrr_churn', 'comeback', 'transfer_in', 'transfer_out', 'handover', 'expansion'];
  if (!result || !period || !result.by_month[period]) {
    return MOVEMENTS.map(function (m) { return { type: m, outlets: 0, gmv: 0 }; });
  }
  var bm = result.by_month[period];
  return MOVEMENTS.map(function (m) {
    return { type: m, outlets: bm.outlets[m] || 0, gmv: bm.segments[m] || 0 };
  });
}
window.nrrMovementBreakdown = nrrMovementBreakdown;

// Team -> KAM drill-down rows (section 6).
function nrrKamRowsForTeam(tlEmail, period) {
  var kams = nrrListKamsForTeam(tlEmail);
  return kams.map(function (k) {
    var kamResult = nrrKamResult(k.email);
    var kamPeriod = period && kamResult && kamResult.by_month[period] ? period : nrrCurrentPeriod(kamResult);
    var bm = kamResult && kamPeriod ? kamResult.by_month[kamPeriod] : null;

    // Outlet rows for this KAM within this team, classified under the
    // TEAM's scope lens (scope='tl', myTlEmail=tlEmail) so badges reconcile
    // with the team-level movement breakdown shown above this table.
    var qd = window.bulkQnrrData;
    var rawRows = ((qd && qd.byKamEmail[k.email]) || []).filter(function (r) {
      return r.period_month === kamPeriod;
    });
    var outlets = rawRows.map(function (r) {
      return { row: r, movement: nrrClassifyRow(r, 'tl', tlEmail) };
    }).filter(function (o) { return o.movement; });

    return {
      kam_email: k.email,
      kam_name: k.name,
      nrr_pct: bm ? bm.nrr_pct : null,
      base_gmv: kamResult ? Math.round(kamResult.base_norm * 30) : 0,
      outlet_count: outlets.length,
      period: kamPeriod,
      outlets: outlets
    };
  }).sort(function (a, b) {
    if (a.nrr_pct == null) return 1;
    if (b.nrr_pct == null) return -1;
    return b.nrr_pct - a.nrr_pct;
  });
}
window.nrrKamRowsForTeam = nrrKamRowsForTeam;

// KAM -> Outlet drill-down rows (section 7) — that KAM's own scope='kam' lens.
function nrrOutletsForKam(kamEmail, period) {
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return [];
  var myTlEmail = '';
  var kamRows = qd.byKamEmail[kamEmail] || [];
  var withTl = kamRows.find(function (r) { return r.latest_tl_email; });
  if (withTl) myTlEmail = withTl.latest_tl_email;

  return kamRows
    .filter(function (r) { return r.period_month === period; })
    .map(function (r) {
      var mv = nrrClassifyRow(r, 'kam', myTlEmail);
      return { row: r, movement: mv };
    })
    .filter(function (o) { return o.movement; })
    .sort(function (a, b) { return (b.row.curr_gmv || 0) - (a.row.curr_gmv || 0); });
}
window.nrrOutletsForKam = nrrOutletsForKam;

// ── v4: number-triple accessor ───────────────────────────────────────────
// {base, mtd, run_rate, curr_days, days_in_month, is_partial} for one month
// of a compute result (works for both _qnrrCompute and nrrComputeBucket
// shapes — both carry by_month with rows/total_gmv/curr_days/is_partial).
// MTD = sum of raw curr_gmv over the same movement set total_gmv counts
// (everything except transfer_out/churn, whose "gmv" is base-side) — summed
// raw, NOT derived from total_gmv×days/30, so it's exact per-row.
function nrrMonthTriple(result, month) {
  if (!result || !month || !result.by_month || !result.by_month[month]) return null;
  var bm = result.by_month[month];
  var mtd = 0;
  (bm.rows || []).forEach(function (r) {
    var mv = r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0
      ? 'core_nrr_churn' : r.movement_type;
    if (mv === 'core_nrr_churn' || mv === 'transfer_out') return;
    mtd += parseFloat(r.curr_gmv) || 0;
  });
  return {
    base: Math.round(result.base_norm * 30),
    mtd: Math.round(mtd),
    run_rate: Math.round(bm.total_gmv || 0),
    curr_days: bm.curr_days,
    days_in_month: bm.days_in_month || 30,
    is_partial: !!bm.is_partial
  };
}
window.nrrMonthTriple = nrrMonthTriple;

// ── v4: outlets behind one movement number (the "why" drill) ─────────────
// scopeCtx: {scope:'tl'|'admin'|'kam', tlEmail} for rep-view results, or
// {scope:'bucket'} for PM/Admin bucket results (bucket rows are already
// pre-filtered; only the churn reclassification applies there).
function nrrOutletsForMovement(result, month, movementType, scopeCtx) {
  if (!result || !result.by_month || !result.by_month[month]) return [];
  var rows = result.by_month[month].rows || [];
  var out = [];
  rows.forEach(function (r) {
    var mv;
    if (scopeCtx && scopeCtx.scope === 'bucket') {
      mv = (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0)
        ? 'core_nrr_churn' : r.movement_type;
    } else {
      mv = nrrClassifyRow(r, (scopeCtx && scopeCtx.scope) || 'admin', (scopeCtx && scopeCtx.tlEmail) || '');
    }
    if (mv === movementType) out.push({ row: r, movement: mv });
  });
  // Churn/transfer_out sort by LOST base value (that's the pain being
  // inspected); everything else by current run-rate value.
  var negative = movementType === 'core_nrr_churn' || movementType === 'transfer_out';
  out.sort(function (a, b) {
    return negative
      ? (b.row.base_gmv || 0) - (a.row.base_gmv || 0)
      : (b.row.curr_gmv || 0) - (a.row.curr_gmv || 0);
  });
  return out;
}
window.nrrOutletsForMovement = nrrOutletsForMovement;

// ── v4: whole-team outlet browse ─────────────────────────────────────────
// Same scope='tl' lens as nrrKamRowsForTeam, so totals reconcile with the
// KAM table by construction.
function nrrOutletsForTeam(tlEmail, period) {
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return [];
  return (qd.byTlEmail[tlEmail] || [])
    .filter(function (r) { return r.period_month === period; })
    .map(function (r) {
      return { row: r, movement: nrrClassifyRow(r, 'tl', tlEmail) };
    })
    .filter(function (o) { return o.movement; })
    .sort(function (a, b) { return (b.row.curr_gmv || 0) - (a.row.curr_gmv || 0); });
}
window.nrrOutletsForTeam = nrrOutletsForTeam;

// Group outlet-drill-down rows by account_id — adapted from the proven
// _olGroupByAccount pattern in src/10_sales_view.js:390-406 (1 company can
// have many branches, e.g. Cafe Amazon PTT = 275 outlets under one
// account_id). Groups sorted by total curr_gmv desc, branches within a
// group sorted the same way (kept from nrrOutletsForKam's own sort).
function nrrGroupOutletsByAccount(outlets) {
  var groups = {}; // account_id -> {account_id, account_name, outlets:[], total_curr_gmv, total_base_gmv}
  outlets.forEach(function (o) {
    var key = o.row.account_id || o.row.account_name || 'unknown';
    if (!groups[key]) {
      groups[key] = {
        account_id: key,
        account_name: o.row.account_name || key,
        outlets: [],
        total_curr_gmv: 0,
        total_base_gmv: 0,
        total_run_rate: 0,
        curr_days: 30
      };
    }
    groups[key].outlets.push(o);
    groups[key].total_curr_gmv += o.row.curr_gmv || 0;
    groups[key].total_base_gmv += o.row.base_gmv || 0;
    var gd = parseFloat(o.row.curr_days) || 30;
    groups[key].curr_days = gd;
    groups[key].total_run_rate += gd > 0 ? (o.row.curr_gmv || 0) / gd * 30 : 0;
  });
  return Object.values(groups).sort(function (a, b) { return b.total_curr_gmv - a.total_curr_gmv; });
}
window.nrrGroupOutletsByAccount = nrrGroupOutletsByAccount;

// ── PM / Admin portfolio-level rollups (3-level view: KAM / PM / Admin) ──
// PM/Admin data has no TL/KAM attribution column at all (see nrr_data.js
// header comment) — the user confirmed the intended mapping: a TL's "own"
// slice of PM/Admin is whichever account_type bucket that TL's KAM book is
// primarily made of. Manually configured per the user's explicit answer
// (2026-07-07) — update this map if team composition changes; there is no
// way to derive it from the data itself.
var TL_BUCKET_MAP = {
  'nitipat.s@freshket.co': 'chain',   // TL "Name" — Chain-primary portfolio
  'pavarisa.mu@freshket.co': 'sa_mc'  // TL "Ploy" — SA/MC-primary portfolio
};
window.TL_BUCKET_MAP = TL_BUCKET_MAP;

function nrrBucketForTl(tlEmail) {
  return TL_BUCKET_MAP[tlEmail] || null;
}
window.nrrBucketForTl = nrrBucketForTl;

// {chain: computeResult|null, sa_mc: computeResult|null, other: computeResult|null}
function nrrPmResult() {
  var pd = window.bulkPmData;
  if (!pd || !pd.loaded) return null;
  return {
    chain: nrrComputeBucket(pd.allRows, 'chain'),
    sa_mc: nrrComputeBucket(pd.allRows, 'sa_mc'),

// ── v5: VP pooled result — ALL portfolios as one book ────────────────────
// Same formula as the buckets (nrrComputeRowsPool), no bucket filter.
function nrrVpResult() {
  var vd = window.bulkVpData;
  if (!vd || !vd.loaded || !vd.allRows.length) return null;
  return nrrComputeRowsPool(vd.allRows, 'vp');
}
window.nrrVpResult = nrrVpResult;

// ── v5: handover cohort model (replicates Sense's verified pattern) ──────
// movement_type already encodes the cohort split at the SQL level:
//   'handover'  = new_user_exp_date in the base month → "cohort มิ.ย."
//   'new_sales' = exp date during the quarter → one cohort per the FIRST
//                 period_month the outlet appears in (claim-dedup), with
//                 its GMV carried forward into later months.
// Returns:
// {
//   handover:    { by_month: {m: {gmv, outlets:[{row,movement}]}} },
//   new_cohorts: [ { cohort_month, by_month: {m: {gmv, outlets}} } ]  // non-empty only
// }
function nrrHandoverCohorts(result) {
  var model = { handover: { by_month: {} }, new_cohorts: [] };
  if (!result || !result.months) return model;

  result.months.forEach(function (month) {
    var bm = result.by_month[month];
    var outlets = (bm.rows || []).filter(function (r) { return r.movement_type === 'handover'; })
      .map(function (r) { return { row: r, movement: 'handover' }; });
    var gmv = outlets.reduce(function (s, o) {
      var d = parseFloat(o.row.curr_days) || 30;
      return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * 30 : 0);
    }, 0);
    model.handover.by_month[month] = { gmv: gmv, outlets: outlets };
  });

  // new_sales cohorts: claim each outlet into the first month it appears.
  var claimed = {}; // outlet_id -> cohort_month
  result.months.forEach(function (month) {
    (result.by_month[month].rows || []).forEach(function (r) {
      if (r.movement_type === 'new_sales' && !claimed[r.outlet_id]) claimed[r.outlet_id] = month;
    });
  });
  var cohortMonths = {};
  Object.keys(claimed).forEach(function (oid) { cohortMonths[claimed[oid]] = true; });

  Object.keys(cohortMonths).sort().forEach(function (cm) {
    var cohort = { cohort_month: cm, by_month: {} };
    result.months.forEach(function (month) {
      if (month < cm) { cohort.by_month[month] = null; return; } // "—" before cohort month
      var outlets = (result.by_month[month].rows || []).filter(function (r) {
        return r.movement_type === 'new_sales' && claimed[r.outlet_id] === cm;
      }).map(function (r) { return { row: r, movement: 'new_sales' }; });
      var gmv = outlets.reduce(function (s, o) {
        var d = parseFloat(o.row.curr_days) || 30;
        return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * 30 : 0);
      }, 0);
      cohort.by_month[month] = { gmv: gmv, outlets: outlets };
    });
    model.new_cohorts.push(cohort);
  });

  return model;
}
window.nrrHandoverCohorts = nrrHandoverCohorts;

// VP "Total Portfolio" — 3 separate %NRR (KAM/PM/Admin), never blended into
// one number (per user's explicit answer), plus one combined GMV figure.
function nrrTotalPortfolio() {
  var kam = nrrOrgResult();
  var kamPeriod = nrrCurrentPeriod(kam);
  var kamPct = kam && kamPeriod ? kam.by_month[kamPeriod].nrr_pct : null;
  var kamGmv = kam ? Math.round(kam.base_norm * 30) : 0;

  var pm = nrrPmResult();
  var pmPct = _nrrBlendedBucketPct(pm);
  var pmGmv = _nrrBlendedBucketGmv(pm);

  var admin = nrrAdminResult();
  var adminPct = _nrrBlendedBucketPct(admin);
  var adminGmv = _nrrBlendedBucketGmv(admin);

  return {
    kam: { pct: kamPct, gmv: kamGmv },
    pm: { pct: pmPct, gmv: pmGmv },
    admin: { pct: adminPct, gmv: adminGmv },
    total_gmv: kamGmv + pmGmv + adminGmv
  };
}
window.nrrTotalPortfolio = nrrTotalPortfolio;

// For a PM/Admin section's own headline %NRR (e.g. "PM overall"), blend its
// chain+sa_mc+other buckets back into one pooled numerator/denominator —
// this is a within-portfolio blend (chain+sa_mc are both still "PM"), not
// the KAM/PM/Admin cross-portfolio blend the user explicitly said NOT to do.
function _nrrBlendedBucketPct(bucketResult) {
  if (!bucketResult) return null;
  var buckets = ['chain', 'sa_mc', 'other'];
  var num = 0, den = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (!r) return;
    var period = nrrCurrentPeriod(r);
    var bm = period ? r.by_month[period] : null;
    if (!bm || bm.nrr_pct == null) return;
    den += r.base_norm;
    num += (bm.nrr_pct / 100) * r.base_norm;
  });
  return den > 0 ? Math.round(num / den * 100) : null;
}

function _nrrBlendedBucketGmv(bucketResult) {
  if (!bucketResult) return 0;
  var buckets = ['chain', 'sa_mc', 'other'];
  var total = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (r) total += Math.round(r.base_norm * 30);
  });
  return total;
}

<script>
// ── nrr_commission.js — commission $ tie-in ──────────────────────────────
// Deliberately does NOT re-implement _commBuildKamPayout/_commBuildTlPayout
// (src/07a_commission_engine.js) — that engine pulls in most of Sense's
// global state (bulkUpsellData, portviewBulkData, governance policy from
// Supabase, gate/cap rules...) and re-deriving it here would risk getting
// real payout numbers subtly wrong outside its native environment.
//
// Instead: query commission_payout_snapshots directly, the SAME table and
// SAME query shape src/dashboard/dash_commission.js already uses. These
// rows are the authoritative, pre-computed output of that engine — under
// quarterly commission mode (confirmed live in the codebase, v829+), each
// period_month's snapshot already reflects that month's payout computed
// from the current quarter's %NRR. We read, never recompute.
//
// Caveat surfaced in the UI (section 8 methodology note): a period_month's
// payout_amount is that MONTH's installment under quarterly NRR mode, not
// a lump quarter-end total — commission is paid out monthly all quarter.

var nrrCommSnapshots = null; // { byEmail: {email: [rows]} , loaded }

async function nrrFetchCommissionSnapshots() {
  if (nrrCommSnapshots && nrrCommSnapshots.loaded) return nrrCommSnapshots;
  if (!supa) { nrrCommSnapshots = { byEmail: {}, loaded: false, error: 'no_auth' }; return nrrCommSnapshots; }
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .in('period_month', QNRR_CFG.q_months);
    var rows = resp.data || [];
    var byEmail = {};
    rows.forEach(function (r) {
      var key = r.beneficiary_email;
      if (!key) return;
      if (!byEmail[key]) byEmail[key] = [];
      byEmail[key].push(r);
    });
    nrrCommSnapshots = { byEmail: byEmail, rows: rows, loaded: true };
  } catch (e) {
    console.warn('[nrr] commission snapshot fetch failed', e);
    nrrCommSnapshots = { byEmail: {}, loaded: false, error: e.message };
  }
  return nrrCommSnapshots;
}
window.nrrFetchCommissionSnapshots = nrrFetchCommissionSnapshots;

// Latest available quarter-month snapshot for one beneficiary email.
function nrrLatestSnapshotFor(email) {
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return null;
  var rows = (nrrCommSnapshots.byEmail[email] || []).slice();
  if (!rows.length) return null;
  rows.sort(function (a, b) { return a.period_month < b.period_month ? 1 : -1; });
  return rows[0];
}
window.nrrLatestSnapshotFor = nrrLatestSnapshotFor;

// Sum of latest-available-month payouts across a list of emails (used for
// the org/team commission KPI tiles in section 5).
function nrrSumLatestPayouts(emails) {
  var total = 0; var found = 0; var missing = 0;
  emails.forEach(function (email) {
    var snap = nrrLatestSnapshotFor(email);
    if (snap && snap.payout_amount != null) { total += Number(snap.payout_amount) || 0; found++; }
    else missing++;
  });
  return { total: total, found: found, missing: missing };
}
window.nrrSumLatestPayouts = nrrSumLatestPayouts;

// All available quarter-month snapshots for one email, keyed by period_month
// (nrrLatestSnapshotFor only returns the single latest — the trend strip
// needs all three quarter months to draw its bars).
function nrrSnapshotsForEmailAcrossMonths(email) {
  var out = {};
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return out;
  (nrrCommSnapshots.byEmail[email] || []).forEach(function (r) { out[r.period_month] = r; });
  return out;
}
window.nrrSnapshotsForEmailAcrossMonths = nrrSnapshotsForEmailAcrossMonths;

// ── Live rates/thresholds (target_settings) — footnote only, never used to
// alter a displayed payout number. Mirrors 07a_commission_engine.js's
// _commGetConfig key pattern exactly: '{metricCode}_params' -> JSON object.
var nrrCommRatesCache = null; // { byKey: {key: parsedValue}, loaded }

async function nrrFetchCommissionRates() {
  if (nrrCommRatesCache && nrrCommRatesCache.loaded) return nrrCommRatesCache;
  if (!supa) { nrrCommRatesCache = { byKey: {}, loaded: false, error: 'no_auth' }; return nrrCommRatesCache; }
  try {
    var resp = await supa.from('target_settings').select('key,value');
    var rows = resp.data || [];
    var byKey = {};
    rows.forEach(function (s) {
      if (/_params$/.test(s.key)) {
        try { byKey[s.key] = JSON.parse(s.value); }
        catch (e) { byKey[s.key] = s.value; }
      } else {
        byKey[s.key] = s.value;
      }
    });
    nrrCommRatesCache = { byKey: byKey, loaded: true };
  } catch (e) {
    console.warn('[nrr] target_settings fetch failed', e);
    nrrCommRatesCache = { byKey: {}, loaded: false, error: e.message };
  }
  return nrrCommRatesCache;
}
window.nrrFetchCommissionRates = nrrFetchCommissionRates;

function nrrCommRateGet(metricCode, paramName, fallback) {
  var raw = nrrCommRatesCache && nrrCommRatesCache.byKey ? nrrCommRatesCache.byKey[metricCode + '_params'] : null;
  if (raw && typeof raw === 'object' && raw[paramName] != null) return raw[paramName];
  return fallback;
}
window.nrrCommRateGet = nrrCommRateGet;

// ── Pace-based estimate for periods with no locked snapshot yet ─────────
// Ported from src/dashboard/dash_commission.js's estimateTLCommission() /
// _getSalesTLBrackets() — same bracket table, same math. Deliberately reads
// GMV/baseline from /nrr's own already-loaded aggregates (nrrMonthTriple)
// rather than adding a parallel data fetch. This is a guess for UNLOCKED
// periods only — it must never be confused with a real snapshot payout.
function nrrTLBrackets() {
  return [
    { min: 0,   max: 84,  rate: 0,     label: '< 85%' },
    { min: 85,  max: 89,  rate: .0055, label: '85–90%' },
    { min: 90,  max: 94,  rate: .007,  label: '90–95%' },
    { min: 95,  max: 99,  rate: .008,  label: '95–100%' },
    { min: 100, max: 119, rate: .010,  label: '100–120%' },
    { min: 120, max: 999, rate: .012,  label: '≥ 120%' }
  ];
}
window.nrrTLBrackets = nrrTLBrackets;

function nrrEstimateCommission(rows) {
  var total = rows.reduce(function (s, g) { return s + (g.totalGMV || 0); }, 0);
  var baseline = rows.reduce(function (s, g) { return s + (g.baseline || 0); }, 0);
  var pace = baseline > 0 ? Math.round(total / baseline * 100) : 0;
  var brackets = nrrTLBrackets();
  var bracket = brackets.filter(function (b) { return pace >= b.min && pace <= b.max; })[0] || brackets[0];
  return { pace: pace, total: total, baseline: baseline, bracket: bracket, est: Math.round(total * bracket.rate) };
}
window.nrrEstimateCommission = nrrEstimateCommission;

// ── Commission V2 — P1/P3 upsell classification ──────────────────────────
// Verbatim port of _commComputeUpsellSku() (07a_commission_engine.js:176-318)
// against the lean per-KAM bundle nrrFetchUpsellBundle() builds. Read-only,
// on-demand, drill-down-supporting math — never used to alter a displayed
// payout number (that always comes from the locked snapshot or the pace
// estimate). expansionOutletIds: Set<string> of outlet IDs already earning
// the 0.5% outlet commission, excluded here — /nrr derives this for free
// from its own already-loaded QNRR rows (movement_type === 'expansion'),
// no extra fetch needed.
function nrrComputeUpsellSku(expansionOutletIds, bundle, baseMonthIso) {
  var EMPTY = { p1: { gmv: 0, comm: 0, groups: [] }, p3: { gmv_incremental: 0, comm: 0, groups: [] },
                total_comm: 0, total_gmv_eligible: 0 };
  if (!bundle || !bundle.loaded) return EMPTY;
  var expIds = expansionOutletIds instanceof Set ? expansionOutletIds : new Set();
  var data = bundle.data || {};
  var baselineGroups = bundle.baselineGroups || {};

  var p1Rate    = nrrCommRateGet('upsell_sku', 'p1_rate', 0.01);
  var p3Rate    = nrrCommRateGet('upsell_sku', 'p3_rate', 0.01);
  var p3Thresh  = nrrCommRateGet('upsell_sku', 'p3_threshold_pct', 2.00);
  var p3MinIncr = nrrCommRateGet('upsell_sku', 'p3_min_incremental', 8000);
  var p1MinGmv  = nrrCommRateGet('upsell_sku', 'p1_min_gmv', 5000);

  var currLabel = nrrCommCurrentMonthLabel();
  var p3Labels = nrrP3WindowLabels(baseMonthIso, 3);

  var p1Groups = [], p3Groups = [];

  Object.keys(data).forEach(function (accountId) {
    var outletMap = data[accountId];
    var baselineByOutlet = baselineGroups[accountId] || {};

    Object.keys(outletMap).forEach(function (outletId) {
      if (expIds.has(String(outletId))) return; // earns 0.5% via outlet commission instead
      var outletGroups = outletMap[outletId];
      var outletBaseline = baselineByOutlet[outletId] || {};

      Object.keys(outletGroups).forEach(function (groupKey) {
        var monthData = outletGroups[groupKey];
        var currRow = monthData[currLabel];
        if (!currRow) return;

        var rawTotalGmv = currRow.totalGmv || 0;
        var rawExistingGmv = currRow.existingGmv || 0;
        var isP1 = !outletBaseline[groupKey];

        if (isP1) {
          if (rawTotalGmv >= p1MinGmv) {
            var p1Comm = rawTotalGmv * p1Rate;
            p1Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey, total_gmv: rawTotalGmv, commission: p1Comm });
          }
        } else {
          var maxBaseline = 0, maxBaselineMonth = p3Labels[0];
          p3Labels.forEach(function (lbl) {
            var lRow = monthData[lbl];
            if (!lRow) return;
            var d = nrrDaysInLabel(lbl);
            var norm30 = d > 0 ? lRow.totalGmv / d * 30 : lRow.totalGmv;
            if (norm30 > maxBaseline) { maxBaseline = norm30; maxBaselineMonth = lbl; }
          });
          if (rawExistingGmv > maxBaseline * p3Thresh) {
            var incremental = rawExistingGmv - maxBaseline;
            if (incremental >= p3MinIncr) {
              var p3Comm = incremental * p3Rate;
              p3Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey,
                existing_curr: rawExistingGmv, max_baseline: maxBaseline, max_baseline_month: maxBaselineMonth,
                incremental: incremental, commission: p3Comm });
            }
          }
        }
      });
    });
  });

  var p1Gmv = p1Groups.reduce(function (s, g) { return s + g.total_gmv; }, 0);
  var p1Comm = p1Groups.reduce(function (s, g) { return s + g.commission; }, 0);
  var p3Incr = p3Groups.reduce(function (s, g) { return s + g.incremental; }, 0);
  var p3Comm = p3Groups.reduce(function (s, g) { return s + g.commission; }, 0);

  return {
    p1: { gmv: p1Gmv, comm: p1Comm, groups: p1Groups },
    p3: { gmv_incremental: p3Incr, comm: p3Comm, groups: p3Groups },
    total_comm: p1Comm + p3Comm,
    total_gmv_eligible: p1Gmv + p3Incr
  };
}
window.nrrComputeUpsellSku = nrrComputeUpsellSku;

// ── Full Table view (history) — arbitrary period, not limited to the
// current quarter's QNRR_CFG.q_months. Same table/columns as
// nrrFetchCommissionSnapshots, just without the quarter filter, so any
// locked/draft period ever computed in Sense can be browsed here. Cached
// per period_month so switching the dropdown back and forth is instant.
var nrrCommAvailablePeriods = null; // [ '2026-06', '2026-05', ... ] desc
var nrrCommPeriodCache = {}; // { [period_month]: { rows, loaded } }

async function nrrFetchAvailablePeriods() {
  if (nrrCommAvailablePeriods) return nrrCommAvailablePeriods;
  if (!supa) return [];
  try {
    var resp = await supa.from('commission_payout_snapshots').select('period_month');
    var seen = {};
    (resp.data || []).forEach(function (r) { if (r.period_month) seen[r.period_month] = true; });
    nrrCommAvailablePeriods = Object.keys(seen).sort().reverse();
  } catch (e) {
    console.warn('[nrr] failed to load available commission periods', e);
    nrrCommAvailablePeriods = [];
  }
  return nrrCommAvailablePeriods;
}
window.nrrFetchAvailablePeriods = nrrFetchAvailablePeriods;

async function nrrFetchSnapshotsForPeriod(periodMonth) {
  if (nrrCommPeriodCache[periodMonth] && nrrCommPeriodCache[periodMonth].loaded) return nrrCommPeriodCache[periodMonth];
  if (!supa) return { rows: [], loaded: false, error: 'no_auth' };
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .eq('period_month', periodMonth);
    var out = { rows: resp.data || [], loaded: true };
    nrrCommPeriodCache[periodMonth] = out;
    return out;
  } catch (e) {
    console.warn('[nrr] failed to load snapshots for ' + periodMonth, e);
    return { rows: [], loaded: false, error: e.message };
  }
}
window.nrrFetchSnapshotsForPeriod = nrrFetchSnapshotsForPeriod;
</script>
<script>
// ── nrr_notes.js — TL/Admin notes on churn/comeback outlets ──────────────
// Reads/writes the `nrr_outlet_notes` Supabase table. This table does NOT
// exist yet as of first implementation — the exact CREATE TABLE + RLS
// policy SQL lives in the plan doc and must be run manually in the
// Supabase SQL editor before this feature does anything. Every function
// here is defensive: if the table/policy is missing, we detect that once,
// set nrrNotesAvailable = false, and the UI hides the "add note" affordance
// entirely rather than showing a broken button or spamming errors.

var nrrNotesAvailable = null; // null = not checked yet, true/false once known
var nrrNotesCache = {}; // outlet_id -> [{note, author_email, created_at}]

async function nrrFetchNotesForOutlets(outletIds, periodMonth) {
  nrrNotesCache = {};
  if (!outletIds.length || !supa) return nrrNotesCache;
  try {
    var resp = await supa.from('nrr_outlet_notes')
      .select('outlet_id,note,author_email,movement_type,created_at')
      .in('outlet_id', outletIds)
      .eq('period_month', periodMonth)
      .order('created_at', { ascending: false });
    if (resp.error) throw resp.error;
    nrrNotesAvailable = true;
    (resp.data || []).forEach(function (n) {
      if (!nrrNotesCache[n.outlet_id]) nrrNotesCache[n.outlet_id] = [];
      nrrNotesCache[n.outlet_id].push(n);
    });
  } catch (e) {
    // Table missing, RLS denies, or any other error — feature unavailable,
    // fail quiet. Logged once for whoever's debugging, not shown to user.
    nrrNotesAvailable = false;
    console.warn('[nrr] outlet notes unavailable (table likely not migrated yet):', e.message || e);
  }
  return nrrNotesCache;
}
window.nrrFetchNotesForOutlets = nrrFetchNotesForOutlets;

async function nrrSaveNote(outletId, periodMonth, quarterId, movementType, noteText) {
  if (!supa || !nrrProfile) return { ok: false, error: 'not_authenticated' };
  try {
    var resp = await supa.from('nrr_outlet_notes').insert({
      outlet_id: outletId,
      period_month: periodMonth,
      quarter_id: quarterId,
      movement_type: movementType,
      author_email: nrrProfile.email,
      note: noteText
    });
    if (resp.error) throw resp.error;
    return { ok: true };
  } catch (e) {
    console.warn('[nrr] failed to save outlet note', e);
    return { ok: false, error: e.message || String(e) };
  }
}
window.nrrSaveNote = nrrSaveNote;

<script>
// ── nrr_components.js — render helpers (v4) ──────────────────────────────

var MV_LABEL = {
  core_nrr: 'Core NRR', core_nrr_churn: 'Churn', comeback: 'Comeback',
  transfer_in: 'Transfer in', transfer_out: 'Transfer out',
  handover: 'Handover', new_sales: 'New sales', expansion: 'Expansion'
};

// v4 categorical palette — a SEPARATE system from status colors (green/sun/
// coral thresholds). Gains = green family, losses = coral family, portfolio
// plumbing = neutral cool hues. sun/amber is reserved for threshold-warning
// status and must never appear as a category color (see nrr_tokens.css).
var MV_COLOR = {
  core_nrr: 'var(--green)',
  expansion: 'var(--mv-green-lt)',
  comeback: 'var(--mv-teal)',
  transfer_in: 'var(--mv-violet)',
  handover: 'var(--mv-slate)',
  new_sales: 'var(--mv-slate)',
  core_nrr_churn: 'var(--coral)',
  transfer_out: 'var(--mv-clay)'
};
var MV_TAG_CLASS = {
  core_nrr: 'green', expansion: 'mv-green-lt', comeback: 'mv-teal',
  transfer_in: 'mv-violet', handover: 'mv-slate', new_sales: 'mv-slate',
  core_nrr_churn: 'coral', transfer_out: 'mv-clay'
};

// Stack order for the gains side of the chart (bottom → top).
var STACK_ORDER = ['core_nrr', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in'];
// Losses hang below the zero line (top → bottom).
var LOSS_ORDER = ['core_nrr_churn', 'transfer_out'];

function nrrEsc(s) {
  return String(s || '').replace(/[&<>'"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c];
  });
}

function nrrStatTileHtml(id, label, valueAttr) {
  return '<div class="nrr-kpi-tile"><div class="nrr-kpi-value num" id="' + id + '" ' + (valueAttr || '') + '>—</div>' +
    '<div class="nrr-kpi-label">' + nrrEsc(label) + '</div></div>';
}

function nrrTag(movementType) {
  var cls = MV_TAG_CLASS[movementType] || 'muted';
  return '<span class="tag ' + cls + '">' + nrrEsc(MV_LABEL[movementType] || movementType) + '</span>';
}

// v8: small color dot in front of a name — replaces the movement-type text
// pill in outlet/account rows. A pill's width varies with label length
// ("Core NRR" vs "Churn"), which both eats space and nudges row height
// when it wraps; a fixed-size dot never does either, and keeps every row's
// name starting at the same x position regardless of movement type.
// Hover still reveals the exact label via title, so nothing is lost.
function nrrMvDotHtml(movementType) {
  if (!movementType) return '<span class="nrr-mv-dot nrr-mv-dot-mixed" title="หลายประเภท"></span>';
  var color = MV_COLOR[movementType] || 'var(--ink3)';
  var label = MV_LABEL[movementType] || movementType;
  return '<span class="nrr-mv-dot" style="background:' + color + '" title="' + nrrEsc(label) + '"></span>';
}
window.nrrMvDotHtml = nrrMvDotHtml;

// ── v4: number-triple renderer — ONE convention everywhere ───────────────
// run-rate = primary (the number the quarter is judged on), ~ prefix +
// dotted underline while the month is partial; MTD = evidence, plain ink;
// base = yardstick, muted. When the month completes, ~/dots drop and MTD
// equals run-rate, so the secondary line collapses to just the base.
function nrrRunRateTooltip(triple) {
  return 'Run-rate: MTD ÷ ' + triple.curr_days + ' วัน × 30 — ประมาณการถึงสิ้นเดือน';
}

// ── v5: per-outlet momentum vs its own base ───────────────────────────────
// Banding verified on real data (51% up / 21% flat / 28% down at day 6):
// >1.10 growth, 0.90–1.10 flat (no mark — flat is the absence of signal),
// <0.90 shrinking. base=0 with revenue = pure gain (comeback/expansion).
function nrrMomentum(base, runRate) {
  if (base > 0) {
    var ratio = runRate / base;
    if (ratio > 1.10) return { cls: 'nrr-sig-up', glyph: '▲' };
    if (ratio < 0.90) return { cls: 'nrr-sig-down', glyph: '▼' };
    return { cls: '', glyph: '' };
  }
  if (runRate > 0) return { cls: 'nrr-sig-up', glyph: '▲' };
  return { cls: '', glyph: '' };
}
window.nrrMomentum = nrrMomentum;

function nrrTripleHtml(size, triple, opts) {
  if (!triple) return '<span class="micro">—</span>';
  opts = opts || {};
  var p = triple.is_partial;
  var rr = (p ? '~' : '') + nrrFmtGMV(triple.run_rate);
  var rrTitle = p ? ' title="' + nrrEsc(nrrRunRateTooltip(triple)) + '"' : '';
  var rrCls = 'nrr-rr' + (p ? ' nrr-rr-proj' : '');

  if (size === 'lg') {
    return '<div class="nrr-triple-lg">' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">ฐาน</div><div class="num nrr-triple-base">' + nrrFmtGMV(triple.base) + '</div></div>' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">MTD · ' + triple.curr_days + '/' + triple.days_in_month + ' วัน</div><div class="num nrr-triple-mtd">' + nrrFmtGMV(triple.mtd) + '</div></div>' +
      '<div class="nrr-triple-cell"><div class="nrr-triple-label">' + (p ? 'คาดการณ์สิ้นเดือน' : 'ทั้งเดือน') + '</div><div class="num nrr-triple-rr ' + rrCls + '"' + rrTitle + '>' + rr + '</div></div>' +
      '</div>';
  }
  // md / sm — two-line right-aligned stack. Momentum signal applies ONLY at
  // sm (outlet rows / account headers) — md/lg surfaces already carry
  // threshold-colored %NRR, doubling the signal there would be noise.
  var szCls = size === 'sm' ? 'nrr-triple-sm' : 'nrr-triple-md';
  var sigHtml = '';
  var sigCls = '';
  if (size === 'sm' && opts.signal) {
    var sig = nrrMomentum(triple.base, triple.run_rate);
    sigCls = sig.cls ? ' ' + sig.cls : '';
    sigHtml = sig.glyph ? '<span class="nrr-sig-glyph">' + sig.glyph + '</span>' : '';
  }
  var line2 = p
    ? 'MTD ' + nrrFmtGMV(triple.mtd) + ' · ฐาน ' + nrrFmtGMV(triple.base)
    : 'ฐาน ' + nrrFmtGMV(triple.base);
  return '<div class="' + szCls + '"><div class="num ' + rrCls + sigCls + '"' + rrTitle + '>' + sigHtml + rr + '</div>' +
    '<div class="nrr-triple-sub">' + line2 + '</div></div>';
}
window.nrrTripleHtml = nrrTripleHtml;

// ── v4: unified outlet row — used by slide-over AND movement expansions ──
// One grid for every row (20px chevron slot / text / 150px numbers) so all
// names share the same left edge — this is the alignment fix.
// opts: {showKam, indent, negative} — negative = show lost base (coral).
function nrrOutletRowHtml(o, opts) {
  opts = opts || {};
  var r = o.row;
  var kamMeta = opts.showKam && r.latest_staff_owner
    ? '<span class="nrr-outlet-kam">' + nrrEsc(r.latest_staff_owner) + '</span> · '
    : '';
  // Transfer attribution (verified: base_* = origin, current_* = destination;
  // blank staff owner = the unattributed Admin pool).
  var transferMeta = '';
  if (o.movement === 'transfer_out') {
    transferMeta = ' · <span class="nrr-transfer-attr">→ ' + nrrEsc(r.current_staff_owner || 'Admin pool') + ' (' + nrrEsc(r.current_portfolio || 'ADMIN') + ')</span>';
  } else if (o.movement === 'transfer_in') {
    transferMeta = ' · <span class="nrr-transfer-attr">← ' + nrrEsc(r.base_staff_owner || 'Admin pool') + ' (' + nrrEsc(r.base_portfolio || 'ADMIN') + ')</span>';
  }
  var numbersHtml;
  if (opts.negative) {
    var lost = Math.round((parseFloat(r.base_gmv) || 0) / (parseFloat(r.base_days) || 31) * 30);
    numbersHtml = '<div class="num nrr-lost">−' + nrrFmtGMV(lost) + '</div><div class="nrr-triple-sub">ฐานที่หาย</div>';
  } else {
    var currD = parseFloat(r.curr_days) || 30;
    var mtd = parseFloat(r.curr_gmv) || 0;
    numbersHtml = nrrTripleHtml('sm', {
      base: Math.round(parseFloat(r.base_gmv) || 0),
      mtd: Math.round(mtd),
      run_rate: Math.round(currD > 0 ? mtd / currD * 30 : 0),
      curr_days: currD, days_in_month: 30,
      is_partial: true
    }, { signal: true });
  }
  return '<div class="nrr-row' + (opts.indent ? ' nrr-row-branch' : '') + '">' +
    '<div class="nrr-row-chev"></div>' +
    '<div class="nrr-row-text nrr-row-text-dot">' + nrrMvDotHtml(o.movement) +
    '<div><span class="nrr-row-name">' + nrrEsc(r.res_name || r.account_name) + '</span>' +
    '<div class="nrr-row-meta">' + kamMeta + nrrEsc(r.account_name || '') + transferMeta + '</div></div></div>' +
    '<div class="nrr-row-nums">' + numbersHtml + '</div>' +
    '</div>';
}
window.nrrOutletRowHtml = nrrOutletRowHtml;

// ── v4/v6: movement chart — two views over the same columns ─────────────
// "ทั้งไตรมาส" (quarter/totals, default): base + one column per month, bar
// height = actual total GMV (run-rate/hatched while partial) — churn is
// NOT baked into this bar (a totals view where losses subtract from height
// makes the bar taller than the real number, which is misleading); churn
// shows in the table and in the delta view instead.
// "การเปลี่ยนแปลง" (delta): the original ChartMogul-style above/below-zero
// view — gains stack up, losses (churn/transfer_out) hang below zero.
// opts: {scopeCtx, showKam, onCellClick(mv, cohort, month)} — v6: clicking
// a cell now opens the slide-over directly (see nrrOpenSlideoverMovement)
// instead of an inline expansion row.
var _nrrMvChartMode = {}; // chartContainerId -> 'quarter' | 'delta'

function _nrrQuarterColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment) {
  var H = 190;
  var maxVal = baseAdjusted + handoverBase;
  var runRates = columns.map(function (c) {
    if (c.isBase) return baseAdjusted + handoverBase;
    var triple = nrrMonthTriple(result, c.month);
    return triple ? triple.run_rate : 0;
  });
  runRates.forEach(function (v) { if (v > maxVal) maxVal = v; });
  var pxPer = maxVal > 0 ? H / maxVal : 0;

  var colsHtml = columns.map(function (c) {
    if (c.isBase) {
      var coreH = Math.max(4, Math.round(baseAdjusted * pxPer));
      var hovH = handoverBase > 0 ? Math.max(3, Math.round(handoverBase * pxPer)) : 0;
      var segs = (hovH ? '<div class="nrr-qcol-seg" style="height:' + hovH + 'px;background:var(--mv-slate);opacity:.45"></div>' : '') +
        '<div class="nrr-qcol-seg" style="height:' + coreH + 'px;background:var(--green);opacity:.35"></div>';
      return '<div class="nrr-qcol">' +
        '<div class="nrr-qcol-cap num">' + nrrFmtGMV(baseAdjusted + handoverBase) + (hasAdjustment ? '<span class="tag muted" style="margin-left:4px">adj</span>' : '') + '</div>' +
        '<div class="nrr-qcol-stack">' + segs + '</div>' +
        '<div class="nrr-qcol-label">' + nrrEsc(c.label) + '</div>' +
        '<div class="nrr-qcol-nrr">&nbsp;</div></div>';
    }
    var bm = result.by_month[c.month];
    var triple = nrrMonthTriple(result, c.month);
    var runRate = triple ? triple.run_rate : 0;
    var mtd = triple ? triple.mtd : 0;
    var isPartial = !!(triple && triple.is_partial);
    // v7-fix: bm.segments[mv] is ALREADY a 30-day run-rate figure
    // (curr_gmv/curr_days*30, see nrr_logic.js) — segments sum to ~run_rate.
    // Column geometry must be: total height = run_rate exactly, where the
    // SOLID portion sums to MTD (each segment scaled down proportionally so
    // relative proportions stay visible) and the hatch fills the remaining
    // (run_rate − MTD). Two earlier attempts got this wrong: clipping
    // sequentially against MTD hid every segment after core_nrr; stacking
    // at full height AND adding the hatch double-counted (column rendered
    // ~2× taller than its own cap label).
    var segTotal = STACK_ORDER.reduce(function (s, mv) { return s + ((bm && bm.segments[mv]) || 0); }, 0);
    var solidScale = (isPartial && segTotal > 0) ? (mtd / segTotal) : 1;
    var upSegs = STACK_ORDER.map(function (mv) {
      var gmv = (bm && bm.segments[mv]) || 0;
      if (gmv <= 0) return '';
      var h = Math.max(2, Math.round(gmv * solidScale * pxPer));
      return '<div class="nrr-qcol-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></div>';
    }).join('');
    var hatchHtml = '';
    if (isPartial && runRate > mtd) {
      var hatchH = Math.max(2, Math.round((runRate - mtd) * pxPer));
      hatchHtml = '<div class="nrr-qcol-hatch" style="height:' + hatchH + 'px" title="' + nrrEsc('ส่วนคาดการณ์ (run-rate − MTD)') + '"></div>';
    }
    var pct = bm ? bm.nrr_pct : null;
    return '<div class="nrr-qcol">' +
      '<div class="nrr-qcol-cap num" style="color:' + (isPartial ? 'var(--green-deep)' : 'var(--ink)') + '">' + (isPartial ? '~' : '') + nrrFmtGMV(runRate) + '</div>' +
      '<div class="nrr-qcol-stack">' + hatchHtml + upSegs + '</div>' +
      '<div class="nrr-qcol-label">' + nrrEsc(c.label) + '</div>' +
      '<div class="nrr-qcol-nrr num" style="color:' + nrrThresholdColorVar(pct) + '">' + (pct == null ? '—' : (isPartial ? '~' : '') + pct + '%') + '</div></div>';
  }).join('');
  return '<div class="nrr-qchart">' + colsHtml + '</div>' +
    '<div class="micro" style="margin-top:10px">ลายเฉียง = ส่วนคาดการณ์ของเดือนที่ยังไม่จบ (run-rate − MTD) · churn ไม่รวมในความสูงแท่ง ดูที่ตารางด้านล่าง</div>';
}

function _nrrDeltaColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment) {
  // Shared scale: gains side sized by the tallest positive stack, losses
  // side by the deepest loss stack — same ฿-per-px on both sides.
  var maxUp = baseAdjusted + handoverBase;
  var maxDown = 0;
  columns.forEach(function (c) {
    if (c.isBase) return;
    var bm = result.by_month[c.month];
    if (!bm) return;
    var up = STACK_ORDER.reduce(function (s, mv) { return s + (bm.segments[mv] || 0); }, 0);
    var down = LOSS_ORDER.reduce(function (s, mv) { return s + (bm.segments[mv] || 0); }, 0);
    if (up > maxUp) maxUp = up;
    if (down > maxDown) maxDown = down;
  });
  var UP_H = 150;
  var pxPer = maxUp > 0 ? UP_H / maxUp : 0;
  var DOWN_H = Math.min(90, Math.max(maxDown > 0 ? 24 : 0, Math.round(maxDown * pxPer)));
  var downPxPer = maxDown > 0 ? DOWN_H / maxDown : 0;

  var colsHtml = columns.map(function (c) {
    var upSegs = '', downSegs = '', hatchHtml = '', topLabel, subLabel, downLabel = '';
    if (c.isBase) {
      var coreH = Math.max(4, Math.round(baseAdjusted * pxPer));
      var hovH = handoverBase > 0 ? Math.max(3, Math.round(handoverBase * pxPer)) : 0;
      upSegs =
        (hovH ? '<div class="nrr-col-seg" style="height:' + hovH + 'px;background:var(--mv-slate)"></div>' : '') +
        '<div class="nrr-col-seg" style="height:' + coreH + 'px;background:var(--green)"></div>';
      topLabel = nrrFmtGMV(baseAdjusted) + (hasAdjustment ? '<span class="tag muted" style="margin-left:4px">adj</span>' : '');
      subLabel = result.cohort_outlets + ' สาขา';
    } else {
      var bm = result.by_month[c.month];
      var upTotal = 0;
      upSegs = STACK_ORDER.map(function (mv) {
        var gmv = (bm && bm.segments[mv]) || 0;
        if (gmv <= 0) return '';
        upTotal += gmv;
        var h = Math.max(3, Math.round(gmv * pxPer));
        return '<div class="nrr-col-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></div>';
      }).join('');
      var downTotal = 0;
      downSegs = LOSS_ORDER.map(function (mv) {
        var gmv = (bm && bm.segments[mv]) || 0;
        if (gmv <= 0) return '';
        downTotal += gmv;
        var h = Math.max(3, Math.round(gmv * downPxPer));
        return '<div class="nrr-col-seg" style="height:' + h + 'px;background:' + (MV_COLOR[mv] || 'var(--coral)') + '"></div>';
      }).join('');
      if (downTotal > 0) downLabel = '<div class="nrr-col-down-label num">−' + nrrFmtGMV(downTotal) + '</div>';

      // Hatched projection overlay: portion of the gains stack above MTD.
      var triple = nrrMonthTriple(result, c.month);
      if (triple && triple.is_partial && triple.run_rate > triple.mtd && upTotal > 0) {
        var hatchH = Math.min(Math.round(upTotal * pxPer), Math.max(2, Math.round((triple.run_rate - triple.mtd) * pxPer)));
        hatchHtml = '<div class="nrr-col-hatch" style="height:' + hatchH + 'px" title="' + nrrEsc('ส่วนคาดการณ์ (run-rate − MTD)') + '"></div>';
      }
      // v7-fix: this view answers "เปลี่ยนไปเท่าไหร่" — its headline is the
      // NET change vs the (adjusted) base, not the same gross run-rate the
      // quarter view already shows. Signed + colored so the two views are
      // numerically distinct at a glance.
      var netChange = triple ? triple.run_rate - (baseAdjusted + handoverBase) : null;
      if (netChange == null) topLabel = '—';
      else {
        var netCls = netChange >= 0 ? 'var(--green-deep)' : 'var(--coral)';
        topLabel = '<span style="color:' + netCls + '">' + (triple.is_partial ? '~' : '') + (netChange >= 0 ? '+' : '−') + nrrFmtGMV(Math.abs(netChange)) + '</span>';
      }
      var activeOutlets = bm ? (bm.outlets.core_nrr || 0) : 0;
      subLabel = activeOutlets + ' สาขา' + (triple && triple.is_partial ? ' · MTD ' + nrrFmtGMV(triple.mtd) : '');
    }
    return '<div class="nrr-col">' +
      '<div class="nrr-col-top num">' + topLabel + '</div>' +
      '<div class="nrr-col-up" style="height:' + UP_H + 'px">' + hatchHtml + upSegs + '</div>' +
      (DOWN_H > 0 ? '<div class="nrr-col-down" style="height:' + DOWN_H + 'px">' + downSegs + '</div>' + downLabel : '') +
      '<div class="nrr-col-label">' + nrrEsc(c.label) + '</div>' +
      '<div class="micro">' + subLabel + '</div></div>';
  }).join('');
  return '<div class="nrr-col-chart">' + colsHtml + '</div>';
}

function nrrRenderMovementChart(chartContainerId, tableContainerId, result, opts) {
  opts = opts || {};
  var chartEl = document.getElementById(chartContainerId);
  var tableEl = document.getElementById(tableContainerId);
  if (!chartEl || !tableEl) return;
  if (!result || !result.months || !result.months.length) {
    chartEl.innerHTML = '<div class="micro">ไม่มีข้อมูล</div>';
    tableEl.innerHTML = '';
    return;
  }

  var baseAdjusted = Math.round(result.base_norm * 30);
  var baseOriginal = Math.round((result.base_norm_original || result.base_norm) * 30);
  var handoverBase = Math.round(result.handover_base_norm || 0);
  var hasAdjustment = (result.transfer_out_base_norm || 0) > 0 || (result.transfer_in_base_norm || 0) > 0;

  var columns = [{ label: 'ฐาน (' + (QNRR_CFG.months_th[result.base_month] || result.base_month) + ')', isBase: true }];
  result.months.forEach(function (m) { columns.push({ label: QNRR_CFG.months_th[m] || m, month: m, isBase: false }); });

  if (!_nrrMvChartMode[chartContainerId]) _nrrMvChartMode[chartContainerId] = 'quarter';
  var mode = _nrrMvChartMode[chartContainerId];
  var modeHtml = '<div class="mode">' +
    '<button' + (mode === 'quarter' ? ' class="on"' : '') + ' data-chart-mode="quarter">ทั้งไตรมาส</button>' +
    '<button' + (mode === 'delta' ? ' class="on"' : '') + ' data-chart-mode="delta">การเปลี่ยนแปลง</button>' +
    '</div>';
  var chartBodyHtml = mode === 'quarter'
    ? _nrrQuarterColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment)
    : _nrrDeltaColumnsHtml(result, columns, baseAdjusted, handoverBase, hasAdjustment);
  chartEl.innerHTML = modeHtml + '<div class="nrr-chart-body">' + chartBodyHtml + '</div>' + nrrLegendHtml();
  chartEl.querySelectorAll('[data-chart-mode]').forEach(function (b) {
    b.addEventListener('click', function () {
      _nrrMvChartMode[chartContainerId] = b.dataset.chartMode;
      nrrRenderMovementChart(chartContainerId, tableContainerId, result, opts);
    });
  });

  // ── Breakdown table — every non-zero cell clickable → inline expansion ──
  // Handover & New renders as a cohort block (Sense's verified pattern):
  // parent row = handover + new_sales combined; "└ cohort <base>" sub-row =
  // handover rows (exp date in base month); one "└ cohort <m>" sub-row per
  // non-empty new_sales cohort (claim-dedup by first appearance month,
  // carry-forward afterwards, "—" before).
  var cohortModel = nrrHandoverCohorts(result);

  function cellBtn(rowKey, cohort, month, cls, display) {
    return '<td class="num-cell"><button class="nrr-cell-btn" data-mv="' + rowKey + '" data-cohort="' + nrrEsc(cohort || '') + '" data-month="' + nrrEsc(month) + '" style="color:var(--' + cls + ')">' + display + '</button></td>';
  }
  var DASH = '<td class="micro">—</td>';

  var TABLE_ROWS = [
    { key: 'core_nrr', label: 'Core NRR active', cls: 'green' },
    { key: 'core_nrr_churn', label: '↳ Churn', cls: 'coral', sub: true, negative: true },
    { key: 'expansion', label: 'Expansion', cls: 'mv-green-lt' },
    { key: 'comeback', label: 'Comeback', cls: 'mv-teal' },
    { key: 'transfer_in', label: 'Transfer in', cls: 'mv-violet' },
    { key: 'transfer_out', label: 'Transfer out', cls: 'mv-clay', negative: true }
  ];
  var colCount = columns.length + 1;
  var theadHtml = '<tr><th>Movement</th>' + columns.map(function (c) { return '<th>' + nrrEsc(c.label) + '</th>'; }).join('') + '</tr>';

  function simpleRowHtml(row) {
    var cells = columns.map(function (c) {
      if (c.isBase) {
        if (row.key === 'core_nrr') return '<td class="num-cell">' + nrrFmtGMV(baseAdjusted) + '</td>';
        return DASH;
      }
      var bm = result.by_month[c.month];
      var v = bm ? (bm.segments[row.key] || 0) : 0;
      var n = bm ? (bm.outlets[row.key] || 0) : 0;
      if (v === 0 && n === 0) return DASH;
      var display = row.negative ? '−' + nrrFmtGMV(v) : nrrFmtGMV(v);
      return cellBtn(row.key, '', c.month, row.cls, display);
    }).join('');
    return '<tr data-mv-row="' + row.key + '"' + (row.sub ? ' class="nrr-table-subrow"' : '') + '><td>' + row.label + '</td>' + cells + '</tr>';
  }

  function handoverBlockHtml() {
    var baseLabel = QNRR_CFG.months_th[result.base_month] || result.base_month;
    // Parent row: handover + new_sales combined per month.
    var parentCells = columns.map(function (c) {
      if (c.isBase) return handoverBase > 0 ? '<td class="num-cell">' + nrrFmtGMV(handoverBase) + '</td>' : DASH;
      var bm = result.by_month[c.month];
      var v = bm ? (bm.segments.handover || 0) + (bm.segments.new_sales || 0) : 0;
      var n = bm ? (bm.outlets.handover || 0) + (bm.outlets.new_sales || 0) : 0;
      if (v === 0 && n === 0) return DASH;
      return cellBtn('handover_new', '', c.month, 'mv-slate', nrrFmtGMV(v));
    }).join('');
    var html = '<tr data-mv-row="handover_new"><td>Handover &amp; New</td>' + parentCells + '</tr>';

    // Base cohort sub-row (handover rows) — only when it has anything.
    var hasHandover = handoverBase > 0 || result.months.some(function (m) {
      return (cohortModel.handover.by_month[m] || {}).outlets && cohortModel.handover.by_month[m].outlets.length > 0;
    });
    if (hasHandover) {
      var hovCells = columns.map(function (c) {
        if (c.isBase) return handoverBase > 0 ? '<td class="num-cell">' + nrrFmtGMV(handoverBase) + '</td>' : DASH;
        var cm = cohortModel.handover.by_month[c.month];
        if (!cm || !cm.outlets.length) return DASH;
        return cellBtn('handover_new', 'base', c.month, 'mv-slate', nrrFmtGMV(cm.gmv));
      }).join('');
      html += '<tr data-mv-row="handover_new:base" class="nrr-table-subrow"><td>└ cohort ' + nrrEsc(baseLabel) + '</td>' + hovCells + '</tr>';
    }

    // New-sales cohort sub-rows — only non-empty cohorts render.
    cohortModel.new_cohorts.forEach(function (cohort) {
      var label = QNRR_CFG.months_th[cohort.cohort_month] || cohort.cohort_month;
      var cells = columns.map(function (c) {
        if (c.isBase) return DASH;
        var cm = cohort.by_month[c.month];
        if (!cm || !cm.outlets.length) return DASH; // null before cohort month → "—"
        return cellBtn('handover_new', cohort.cohort_month, c.month, 'mv-slate', nrrFmtGMV(cm.gmv));
      }).join('');
      html += '<tr data-mv-row="handover_new:' + nrrEsc(cohort.cohort_month) + '" class="nrr-table-subrow"><td>└ cohort ' + nrrEsc(label) + '</td>' + cells + '</tr>';
    });
    return html;
  }

  var tbodyHtml =
    simpleRowHtml(TABLE_ROWS[0]) + simpleRowHtml(TABLE_ROWS[1]) +
    handoverBlockHtml() +
    TABLE_ROWS.slice(2).map(simpleRowHtml).join('');
  var totalRow = '<tr class="nrr-table-total"><td>Total GMV</td>' + columns.map(function (c) {
    if (c.isBase) return '<td class="num-cell">' + nrrFmtGMV(baseAdjusted + handoverBase) + '</td>';
    var bm = result.by_month[c.month];
    return '<td class="num-cell">' + (bm ? nrrFmtGMV(bm.total_gmv) : '—') + '</td>';
  }).join('') + '</tr>';

  var adjNote = '';
  if (hasAdjustment) {
    adjNote = '<div class="micro" style="margin-top:8px">ฐานปรับจาก ' + nrrFmtGMV(baseOriginal) + ' → ' + nrrFmtGMV(baseAdjusted) +
      (result.transfer_out_base_norm > 0 ? ' (หัก ' + result.transfer_out_outlets.length + ' outlet ย้ายออก −' + nrrFmtGMV(Math.round(result.transfer_out_base_norm * 30)) + ')' : '') +
      (result.transfer_in_base_norm > 0 ? ' (บวก ' + result.transfer_in_outlets.length + ' outlet ย้ายเข้า +' + nrrFmtGMV(Math.round(result.transfer_in_base_norm * 30)) + ')' : '') +
      '</div>';
  }
  tableEl.innerHTML = '<table class="nrr-table nrr-mv-table"><thead>' + theadHtml + '</thead><tbody>' + tbodyHtml + totalRow + '</tbody></table>' + adjNote;

  // v6: click delegation — every non-zero cell opens the slide-over
  // directly (movement mode) instead of an inline expansion row. Bound
  // once per container; _nrrMvOpts is refreshed on every render so the
  // handler always resolves against the current result/scope.
  if (!tableEl._nrrMvBound) {
    tableEl._nrrMvBound = true;
    tableEl.addEventListener('click', function (e) {
      var btn = e.target.closest('.nrr-cell-btn');
      if (!btn) return;
      var o = tableEl._nrrMvOpts;
      if (!o || !o.onCellClick) return;
      var outlets = _nrrResolveMvOutlets(o, btn.dataset.mv, btn.dataset.cohort || '', btn.dataset.month);
      var prev = tableEl.querySelector('.nrr-cell-btn.on');
      if (prev) prev.classList.remove('on');
      btn.classList.add('on');
      o.onCellClick(btn.dataset.mv, btn.dataset.cohort || '', btn.dataset.month, outlets);
    });
  }
  tableEl._nrrMvOpts = { result: result, scopeCtx: opts.scopeCtx, showKam: opts.showKam, onCellClick: opts.onCellClick, cohortModel: cohortModel };
}
window.nrrRenderMovementChart = nrrRenderMovementChart;

// Resolve the outlet list behind one cell — plain movements come from
// nrrOutletsForMovement; handover_new cells come from the cohort model so
// counts/sums reconcile with the cohort sub-rows by construction.
function _nrrResolveMvOutlets(o, mv, cohort, month) {
  if (mv !== 'handover_new') return nrrOutletsForMovement(o.result, month, mv, o.scopeCtx);
  var cm = o.cohortModel;
  if (cohort === 'base') return (cm.handover.by_month[month] || {}).outlets || [];
  if (cohort) {
    var c = cm.new_cohorts.find(function (x) { return x.cohort_month === cohort; });
    return c && c.by_month[month] ? c.by_month[month].outlets : [];
  }
  // parent = handover + all new_sales cohorts for that month
  var all = ((cm.handover.by_month[month] || {}).outlets || []).slice();
  cm.new_cohorts.forEach(function (c) {
    if (c.by_month[month]) all = all.concat(c.by_month[month].outlets);
  });
  return all;
}

// v6: cohort-aware label helper — used by nrrOpenSlideoverMovement so the
// slide-over title matches what the old inline-expansion header used to say.
function nrrMovementCellLabel(mv, cohort, month) {
  var tagMv = mv === 'handover_new' ? 'handover' : mv;
  var label = mv === 'handover_new' ? 'Handover & New' : (MV_LABEL[tagMv] || tagMv);
  var cohortLabel = '';
  if (mv === 'handover_new' && cohort) {
    cohortLabel = ' · cohort ' + (cohort === 'base' ? (QNRR_CFG.months_th[QNRR_CFG.base_month] || QNRR_CFG.base_month) : (QNRR_CFG.months_th[cohort] || cohort));
  }
  return label + cohortLabel;
}
window.nrrMovementCellLabel = nrrMovementCellLabel;

// ── v6: composition bar — the fix for "only green and white". A single
// glanceable strip under the Pulse hero showing the categorical palette's
// proportions immediately, so the page doesn't read monochrome before the
// user scrolls down to the movement chart. Not a strict ledger (churn/
// transfer_out are losses shown as their own slice, not subtracted) — it's
// a "color signature of the business right now," visible in 5 seconds.
var COMPO_DEFS = [
  { key: 'core_nrr', label: 'Core NRR' },
  { key: 'core_nrr_churn', label: 'Churn' },
  { key: 'handover_new', label: 'Handover & New' },
  { key: 'comeback', label: 'Comeback' },
  { key: 'expansion', label: 'Expansion' },
  { key: 'transfer_in', label: 'Transfer in' },
  { key: 'transfer_out', label: 'Transfer out' }
];
function _nrrCompoColor(key) { return key === 'handover_new' ? MV_COLOR.handover : (MV_COLOR[key] || 'var(--ink3)'); }
function _nrrCompoValue(segs, key) {
  if (key === 'handover_new') return (segs.handover || 0) + (segs.new_sales || 0);
  return segs[key] || 0;
}

function nrrCompositionBarHtml(result, period) {
  var bm = result && period ? result.by_month[period] : null;
  if (!bm) return '';
  var items = COMPO_DEFS.map(function (d) {
    return { key: d.key, label: d.label, v: Math.abs(_nrrCompoValue(bm.segments, d.key)) };
  }).filter(function (x) { return x.v > 0; });
  var total = items.reduce(function (s, x) { return s + x.v; }, 0);
  if (!total) return '';

  var barHtml = items.map(function (x) {
    return '<i style="width:' + (x.v / total * 100).toFixed(2) + '%;background:' + _nrrCompoColor(x.key) + '" title="' + nrrEsc(x.label) + '"></i>';
  }).join('');
  var keyHtml = items.map(function (x) {
    var neg = x.key === 'core_nrr_churn' || x.key === 'transfer_out';
    return '<span class="nrr-compo-k"><i style="background:' + _nrrCompoColor(x.key) + '"></i>' + nrrEsc(x.label) +
      ' <b class="num">' + (neg ? '−' : '') + nrrFmtGMV(x.v) + '</b></span>';
  }).join('');
  var baseLabel = nrrFmtGMV(Math.round((result.base_norm || 0) * 30));
  return '<div class="nrr-compo">' +
    '<div class="nrr-compo-lbl">องค์ประกอบของฐาน ' + baseLabel + '</div>' +
    '<div class="nrr-compo-bar">' + barHtml + '</div>' +
    '<div class="nrr-compo-key">' + keyHtml + '</div>' +
    '</div>';
}
window.nrrCompositionBarHtml = nrrCompositionBarHtml;

function nrrLegendHtml() {
  var legendMvs = ['core_nrr', 'handover', 'expansion', 'comeback', 'transfer_in', 'core_nrr_churn', 'transfer_out'];
  return '<div class="nrr-movement-legend">' + legendMvs.map(function (mv) {
    return '<div class="nrr-movement-legend-item"><span class="nrr-movement-legend-dot" style="background:' + (MV_COLOR[mv] || 'var(--ink3)') + '"></span>' + (MV_LABEL[mv] || mv) + '</div>';
  }).join('') + '</div>';
}

// ── Threshold coloring (STATUS system — separate from category palette) ──
// ≥100% green, 90-99% amber/sun, <90% coral.
function nrrThresholdColorVar(pct) {
  if (pct == null) return 'var(--ink3)';
  if (pct >= 100) return 'var(--green-deep)'; // text-safe (Raw Papaya) — --green (Cabbage) is the fill/glyph role, too low-contrast for text
  if (pct >= 90) return 'var(--sun-deep)';
  return 'var(--coral)';
}
window.nrrThresholdColorVar = nrrThresholdColorVar;

// ── CSV export — client-side only, UTF-8 BOM so Thai opens right in Excel.
function nrrExportCsv(filename, headers, rows) {
  var esc = function (v) {
    v = String(v == null ? '' : v);
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  };
  var lines = [headers.map(esc).join(',')].concat(rows.map(function (r) { return r.map(esc).join(','); }));
  var csv = '﻿' + lines.join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
window.nrrExportCsv = nrrExportCsv;

// ── Copy-to-clipboard — for pasting a quick summary into Slack/email.
async function nrrCopyText(text, btnEl) {
  try {
    await navigator.clipboard.writeText(text);
    if (btnEl) {
      var orig = btnEl.textContent;
      btnEl.textContent = 'คัดลอกแล้ว ✓';
      setTimeout(function () { btnEl.textContent = orig; }, 1600);
    }
  } catch (e) {
    console.warn('[nrr] clipboard copy failed', e);
  }
}
window.nrrCopyText = nrrCopyText;
</script>
<script>
// ── nrr_view.js — page controller (v4 "Answer First") ────────────────────
// Narrative order: Pulse hero → Team Scoreboard → Movement (KAM) → KAM
// Leaderboard → PM → Admin → Commission strip → footnote. Every section
// answers ONE user question; the hero answers "are we okay?" in one glance.
// All numbers come from pure compute functions (nrr_logic/nrr_aggregate) —
// this file is presentation + interaction state only.

var nrrState = {
  period: null,        // selected quarter month, drives every section
  selectedTeam: null,  // admin's currently-inspected team in the leaderboard

  mvView: {
    portfolio: null,   // 'vp' | 'kam' | 'pm' | 'admin' (null = pick default on first render)

async function nrrInitApp() {

  document.getElementById('nrr-refresh-btn').addEventListener('click', function () { nrrRefresh(true); });
  document.getElementById('nrr-slideover-body').addEventListener('click', function (e) {
    nrrHandleNoteAffClick(e);
    nrrHandleNoteSaveClick(e);
    var retryBtn = e.target.closest('.nrr-comm-retry-upsell-btn');
    if (retryBtn && nrrCommDrawerState) {
      var target = document.getElementById('nrr-comm-drawer-upsell');
      if (target) target.innerHTML = '<div class="ds-section-hd"><span class="ds-eyebrow">Upsell P1 / P3</span></div><div class="ds-skel" style="margin-bottom:8px"></div><div class="ds-skel" style="width:65%"></div>';
      delete nrrUpsellBundleCache[retryBtn.dataset.email];
      var snap = nrrLatestSnapshotFor(nrrCommDrawerState.kamEmail);
      var bd = snap && snap.breakdown ? snap.breakdown : null;
      var result = nrrKamResult(nrrCommDrawerState.kamEmail);
      var bm = result && nrrCommDrawerState.period && result.by_month ? result.by_month[nrrCommDrawerState.period] : null;
      var expOutlets = (bm ? (bm.rows || []) : []).filter(function (r) { return r.movement_type === 'expansion'; });
      nrrLoadCommissionUpsellSection(retryBtn.dataset.email, new Set(expOutlets.map(function (r) { return String(r.outlet_id); })), bd);
    }
  });
  document.getElementById('nrr-slideover-body').addEventListener('keydown', nrrHandleNoteInputKeydown);
  document.getElementById('nrr-slideover-backdrop').addEventListener('click', nrrCloseSlideover);
  document.getElementById('nrr-slideover-close').addEventListener('click', nrrCloseSlideover);
  document.getElementById('nrr-slideover-search').addEventListener('input', function (e) {
    nrrSlideoverState.search = e.target.value.trim().toLowerCase();
    nrrRenderSlideoverBody();
  });
  document.getElementById('nrr-comm-strip').addEventListener('click', function (e) {
    var drillBtn = e.target.closest('.nrr-comm-drill-btn');
    if (drillBtn) { nrrOpenCommissionDrawer(drillBtn.dataset.email, drillBtn.dataset.name, drillBtn.dataset.period); return; }
    var tabBtn = e.target.closest('.nrr-comm-tab');
    if (tabBtn) { nrrCommViewMode = tabBtn.dataset.mode; nrrRenderCommissionSection(); return; }
  });
  document.getElementById('nrr-comm-strip').addEventListener('change', function (e) {
    if (e.target.id !== 'nrr-comm-period-select') return;
    nrrCommSelectedPeriod = e.target.value;
    nrrRenderCommissionFullTable(nrrCommSelectedPeriod);
  });
  await nrrRefresh(false);
}
window.nrrInitApp = nrrInitApp;

async function nrrRefresh(force) {
  var status = document.getElementById('nrr-sync-status');
  if (status) status.textContent = 'กำลังโหลดข้อมูล...';
  try {
    await nrrFetchQnrrCsv(force);
    await Promise.all([nrrFetchPmCsv(force), nrrFetchAdminCsv(force), nrrFetchVpCsv(force)]);
    await Promise.all([nrrFetchCommissionSnapshots(), nrrFetchCommissionRates()]);
    nrrRenderAll();
    if (status) status.textContent = 'อัปเดตล่าสุด ' + new Date(window.bulkQnrrData.loadedAt).toLocaleString('th-TH');
  } catch (e) {
    if (status) status.textContent = 'โหลดข้อมูลไม่สำเร็จ — กด "รีเฟรช" เพื่อลองใหม่';
  }
}
