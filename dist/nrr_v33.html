// Sense itself builds it in (src/02_data_pipeline.js, bulk-qnrr-single
// handler): { byKamEmail:{email:[row]}, byTlEmail:{email:[row]}, allRows:[],
// loaded:true }.
// ────────────────────────────────────────────────────────────────────────

var QNRR_CFG = {
  quarter:    '2026q3',
  base_month: '2026-06',
  q_months:   ['2026-07', '2026-08', '2026-09'],
  months_th:  {
    '2026-06': 'มิ.ย.', '2026-07': 'ก.ค.',
    '2026-08': 'ส.ค.',  '2026-09': 'ก.ย.'
  },
  csv_file:   'kam_rep_view.csv'
};
window.QNRR_CFG = QNRR_CFG;

// scope: 'kam' | 'tl' | 'admin'
// For 'tl'/'admin' scope, kamEmail may be the TL's own email (direct
// byTlEmail lookup, v817) or null/empty (pure org-wide, v850-fix — kamEmail
// is genuinely optional once scope !== 'kam').
function _qnrrCompute(kamEmail, scope) {
  scope = scope || 'kam';
  if (scope === 'kam' && !kamEmail) return null;
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return null;

  var myTlEmail = '';
  var kamRows = (qd.byKamEmail && qd.byKamEmail[kamEmail]) || [];
  if (kamRows.length) {
    myTlEmail = (kamRows.find(function (r) { return r.latest_tl_email; }) || {}).latest_tl_email || '';
  }
  // TL/Admin login directly — their own email may live in byTlEmail directly.
  if (!myTlEmail && qd.byTlEmail && qd.byTlEmail[kamEmail]) {
    myTlEmail = kamEmail;
  }

  var allRows;
  if (scope === 'tl' && myTlEmail && qd.byTlEmail && qd.byTlEmail[myTlEmail]) {
    allRows = qd.byTlEmail[myTlEmail];
  } else if (scope === 'tl' && !myTlEmail) {
    // Admin viewing "team" scope with no personal TL — org-wide fallback.
    allRows = qd.allRows || [];
  } else if (scope === 'admin') {
    allRows = qd.allRows || [];
  } else {
    allRows = kamRows;
  }
  if (!allRows || !allRows.length) return null;

  function _rowInScope(r) {
    if (scope === 'kam')   return r.latest_kam_email === kamEmail;
    if (scope === 'tl')    return myTlEmail ? r.latest_tl_email === myTlEmail : true;
    if (scope === 'admin') return true;
    return r.latest_kam_email === kamEmail;
  }

  function _effectiveMovement(r) {
    // core_nrr row with curr_gmv=0 IS a churned outlet this period — the raw
    // CSV never contains the literal 'core_nrr_churn' value.
    if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) {
      return 'core_nrr_churn';
    }
    if (scope === 'kam') return r.movement_type;

    // "org-wide, no portfolio boundary" applies both to scope==='admin' AND
    // to scope==='tl' with myTlEmail==='' (Admin viewing the "ทีม" toggle
    // without personally being a TL of any squad) — same resolved view.
    var isOrgWideView = (scope === 'admin') || (scope === 'tl' && !myTlEmail);
    if (isOrgWideView) {
      // No boundary between individual KAMs at this scope: a pure KAM<->KAM
      // reassignment never cost/gained the org anything, so it reads as
      // core_nrr regardless of squad. Moves involving PM/ADMIN/SALE are a
      // genuine portfolio-TYPE change and stay visible as transfer.
      var isPureKamMove = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
      if (isPureKamMove && r.movement_type === 'transfer_out') return null;
      if (isPureKamMove && r.movement_type === 'transfer_in')  return 'core_nrr';
      return r.movement_type;
    }

    // Same-squad transfer_in/out between KAMs → neutralize. Cross-squad, or
    // moves touching a non-KAM portfolio type → count normally.
    var sameTlBase   = r.base_tl_email && r.base_tl_email === myTlEmail;
    var sameTlPeriod = r.latest_tl_email === myTlEmail;
    var isPureKamMove2 = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
    var sameTeam     = sameTlBase && sameTlPeriod && isPureKamMove2;
    if (sameTeam && r.movement_type === 'transfer_out') return null;
    if (sameTeam && r.movement_type === 'transfer_in')  return 'core_nrr';
    return r.movement_type;
  }

  var scopedRows = allRows.filter(_rowInScope);
  if (!scopedRows.length) return null;

  var base_month = scopedRows[0].base_month || QNRR_CFG.base_month;
  var months   = [];
  var monthSet = {};
  scopedRows.forEach(function (r) {
    if (!monthSet[r.period_month]) { monthSet[r.period_month] = 1; months.push(r.period_month); }
  });
  months.sort();

  // ── Build baseMap from first period-month rows ──────────────────────────
  var baseMap = {};
  var baseMonthRows = scopedRows.filter(function (r) { return r.period_month === months[0]; });
  baseMonthRows.forEach(function (r) {
    // transfer_in excluded (like handover): its base_gmv belongs to the
    // PREVIOUS owner and is added exactly once by the symmetric transfer_in
    // adjustment below. Effective (not raw) movement, so a same-team
    // KAM↔KAM move reclassified to core_nrr at tl/admin scope stays in the
    // base — it was this scope's outlet in the base month already.
    if (r.base_gmv > 0 && !baseMap[r.outlet_id] && r.movement_type !== 'handover'
        && _effectiveMovement(r) !== 'transfer_in') {
      baseMap[r.outlet_id] = { gmv: r.base_gmv, days: r.base_days || 31 };
    }
  });

  var base_gmv_original = 0;
  var base_norm_original = 0;
  Object.keys(baseMap).forEach(function (oid) {
    var b = baseMap[oid];
    base_gmv_original  += b.gmv;
    base_norm_original += b.gmv / b.days;
  });

  // ── Core-cohort transfer_out across the entire quarter (retroactive) ────
  var coreTransferOutSet = {};
  scopedRows.forEach(function (r) {
    var mv = _effectiveMovement(r);
    if (mv === 'transfer_out' && baseMap[r.outlet_id] && !coreTransferOutSet[r.outlet_id]) {
      var b = baseMap[r.outlet_id];
      coreTransferOutSet[r.outlet_id] = {
        gmv_norm: b.gmv / b.days,
        account_name: r.account_name || '',
        period_month: r.period_month
      };
    }
  });

  var transfer_out_base_norm = 0;
  var transfer_out_base_gmv  = 0;
  var transfer_out_outlets   = [];
  Object.keys(coreTransferOutSet).forEach(function (oid) {
    var t = coreTransferOutSet[oid];
    transfer_out_base_norm += t.gmv_norm;
    transfer_out_base_gmv  += baseMap[oid].gmv;
    transfer_out_outlets.push({ outlet_id: oid, gmv_norm: t.gmv_norm, account_name: t.account_name, period_month: t.period_month });
  });

  // ── transfer_in across the entire quarter — symmetric with transfer_out ──
  var coreTransferInSet = {};
  scopedRows.forEach(function (r) {
    var mv = _effectiveMovement(r);
    if (mv === 'transfer_in' && !coreTransferInSet[r.outlet_id]) {
      var b_gmv  = parseFloat(r.base_gmv) || 0;
      var b_days = parseFloat(r.base_days) || 31;
      coreTransferInSet[r.outlet_id] = {
        gmv: b_gmv, gmv_norm: b_gmv / b_days,
        account_name: r.account_name || '', period_month: r.period_month
      };
    }
  });
  var transfer_in_base_norm = 0;
  var transfer_in_base_gmv  = 0;
  var transfer_in_outlets   = [];
  Object.keys(coreTransferInSet).forEach(function (oid) {
    var t = coreTransferInSet[oid];
    transfer_in_base_norm += t.gmv_norm;
    transfer_in_base_gmv  += t.gmv;
    transfer_in_outlets.push({ outlet_id: oid, gmv_norm: t.gmv_norm, account_name: t.account_name, period_month: t.period_month });
  });

  var base_norm = base_norm_original - transfer_out_base_norm + transfer_in_base_norm;
  var base_gmv  = base_gmv_original  - transfer_out_base_gmv  + transfer_in_base_gmv;
  var cohort_outlets = Object.keys(baseMap).length;

  var handover_base_norm = 0;
  baseMonthRows.forEach(function (r) {
    if (r.movement_type === 'handover' && r.base_gmv > 0) {
      var base_d = parseFloat(r.base_days) || 31;
      handover_base_norm += (parseFloat(r.base_gmv) || 0) / base_d * 30;
    }
  });

  var MOVEMENTS = ['core_nrr', 'core_nrr_churn', 'handover', 'new_sales',
    'expansion', 'comeback', 'transfer_in', 'transfer_out'];

  var by_month = {};
  months.forEach(function (month) {
    var monthRows = scopedRows.filter(function (r) { return r.period_month === month; });
    var segments = {};
    var outlets  = {};
    MOVEMENTS.forEach(function (m) { segments[m] = 0; outlets[m] = 0; });

    var seenOutlets = {};
    var nrr_curr_norm = 0;
    var core_nrr_base_sum = 0;

    monthRows.forEach(function (r) {
      var mv = _effectiveMovement(r);
      if (!mv) return;
      var base_d = parseFloat(r.base_days) || 31;
      var curr_d = parseFloat(r.curr_days) || 30;
      var gmvVal = (mv === 'core_nrr_churn' || mv === 'transfer_out')
        ? (parseFloat(r.base_gmv) || 0) / base_d * 30
        : (parseFloat(r.curr_gmv) || 0) / curr_d * 30;
      segments[mv] = (segments[mv] || 0) + gmvVal;
      outlets[mv]  = (outlets[mv]  || 0) + 1;

      if (mv === 'core_nrr') {
        core_nrr_base_sum += (parseFloat(r.base_gmv) || 0) / base_d * 30;
      }

      if ((mv === 'core_nrr' || mv === 'core_nrr_churn' || mv === 'transfer_in') && r.base_gmv > 0) {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          var curr_days = r.curr_days || 30;
          nrr_curr_norm += curr_days > 0 ? r.curr_gmv / curr_days : 0;
        }
      }

      // Comeback: pure upside added only to the numerator against an
      // unchanged base (comeback outlets have base_gmv=0 by definition —
      // never in baseMap, never touch the denominator). Intentionally
      // asymmetric with transfer_in, which adds to BOTH sides.
      if (mv === 'comeback') {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          var curr_days_cb = r.curr_days || 30;
          nrr_curr_norm += curr_days_cb > 0 ? r.curr_gmv / curr_days_cb : 0;
        }
      }
    });

    var nrr_pct = base_norm > 0 ? Math.round(nrr_curr_norm / base_norm * 100) : null;

    var total_gmv = MOVEMENTS
      .filter(function (m) { return m !== 'transfer_out' && m !== 'core_nrr_churn'; })
      .reduce(function (s, m) { return s + (segments[m] || 0); }, 0);

    var curr_days_sample = monthRows.find(function (r) { return r.curr_days > 0; });
    var curr_days = curr_days_sample ? curr_days_sample.curr_days : 30;
    var contraction = (segments.core_nrr || 0) - core_nrr_base_sum;

    var monthParts  = month.split('-');
    var daysInMonth = new Date(parseInt(monthParts[0], 10), parseInt(monthParts[1], 10), 0).getDate();
    var isPartial   = curr_days > 0 && curr_days < daysInMonth - 2;

    by_month[month] = {
      nrr_pct: nrr_pct, total_gmv: total_gmv, segments: segments, outlets: outlets,
      rows: monthRows, curr_days: curr_days, days_in_month: daysInMonth,
      is_partial: isPartial, core_nrr_base: core_nrr_base_sum, contraction: contraction
    };
  });

  return {
    quarter: QNRR_CFG.quarter,
    base_month: base_month,
    months: months,
    base_gmv: base_gmv,
    base_norm: base_norm,
    base_norm_original: base_norm_original,
    transfer_out_base_norm: transfer_out_base_norm,
    transfer_out_outlets: transfer_out_outlets,
    transfer_in_base_norm: transfer_in_base_norm,
    transfer_in_outlets: transfer_in_outlets,
    handover_base_norm: handover_base_norm,
    cohort_outlets: cohort_outlets,
    by_month: by_month
  };
}
window._qnrrCompute = _qnrrCompute;

// ── nrrComputeBucket — PM/Admin portfolio-view NRR, grouped by account_type ──
// PM/Admin data (pm_view.csv / admin_view.csv) has NO kam/tl email columns at
// all — there is no per-person or per-team ownership concept for these two
// portfolio types, only account_type (SA/MC vs Chain). This is NOT a port
// from Sense (nothing in Sense computes PM/Admin NRR today) — it's the same
// %NRR formula as _qnrrCompute above, re-targeted to filter by
// nrrAccountBucket(row) === bucket instead of kam/tl email.
//
// Deliberately simpler than _qnrrCompute in two ways:
//  1. No _effectiveMovement-style neutralization — there's no "same-team
//     transfer" concept across account_type buckets, so every transfer_in/
//     transfer_out counts at face value, always.
//  2. No filtering by current_portfolio — exactly like rep_view rows are
//     never filtered by current_portfolio in _qnrrCompute, pm_view.csv /
//     admin_view.csv rows already represent "this portfolio's movement
//     story" end to end (including rows where current_portfolio shows the
//     outlet left to KAM/SALE this quarter) — filtering them out would
//     incorrectly drop real transfer_out/in adjustments.
//
// rows: the full allRows array from bulkPmData or bulkAdminData.
// bucket: 'chain' | 'sa_mc' | 'other' (see nrrAccountBucket in nrr_data.js).
function nrrComputeBucket(rows, bucket) {
  if (!rows || !rows.length) return null;
  var bucketRows = rows.filter(function (r) { return nrrAccountBucket(r) === bucket; });
  return nrrComputeRowsPool(bucketRows, bucket);
}
window.nrrComputeBucket = nrrComputeBucket;

// ── nrrComputeRowsPool — the pooled-rows NRR formula itself (v5 extract) ──
// Extracted verbatim from nrrComputeBucket so the SAME formula also serves
// the VP view (vp_view.csv: all three portfolios pooled, no bucket filter).
// The formula is naturally correct for VP: transfer_out still subtracts
// from the denominator, and the transfer_in adjustment computes to zero on
// its own because VP rows contain no transfer_in (verified in the Q2 vp
// SQL — inter-portfolio moves are invisible inside one pool).
function nrrComputeRowsPool(bucketRows, bucketLabel) {
  if (!bucketRows || !bucketRows.length) return null;

  function effMv(r) {
    if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) return 'core_nrr_churn';
    return r.movement_type;
  }

  var months = [];
  var monthSet = {};
  bucketRows.forEach(function (r) {
    if (!monthSet[r.period_month]) { monthSet[r.period_month] = 1; months.push(r.period_month); }
  });
  months.sort();
  var baseMonth = months[0];

  var baseMap = {};
  bucketRows.filter(function (r) { return r.period_month === baseMonth; }).forEach(function (r) {
    // Same month-1 transfer_in exclusion as _qnrrCompute's baseMap (see the
    // divergence note in the file header) — pm_view.csv carries inbound
    // transfer_in rows too, so the pool base double-counts identically.
    if (r.base_gmv > 0 && !baseMap[r.outlet_id] && r.movement_type !== 'handover'
        && effMv(r) !== 'transfer_in') {
      baseMap[r.outlet_id] = { gmv: r.base_gmv, days: r.base_days || 31 };
    }
  });

  var base_norm_original = 0;
  Object.keys(baseMap).forEach(function (oid) { base_norm_original += baseMap[oid].gmv / baseMap[oid].days; });

  var transferOutNorm = 0;
  var transfer_out_outlets = [];
  var seenOut = {};
  bucketRows.forEach(function (r) {
    if (effMv(r) === 'transfer_out' && baseMap[r.outlet_id] && !seenOut[r.outlet_id]) {
      seenOut[r.outlet_id] = true;
      transferOutNorm += baseMap[r.outlet_id].gmv / baseMap[r.outlet_id].days;
      transfer_out_outlets.push({ outlet_id: r.outlet_id, account_name: r.account_name || '', period_month: r.period_month });
    }
  });

  var transferInNorm = 0;
  var transfer_in_outlets = [];
  var seenIn = {};
  bucketRows.forEach(function (r) {
    if (effMv(r) === 'transfer_in' && !seenIn[r.outlet_id]) {
      seenIn[r.outlet_id] = true;
      var b_gmv = parseFloat(r.base_gmv) || 0;
      var b_days = parseFloat(r.base_days) || 31;
      transferInNorm += b_gmv / b_days;
      transfer_in_outlets.push({ outlet_id: r.outlet_id, account_name: r.account_name || '', period_month: r.period_month });
    }
  });

  var base_norm = base_norm_original - transferOutNorm + transferInNorm;
  var cohort_outlets = Object.keys(baseMap).length;

  // Handover base — base-month GMV of handover-cohort outlets, ×30
  // normalized. Mirrors _qnrrCompute's handover_base_norm so the shared
  // chart's base-column slate segment and the "cohort มิ.ย." table row
  // reconcile for PM/Admin/VP views too (v5 addition; was silently 0 for
  // bucket results in v4).
  var handover_base_norm = 0;
  bucketRows.filter(function (r) { return r.period_month === baseMonth; }).forEach(function (r) {
    if (r.movement_type === 'handover' && r.base_gmv > 0) {
      var hb_d = parseFloat(r.base_days) || 31;
      handover_base_norm += (parseFloat(r.base_gmv) || 0) / hb_d * 30;
    }
  });

  var by_month = {};
  months.forEach(function (month) {
    var monthRows = bucketRows.filter(function (r) { return r.period_month === month; });
    var segments = {}; var outlets = {};
    ['core_nrr', 'core_nrr_churn', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in', 'transfer_out'].forEach(function (m) {
      segments[m] = 0; outlets[m] = 0;
    });
    var seenOutlets = {};
    var nrr_curr_norm = 0;

    monthRows.forEach(function (r) {
      var mv = effMv(r);
      var base_d = parseFloat(r.base_days) || 31;
      var curr_d = parseFloat(r.curr_days) || 30;
      var gmvVal = (mv === 'core_nrr_churn' || mv === 'transfer_out')
        ? (parseFloat(r.base_gmv) || 0) / base_d * 30
        : (parseFloat(r.curr_gmv) || 0) / curr_d * 30;
      segments[mv] = (segments[mv] || 0) + gmvVal;
      outlets[mv] = (outlets[mv] || 0) + 1;

      if ((mv === 'core_nrr' || mv === 'core_nrr_churn' || mv === 'transfer_in') && r.base_gmv > 0) {
        if (!seenOutlets[r.outlet_id]) {
          seenOutlets[r.outlet_id] = true;
          nrr_curr_norm += r.curr_days > 0 ? r.curr_gmv / r.curr_days : 0;
        }
      }
      if (mv === 'comeback' && !seenOutlets[r.outlet_id]) {
        seenOutlets[r.outlet_id] = true;
        nrr_curr_norm += r.curr_days > 0 ? r.curr_gmv / r.curr_days : 0;
      }
    });

    var nrr_pct = base_norm > 0 ? Math.round(nrr_curr_norm / base_norm * 100) : null;

    // v4 additive fields mirroring _qnrrCompute's month block, so the
    // shared movement chart/table + expansion components can consume both
    // result shapes identically. (This function is NOT a Sense port — safe
    // to extend, per header comment. _qnrrCompute stays frozen.)
    var total_gmv = ['core_nrr', 'handover', 'new_sales', 'expansion', 'comeback', 'transfer_in']
      .reduce(function (s, m) { return s + (segments[m] || 0); }, 0);
    var curr_days_sample = monthRows.find(function (r) { return r.curr_days > 0; });
    var curr_days = curr_days_sample ? curr_days_sample.curr_days : 30;
    var monthParts = month.split('-');
    var daysInMonth = new Date(parseInt(monthParts[0], 10), parseInt(monthParts[1], 10), 0).getDate();
    var isPartial = curr_days > 0 && curr_days < daysInMonth - 2;

    by_month[month] = {
      nrr_pct: nrr_pct, segments: segments, outlets: outlets,
      rows: monthRows, total_gmv: total_gmv,
      curr_days: curr_days, days_in_month: daysInMonth, is_partial: isPartial
    };
  });

  return {
    bucket: bucketLabel || null,
    // baseMonth above is the first PERIOD month (used only to pick which
    // rows carry the base cohort). The actual base month label is the
    // quarter config's fixed base month — same convention as _qnrrCompute.
    base_month: QNRR_CFG.base_month,
    base_norm: base_norm,
    base_norm_original: base_norm_original,
    transfer_out_base_norm: transferOutNorm,
    transfer_out_outlets: transfer_out_outlets,
    transfer_in_base_norm: transferInNorm,
    transfer_in_outlets: transfer_in_outlets,
    handover_base_norm: handover_base_norm,
    cohort_outlets: cohort_outlets,
    months: months,
    by_month: by_month
  };
}
window.nrrComputeRowsPool = nrrComputeRowsPool;

// ── nrrClassifyRow — standalone per-row classifier for outlet-level UI ──
// _effectiveMovement above is a closure private to _qnrrCompute (matches
// Sense's own source exactly, on purpose — do not touch it). The drill-down
// UI (movement badges on individual outlet rows) needs the same
// classification available OUTSIDE that closure, so this is a parameterized
// copy of the identical logic. If _effectiveMovement above ever changes,
// this must change too, in lockstep.
function nrrClassifyRow(r, scope, myTlEmail) {
  if (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0) {
    return 'core_nrr_churn';
  }
  if (scope === 'kam') return r.movement_type;

  var isOrgWideView = (scope === 'admin') || (scope === 'tl' && !myTlEmail);
  if (isOrgWideView) {
    var isPureKamMoveOrg = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
    if (isPureKamMoveOrg && r.movement_type === 'transfer_out') return null;
    if (isPureKamMoveOrg && r.movement_type === 'transfer_in')  return 'core_nrr';
    return r.movement_type;
  }

  var sameTlBase   = r.base_tl_email && r.base_tl_email === myTlEmail;
  var sameTlPeriod = r.latest_tl_email === myTlEmail;
  var isPureKamMove = (r.base_portfolio === 'KAM' && r.current_portfolio === 'KAM') || !r.transfer_scope;
  var sameTeam = sameTlBase && sameTlPeriod && isPureKamMove;
  if (sameTeam && r.movement_type === 'transfer_out') return null;
  if (sameTeam && r.movement_type === 'transfer_in')  return 'core_nrr';
  return r.movement_type;
}
window.nrrClassifyRow = nrrClassifyRow;

<script>
// ── nrr_data.js — R2 CSV fetch + parse for /nrr ──────────────────────────
// parseCSVRow ported verbatim from src/02_data_pipeline.js (repo-wide
// convention — no external CSV library anywhere in this codebase).
// The bulkQnrrData shape built here matches EXACTLY what Sense's own
// bulk-qnrr-single handler builds (src/02_data_pipeline.js:1120-1176),
// including the 29-column order, so nrr_logic.js's ported _qnrrCompute
// works unmodified against it.

var R2_BASE = 'https://pub-12078d17646340808024e8cc95504995.r2.dev';

window.bulkQnrrData = { loaded: false };

function parseCSVRow(row) {
  var fields = []; var cur = ''; var inQ = false;
  for (var i = 0; i < row.length; i++) {
    var c = row[i];
    if (inQ) {
      if (c === '"' && row[i + 1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cur += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
  }
  fields.push(cur.trim());
  return fields;
}

function _nrrParseQnrrCsv(text) {
  var lines = text.trim().split('\n').slice(1).filter(function (l) { return l.trim(); });
  var byKamEmail = {}, byTlEmail = {}, allRows = [];
  lines.forEach(function (l) {
    var p = parseCSVRow(l);
    if (!p[0] || !p[1]) return;
    var row = {
      period_month:            (p[0] || '').trim(),
      movement_type:           (p[1] || '').trim(),
      transfer_scope:          (p[2] || '').trim(),
      current_portfolio:       (p[3] || '').trim(),
      current_staff_owner:     (p[4] || '').trim(),
      base_portfolio:          (p[5] || '').trim(),
      base_staff_owner:        (p[6] || '').trim(),
      outlet_id:               (p[7] || '').trim(),
      account_id:              (p[8] || '').trim(),
      account_name:            (p[9] || '').trim(),
      res_name:                (p[10] || '').trim(),
      account_type:            (p[11] || '').trim(),
      cohort_month:            (p[12] || '').trim(),
      curr_gmv:                parseFloat(p[13]) || 0,
      base_gmv:                parseFloat(p[14]) || 0,
      base_days:               parseInt(p[15], 10) || 31,
      curr_days:               parseInt(p[16], 10) || 30,
      first_dollar_date:       (p[17] || '').trim(),
      first_portfolio_date:    (p[18] || '').trim(),
      first_dollar_owner:      (p[19] || '').trim(),
      new_user_exp_date:       (p[20] || '').trim(),
      latest_tl:               (p[21] || '').trim(),
      base_tl:                 (p[22] || '').trim(),
      latest_staff_owner:      (p[23] || '').trim(),
      latest_commercial_owner: (p[24] || '').trim(),
      latest_kam_email:        (p[25] || '').trim(),
      latest_tl_email:         (p[26] || '').trim(),
      base_kam_email:          (p[27] || '').trim(),
      base_tl_email:           (p[28] || '').trim()
    };
    allRows.push(row);
    // Blank latest_kam_email/latest_tl_email rows (a handful exist in real
    // data) are intentionally left out of the per-person indices but still
    // land in allRows — org/admin-scope aggregation must never depend on a
    // per-person key being present (see docs on the v840-class bug).
    if (row.latest_kam_email) {
      if (!byKamEmail[row.latest_kam_email]) byKamEmail[row.latest_kam_email] = [];
      byKamEmail[row.latest_kam_email].push(row);
    }
    if (row.latest_tl_email) {
      if (!byTlEmail[row.latest_tl_email]) byTlEmail[row.latest_tl_email] = [];
      byTlEmail[row.latest_tl_email].push(row);
    }
  });
  return { byKamEmail: byKamEmail, byTlEmail: byTlEmail, allRows: allRows };
}

async function nrrFetchQnrrCsv(force) {
  if (window.bulkQnrrData && window.bulkQnrrData.loaded && !force) return window.bulkQnrrData;
  var url = R2_BASE + '/' + QNRR_CFG.csv_file + '?cb=' + Date.now();
  var lastErr = null;
  for (var attempt = 0; attempt < 3; attempt++) {
    try {
      var res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = await res.text();
      var parsed = _nrrParseQnrrCsv(text);
      window.bulkQnrrData = {
        byKamEmail: parsed.byKamEmail,
        byTlEmail: parsed.byTlEmail,
        allRows: parsed.allRows,
        loaded: true,
        loadedAt: Date.now()
      };
      return window.bulkQnrrData;
    } catch (e) {
      lastErr = e;
      if (attempt < 2) await new Promise(function (r) { setTimeout(r, 800 * (attempt + 1)); });
    }
  }
  console.warn('[nrr] failed to load ' + QNRR_CFG.csv_file, lastErr);
  throw lastErr;
}
window.nrrFetchQnrrCsv = nrrFetchQnrrCsv;

// List of distinct TLs present in the data (email + display name), sorted
// by display name — drives the cross-team comparison table (admin only).
function nrrListTeams() {
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return [];
  var seen = {};
  var out = [];
  (qd.allRows || []).forEach(function (r) {
    var email = r.latest_tl_email;
    if (!email || seen[email]) return;
    seen[email] = true;
    out.push({ email: email, name: r.latest_tl || email });
  });
  out.sort(function (a, b) { return a.name.localeCompare(b.name, 'th'); });
  return out;
}
window.nrrListTeams = nrrListTeams;

// List of distinct KAMs within a team (by latest_tl_email), for the
// Team -> KAM drill-down.
function nrrListKamsForTeam(tlEmail) {
  var qd = window.bulkQnrrData;
  if (!qd || !qd.loaded) return [];
  var seen = {};
  var out = [];
  (qd.byTlEmail[tlEmail] || []).forEach(function (r) {
    var email = r.latest_kam_email;
    if (!email || seen[email]) return;
    seen[email] = true;
    out.push({ email: email, name: r.latest_staff_owner || email });
  });
  out.sort(function (a, b) { return a.name.localeCompare(b.name, 'th'); });
  return out;
}
window.nrrListKamsForTeam = nrrListKamsForTeam;

// ── PM / Admin portfolio views ───────────────────────────────────────────
// pm_view.csv / admin_view.csv come from DIFFERENT SQL sources
// (sql/q3_2026_movement_pm_view.sql, .../admin_view.sql) with a SMALLER
// 21-column schema — no latest_kam_email/latest_tl_email/latest_tl/base_tl
// at all, because PM/Admin portfolios have no per-KAM/TL ownership concept.
// PM rows are ~99% staff-attributed by NAME (no email); Admin rows are ~99%

// Shared fetch for both portfolio-view files. Returns {allRows, loaded}
// or {allRows:[], loaded:false, notFound:true} on 404 — callers must show
// an explicit "PM/Admin data not available yet" state, never fail silently
// (this file is genuinely not uploaded to R2 as of first implementation —
// confirmed 404 when checked directly).
async function _nrrFetchPortfolioCsv(filename) {
  var url = R2_BASE + '/' + filename + '?cb=' + Date.now();
  try {
    var res = await fetch(url);
    if (res.status === 404) return { allRows: [], loaded: false, notFound: true };
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    var allRows = _nrrParsePortfolioCsv(text);
    // Staleness guard (added 2026-07-09): pm_view.csv/admin_view.csv are
    // each regenerated by a separate BigQuery run + manual R2 upload, not
    // wired to any auto-refresh — a run gets skipped and nobody notices
    // until the numbers look off (caught for admin_view: it silently held
    // 2026-Q2 data — Apr/May/Jun — three months INTO Q3). Flag it loudly
    // instead of quietly rendering last quarter's movement as "current."
    var months = Array.from(new Set(allRows.map(function (r) { return r.period_month; })));
    var isStale = months.length > 0 && !months.some(function (m) { return QNRR_CFG.q_months.indexOf(m) > -1; });
    return { allRows: allRows, loaded: true, loadedAt: Date.now(), months: months, isStale: isStale };
  } catch (e) {
    console.warn('[nrr] failed to load ' + filename, e);
    return { allRows: [], loaded: false, error: e.message };
  }
}

// ── Commission V2 — per-KAM upsell bundle (lazy, on-demand) ─────────────
// Mirrors src/02_data_pipeline.js's per-KAM bundle handler exactly: same
// R2_BASE, same safe-key derivation, same "no kam_email column" format
// (that column only exists in the ALL-KAMs bulk file, not the per-KAM one —
// confirmed by reading the real parser, not assumed from the SQL header
// comment, which describes the bulk file's 7 cols, not this 6-col one).
var nrrUpsellBundleCache = {}; // { [email]: {data, baselineGroups, loaded} }
var nrrUpsellBundleInFlight = {};

function _nrrKamSafeKey(email) {
  return (email || '').toLowerCase().replace(/[^a-z0-9]/g, '_');
}

var _TH_MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                  'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

function nrrThMonthLabel(d) { return _TH_MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543); }

// Every existing last_order_date consumer just echoes the raw ISO string —
// this is a deliberate new convention for the churn drawer specifically,
// since "29 มิ.ย." reads far better next to a Thai-labeled ฿ amount than
// "2026-06-29" does. Day-level only (no year) to match the month chips'
// own terseness.
function nrrShortThaiDate(iso) {
  var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
  if (!m) return null;
  var mIdx = parseInt(m[2], 10) - 1;
  if (mIdx < 0 || mIdx > 11) return null;
  return parseInt(m[3], 10) + ' ' + _TH_MONTHS[mIdx];
}
window.nrrShortThaiDate = nrrShortThaiDate;

// Rolling, "today"-relative 3-month window — matches 02_data_pipeline.js's
// _p1BaselineLabels exactly (lag-1 anchor, months 1/2/3 back from there).
// NOTE: this is deliberately NOT the quarterly-pinned base_month window —
// P1's "has this outlet ever bought this group" check floats with today's
// date in the real system too; only P3's baseline magnitude is quarter-pinned
// (see nrrP3WindowLabels). Faithfully replicating both, not "fixing" either.
function nrrP1BaselineLabels() {
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  var set = {};
  [1, 2, 3].forEach(function (i) {
    var d = new Date(lag.getFullYear(), lag.getMonth() - i, 1);
    set[nrrThMonthLabel(d)] = true;
  });
  return set;
}

function nrrCommCurrentMonthLabel() {
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  return nrrThMonthLabel(lag);
}

// Quarterly-pinned window: labels for baseMonthIso ('2026-06') and the
// (count-1) months before it — matches 07a_commission_engine.js's
// _commBaseMonthLabels(baseMonthOverride, count) exactly.
function nrrP3WindowLabels(baseMonthIso, count) {
  var parts = baseMonthIso.split('-');
  var yr = parseInt(parts[0], 10), mo = parseInt(parts[1], 10); // mo is 1-based
  var out = [];
  for (var i = 0; i < count; i++) {
    var d = new Date(yr, mo - 1 - i, 1);
    out.push(nrrThMonthLabel(d));
  }
  return out;
}
window.nrrP3WindowLabels = nrrP3WindowLabels;
window.nrrCommCurrentMonthLabel = nrrCommCurrentMonthLabel;

function nrrDaysInLabel(label) {
  try {
    var parts = label.split(' ');
    var mIdx = _TH_MONTHS.indexOf(parts[0]);
    var year = parseInt(parts[1], 10) - 543;
    if (mIdx < 0 || !year) return 30;
    return new Date(year, mIdx + 1, 0).getDate();
  } catch (e) { return 30; }
}
window.nrrDaysInLabel = nrrDaysInLabel;

async function nrrFetchUpsellBundle(kamEmail) {
  if (nrrUpsellBundleCache[kamEmail] && nrrUpsellBundleCache[kamEmail].loaded) return nrrUpsellBundleCache[kamEmail];
  if (nrrUpsellBundleInFlight[kamEmail]) return nrrUpsellBundleInFlight[kamEmail];
  var safeKey = _nrrKamSafeKey(kamEmail);
  var url = R2_BASE + '/sense_upsell_' + safeKey + '.csv?cb=' + Date.now();
  var p = (async function () {
    try {
      var res = await fetch(url);
      if (res.status === 404) return { data: {}, baselineGroups: {}, loaded: false, notFound: true };
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = await res.text();
      var lines = text.trim().split(/\r?\n/).filter(function (l) { return l.trim(); });
      if (lines.length && /account_id/i.test(lines[0])) lines = lines.slice(1);

      var p1Labels = nrrP1BaselineLabels();
      var currLabel = nrrCommCurrentMonthLabel();
      var data = {};             // accountId -> outletId -> groupKey -> monthLabel -> {existingGmv,totalGmv}
      var baselineGroups = {};   // accountId -> outletId -> Set-like object of groupKey -> true

      lines.forEach(function (l) {
        // Per-KAM bundle has NO kam_email column: account_id, outlet_id,
        // month_label, group_key, existing_gmv, total_gmv (6 cols).
        var p = parseCSVRow(l);
        var accountId = (p[0] || '').trim();
        var outletId = (p[1] || '').trim();
        var monthLabel = (p[2] || '').trim();
        var groupKey = (p[3] || '').trim();
        var existingGmv = parseFloat(p[4]) || 0;
        var totalGmv = parseFloat(p[5]) || 0;
        if (!accountId || !outletId || !monthLabel || !groupKey) return;

        if (!data[accountId]) data[accountId] = {};
        if (!data[accountId][outletId]) data[accountId][outletId] = {};
        if (!data[accountId][outletId][groupKey]) data[accountId][outletId][groupKey] = {};
        data[accountId][outletId][groupKey][monthLabel] = { existingGmv: existingGmv, totalGmv: totalGmv };

        if (monthLabel !== currLabel && totalGmv > 0 && p1Labels[monthLabel]) {
          if (!baselineGroups[accountId]) baselineGroups[accountId] = {};
          if (!baselineGroups[accountId][outletId]) baselineGroups[accountId][outletId] = {};
          baselineGroups[accountId][outletId][groupKey] = true;
        }
      });

      var bundle = { data: data, baselineGroups: baselineGroups, loaded: true, loadedAt: Date.now() };
      nrrUpsellBundleCache[kamEmail] = bundle;
      return bundle;
    } catch (e) {
      console.warn('[nrr] failed to load upsell bundle for ' + kamEmail, e);
      return { data: {}, baselineGroups: {}, loaded: false, error: e.message };
    } finally {
      delete nrrUpsellBundleInFlight[kamEmail];
    }
  })();
  nrrUpsellBundleInFlight[kamEmail] = p;
  return p;
}
window.nrrFetchUpsellBundle = nrrFetchUpsellBundle;

// ── nrr_core.js — auth, role gate, format helpers, CountUp ───────────────
// Auth pattern ported from src/dashboard/dash_core.js (same Supabase
// project, same profiles table). Role gate is intentionally narrower than
// /dashboard's: only 'tl'/'admin'/'rep' get in, because _qnrrCompute's scope
// logic (nrr_logic.js) only defines real behavior for scope 'kam'/'tl'/
// 'admin' — sales_tl/ad_tl have no defined NRR-scope semantics in the
// actual business logic, so letting them in would show meaningless numbers.
// 'rep' (added Phase B, 2026-07-09) maps to scope 'kam' — reps only ever
// see the Portfolio layer (nrr_router.js's guard confines them there),
// never the tl/admin dashboard.

var SUPA_URL = 'https://menslbnyyvpxiyvjywcm.supabase.co';
var SUPA_KEY = 'sb_publishable_DRCzHd782Gry8Edu4ZIiHA_KuOgBIIG';
var NRR_ALLOWED_ROLES = ['tl', 'admin', 'team_lead', 'team lead', 'rep'];

var supa = null;
var nrrProfile = null;

function nrrNormalizeRole(r) {
  var s = String(r || '').trim().toLowerCase();
  if (['team_lead', 'team lead', 'tl'].includes(s)) return 'tl';
  if (['admin', 'ad'].includes(s)) return 'admin';
  return s || '';
}

window.addEventListener('DOMContentLoaded', async function () {
  supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  try {
    var sessionResp = await supa.auth.getSession();
    var session = sessionResp.data.session;
    if (session) await nrrOnSessionReady(session);

  } catch (e) {

    nrrShowAuthError('เชื่อมต่อระบบไม่ได้ — กรุณาลองใหม่');

  supa.auth.onAuthStateChange(async function (event, session) {

// ── Format helpers ────────────────────────────────────────────────────
function nrrFmtGMV(v) {
  if (v == null || isNaN(v)) return '—';
  var neg = v < 0; v = Math.abs(v);
  var s;
  if (v >= 1e6) s = '฿' + (v / 1e6).toFixed(1) + 'M';
  else if (v >= 1e3) s = '฿' + Math.round(v / 1e3) + 'K';
  else s = '฿' + Math.round(v).toLocaleString();
  return neg ? '-' + s : s;
}
window.nrrFmtGMV = nrrFmtGMV;

// Exact-baht formatter — for commission payouts specifically (user ask
// 2026-07-09: "50,123" not "50K"). Movement/GMV figures elsewhere in the
// app stay abbreviated via nrrFmtGMV — commission is a payroll number
// teams reconcile against payslips, where nrrFmtGMV's rounding is
// actively unhelpful.
function nrrFmtGMVExact(v) {
  if (v == null || isNaN(v)) return '—';
  var neg = v < 0;
  return (neg ? '-' : '') + '฿' + Math.round(Math.abs(v)).toLocaleString('en-US');
}
window.nrrFmtGMVExact = nrrFmtGMVExact;

function nrrFmtPct(v) { return v != null ? v + '%' : '—'; }
window.nrrFmtPct = nrrFmtPct;

function nrrFmtDelta(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v + 'pp';
}
window.nrrFmtDelta = nrrFmtDelta;

// ── CountUp — cubic ease-out, ported from src/06_portview_teamview.js ──
function nrrCountUp(el, target, duration, formatter) {
  duration = duration || 900;
  formatter = formatter || function (n) { return Math.round(n).toLocaleString(); };
  if (!el) return;
  if (target === 0) { el.textContent = formatter(0); return; }
  var start = performance.now();
  var startVal = 0;
  function tick(t) {
    var p = Math.min((t - start) / duration, 1);
    var eased = 1 - Math.pow(1 - p, 3);
    el.textContent = formatter(startVal + eased * (target - startVal));
    if (p < 1) requestAnimationFrame(tick);
    else {
      el.classList.add('nrr-pop');
      setTimeout(function () { el.classList.remove('nrr-pop'); }, 420);
    }
  }
  requestAnimationFrame(tick);
}
window.nrrCountUp = nrrCountUp;

<script>
// ── nrr_router.js — hash router for the two-layer app ────────────────────
// Layer 1 "Dashboard"  = the original one-page notebook (tl/admin).
// Layer 2 "Portfolio"  = per-KAM operational drill-down (portfolio →
//                        account), added Phase B/C/D.
//
// Routes:
//   #/                      → dashboard (rep is redirected to #/portfolio)
//   #/portfolio             → own portfolio (rep) / KAM switcher (tl/admin)
//   #/portfolio/<kamEmail>  → a specific KAM's portfolio (permission-guarded)
//   #/account/<accountId>   → one account's detail (permission-guarded)
//
// Views are sibling containers (`.nrr-view`, id="nrr-view-<name>") toggled
// with [hidden] — the dashboard DOM is never torn down, so its render cycle
// (nrrRenderAll) keeps working exactly as before this router existed.
// Render hooks are registered per view via nrrRouterRegister(); the router
// only guards, toggles visibility, and dispatches.

var nrrRoutes = {};          // { viewName: function(route) }
var nrrCurrentRoute = null;

function nrrRouterRegister(name, fn) { nrrRoutes[name] = fn; }
window.nrrRouterRegister = nrrRouterRegister;

function nrrParseHash() {
  var h = (location.hash || '').replace(/^#\/?/, '');
  var parts = h.split('/').filter(Boolean);
  if (!parts.length) return { view: 'dashboard', param: null };
  if (parts[0] === 'portfolio') return { view: 'portfolio', param: parts[1] ? decodeURIComponent(parts[1]) : null };
  if (parts[0] === 'account') return { view: 'account', param: parts[1] ? decodeURIComponent(parts[1]) : null };
  if (parts[0] === 'company') return { view: 'company', param: null };
  if (parts[0] === 'sales') return { view: 'sales', param: null };
  return { view: 'dashboard', param: null };
}

// Role guard. Returns the route to actually show; sets .redirect when the
// requested one is not allowed for this profile.
//  - rep: portfolio layer only, and only their own portfolio. Account-level
//    ownership (rep opening someone else's account) is enforced by the
//    account view itself once it has portview data (Phase C) — the router
//    can't know account→KAM mapping before that data loads.
//  - tl: dashboard (own team) + portfolio, but only KAMs in their own team
//    (Phase B, 2026-07-09) — without this a TL could open
//    #/portfolio/<kamEmail> for a KAM outside their team by editing the
//    URL directly; the KAM-switcher UI only ever *offers* their own team,
//    it doesn't enforce it, so the guard has to be here too.
//  - admin: everything.
function nrrRouteGuard(route) {
  var p = window.nrrProfile;
  if (!p) return route;
  // Company overview + Sales pipeline (v28): whole-company data — admin only.
  if ((route.view === 'company' || route.view === 'sales') && p.role !== 'admin') {
    return { view: 'dashboard', param: null, redirect: true };
  }
  if (p.role === 'rep') {
    if (route.view === 'dashboard') return { view: 'portfolio', param: null, redirect: true };
    if (route.view === 'portfolio' && route.param && route.param !== p.email) {
      return { view: 'portfolio', param: null, redirect: true };
    }
  }
  if (p.role === 'tl' && route.view === 'portfolio' && route.param) {
    var ownTeam = (typeof nrrListKamsForTeam === 'function' ? nrrListKamsForTeam(p.email) : []);
    var inTeam = ownTeam.some(function (k) { return k.email === route.param; });
    if (!inTeam) return { view: 'portfolio', param: null, redirect: true };
  }
  return route;
}

function nrrRouteHash(route) {
  if (route.view === 'dashboard') return '#/';
  return '#/' + route.view + (route.param ? '/' + encodeURIComponent(route.param) : '');
}

function nrrNavigate(hash) {
  if (location.hash === hash) { nrrHandleRoute(); return; }
  location.hash = hash;
}
window.nrrNavigate = nrrNavigate;

function nrrHandleRoute() {
  var route = nrrRouteGuard(nrrParseHash());
  if (route.redirect) { location.replace(nrrRouteHash(route)); return; }

  var changedView = !nrrCurrentRoute || nrrCurrentRoute.view !== route.view;

  document.querySelectorAll('.nrr-view').forEach(function (el) {
    el.hidden = el.id !== 'nrr-view-' + route.view;
  });

  // App-level nav active state: the account view belongs to the portfolio
  // family; company/sales (v28) are their own tabs.
  var navFamily = route.view === 'dashboard' ? 'dashboard'
    : (route.view === 'company' || route.view === 'sales') ? route.view
    : 'portfolio';
  document.querySelectorAll('#nrr-appnav a').forEach(function (a) {
    a.classList.toggle('on', a.dataset.view === navFamily);
  });

  // The scrollspy subnav (and its divider) only make sense inside the
  // dashboard's long scroll.
  var subnav = document.getElementById('nrr-subnav');
  if (subnav) subnav.style.display = route.view === 'dashboard' ? '' : 'none';
  var navDiv = document.querySelector('.nrr-appnav-div');
  if (navDiv) navDiv.style.display = route.view === 'dashboard' ? '' : 'none';

  nrrCurrentRoute = route;
  var fn = nrrRoutes[route.view];
  if (fn) fn(route);
  if (changedView) window.scrollTo(0, 0);
}
window.nrrHandleRoute = nrrHandleRoute;

window.addEventListener('hashchange', nrrHandleRoute);
</script>
<script>
// ── nrr_aggregate.js — org / team / KAM / outlet rollups ─────────────────
// All rollups are computed client-side from the single flat CSV, by calling
// the ported _qnrrCompute (nrr_logic.js) at the appropriate scope — never
// by re-filtering/re-classifying rows independently, so movement badges
// shown anywhere in the UI always agree with the totals in the sections
// above them.
//
// Deliberate scope choice (see plan notes): a KAM's own %NRR shown in the
// Team -> KAM drill-down is computed at scope='kam' (their personal number,
// identical to what they see in Sense). The movement badges on the outlets
// listed under that KAM use scope='tl' (the enclosing team's lens) so the
// colors/categories reconcile with the team-level movement breakdown above.
// At the KAM -> Outlet level, everything switches to that KAM's own
// scope='kam' lens (inspecting one person's book on its own terms).

function nrrCurrentPeriod(result) {
  if (!result || !result.months || !result.months.length) return null;
  // Prefer the latest month that actually has row data; QNRR_CFG.q_months
  // may list months that haven't started yet (e.g. Aug/Sep before they
  // occur) — result.months only contains months present in the CSV.
  return result.months[result.months.length - 1];
}
window.nrrCurrentPeriod = nrrCurrentPeriod;

// ── Actual-month display convention (2026-07-09, user decision) ─────────
// The compute engine (nrr_logic.js, frozen twin of Sense's 07c) normalizes
// everything to 30-day figures. The teams however read performance in
// ACTUAL calendar-month baht, so every displayed amount is converted:
//   value_actual = day-rate × days-in-that-month
// Closed months → exact actuals; the open month → full-month projection
// from the MTD run-rate. ONLY money display changes — %NRR stays the
// engine's 30-day-normalized ratio (the fair cross-month comparator).
function nrrDaysIn(month) {
  var p = (month || '').split('-');
  return p.length === 2 ? new Date(parseInt(p[0], 10), parseInt(p[1], 10), 0).getDate() : 30;
}
window.nrrDaysIn = nrrDaysIn;
function nrrBaseDays() { return nrrDaysIn(QNRR_CFG.base_month); }
window.nrrBaseDays = nrrBaseDays;

// Scales one engine result's ×30 display fields (segments, total_gmv,
// handover/core base sums, contraction) to actual-month values, in place,
// exactly once. Applied at every result-producing entry point below so
// every consumer (charts, tables, triples, composition bar) stays
// internally consistent without touching the frozen engine.
function _nrrActualizeResult(result) {
  if (!result || result._actualized) return result;
  var bScale = nrrBaseDays() / 30;
  result.handover_base_norm = (result.handover_base_norm || 0) * bScale;
  Object.keys(result.by_month || {}).forEach(function (m) {
    var bm = result.by_month[m];
    var scale = (bm.days_in_month || nrrDaysIn(m)) / 30;
    Object.keys(bm.segments || {}).forEach(function (mv) {
      // churn/transfer_out segments carry BASE-month GMV ("ฐานที่หาย") —
      // their actual value belongs to the base month's calendar, not the
      // current month's.
      bm.segments[mv] *= (mv === 'core_nrr_churn' || mv === 'transfer_out') ? bScale : scale;
    });
    bm.total_gmv = (bm.total_gmv || 0) * scale; // excludes churn/transfer_out by construction
    if (bm.core_nrr_base != null) bm.core_nrr_base *= bScale;
    if (bm.contraction != null) bm.contraction = (bm.segments.core_nrr || 0) - (bm.core_nrr_base || 0);
  });
  result._actualized = true;
  return result;
}

function nrrOrgResult() {
  return _nrrActualizeResult(_qnrrCompute(null, 'admin'));
}
window.nrrOrgResult = nrrOrgResult;

function nrrTeamResult(tlEmail) {

    var bm = result && period ? result.by_month[period] : null;
    var outletCount = 0;
    if (bm) {
      ['core_nrr', 'core_nrr_churn', 'comeback', 'transfer_in'].forEach(function (m) {
        outletCount += bm.outlets[m] || 0;

// ── v4: number-triple accessor ───────────────────────────────────────────
// {base, mtd, run_rate, curr_days, days_in_month, is_partial} for one month
// of a compute result (works for both _qnrrCompute and nrrComputeBucket
// shapes — both carry by_month with rows/total_gmv/curr_days/is_partial).
// MTD = sum of raw curr_gmv over the same movement set total_gmv counts
// (everything except transfer_out/churn, whose "gmv" is base-side) — summed
// raw, NOT derived from total_gmv×days/30, so it's exact per-row.
function nrrMonthTriple(result, month) {
  if (!result || !month || !result.by_month || !result.by_month[month]) return null;
  var bm = result.by_month[month];
  var mtd = 0;
  (bm.rows || []).forEach(function (r) {
    var mv = r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0
      ? 'core_nrr_churn' : r.movement_type;
    if (mv === 'core_nrr_churn' || mv === 'transfer_out') return;
    mtd += parseFloat(r.curr_gmv) || 0;
  });
  return {
    base: Math.round(result.base_norm * nrrBaseDays()),
    mtd: Math.round(mtd),
    run_rate: Math.round(bm.total_gmv || 0),
    curr_days: bm.curr_days,
    days_in_month: bm.days_in_month || 30,
    is_partial: !!bm.is_partial
  };
}

// ── v4: outlets behind one movement number (the "why" drill) ─────────────
// scopeCtx: {scope:'tl'|'admin'|'kam', tlEmail} for rep-view results, or
// {scope:'bucket'} for PM/Admin bucket results (bucket rows are already
// pre-filtered; only the churn reclassification applies there).
function nrrOutletsForMovement(result, month, movementType, scopeCtx) {
  if (!result || !result.by_month || !result.by_month[month]) return [];
  var rows = result.by_month[month].rows || [];
  var out = [];
  rows.forEach(function (r) {
    var mv;
    if (scopeCtx && scopeCtx.scope === 'bucket') {
      mv = (r.movement_type === 'core_nrr' && (parseFloat(r.curr_gmv) || 0) === 0)
        ? 'core_nrr_churn' : r.movement_type;
    } else {
      mv = nrrClassifyRow(r, (scopeCtx && scopeCtx.scope) || 'admin', (scopeCtx && scopeCtx.tlEmail) || '');
    }
    if (mv === movementType) out.push({ row: r, movement: mv });
  });
  // Churn/transfer_out sort by LOST base value (that's the pain being
  // inspected); everything else by current run-rate value.
  var negative = movementType === 'core_nrr_churn' || movementType === 'transfer_out';
  out.sort(function (a, b) {
    return negative
      ? (b.row.base_gmv || 0) - (a.row.base_gmv || 0)

  });
  return out;
}

// Group outlet-drill-down rows by account_id — adapted from the proven
// _olGroupByAccount pattern in src/10_sales_view.js:390-406 (1 company can
// have many branches, e.g. Cafe Amazon PTT = 275 outlets under one
// account_id). Groups sorted by total curr_gmv desc, branches within a
// group sorted the same way (kept from nrrOutletsForKam's own sort).
function nrrGroupOutletsByAccount(outlets) {
  var groups = {}; // account_id -> {account_id, account_name, outlets:[], total_curr_gmv, total_base_gmv}
  outlets.forEach(function (o) {
    var key = o.row.account_id || o.row.account_name || 'unknown';
    if (!groups[key]) {
      groups[key] = {
        account_id: key,
        account_name: o.row.account_name || key,
        outlets: [],
        total_curr_gmv: 0,
        total_base_gmv: 0,
        total_run_rate: 0,

    groups[key].total_curr_gmv += o.row.curr_gmv || 0;

    groups[key].curr_days = gd;

// Max last_order_date for ONE specific outlet within an account, across all

// PER-OUTLET classification: a chain account can have one branch churn
// (curr_gmv 0 this period) while a sibling branch under the SAME account_id
// is still very much active. An account-wide max would silently borrow the
// active sibling's fresh order date onto the churned branch's row, making a
// real churn look like a false alarm — caught exactly this way in review
// (2026-07-10): a 2-outlet account showed "churn" next to a days-old order
// date that actually belonged to the OTHER outlet under that account_id.
// ISO YYYY-MM-DD strings sort correctly with a plain string max. Returns

function nrrCompanyModel() {
  var cd = window.bulkCompanyData;
  if (!cd || !cd.loaded || !cd.allRows || !cd.allRows.length) return null;

// ── Sales handover pipeline model (from bulkSalesPipelineData) ───────────
// Buckets each currently-Sales-owned outlet by how soon its handover
// deadline (new_user_exp_date) falls, using REAL today (not the day-1 lag
// anchor used elsewhere) since this is a business deadline, not a
// data-availability concern:
//   overdue         — deadline already passed, still Sales-owned (needs
//                     action now)
//   this_month      — deadline is later this calendar month
//   next_month      — deadline falls in the following calendar month
//   plus2           — two months out
//   plus3_or_later  — three-plus months out
//   no_date         — new_user_exp_date missing/unparseable
// Each bucket carries {gmv, outlets, rows[]} (rows sorted soonest/most-
// overdue first) so the UI can both show a headline number and drill into
// the underlying account list.
// v29: buckets by REAL forward calendar month (not vague "+N เดือน" labels)
// so the pipeline reads as an actual month-by-month table, same language as
// the company audit table. Buckets: overdue, m0 (this month) .. m{MAX_OFFSET}
// (the last one is a "this month or later" catch-all), no_date. 45-day SA /
// 90-day MC-Chain deadlines mean nothing meaningful lives past ~3 months out
// today, but the bucket count isn't hardcoded to that assumption.
var NRR_PIPE_MAX_OFFSET = 5;

function nrrSalesPipelineModel() {
  var pd = window.bulkSalesPipelineData;
  if (!pd || !pd.loaded || !pd.allRows || !pd.allRows.length) return null;
  var TH_MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var todayKey = today.getFullYear() * 12 + today.getMonth();

  var order = ['overdue'];
  var labels = { overdue: 'เลยกำหนดแล้ว', no_date: 'ไม่มีกำหนด' };
  for (var i = 0; i <= NRR_PIPE_MAX_OFFSET; i++) {
    var d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    var key = 'm' + i;
    order.push(key);
    var lbl = TH_MONTHS[d.getMonth()] + ' ' + (d.getFullYear() + 543);
    labels[key] = i === 0 ? 'เดือนนี้ (' + lbl + ')' : (i === NRR_PIPE_MAX_OFFSET ? lbl + ' ขึ้นไป' : lbl);
  }
  order.push('no_date');

  var buckets = {};
  order.forEach(function (k) {
    buckets[k] = { gmv: 0, outlets: 0, rows: [], bySquad: { chain: { gmv: 0, outlets: 0 }, sa_mc: { gmv: 0, outlets: 0 }, other: { gmv: 0, outlets: 0 } } };
  });
  var bySquad = { chain: 0, sa_mc: 0, other: 0 };

  pd.allRows.forEach(function (r) {
    var key;
    var d = r.new_user_exp_date ? new Date(r.new_user_exp_date + 'T00:00:00') : null;
    if (!d || isNaN(d.getTime())) {
      key = 'no_date';
    } else if (d < today) {
      key = 'overdue';
    } else {
      var diff = (d.getFullYear() * 12 + d.getMonth()) - todayKey;
      key = 'm' + Math.min(diff, NRR_PIPE_MAX_OFFSET);
    }
    var sq = (r.bucket === 'chain' || r.bucket === 'sa_mc') ? r.bucket : 'other';
    buckets[key].gmv += r.last_month_gmv;
    buckets[key].outlets += 1;
    buckets[key].rows.push(r);
    buckets[key].bySquad[sq].gmv += r.last_month_gmv;
    buckets[key].bySquad[sq].outlets += 1;
    bySquad[sq] += r.last_month_gmv;
  });

  // overdue: most-overdue (oldest date) first; future buckets: soonest first
  order.forEach(function (k) {
    buckets[k].rows.sort(function (a, b) {
      if (a.new_user_exp_date === b.new_user_exp_date) return 0;
      return a.new_user_exp_date < b.new_user_exp_date ? -1 : 1;
    });
  });

  var total = order.reduce(function (s, k) { return s + buckets[k].gmv; }, 0);
  return { buckets: buckets, order: order, labels: labels, bySquad: bySquad, total: total, asOf: today };
}
window.nrrSalesPipelineModel = nrrSalesPipelineModel;

// Per-Sales-rep breakdown of a set of pipeline rows (a bucket's rows, or any

// staff_owner (old CSV before the v4 SQL added it, or genuinely blank) group
// under "ไม่ระบุ Sales".
function nrrPipelineByRep(rows) {
  var byRep = {};
  rows.forEach(function (r) {
    var rep = (r.staff_owner || '').trim() || 'ไม่ระบุ Sales';
    if (!byRep[rep]) byRep[rep] = { rep: rep, gmv: 0, outlets: 0, rows: [] };
    byRep[rep].gmv += r.last_month_gmv;
    byRep[rep].outlets += 1;
    byRep[rep].rows.push(r);
  });
  return Object.values(byRep).sort(function (a, b) { return b.gmv - a.gmv; });

// ── v5: handover cohort model (replicates Sense's verified pattern) ──────
// movement_type already encodes the cohort split at the SQL level:
//   'handover'  = new_user_exp_date in the base month → "cohort มิ.ย."
//   'new_sales' = exp date during the quarter → one cohort per the FIRST
//                 period_month the outlet appears in (claim-dedup), with
//                 its GMV carried forward into later months.
// Returns:
// {
//   handover:    { by_month: {m: {gmv, outlets:[{row,movement}]}} },
//   new_cohorts: [ { cohort_month, by_month: {m: {gmv, outlets}} } ]  // non-empty only
// }
function nrrHandoverCohorts(result) {
  var model = { handover: { by_month: {} }, new_cohorts: [] };
  if (!result || !result.months) return model;

  result.months.forEach(function (month) {
    var bm = result.by_month[month];
    var outlets = (bm.rows || []).filter(function (r) { return r.movement_type === 'handover'; })
      .map(function (r) { return { row: r, movement: 'handover' }; });
    var gmv = outlets.reduce(function (s, o) {
      var d = parseFloat(o.row.curr_days) || 30;
      return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * nrrDaysIn(o.row.period_month) : 0);
    }, 0);
    model.handover.by_month[month] = { gmv: gmv, outlets: outlets };
  });

  // new_sales cohorts: claim each outlet into the first month it appears.
  var claimed = {}; // outlet_id -> cohort_month
  result.months.forEach(function (month) {
    (result.by_month[month].rows || []).forEach(function (r) {
      if (r.movement_type === 'new_sales' && !claimed[r.outlet_id]) claimed[r.outlet_id] = month;
    });
  });
  var cohortMonths = {};
  Object.keys(claimed).forEach(function (oid) { cohortMonths[claimed[oid]] = true; });

  Object.keys(cohortMonths).sort().forEach(function (cm) {
    var cohort = { cohort_month: cm, by_month: {} };
    result.months.forEach(function (month) {
      if (month < cm) { cohort.by_month[month] = null; return; } // "—" before cohort month
      var outlets = (result.by_month[month].rows || []).filter(function (r) {
        return r.movement_type === 'new_sales' && claimed[r.outlet_id] === cm;
      }).map(function (r) { return { row: r, movement: 'new_sales' }; });
      var gmv = outlets.reduce(function (s, o) {
        var d = parseFloat(o.row.curr_days) || 30;
        return s + (d > 0 ? (parseFloat(o.row.curr_gmv) || 0) / d * nrrDaysIn(o.row.period_month) : 0);
      }, 0);
      cohort.by_month[month] = { gmv: gmv, outlets: outlets };
    });
    model.new_cohorts.push(cohort);
  });

  return model;
}
window.nrrHandoverCohorts = nrrHandoverCohorts;

// VP "Total Portfolio" — 3 separate %NRR (KAM/PM/Admin), never blended into
// one number (per user's explicit answer), plus one combined GMV figure.
function nrrTotalPortfolio() {
  var kam = nrrOrgResult();
  var kamPeriod = nrrCurrentPeriod(kam);
  var kamPct = kam && kamPeriod ? kam.by_month[kamPeriod].nrr_pct : null;
  var kamGmv = kam ? Math.round(kam.base_norm * nrrBaseDays()) : 0;

  var pm = nrrPmResult();
  var pmPct = _nrrBlendedBucketPct(pm);
  var pmGmv = _nrrBlendedBucketGmv(pm);

  var admin = nrrAdminResult();
  var adminPct = _nrrBlendedBucketPct(admin);
  var adminGmv = _nrrBlendedBucketGmv(admin);

  return {
    kam: { pct: kamPct, gmv: kamGmv },
    pm: { pct: pmPct, gmv: pmGmv },
    admin: { pct: adminPct, gmv: adminGmv },
    total_gmv: kamGmv + pmGmv + adminGmv
  };
}
window.nrrTotalPortfolio = nrrTotalPortfolio;

// For a PM/Admin section's own headline %NRR (e.g. "PM overall"), blend its
// chain+sa_mc+other buckets back into one pooled numerator/denominator —
// this is a within-portfolio blend (chain+sa_mc are both still "PM"), not
// the KAM/PM/Admin cross-portfolio blend the user explicitly said NOT to do.
function _nrrBlendedBucketPct(bucketResult) {
  if (!bucketResult) return null;
  var buckets = ['chain', 'sa_mc', 'other'];
  var num = 0, den = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (!r) return;
    var period = nrrCurrentPeriod(r);
    var bm = period ? r.by_month[period] : null;
    if (!bm || bm.nrr_pct == null) return;
    den += r.base_norm;
    num += (bm.nrr_pct / 100) * r.base_norm;
  });
  return den > 0 ? Math.round(num / den * 100) : null;
}

function _nrrBlendedBucketGmv(bucketResult) {
  if (!bucketResult) return 0;
  var buckets = ['chain', 'sa_mc', 'other'];
  var total = 0;
  buckets.forEach(function (b) {
    var r = bucketResult[b];
    if (r) total += Math.round(r.base_norm * nrrBaseDays());
  });
  return total;
}

<script>
// ── nrr_commission.js — commission $ tie-in ──────────────────────────────
// Deliberately does NOT re-implement _commBuildKamPayout/_commBuildTlPayout
// (src/07a_commission_engine.js) — that engine pulls in most of Sense's
// global state (bulkUpsellData, portviewBulkData, governance policy from
// Supabase, gate/cap rules...) and re-deriving it here would risk getting
// real payout numbers subtly wrong outside its native environment.
//
// Instead: query commission_payout_snapshots directly, the SAME table and
// SAME query shape src/dashboard/dash_commission.js already uses. These
// rows are the authoritative, pre-computed output of that engine — under
// quarterly commission mode (confirmed live in the codebase, v829+), each
// period_month's snapshot already reflects that month's payout computed
// from the current quarter's %NRR. We read, never recompute.
//
// Caveat surfaced in the UI (section 8 methodology note): a period_month's
// payout_amount is that MONTH's installment under quarterly NRR mode, not
// a lump quarter-end total — commission is paid out monthly all quarter.

var nrrCommSnapshots = null; // { byEmail: {email: [rows]} , loaded }

async function nrrFetchCommissionSnapshots() {
  if (nrrCommSnapshots && nrrCommSnapshots.loaded) return nrrCommSnapshots;
  if (!supa) { nrrCommSnapshots = { byEmail: {}, loaded: false, error: 'no_auth' }; return nrrCommSnapshots; }
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .in('period_month', QNRR_CFG.q_months);
    var rows = resp.data || [];
    var byEmail = {};
    rows.forEach(function (r) {
      var key = r.beneficiary_email;
      if (!key) return;
      if (!byEmail[key]) byEmail[key] = [];
      byEmail[key].push(r);
    });
    nrrCommSnapshots = { byEmail: byEmail, rows: rows, loaded: true };
  } catch (e) {
    console.warn('[nrr] commission snapshot fetch failed', e);
    nrrCommSnapshots = { byEmail: {}, loaded: false, error: e.message };

}
window.nrrFetchCommissionSnapshots = nrrFetchCommissionSnapshots;

// Latest available quarter-month snapshot for one beneficiary email.
function nrrLatestSnapshotFor(email) {
  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return null;
  var rows = (nrrCommSnapshots.byEmail[email] || []).slice();
  if (!rows.length) return null;
  rows.sort(function (a, b) { return a.period_month < b.period_month ? 1 : -1; });
  return rows[0];
}
window.nrrLatestSnapshotFor = nrrLatestSnapshotFor;

// Sum of latest-available-month payouts across a list of emails (used for
// the org/team commission KPI tiles in section 5).
function nrrSumLatestPayouts(emails) {
  var total = 0; var found = 0; var missing = 0;
  emails.forEach(function (email) {
    var snap = nrrLatestSnapshotFor(email);
    if (snap && snap.payout_amount != null) { total += Number(snap.payout_amount) || 0; found++; }
    else missing++;
  });
  return { total: total, found: found, missing: missing };
}
window.nrrSumLatestPayouts = nrrSumLatestPayouts;

// All available quarter-month snapshots for one email, keyed by period_month
// (nrrLatestSnapshotFor only returns the single latest — the trend strip
// needs all three quarter months to draw its bars).
function nrrSnapshotsForEmailAcrossMonths(email) {

  if (!nrrCommSnapshots || !nrrCommSnapshots.loaded) return out;

  return out;
}
window.nrrSnapshotsForEmailAcrossMonths = nrrSnapshotsForEmailAcrossMonths;

// ── Live rates/thresholds (target_settings) — footnote only, never used to
// alter a displayed payout number. Mirrors 07a_commission_engine.js's
// _commGetConfig key pattern exactly: '{metricCode}_params' -> JSON object.
var nrrCommRatesCache = null; // { byKey: {key: parsedValue}, loaded }

async function nrrFetchCommissionRates() {
  if (nrrCommRatesCache && nrrCommRatesCache.loaded) return nrrCommRatesCache;
  if (!supa) { nrrCommRatesCache = { byKey: {}, loaded: false, error: 'no_auth' }; return nrrCommRatesCache; }
  try {

    var rows = resp.data || [];

    rows.forEach(function (s) {

function nrrCommRateGet(metricCode, paramName, fallback) {
  var raw = nrrCommRatesCache && nrrCommRatesCache.byKey ? nrrCommRatesCache.byKey[metricCode + '_params'] : null;
  if (raw && typeof raw === 'object' && raw[paramName] != null) return raw[paramName];
