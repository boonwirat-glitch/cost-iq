window.nrrCommRateGet = nrrCommRateGet;

// ── Estimate engine v2 (2026-07-09) — mirrors the REAL payout structure ──
// The v1 estimator (ported from the retired TL dashboard) was a
// %-of-team-GMV scheme from an older Sales-TL plan — against today's
// fixed-amount tier plans it produced absurd numbers (฿834K for a TL whose
// real payout tops out at ฿50K×mult). v2 replicates what the Cockpit's
// engine actually does at Compute time, from the same live sources:
//
//   TL : NRR tier payout (commission_rule_tiers, e.g. 0/8K/12K/30K/50K)
//        × team upsell multiplier (tl_upsell_mult_params tiers on
//          team upsell GMV ÷ team base GMV, from sense_upsell_team.csv)
//   KAM: NRR tier payout (0/5K/10K)
//        + P1/P3 SKU comm + outlet comm (rates × sense_upsell_team.csv GMVs)
//        × NRR gate cap (gmv_gate_params: <95%→0, 95–98%→cap_1, ≥98%→1)
//        — handover retention NOT estimated (needs per-account handover
//          data); flagged in the returned note.
//
// Still a clearly-labeled ESTIMATE for unlocked periods only — %NRR is the
// MTD run-rate, upsell GMVs refresh on the team CSV's cadence.

// Plan tier tables + per-period assignments (4 small tables, fetched once).
var nrrCommPlansCache = { tiersByPlan: {}, assignments: {}, loaded: false };
async function nrrFetchCommissionPlans() {
  if (nrrCommPlansCache.loaded) return nrrCommPlansCache;
  try {
    var res = await Promise.all([
      supa.from('commission_plans').select('id,plan_code,beneficiary_role,status'),
      supa.from('commission_rules').select('id,plan_id,metric_code,active'),
      supa.from('commission_rule_tiers').select('rule_id,tier_order,min_value,max_value,payout_value'),
      supa.from('commission_plan_assignments').select('period_month,assignment_scope,assignee_key,plan_code')
    ]);
    var plans = res[0].data || [], rules = res[1].data || [];
    var tiers = res[2].data || [], assigns = res[3].data || [];
    var planById = {};
    plans.forEach(function (p) { planById[p.id] = p; });
    var tiersByPlan = {};
    rules.forEach(function (r) {
      if (r.metric_code !== 'nrr' || r.active === false) return;
      var plan = planById[r.plan_id];
      if (!plan) return;
      tiersByPlan[plan.plan_code] = tiers
        .filter(function (t) { return t.rule_id === r.id; })
        .sort(function (a, b) { return (a.tier_order || 0) - (b.tier_order || 0); });
    });
    var assignments = {};
    assigns.forEach(function (a) {
      assignments[a.period_month + '|' + a.assignment_scope + '|' + a.assignee_key] = a.plan_code;
    });
    nrrCommPlansCache = { tiersByPlan: tiersByPlan, assignments: assignments, loaded: true };
  } catch (e) {
    console.warn('[nrr] commission plans fetch failed', e);
    nrrCommPlansCache = { tiersByPlan: {}, assignments: {}, loaded: false, error: e.message };
  }
  return nrrCommPlansCache;
}
window.nrrFetchCommissionPlans = nrrFetchCommissionPlans;

// Engine's hardcoded fallback tiers (_commDefaultTiers) — used only if the
// plan tables can't be fetched, so the estimate degrades to STD not to 0.
function nrrCommDefaultTiers(role) {
  return role === 'tl'
    ? [{ min_value: null, max_value: 98.5, payout_value: 0 },
       { min_value: 98.5, max_value: 99,   payout_value: 0 },
       { min_value: 99,   max_value: 100,  payout_value: 8000 },
       { min_value: 100,  max_value: 102,  payout_value: 12000 },
       { min_value: 102,  max_value: 104,  payout_value: 30000 },
       { min_value: 104,  max_value: null, payout_value: 50000 }]
    : [{ min_value: null, max_value: 100,  payout_value: 0 },
       { min_value: 100,  max_value: 103,  payout_value: 5000 },
       { min_value: 103,  max_value: null, payout_value: 10000 }];
}

// Tier match — same open-interval convention as _commMatchTierByCode:
// pct >= min (null = open) && pct < max (null = open).
function nrrCommTierPayout(role, email, period, pct) {
  if (pct == null || isNaN(pct)) return 0;
  var std = role === 'tl' ? 'TL_NRR_STD' : 'KAM_NRR_STD';
  var code = nrrCommPlansCache.assignments[period + '|' + role + '|' + email] || std;
  var tiers = nrrCommPlansCache.tiersByPlan[code] || nrrCommPlansCache.tiersByPlan[std];
  if (!tiers || !tiers.length) tiers = nrrCommDefaultTiers(role);
  for (var i = 0; i < tiers.length; i++) {
    var t = tiers[i];
    var minOk = t.min_value == null || t.min_value === '' || pct >= Number(t.min_value);
    var maxOk = t.max_value == null || t.max_value === '' || pct < Number(t.max_value);
    if (minOk && maxOk) return Number(t.payout_value || 0);
  }
  return 0;
}
window.nrrCommTierPayout = nrrCommTierPayout;

// Full tier ladder with current/next flags + the pp gap to the next tier —
// feeds both the KAM/TL self-view tier chip+progress bar and the drawer's
// "วิธีคิดค่าคอมฯ" table. Reuses the exact same tier source/matching
// convention as nrrCommTierPayout (never a second source of truth).
function nrrCommTierTable(role, email, period, pct) {
  var std = role === 'tl' ? 'TL_NRR_STD' : 'KAM_NRR_STD';
  var code = nrrCommPlansCache.assignments[period + '|' + role + '|' + email] || std;
  var tiers = nrrCommPlansCache.tiersByPlan[code] || nrrCommPlansCache.tiersByPlan[std];
  if (!tiers || !tiers.length) tiers = nrrCommDefaultTiers(role);
  tiers = tiers.slice().sort(function (a, b) { return (Number(a.min_value) || -Infinity) - (Number(b.min_value) || -Infinity); });

  var currentIdx = -1;
  if (pct != null && !isNaN(pct)) {
    for (var i = 0; i < tiers.length; i++) {
      var t = tiers[i];
      var minOk = t.min_value == null || t.min_value === '' || pct >= Number(t.min_value);
      var maxOk = t.max_value == null || t.max_value === '' || pct < Number(t.max_value);
      if (minOk && maxOk) { currentIdx = i; break; }
    }
  }
  var nextIdx = currentIdx >= 0 && currentIdx < tiers.length - 1 ? currentIdx + 1 : -1;
  var rows = tiers.map(function (t, i) {
    return { min: t.min_value, max: t.max_value, payout: Number(t.payout_value || 0), label: t.payout_label || '',
      isCurrent: i === currentIdx, isNext: i === nextIdx };
  });
  var gapPp = (nextIdx >= 0 && pct != null) ? Math.max(0, Math.ceil(Number(tiers[nextIdx].min_value) - pct)) : null;
  return { tiers: rows, currentTier: currentIdx >= 0 ? rows[currentIdx] : null, nextTier: nextIdx >= 0 ? rows[nextIdx] : null, gapPp: gapPp };
}
window.nrrCommTierTable = nrrCommTierTable;

// Converts an estimate object (nrrEstimateTlCommission/nrrEstimateKamCommission's
// return shape) into an ordered list of "receipt" steps — one line per
// term of the real formula ((nrr_payout [+ upsell_comm]) × gate_cap [×
// team multiplier for TL] + handover.payout) — so the drawer can render
// the exact arithmetic instead of a paraphrased note. drillKey lets the
// renderer wire each line to its matching account-level section (or null
// for lines with no account list, e.g. the NRR tier line itself).
function nrrCommEstimateReceiptSteps(est) {
  if (!est) return [];
  var steps = [{ kind: 'add', first: true, label: 'NRR (' + est.pct + '%)', amount: est.nrr_payout, drillKey: 'nrr' }];
  if (est.kind === 'kam') {
    // v16: every component of the real formula gets its OWN line — always,
    // even at ฿0 — so the receipt never has a missing term and "why is
    // expansion separate from upsell" stops being a question (they're
    // visible siblings). Handover included at ฿0 too ("ไม่มีเดือนนี้").
    // A receipt must ADD UP exactly on screen: the last component absorbs
    // the per-line rounding remainder so Σ(lines) === subtotal to the baht.
    var p1r = est.p1_comm || 0, p3r = est.p3_comm || 0;
    var outR = (est.upsell_comm || 0) - p1r - p3r;
    var hoPay = (est.handover && est.handover.payout) || 0;
    steps.push({ kind: 'add', label: 'Upsell P1 · สินค้าใหม่', amount: p1r, drillKey: 'p1' });
    steps.push({ kind: 'add', label: 'Upsell P3 · สินค้าโต', amount: p3r, drillKey: 'p3' });
    steps.push({ kind: 'add', label: 'Expansion · ร้านขยาย 0.5%', amount: outR, drillKey: 'expansion' });
    // Handover is INSIDE the gate (engine 07a:691) — show it as a component
    // above the subtotal, then multiply the whole subtotal by the gate.
    steps.push({ kind: 'add', label: 'Handover · retention', amount: hoPay,
      meta: est.handover && est.handover.accounts ? est.handover.accounts + ' ร้าน · retention ' + est.handover.retention_pct + '%' : 'ไม่มีเดือนนี้',
      drillKey: est.handover && est.handover.detail && est.handover.detail.length ? 'handover' : null });
    steps.push({ kind: 'subtotal', label: 'รวมก่อน Gate', amount: est.nrr_payout + (est.upsell_comm || 0) + hoPay });
    steps.push({ kind: 'multiply', label: 'NRR Gate (' + est.pct + '% ' + (est.gate_cap >= 1 ? '≥' : '<') + ' ' + (est.gate_threshold || 98) + '%)', factor: est.gate_cap });
  } else {
    steps.push({ kind: 'multiply', label: 'ตัวคูณ upsell ทีม (' + (est.upsell_pct != null ? est.upsell_pct.toFixed(1) : '0.0') + '% ของฐาน)', factor: est.multiplier, drillKey: 'mult' });
  }
  steps.push({ kind: 'total', label: 'รวมค่าคอมฯ', amount: est.est });
  return steps;
}
window.nrrCommEstimateReceiptSteps = nrrCommEstimateReceiptSteps;

// Same receipt shape, sourced from a LOCKED snapshot's breakdown jsonb
// instead of a live estimate — field names match _commBuildSnapshotRows()
// (07a_commission_engine.js) exactly. Keeps one receipt renderer for both
// locked and unlocked periods — the whole point of this redesign is that
// both look the same.
function nrrCommSnapshotReceiptSteps(bd) {
  if (!bd) return [];
  var steps = [{ kind: 'add', first: true, label: 'NRR (' + (bd.nrr_pct != null ? bd.nrr_pct + '%' : '—') + ')', amount: bd.nrr_payout || 0, drillKey: 'nrr' }];
  if (bd.type === 'kam_full') {
    var sku = bd.upsell_sku || {};
    var upsell = ((sku.p1 && sku.p1.comm) || 0) + ((sku.p3 && sku.p3.comm) || 0) + ((bd.upsell_outlet && bd.upsell_outlet.commission) || 0);
    // Same add-up-exactly rule as the estimate steps: round P1/P3, the
    // Expansion line absorbs the remainder so Σ(lines) === subtotal.
    var p1Comm = Math.round((sku.p1 && sku.p1.comm) || 0);
    var p3Comm = Math.round((sku.p3 && sku.p3.comm) || 0);
    var outletComm = Math.round(upsell) - p1Comm - p3Comm;
    var hoPay = (bd.handover && bd.handover.payout) || 0;
    steps.push({ kind: 'add', label: 'Upsell P1 · สินค้าใหม่', amount: p1Comm, drillKey: 'p1' });
    steps.push({ kind: 'add', label: 'Upsell P3 · สินค้าโต', amount: p3Comm, drillKey: 'p3' });
    steps.push({ kind: 'add', label: 'Expansion · ร้านขยาย 0.5%', amount: outletComm, drillKey: 'expansion' });
    // Handover is INSIDE the gate (engine 07a:691) — component above the
    // subtotal, whole subtotal then ×gate to reach final_payout.
    steps.push({ kind: 'add', label: 'Handover · retention', amount: hoPay,
      meta: bd.handover && bd.handover.accounts ? bd.handover.accounts + ' ร้าน · retention ' + bd.handover.retention_pct + '%' : 'ไม่มีเดือนนี้',
      drillKey: bd.handover && bd.handover.detail && bd.handover.detail.length ? 'handover' : null });
    steps.push({ kind: 'subtotal', label: 'รวมก่อน Gate', amount: (bd.nrr_payout || 0) + upsell + hoPay });
    var gcap = bd.gmv_gate ? bd.gmv_gate.cap_multiplier : 1;
    steps.push({ kind: 'multiply', label: 'NRR Gate' + (bd.nrr_pct != null ? ' (' + bd.nrr_pct + '%)' : ''), factor: gcap });
  } else {
    var mult = bd.upsell_mult;
    steps.push({ kind: 'multiply', label: 'ตัวคูณ upsell ทีม', factor: typeof mult === 'object' ? mult.multiplier : parseFloat(mult) || 1, drillKey: 'mult' });
  }
  steps.push({ kind: 'total', label: 'รวมค่าคอมฯ', amount: bd.final_payout != null ? bd.final_payout : 0 });
  return steps;
}
window.nrrCommSnapshotReceiptSteps = nrrCommSnapshotReceiptSteps;

// sense_upsell_team.csv — per-KAM quarter-to-date upsell GMV totals
// (kam_email, p1_gmv, p3_incremental, outlet_gmv, tl_upsell_base). ~100KB.
var nrrUpsellTeamCache = { byEmail: {}, loaded: false };
async function nrrFetchUpsellTeamCsv() {
  if (nrrUpsellTeamCache.loaded) return nrrUpsellTeamCache;
  try {
    var resp = await fetch(R2_BASE + '/sense_upsell_team.csv?cb=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var lines = (await resp.text()).split('\n').filter(function (l) { return l.trim(); });
    var byEmail = {};
    for (var i = 1; i < lines.length; i++) {
      var c = parseCSVRow(lines[i]);
      byEmail[(c[0] || '').trim().toLowerCase()] = {
        p1_gmv: parseFloat(c[1]) || 0, p3_incremental: parseFloat(c[2]) || 0,
        outlet_gmv: parseFloat(c[3]) || 0, tl_upsell_base: parseFloat(c[4]) || 0
      };
    }
    nrrUpsellTeamCache = { byEmail: byEmail, loaded: true };
  } catch (e) {
    console.warn('[nrr] sense_upsell_team.csv fetch failed', e);
    nrrUpsellTeamCache = { byEmail: {}, loaded: false, error: e.message };
  }
  return nrrUpsellTeamCache;
}
window.nrrFetchUpsellTeamCsv = nrrFetchUpsellTeamCsv;

// Multiplier tiers from live target_settings (tl_upsell_mult_params),
// engine-default fallback baked in.
function nrrCommTeamMultiplier(upsellPct) {
  var raw = nrrCommRatesCache && nrrCommRatesCache.byKey ? nrrCommRatesCache.byKey.tl_upsell_mult_params : null;
  var tiers = raw && raw.tiers ? raw.tiers : [
    { min_pct: 0, max_pct: 1.99, multiplier: 1.00 }, { min_pct: 2, max_pct: 2.99, multiplier: 1.20 },
    { min_pct: 3, max_pct: 3.99, multiplier: 1.35 }, { min_pct: 4, max_pct: 4.99, multiplier: 1.50 },
    { min_pct: 5, max_pct: null, multiplier: 1.80 }];
  var mult = 1.0;
  tiers.forEach(function (t) {
    if (upsellPct >= (t.min_pct || 0) && (t.max_pct == null || upsellPct <= t.max_pct)) mult = t.multiplier;
  });
  return mult;
}

// pct: governed %NRR for the beneficiary (run-rate for the open month).
function nrrEstimateTlCommission(tlEmail, period, pct) {
  if (pct == null) return null;
  var nrrPayout = nrrCommTierPayout('tl', tlEmail, period, pct);
  var teamUpsell = 0, teamBase = 0;
  (typeof nrrListKamsForTeam === 'function' ? nrrListKamsForTeam(tlEmail) : []).forEach(function (k) {
    var row = nrrUpsellTeamCache.byEmail[(k.email || '').toLowerCase()];
    if (row) teamUpsell += row.tl_upsell_base;
    var kr = nrrKamResult(k.email);
    if (kr) teamBase += kr.base_gmv || 0;
  });
  var upsellPct = teamBase > 0 ? teamUpsell / teamBase * 100 : 0;
  var mult = nrrCommTeamMultiplier(upsellPct);
  return {
    kind: 'tl', pct: pct, nrr_payout: nrrPayout,
    upsell_pct: upsellPct, multiplier: mult,
    est: Math.round(nrrPayout * mult),
    note: 'NRR tier ฿' + nrrPayout.toLocaleString('en-US') + ' × ' + mult + 'x (upsell ทีม ' + upsellPct.toFixed(1) + '%)'
  };
}
window.nrrEstimateTlCommission = nrrEstimateTlCommission;

// ── Handover retention — live drill-down for the drawer ─────────────────
// portview_handover.csv is org-wide (all KAMs, one row per handed-over
// account) — fetched once, filtered per-KAM client-side. Mirrors
// _commComputeHandoverRetention's shape/columns exactly (07a_commission_
// engine.js:440) but period-relative (transfer_month = the month BEFORE
// the period being viewed) instead of relative to real "today", since
// /nrr's drawer can be opened for any period, not just the live one.
var nrrHandoverCsvCache = { rows: [], loaded: false };
async function nrrFetchHandoverCsv() {
  if (nrrHandoverCsvCache.loaded) return nrrHandoverCsvCache;
  try {
    var resp = await fetch(R2_BASE + '/portview_handover.csv?cb=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var lines = (await resp.text()).split('\n').filter(function (l) { return l.trim(); });
    var header = parseCSVRow(lines[0]);
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var c = parseCSVRow(lines[i]), o = {};
      header.forEach(function (h, idx) { o[h] = c[idx]; });
      rows.push(o);
    }
    nrrHandoverCsvCache = { rows: rows, loaded: true };
  } catch (e) {
    console.warn('[nrr] portview_handover.csv fetch failed', e);
    nrrHandoverCsvCache = { rows: [], loaded: false, error: e.message };
  }
  return nrrHandoverCsvCache;
}
window.nrrFetchHandoverCsv = nrrFetchHandoverCsv;

function _nrrPrevMonthOf(period) {
  var p = (period || '').split('-');
  if (p.length !== 2) return '';
  var d = new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1 - 1, 1); // -1 for 0-index, -1 for prev month
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// Returns { accounts, baseline_gmv, current_gmv, retention_pct, tier, payout, detail }
// detail: [{ name, account_id, baseline, current, transfer_month }]
function nrrComputeHandoverForKam(kamEmail, period) {
  var EMPTY = { accounts: 0, baseline_gmv: 0, current_gmv: 0, retention_pct: 0, payout: 0, detail: [] };
  var qd = window.bulkQnrrData;
  var kamRows = (qd && qd.byKamEmail && qd.byKamEmail[kamEmail]) || [];
  var kamName = kamRows.length ? (kamRows[0].latest_staff_owner || '') : '';
  if (!kamName || !nrrHandoverCsvCache.loaded) return EMPTY;

  var prevMonth = _nrrPrevMonthOf(period);
  var rows = nrrHandoverCsvCache.rows.filter(function (r) {
    return (r.new_kam_name || '').trim() === kamName &&
      (r.prev_owner || '').toUpperCase() === 'SALE' &&
      (r.transfer_month || '') === prevMonth;
  });
  if (!rows.length) return EMPTY;

  var baselineNorm = 0, perfNorm = 0, baselineGmv = 0, currentGmv = 0;
  var detail = rows.map(function (r) {
    var b = parseFloat(r.baseline_gmv) || 0, p = parseFloat(r.perf_gmv) || 0;
    var bd = parseFloat(r.baseline_days_in_month) || 30, pd = parseFloat(r.perf_days_in_month) || 30;
    baselineNorm += b / bd * 30; perfNorm += p / pd * 30;
    baselineGmv += b; currentGmv += p;
    return { name: r.account_name || r.account_id, account_id: r.account_id, baseline: b, current: p, transfer_month: r.transfer_month };
  });
  var retentionPct = baselineNorm > 0 ? Math.round(perfNorm / baselineNorm * 100) : 0;

  var t2Pct = nrrCommRateGet('handover', 'tier2_pct', 100);
  var t3Pct = nrrCommRateGet('handover', 'tier3_pct', 120);
  var t2Pay = nrrCommRateGet('handover', 'tier2_payout', 2500);
  var t3Bonus = nrrCommRateGet('handover', 'tier3_bonus', 2500);
  var payout = retentionPct >= t3Pct ? t2Pay + t3Bonus : retentionPct >= t2Pct ? t2Pay : 0;

  return { accounts: rows.length, baseline_gmv: baselineGmv, current_gmv: currentGmv, retention_pct: retentionPct, payout: payout, detail: detail };
}
window.nrrComputeHandoverForKam = nrrComputeHandoverForKam;

function nrrEstimateKamCommission(kamEmail, period, pct) {
  if (pct == null) return null;
  var nrrPayout = nrrCommTierPayout('kam', kamEmail, period, pct);
  var row = nrrUpsellTeamCache.byEmail[(kamEmail || '').toLowerCase()] || { p1_gmv: 0, p3_incremental: 0, outlet_gmv: 0 };
  var p1Rate = nrrCommRateGet('upsell_sku', 'p1_rate', 0.01);
  var p3Rate = nrrCommRateGet('upsell_sku', 'p3_rate', 0.01);
  var outRate = nrrCommRateGet('upsell_outlet', 'rate', 0.005);
  // Components kept separate (v16) — the receipt renders one line per
  // component; only the arithmetic below combines them.
  var p1Comm = row.p1_gmv * p1Rate;
  var p3Comm = row.p3_incremental * p3Rate;
  var outletComm = row.outlet_gmv * outRate;
  var upsellComm = p1Comm + p3Comm + outletComm;
  // NRR gate — same thresholds/caps the engine applies (_commComputeGmvGate).
  // Handover IS gated: the real engine (_commBuildKamPayout,
  // 07a_commission_engine.js:688-692) folds handover.payout into the
  // subtotal FIRST, then multiplies the whole thing by the gate cap:
  //   subtotal = nrr + upsell(sku+outlet) + handover
  //   final    = round(subtotal × cap)
  // (An earlier port added handover OUTSIDE the gate; that was wrong —
  // the two "verification" rows it cited both happened to be cases where
  // the formulas coincide, Dent handover=0 and Pop gate=1.0, so the
  // gate<1 AND handover>0 case was never actually exercised. Fixed
  // 2026-07-09 to match the engine that generates locked payroll.)
  var t1 = nrrCommRateGet('gmv_gate', 'threshold_1', 98);
  var t2 = nrrCommRateGet('gmv_gate', 'threshold_2', 95);
  var cap = 1.0;
  if (pct < t2) cap = nrrCommRateGet('gmv_gate', 'cap_2', 0);
  else if (pct < t1) cap = nrrCommRateGet('gmv_gate', 'cap_1', 0.3);
  var handover = nrrComputeHandoverForKam(kamEmail, period);
  return {
    kind: 'kam', pct: pct, nrr_payout: nrrPayout,
    p1_comm: Math.round(p1Comm), p3_comm: Math.round(p3Comm), outlet_comm: Math.round(outletComm),
    upsell_comm: Math.round(upsellComm),
    gate_threshold: t1, gate_cap: cap, handover: handover,
    est: Math.round((nrrPayout + upsellComm + handover.payout) * cap),
    note: '(NRR ฿' + nrrPayout.toLocaleString('en-US') + ' + upsell ฿' + Math.round(upsellComm).toLocaleString('en-US') +
      (handover.payout ? ' + handover ฿' + handover.payout.toLocaleString('en-US') : '') + ')' +
      (cap < 1 ? ' × gate ' + cap + 'x' : '')
  };
}
window.nrrEstimateKamCommission = nrrEstimateKamCommission;

// ── Commission V2 — P1/P3 upsell classification ──────────────────────────
// Verbatim port of _commComputeUpsellSku() (07a_commission_engine.js:176-318)
// against the lean per-KAM bundle nrrFetchUpsellBundle() builds. Read-only,
// on-demand, drill-down-supporting math — never used to alter a displayed
// payout number (that always comes from the locked snapshot or the pace
// estimate). expansionOutletIds: Set<string> of outlet IDs already earning
// the 0.5% outlet commission, excluded here — /nrr derives this for free
// from its own already-loaded QNRR rows (movement_type === 'expansion'),
// no extra fetch needed.
function nrrComputeUpsellSku(expansionOutletIds, bundle, baseMonthIso) {
  var EMPTY = { p1: { gmv: 0, comm: 0, groups: [] }, p3: { gmv_incremental: 0, comm: 0, groups: [] },
                total_comm: 0, total_gmv_eligible: 0 };
  if (!bundle || !bundle.loaded) return EMPTY;
  var expIds = expansionOutletIds instanceof Set ? expansionOutletIds : new Set();
  var data = bundle.data || {};
  var baselineGroups = bundle.baselineGroups || {};

  var p1Rate    = nrrCommRateGet('upsell_sku', 'p1_rate', 0.01);
  var p3Rate    = nrrCommRateGet('upsell_sku', 'p3_rate', 0.01);
  var p3Thresh  = nrrCommRateGet('upsell_sku', 'p3_threshold_pct', 2.00);
  var p3MinIncr = nrrCommRateGet('upsell_sku', 'p3_min_incremental', 8000);
  var p1MinGmv  = nrrCommRateGet('upsell_sku', 'p1_min_gmv', 5000);

  var currLabel = nrrCommCurrentMonthLabel();
  var p3Labels = nrrP3WindowLabels(baseMonthIso, 3);

  var p1Groups = [], p3Groups = [];

  Object.keys(data).forEach(function (accountId) {
    var outletMap = data[accountId];
    var baselineByOutlet = baselineGroups[accountId] || {};

    Object.keys(outletMap).forEach(function (outletId) {
      if (expIds.has(String(outletId))) return; // earns 0.5% via outlet commission instead
      var outletGroups = outletMap[outletId];
      var outletBaseline = baselineByOutlet[outletId] || {};

      Object.keys(outletGroups).forEach(function (groupKey) {
        var monthData = outletGroups[groupKey];
        var currRow = monthData[currLabel];
        if (!currRow) return;

        var rawTotalGmv = currRow.totalGmv || 0;
        var rawExistingGmv = currRow.existingGmv || 0;
        var isP1 = !outletBaseline[groupKey];

        if (isP1) {
          if (rawTotalGmv >= p1MinGmv) {
            var p1Comm = rawTotalGmv * p1Rate;
            p1Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey, total_gmv: rawTotalGmv, commission: p1Comm });
          }
        } else {
          var maxBaseline = 0, maxBaselineMonth = p3Labels[0];
          p3Labels.forEach(function (lbl) {
            var lRow = monthData[lbl];
            if (!lRow) return;
            var d = nrrDaysInLabel(lbl);
            var norm30 = d > 0 ? lRow.totalGmv / d * 30 : lRow.totalGmv;
            if (norm30 > maxBaseline) { maxBaseline = norm30; maxBaselineMonth = lbl; }
          });
          if (rawExistingGmv > maxBaseline * p3Thresh) {
            var incremental = rawExistingGmv - maxBaseline;
            if (incremental >= p3MinIncr) {
              var p3Comm = incremental * p3Rate;
              p3Groups.push({ accountId: accountId, outletId: outletId, groupKey: groupKey,
                existing_curr: rawExistingGmv, max_baseline: maxBaseline, max_baseline_month: maxBaselineMonth,
                incremental: incremental, commission: p3Comm });
            }
          }
        }
      });
    });
  });

  var p1Gmv = p1Groups.reduce(function (s, g) { return s + g.total_gmv; }, 0);
  var p1Comm = p1Groups.reduce(function (s, g) { return s + g.commission; }, 0);
  var p3Incr = p3Groups.reduce(function (s, g) { return s + g.incremental; }, 0);
  var p3Comm = p3Groups.reduce(function (s, g) { return s + g.commission; }, 0);

  return {
    p1: { gmv: p1Gmv, comm: p1Comm, groups: p1Groups },
    p3: { gmv_incremental: p3Incr, comm: p3Comm, groups: p3Groups },
    total_comm: p1Comm + p3Comm,
    total_gmv_eligible: p1Gmv + p3Incr
  };
}
window.nrrComputeUpsellSku = nrrComputeUpsellSku;

// ── Full Table view (history) — arbitrary period, not limited to the
// current quarter's QNRR_CFG.q_months. Same table/columns as
// nrrFetchCommissionSnapshots, just without the quarter filter, so any
// locked/draft period ever computed in Sense can be browsed here. Cached
// per period_month so switching the dropdown back and forth is instant.
var nrrCommAvailablePeriods = null; // [ '2026-06', '2026-05', ... ] desc
var nrrCommPeriodCache = {}; // { [period_month]: { rows, loaded } }

async function nrrFetchAvailablePeriods() {
  if (nrrCommAvailablePeriods) return nrrCommAvailablePeriods;
  if (!supa) return [];
  try {
    var resp = await supa.from('commission_payout_snapshots').select('period_month');
    var seen = {};
    (resp.data || []).forEach(function (r) { if (r.period_month) seen[r.period_month] = true; });
    nrrCommAvailablePeriods = Object.keys(seen).sort().reverse();
  } catch (e) {
    console.warn('[nrr] failed to load available commission periods', e);
    nrrCommAvailablePeriods = [];
  }
  return nrrCommAvailablePeriods;
}
window.nrrFetchAvailablePeriods = nrrFetchAvailablePeriods;

async function nrrFetchSnapshotsForPeriod(periodMonth) {
  if (nrrCommPeriodCache[periodMonth] && nrrCommPeriodCache[periodMonth].loaded) return nrrCommPeriodCache[periodMonth];
  if (!supa) return { rows: [], loaded: false, error: 'no_auth' };
  try {
    var resp = await supa.from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .eq('period_month', periodMonth);
    var out = { rows: resp.data || [], loaded: true };
    nrrCommPeriodCache[periodMonth] = out;
    return out;
  } catch (e) {
    console.warn('[nrr] failed to load snapshots for ' + periodMonth, e);
    return { rows: [], loaded: false, error: e.message };
  }
}
window.nrrFetchSnapshotsForPeriod = nrrFetchSnapshotsForPeriod;
</script>
<script>
// ── nrr_portfolio.js — Portfolio layer pure logic (Phase B, 2026-07-09) ──
// Pace/filter logic over window.bulkPortviewData (nrr_data.js). Deliberately
// a separate file from nrr_commission.js — this is account-level pace/churn
// signal, not commission math, even though both feed the same Portfolio view.
//
// Baseline decision (round 2, 2026-07-09 — do not "fix" this back to Sense's
// own convention without re-reading this note): Sense's real portview pace
// (06_portview_teamview.js:2-51, computePaceSignal) uses a ROLLING average
// of the trailing 1-3 months as baseline. /nrr deliberately does NOT copy
// that — every other number on this page (%NRR, commission) is anchored to
// the quarter's FIXED base_month (QNRR_CFG.base_month) for the whole
// quarter, so account-level pace uses that SAME fixed month too. Otherwise
// two baselines would silently disagree once the quarter moves past its
// first month. See plan doc "Phase B round 2" for the full reasoning.

var _NRR_TH_MONTHS_ORDER = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                            'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

function _nrrParseThLabel(label) {
  var parts = (label || '').split(' ');
  var mIdx = _NRR_TH_MONTHS_ORDER.indexOf(parts[0]);
  var year = parseInt(parts[1], 10) - 543;
  return { mIdx: mIdx, year: year, key: (mIdx > -1 && year) ? year * 12 + mIdx : null };
}

// Thai label for QNRR_CFG.base_month ('2026-06' -> 'มิ.ย. 2569') — reuses
// nrrThMonthLabel() (nrr_data.js) so the label format always matches what
// bulk_history.csv actually contains.
function nrrBaseMonthThLabel() {
  var p = QNRR_CFG.base_month.split('-');
  return nrrThMonthLabel(new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, 1));
}
window.nrrBaseMonthThLabel = nrrBaseMonthThLabel;

// pct/cls thresholds mirror Sense's own portview pace banding (100/95/90);
// baseline_gmv is this account's GMV in the quarter's fixed base month
// (bulk_history.csv), NOT a rolling average and NOT portview.csv's
// last_month_gmv (that column drifts month-to-month within the quarter —
// see header note above). runrate_gmv stays from portview.csv, precomputed
// server-side — never re-derived here.
function nrrPaceSignal(row) {
  if (!row) return { pct: null, cls: 'unknown', label: '—', baseline_gmv: 0 };
  var hist = (window.bulkHistoryData && window.bulkHistoryData.byAccountId[row.account_id]) || [];
  var baseLabel = nrrBaseMonthThLabel();
  var baseRow = hist.filter(function (h) { return h.month_label === baseLabel; })[0];
  if (!baseRow || !baseRow.gmv) {
    return { pct: null, cls: 'new', label: 'ร้านใหม่', baseline_gmv: 0 };
  }
  var pct = row.runrate_gmv / baseRow.gmv * 100;
  var cls = pct >= 100 ? 'great' : pct >= 95 ? 'safe' : pct >= 90 ? 'warn' : 'danger';
  // 'expected' = "should have by today if tracking baseline exactly"
  // (Sense's computePaceSignal field of the same name) — Portfolio's row
  // view doesn't show it (no room), the Account page hero does.
  var expected = baseRow.gmv * (row.days_elapsed / (row.days_in_month || 30));
  return { pct: pct, cls: cls, label: Math.round(pct) + '%', baseline_gmv: baseRow.gmv, expected: expected };
}
window.nrrPaceSignal = nrrPaceSignal;

// One KAM's accounts, pace signal attached, sorted worst-pace-first (the
// accounts most worth a rep's attention surface at the top of their list).
function nrrPortfolioRowsFor(kamEmail) {
  var pv = window.bulkPortviewData;
  if (!pv || !pv.loaded) return [];
  return (pv.byKamEmail[kamEmail] || [])
    .map(function (r) { return { row: r, pace: nrrPaceSignal(r) }; })
    .sort(function (a, b) {
      var pa = a.pace.pct == null ? -1 : a.pace.pct;
      var pb = b.pace.pct == null ? -1 : b.pace.pct;
      return pa - pb;
    });
}
window.nrrPortfolioRowsFor = nrrPortfolioRowsFor;

// Portfolio-level risk summary — same grouping Sense's ON TRACK/MONITOR/
// AT RISK boxes use (06_portview_teamview.js:1580-1700: group by
// paceSignal.cls, value = surplus above baseline for the ok bucket, or
// shortfall below baseline for warn/danger) — but against /nrr's own
// fixed-base-month baseline, not Sense's rolling one. Accounts with no
// baseline (cls 'new') are excluded — there's nothing to compare them to.
function nrrPortfolioRiskSummary(kamEmail) {
  var buckets = {
    ok:     { count: 0, value: 0 },
    warn:   { count: 0, value: 0 },
    danger: { count: 0, value: 0 }
  };
  nrrPortfolioRowsFor(kamEmail).forEach(function (item) {
    if (item.pace.pct == null) return;
    var runrate = item.row.runrate_gmv || 0, baseline = item.pace.baseline_gmv || 0;
    if (item.pace.cls === 'great' || item.pace.cls === 'safe') {
      buckets.ok.count++;
      buckets.ok.value += Math.max(0, runrate - baseline);
    } else if (item.pace.cls === 'warn') {
      buckets.warn.count++;
      buckets.warn.value += Math.max(0, baseline - runrate);
    } else {
      buckets.danger.count++;
      buckets.danger.value += Math.max(0, baseline - runrate);
    }
  });
  return buckets;
}
window.nrrPortfolioRiskSummary = nrrPortfolioRiskSummary;

// Mini 6-month bar chart per account (Sense's _buildSparkline pattern,
// 06_portview_teamview.js:987-1017, ghost/solid two-tone last bar) — the
// 5 closed months come straight from bulk_history.csv; the current
// (open) month comes from the portview row itself (bulk_history.csv never
// contains the in-progress month). The quarter base month gets a small
// marker so it's visible which bar the pace% above is actually measured
// against.
function nrrAcctSparklineHtml(row, pace) {
  var hist = (window.bulkHistoryData && window.bulkHistoryData.byAccountId[row.account_id]) || [];
  var baseLabel = nrrBaseMonthThLabel();
  var closed = hist.slice().sort(function (a, b) {
    return (_nrrParseThLabel(a.month_label).key || 0) - (_nrrParseThLabel(b.month_label).key || 0);
  }).slice(-5);

  var bars = closed.map(function (h) {
    return { label: h.month_label, v: h.gmv, isBase: h.month_label === baseLabel, mtd: null };
  });
  bars.push({ label: 'MTD', v: row.runrate_gmv || 0, mtd: row.gmv_to_date || 0, isBase: false, isCurrent: true });

  var maxV = Math.max.apply(null, [1].concat(bars.map(function (b) { return b.v; })));
  var H = 26;
  var color = pace.pct == null ? 'var(--ink3)' : nrrThresholdColorVar(pace.pct);
  var barsHtml = bars.map(function (b) {
    var h = Math.max(2, Math.round((b.v / maxV) * H));
    var inner;
    if (b.isCurrent && b.mtd != null && b.v > b.mtd) {
      var solidH = Math.max(1, Math.round((b.mtd / maxV) * H));
      var hatchH = Math.max(1, h - solidH);
      inner = '<div class="nrr-spark-hatch" style="height:' + hatchH + 'px;background:repeating-linear-gradient(-45deg,rgba(255,255,255,0.5) 0 2px,rgba(255,255,255,0) 2px 5px),' + color + '"></div>' +
        '<div class="nrr-spark-seg" style="height:' + solidH + 'px;background:' + color + '"></div>';
    } else {
      // Base month gets an INSET top marker (box-shadow — draws inside
      // the box, adds no height) instead of the old trailing mark element
      // below the bar. That trailing element made the base column's total
      // height greater than its neighbors; since columns bottom-align,
      // the extra height pushed the base bar itself UP, making it look
      // taller/bigger than its real value (2026-07-09 — same bug shape
      // already fixed once in the Account view's own trend chart).
      inner = '<div class="nrr-spark-seg" style="height:' + h + 'px;background:' + color + (b.isBase ? ';box-shadow:inset 0 2px 0 var(--ink)' : '') + '"></div>';
    }
    return '<div class="nrr-spark-col' + (b.isBase ? ' base' : '') + '" title="' + nrrEsc(b.label + ': ' + nrrFmtGMV(b.v) + (b.isBase ? ' (เดือนฐาน)' : '')) + '">' +
      '<div class="nrr-spark-stack">' + inner + '</div>' +
      '</div>';
  }).join('');
  return '<div class="nrr-spark">' + barsHtml + '</div>';
}
window.nrrAcctSparklineHtml = nrrAcctSparklineHtml;
</script>
<script>
// ── nrr_account.js — Account view (Phase C, 2026-07-09) pure logic ──────
// Feeds #/account/:id. Two SKU signal systems, ported from two DIFFERENT
// Sense functions — do not merge them, they answer different questions:
//   nrrSkuPositiveSignals — live "what's growing this month" (new/growing
//     SKUs), run-rate projected so a partial month is judged fairly.
//     Ported from __legacyRenderKamThisMonthFallback (05_kam_view.js:617-701).
//   nrrSkuCycleSignals — "what's overdue relative to ITS OWN normal
//     reorder cadence" (near/gone), interval-aware so a SKU normally
//     bought every 20 days isn't falsely flagged on day 8. Ported from
//     computeChurnSignals (05_kam_view.js:63-170) — only the 'gone'/'near'
//     branches; Sense also has 'approaching'/'not_yet'/'slow' which are
//     NOT ported here (out of scope for this phase, see plan doc).

var NRR_CAT_MASTER = [
  { n: 'DG Food', c: 'var(--cat-1)' }, { n: 'Processed Food', c: 'var(--cat-2)' },
  { n: 'Vegetable', c: 'var(--cat-3)' }, { n: 'Meat', c: 'var(--cat-4)' },
  { n: 'Fish & Seafood', c: 'var(--cat-5)' }, { n: 'Egg', c: 'var(--cat-6)' },
  { n: 'Fruit', c: 'var(--cat-7)' }, { n: 'Beverage Non-alcohol', c: 'var(--cat-8)' },
  { n: 'Beverage Alcohol', c: 'var(--cat-9)' }, { n: 'DG Non-food', c: 'var(--cat-10)' }
];
window.NRR_CAT_MASTER = NRR_CAT_MASTER;

// { cur, last } Thai month labels — same lag-1-day anchor convention as
// nrrCommCurrentMonthLabel() (nrr_commission.js) so "current month" agrees
// everywhere in the app.
function _nrrAccountMonthLabels() {
  var cur = nrrCommCurrentMonthLabel();
  var lag = new Date(); lag.setDate(lag.getDate() - 1);
  var last = nrrThMonthLabel(new Date(lag.getFullYear(), lag.getMonth() - 1, 1));
  return { cur: cur, last: last };
}

function _nrrPortviewRowFor(accountId) {
  var pv = window.bulkPortviewData;
  if (!pv || !pv.loaded) return null;
  return pv.allRows.filter(function (r) { return r.account_id === accountId; })[0] || null;
}

function _nrrSkusRowsForMonth(accountId, kamEmail, monthLabel) {
  var bundle = nrrSenseSkusCache[kamEmail];
  if (!bundle || !bundle.loaded) return [];
  return (bundle.byAccountId[accountId] || []).filter(function (r) { return r.month_label === monthLabel; });
}

// ── Positive signals — live, run-rate projected ──────────────────────────
function nrrSkuPositiveSignals(accountId, kamEmail) {
  var labels = _nrrAccountMonthLabels();
  var curRows = _nrrSkusRowsForMonth(accountId, kamEmail, labels.cur);
  var lastRows = _nrrSkusRowsForMonth(accountId, kamEmail, labels.last);
  var lastByItem = {};
  lastRows.forEach(function (r) { lastByItem[r.item_id] = r; });

  var acctRow = _nrrPortviewRowFor(accountId);
  var daysElapsed = (acctRow && acctRow.days_elapsed) || 1;
  var daysInMonth = (acctRow && acctRow.days_in_month) || 30;
  var ratio = daysElapsed > 0 ? daysInMonth / daysElapsed : 1;

  var newItems = [], growing = [];
  curRows.forEach(function (r) {
    var last = lastByItem[r.item_id];
    if (!last) {
      if (r.gmv_ex_vat > 1000) newItems.push({ item_id: r.item_id, name: r.item_name_th, gmv: r.gmv_ex_vat });
      return;
    }
    if (!last.gmv_ex_vat) return;
    var proj = r.gmv_ex_vat * ratio;
    var chgPct = (proj - last.gmv_ex_vat) / last.gmv_ex_vat;
    if (chgPct >= 0.20 && r.gmv_ex_vat > 2000) {
      growing.push({ item_id: r.item_id, name: r.item_name_th, gmvToDate: r.gmv_ex_vat, proj: proj, lastGmv: last.gmv_ex_vat, projInc: proj - last.gmv_ex_vat, chgPct: chgPct });
    }
  });
  newItems.sort(function (a, b) { return b.gmv - a.gmv; });
  growing.sort(function (a, b) { return b.projInc - a.projInc; });
  return { new: newItems, growing: growing };
}
window.nrrSkuPositiveSignals = nrrSkuPositiveSignals;

// ── Cycle signals — interval-aware, per-SKU, last month's own cadence ────
function nrrSkuCycleSignals(accountId, kamEmail) {
  var labels = _nrrAccountMonthLabels();
  var lastRows = _nrrSkusRowsForMonth(accountId, kamEmail, labels.last);
  var acctRow = _nrrPortviewRowFor(accountId);
  var daysElapsed = (acctRow && acctRow.days_elapsed) || 1;
  var daysInMonth = (acctRow && acctRow.days_in_month) || 30;

  var out = [];
  lastRows.forEach(function (r) {
    if (!r.order_count || r.order_count < 1) return; // need order history to derive a cycle at all
    var outletCount = r.outlet_count_sku || 1;
    var perOutletFreq = r.order_count / outletCount;
    if (perOutletFreq <= 0) return;
    var avgInterval = daysInMonth / perOutletFreq;
    var daysLate = Math.max(0, Math.round(daysElapsed - avgInterval));
    var cls = null;
    if (daysElapsed >= avgInterval * 1.5) cls = 'gone';
    else if (daysElapsed >= avgInterval) cls = 'near';
    if (!cls) return;
    out.push({
      item_id: r.item_id, name: r.item_name_th, monthlyGmv: r.gmv_ex_vat,
      orderCountLastMonth: r.order_count, avgInterval: avgInterval, daysLate: daysLate,
      cls: cls, lastOrderDate: r.last_order_date
    });
  });
  out.sort(function (a, b) { return b.monthlyGmv - a.monthlyGmv; });
  return out;
}
window.nrrSkuCycleSignals = nrrSkuCycleSignals;

// ── Per-outlet breakdown for the floating tooltip on a signal row ───────
function nrrSkuOutletBreakdown(accountId, itemId, kamEmail) {
  var bundle = nrrSenseSkuOutletCache[kamEmail];
  if (!bundle || !bundle.loaded) return null;
  var byItem = bundle.byAccountItem[accountId];
  return (byItem && byItem[String(itemId)]) || null;
}
window.nrrSkuOutletBreakdown = nrrSkuOutletBreakdown;

// ── AOV — current (live, from portview MTD) + historical band/trend ─────
function nrrAovBand(aov) {
  if (aov == null) return { cls: 'unknown', label: '—', color: 'var(--ink3)' };
  if (aov >= 5000) return { cls: 'great', label: 'ดีมาก', color: 'var(--green-deep)' };
  if (aov >= 3000) return { cls: 'good', label: 'ดี', color: 'var(--green)' };
  if (aov >= 1500) return { cls: 'mid', label: 'ปานกลาง', color: 'var(--sun-deep)' };
  return { cls: 'low', label: 'ควรดู', color: 'var(--coral)' };
}
window.nrrAovBand = nrrAovBand;

function nrrAccountAov(accountId) {
  var row = _nrrPortviewRowFor(accountId);
  var current = (row && row.orders_to_date > 0) ? row.gmv_to_date / row.orders_to_date : null;
  var hist = (window.bulkHistoryData && window.bulkHistoryData.byAccountId[accountId]) || [];
  var sorted = hist.slice().sort(function (a, b) { return (_nrrParseThLabel(a.month_label).key || 0) - (_nrrParseThLabel(b.month_label).key || 0); });
  var months = sorted.map(function (h) { return { month: h.month_label, aov: h.orders > 0 ? h.gmv / h.orders : null, orders: h.orders }; });
  var threeAgo = months.length >= 3 ? months[months.length - 3].aov : null;
  var trendPct = (current != null && threeAgo) ? Math.round((current / threeAgo - 1) * 100) : null;
  var lastMonth = months.length ? months[months.length - 1] : null;
  return {
    current: current, band: nrrAovBand(current), months: months, trendPct: trendPct,
    ordersThisMonth: row ? row.orders_to_date : 0,
    lastMonthAov: lastMonth ? lastMonth.aov : null, lastMonthOrders: lastMonth ? lastMonth.orders : 0
  };
}
window.nrrAccountAov = nrrAccountAov;

// ── Outlet movement + per-outlet cycle signal (Chain accounts) ──────────
function nrrOutletMovement(accountId) {
  var labels = _nrrAccountMonthLabels();
  var rows = (window.bulkOutletsData && window.bulkOutletsData.byAccountId[accountId]) || [];
  var curByOutlet = {}, lastByOutlet = {}, nameByOutlet = {};
  rows.forEach(function (r) {
    nameByOutlet[r.outlet_id] = r.outlet_name;
    if (r.month_label === labels.cur) curByOutlet[r.outlet_id] = r;
    if (r.month_label === labels.last) lastByOutlet[r.outlet_id] = r;
  });
  var acctRow = _nrrPortviewRowFor(accountId);
  var daysElapsed = (acctRow && acctRow.days_elapsed) || 1;
  var daysInMonth = (acctRow && acctRow.days_in_month) || 30;

  var list = Object.keys(nameByOutlet).map(function (oid) {
    var last = lastByOutlet[oid], cur = curByOutlet[oid];
    var status = (!last && cur) ? 'new' : (last && !cur) ? 'quiet' : 'steady';
    // Same interval math as nrrSkuCycleSignals, applied per-outlet instead
    // of per-SKU (Sense's computeOutletCycleSignals precedent) — cycles
    // under 3 days are excluded, matching Sense's own noise floor for
    // near-daily-ordering outlets where "overdue" stops being meaningful.
    var cycle = null;
    if (status === 'steady' && last && last.orders > 0) {
      var interval = daysInMonth / last.orders;
      if (interval >= 3) {
        if (daysElapsed >= interval * 1.5) cycle = 'gone';
        else if (daysElapsed >= interval) cycle = 'near';
      }
    }
    return {
      outlet_id: oid, outlet_name: nameByOutlet[oid], status: status, cycle: cycle,
      gmv: cur ? cur.gmv_ex_vat : 0, lastGmv: last ? last.gmv_ex_vat : 0,
      lastOrderDate: (cur && cur.last_order_date) || (last && last.last_order_date) || null
    };
  });

  var counts = { steady: 0, new: 0, quiet: 0 };
  list.forEach(function (o) {
    if (o.status === 'quiet' || o.cycle === 'gone') counts.quiet++;
    else if (o.status === 'new') counts.new++;
    else counts.steady++;
  });
  // sort quiet-first (most worth attention) then new, then steady
  var order = { quiet: 0, new: 1, steady: 2 };
  list.sort(function (a, b) { return (order[a.status] || 2) - (order[b.status] || 2); });
  return { outlets: list, counts: counts, total: list.length };
}
window.nrrOutletMovement = nrrOutletMovement;

// ── Category coverage — all 10 Freshket categories, gaps included ───────
function nrrAccountCategoryCoverage(accountId, kamEmail) {
  var catRows = (window.bulkCategoriesData && window.bulkCategoriesData.byAccountId[accountId]) || [];
  var labels = _nrrAccountMonthLabels();
  var hasCur = catRows.some(function (r) { return r.month_label === labels.cur; });
  var useLabel = hasCur ? labels.cur : labels.last; // early-month MTD may have zero category rows yet

  var byCat = {};
  catRows.forEach(function (r) { if (r.month_label === useLabel) byCat[r.category] = (byCat[r.category] || 0) + r.gmv; });
  var total = Object.keys(byCat).reduce(function (s, k) { return s + byCat[k]; }, 0);

  var skuBundle = nrrSenseSkusCache[kamEmail];
  var skuRows = (skuBundle && skuBundle.loaded && skuBundle.byAccountId[accountId]) || [];
  var skuCountByCat = {}, seenItem = {};
  skuRows.forEach(function (r) {
    if (r.month_label !== useLabel) return;
    var key = r.dept + '|' + r.item_id;
    if (seenItem[key]) return;
    seenItem[key] = true;
    skuCountByCat[r.dept] = (skuCountByCat[r.dept] || 0) + 1;
  });

  var categories = NRR_CAT_MASTER.map(function (c) {
    var gmv = byCat[c.n] || 0;
    return { name: c.n, color: c.c, bought: gmv > 0, gmv: gmv, pct: total > 0 ? Math.round(gmv / total * 100) : 0, skuCount: skuCountByCat[c.n] || 0 };
  });
  var boughtCount = categories.filter(function (c) { return c.bought; }).length;
  return { categories: categories, boughtCount: boughtCount, total: NRR_CAT_MASTER.length, monthUsed: useLabel };
}
window.nrrAccountCategoryCoverage = nrrAccountCategoryCoverage;

// ── Price impact — net ฿ effect of price changes this month vs last ─────
function nrrAccountPriceImpact(accountId, kamEmail) {
  var priceBundle = window.bulkPriceData;
  if (!priceBundle || !priceBundle.loaded) return null;
  var byItem = priceBundle.byAccountItem[accountId];
  if (!byItem) return { net: 0, up: [], down: [], upCount: 0, downCount: 0, hasCurrentData: false, creeping: [] };

  var labels = _nrrAccountMonthLabels();
  var skuBundle = nrrSenseSkusCache[kamEmail];
  var skuRows = (skuBundle && skuBundle.loaded && skuBundle.byAccountId[accountId]) || [];
  var nameByItem = {}, qtyByItem = {};
  skuRows.forEach(function (r) {
    if (!nameByItem[r.item_id]) nameByItem[r.item_id] = r.item_name_th; // any month, so an item dropped this month still gets a name
    if (r.month_label === labels.cur) { nameByItem[r.item_id] = r.item_name_th; qtyByItem[r.item_id] = r.qty_kg; }
  });

  // bulk_price.csv is a closed-month batch export — it does not carry a
  // row for the in-progress month until the pipeline's month-end run
  // (confirmed 2026-07-09: file had zero "ก.ค. 2569" rows on day 9 of
  // July). Track that explicitly so the UI can say "รอข้อมูลปิดเดือน"
  // instead of a misleading "+฿0 ไม่มีการเปลี่ยนแปลง" that looks like a
  // verified zero when it's actually just missing data.
  var hasCurrentData = false;
  var up = [], down = [];
  var flagged = {};      // item_ids already caught by the this-month ≥1% threshold below
  var historyByItem = {}; // item_id -> [{month_label, unit_price}] across all closed months in bulk_price.csv (up to 6)

  Object.keys(byItem).forEach(function (itemId) {
    var rows = byItem[itemId];
    var history = rows
      .filter(function (r) { return r.unit_price > 0; })
      .slice()
      .sort(function (a, b) { return (_nrrParseThLabel(a.month_label).key || 0) - (_nrrParseThLabel(b.month_label).key || 0); })
      .map(function (r) { return { month_label: r.month_label, unit_price: r.unit_price }; });
    historyByItem[itemId] = history;

    var curRow = rows.filter(function (r) { return r.month_label === labels.cur; })[0];
    if (curRow) hasCurrentData = true;
    var lastRow = rows.filter(function (r) { return r.month_label === labels.last; })[0];
    if (!curRow || !lastRow || !lastRow.unit_price) return;
    var pctChange = (curRow.unit_price - lastRow.unit_price) / lastRow.unit_price * 100;
    if (Math.abs(pctChange) < 1) return; // Sense's own ≥1% threshold (computePriceChanges)
    var qty = qtyByItem[itemId] || 0;
    var impact = (curRow.unit_price - lastRow.unit_price) * qty;
    var entry = { item_id: itemId, name: nameByItem[itemId] || itemId, pctChange: pctChange, impact: impact, history: history };
    if (pctChange > 0) up.push(entry); else down.push(entry);
    flagged[itemId] = true;
  });
  up.sort(function (a, b) { return b.impact - a.impact; });
  down.sort(function (a, b) { return a.impact - b.impact; });
  var net = up.reduce(function (s, e) { return s + e.impact; }, 0) + down.reduce(function (s, e) { return s + e.impact; }, 0);

  // Creep signal — cumulative % move across the full bulk_price.csv history
  // (up to 6 closed months), for items the single-month threshold above
  // never catches because no ONE step ever looked alarming on its own.
  // Thresholds are calibrated against the real file, not guessed: a
  // strict <1%-per-step / ≥3%-cumulative bar (matching the up/down list's
  // own ≥1% threshold) fires on ZERO of the ~111K item-histories in
  // bulk_price.csv as of 2026-07-09 — fresh-food pricing here moves in
  // discrete jumps, not smooth drift, so that bar is unusable. <2%-per-step
  // / ≥2.5%-cumulative fires on 299, a real and checkable set. Re-check
  // this distribution if it goes quiet again after future price resets.
  var CREEP_STEP_CEILING_PCT = 2;
  var CREEP_THRESHOLD_PCT = 2.5;
  var creeping = [];
  Object.keys(historyByItem).forEach(function (itemId) {
    if (flagged[itemId]) return;
    var history = historyByItem[itemId];
    if (history.length < 2) return;
    // Every INDIVIDUAL step has to stay under the ceiling — otherwise this
    // isn't a slow creep, it's a jump between two months that just happens
    // not to be the cur/last pair the up/down list above checks (e.g. a
    // spike between two closed months). With only 2 data points cumPct
    // === the one step's pct, so this also naturally requires ≥3 months
    // of history for anything to qualify.
    var maxStepPct = 0;
    for (var i = 1; i < history.length; i++) {
      var p0 = history[i - 1].unit_price, p1 = history[i].unit_price;
      if (p0 > 0) maxStepPct = Math.max(maxStepPct, Math.abs((p1 - p0) / p0 * 100));
    }
    if (maxStepPct >= CREEP_STEP_CEILING_PCT) return;
    var first = history[0], last = history[history.length - 1];
    if (!first.unit_price) return;
    var cumPct = (last.unit_price - first.unit_price) / first.unit_price * 100;
    if (Math.abs(cumPct) < CREEP_THRESHOLD_PCT) return;
    creeping.push({ item_id: itemId, name: nameByItem[itemId] || itemId, cumPct: cumPct, history: history });
  });
  creeping.sort(function (a, b) { return Math.abs(b.cumPct) - Math.abs(a.cumPct); });

  return { net: net, up: up, down: down, upCount: up.length, downCount: down.length, hasCurrentData: hasCurrentData, creeping: creeping };
}
window.nrrAccountPriceImpact = nrrAccountPriceImpact;

// ── Net signal summary — the one-sentence verdict above the two lists ───
function nrrNetSignalSummary(accountId, kamEmail) {
  var pos = nrrSkuPositiveSignals(accountId, kamEmail);
  var risk = nrrSkuCycleSignals(accountId, kamEmail);
  var gain = pos.new.reduce(function (s, x) { return s + x.gmv; }, 0) + pos.growing.reduce(function (s, x) { return s + x.projInc; }, 0);
  var atRisk = risk.reduce(function (s, x) { return s + x.monthlyGmv; }, 0);
  var acctRow = _nrrPortviewRowFor(accountId);
  var runrate = acctRow ? acctRow.runrate_gmv : null;
  var netRunrate = runrate != null ? runrate + gain - atRisk : null;
  return {
    gainAmount: gain, gainCount: pos.new.length + pos.growing.length,
    riskAmount: atRisk, riskCount: risk.length,
    runrate: runrate, netRunrate: netRunrate
  };
}
window.nrrNetSignalSummary = nrrNetSignalSummary;
</script>
<script>
// ── nrr_company.js — Company Overview (#/company) + Sales (#/sales) views ──
// v28: both views moved OUT of the dashboard (exec feedback on the v27
// deploy: company content must not mix into the dashboard's journey, the
// inline pipeline outlet list was unusable at 3k rows, and the section had
// no real visual design). Admin-only — nrr_router.js guards both routes.
//
// Journey design:
//   #/company — "How is the company doing?"
//     §1 hero (echoes the dashboard's .nrr-pulse 3-col grid): big MTD
//        number + end-of-month projection verdict + B2C/Chain/SA-MC
//        satellites + month chips; composition strip below.
//     §2 squad race — Chain vs SA/MC monthly columns in the app-native
//        div-column language (.nrr-qcol-* family) with the established
//        hatch-overlay projection visual on the MTD month.
//     §3 squad cards — per-squad total + MoM delta + Sales/KAM/PM/Admin
//        stacked mini-bar (lightness ramp of the squad hue, values always
//        direct-labeled) + "waiting in Sales' hands" link to #/sales.
//     §4 audit table — the sheet-mirror table for reconciling with the
//        "Target & Plan 2H 2026" Google Sheet.
//   #/sales — "What's in Sales' hands and when does it convert?"
//     §1 handover pipeline chips (overdue → +3mo) — click opens the
//        slideover (commission-drawer custom-body precedent) with its own
//        search + chunked rows, never an inline dump.
//     §2 monthly actuals by account_type.
//
// Data: nrrCompanyModel/nrrSalesByBucket/nrrSalesPipelineModel
// (nrr_aggregate.js) over company_gmv.csv + sales_handover_pipeline.csv
// (nrr_data.js, both 404-graceful). Squad colors #c56a2c (Chain) /
// #1295a8 (SA/MC) — validated for lightness/chroma/CVD/contrast in both
// light & dark via the dataviz palette checker (2026-07-10).

var nrrCompanyState = {
  month: null,      // selected month_key for hero + squad cards (null = latest)
  chartWindow: 6,   // 3 | 6 | 0(all) months shown in the race chart
  tableWindow: 6    // same for the audit table
};

var NRR_CO_COLORS = {
  chain: '#c56a2c',
  sa_mc: '#1295a8',
  b2c: 'var(--mv-slate)'
};
// Lightness ramp (as rgba alphas over white) for the Sales/KAM/PM/Admin
// stack inside one squad — sequential-within-hue, identity always carried
// by the labeled key next to it, never color alone.
var NRR_CO_RAMP = { sales: 1, kam: 0.72, pm: 0.48, admin: 0.28 };
var NRR_CO_RGB = { chain: '197,106,44', sa_mc: '18,149,168' };
var NRR_CO_SUBS = [
  { key: 'sales', label: 'Sales' },
  { key: 'kam', label: 'KAM' },
  { key: 'pm', label: 'PM' },
  { key: 'admin', label: 'Admin' }
];

// ── Shared helpers ────────────────────────────────────────────────────────

// Day-of-month of the lag-1 anchor — data always trails 1 calendar day.
function _nrrCompanyMtdDay() {
  var d = new Date(); d.setDate(d.getDate() - 1);
  return d.getDate();
}

function _nrrCoDaysInMonth(monthKey) {
  var p = monthKey.split('-');
  return new Date(parseInt(p[0], 10), parseInt(p[1], 10), 0).getDate();
}

function _nrrCompanyStaleBannerHtml(cd) {
  if (!cd || !cd.isStale) return '';
  return '<div class="nrr-stale-banner">⚠️ company_gmv.csv มีข้อมูลถึงเดือน ' + nrrEsc(cd.maxMonthKey || '—') +
    ' แต่เดือนปัจจุบันคือ ' + nrrEsc(cd.currMonthKey || '—') +
    ' — ไฟล์ยังไม่ได้ re-run/upload ใหม่ ตัวเลขด้านล่างไม่ใช่ข้อมูลล่าสุด</div>';
}

// {mtd, proj, is_partial, curr_days, days_in_month} for one month of the
// company model — raw actuals; proj = straight-line run-rate on the MTD month.
function _nrrCoMonthFigures(model, cd, monthKey) {
  var m = model.by_month[monthKey];
  if (!m) return null;
  var isMtd = cd && cd.currMonthKey && monthKey === cd.currMonthKey;
  var dim = _nrrCoDaysInMonth(monthKey);
  var days = isMtd ? Math.min(_nrrCompanyMtdDay(), dim) : dim;
  var proj = isMtd && days > 0 ? m.total / days * dim : m.total;
  return { mtd: m.total, proj: proj, is_partial: isMtd, curr_days: days, days_in_month: dim };
}

function _nrrCoWindowMonths(model, win) {
  return win > 0 ? model.months.slice(-win) : model.months.slice();
}

function _nrrCoSegHtml(id, current, options, dataAttr) {
  return '<div class="seg" id="' + id + '">' + options.map(function (o) {
    return '<button' + (current === o[0] ? ' class="on"' : '') + ' data-' + dataAttr + '="' + o[0] + '">' + o[1] + '</button>';
  }).join('') + '</div>';
}

function _nrrCoNotFoundHtml(title, fileName, sqlName) {
  return '<div class="nrr-section"><div class="nrr-panel-body">' +
    '<div class="nrr-panel-head"><div class="h2">' + title + '</div></div>' +
    '<div class="micro" style="margin-top:8px">ยังไม่มีข้อมูล — ไฟล์ ' + fileName +
    ' ยังไม่ถูกอัปโหลดไป R2 (รัน ' + sqlName + ' ใน BigQuery แล้วอัปโหลดก่อน)</div>' +
    '</div></div>';
}

// ── §1 Company hero ───────────────────────────────────────────────────────

function _nrrCoHeroHtml(model, cd, selKey) {
  var m = model.by_month[selKey];
  var fig = _nrrCoMonthFigures(model, cd, selKey);
  var months = model.months;
  var idx = months.indexOf(selKey);
  var prevKey = idx > 0 ? months[idx - 1] : null;
  var prevTotal = prevKey ? model.by_month[prevKey].total : null;

  // Verdict: projection + MoM vs previous month's actual
  var momPct = prevTotal > 0 ? Math.round((fig.proj - prevTotal) / prevTotal * 1000) / 10 : null;
  var momTxt = momPct == null ? '' :
    ' · เทียบ' + nrrEsc((model.labels[prevKey] || prevKey).split(' ')[0]) + ' ' + (momPct >= 0 ? '+' : '') + momPct + '%';
  var verdict = fig.is_partial
    ? 'คาดการณ์จบเดือน ~' + nrrFmtGMV(fig.proj) + momTxt
    : 'จบเดือนที่ ' + nrrFmtGMV(m.total) + momTxt;

  var satDot = function (color) { return '<span class="nrr-sat-dot" style="background:' + color + '"></span>'; };
  var satellitesHtml = '<div class="nrr-pulse-satellites">' +
    '<span>' + satDot(NRR_CO_COLORS.b2c) + 'B2C <b class="num">' + nrrFmtGMV(m.b2c.gmv) + '</b></span>' +
    '<span>' + satDot(NRR_CO_COLORS.chain) + 'Chain <b class="num">' + nrrFmtGMV(m.squads.chain.total) + '</b></span>' +
    '<span>' + satDot(NRR_CO_COLORS.sa_mc) + 'SA/MC <b class="num">' + nrrFmtGMV(m.squads.sa_mc.total) + '</b></span>' +
    '</div>';

  // Custom 3-cell triple with company-appropriate labels (raw actuals —
  // .nrr-triple-lg CSS reused, labels differ from the NRR "ฐาน" semantics)
  var tripleHtml = '<div class="nrr-triple-lg">' +
    '<div class="nrr-triple-cell"><div class="nrr-triple-label">เดือนก่อน</div><div class="num nrr-triple-base">' + (prevTotal != null ? nrrFmtGMV(prevTotal) : '—') + '</div></div>' +
    '<div class="nrr-triple-cell"><div class="nrr-triple-label">' + (fig.is_partial ? 'MTD · ' + fig.curr_days + '/' + fig.days_in_month + ' วัน' : 'ทั้งเดือน') + '</div><div class="num nrr-triple-mtd">' + nrrFmtGMV(fig.mtd) + '</div></div>' +
    '<div class="nrr-triple-cell"><div class="nrr-triple-label">' + (fig.is_partial ? 'คาดการณ์สิ้นเดือน' : 'จบเดือน') + '</div><div class="num nrr-triple-rr' + (fig.is_partial ? ' nrr-rr-proj' : '') + '">' + (fig.is_partial ? '~' : '') + nrrFmtGMV(fig.proj) + '</div></div>' +
    '</div>';

  // Month chips: last 4 months, chronological — MTD chip gets a progress bar
  var chipMonths = months.slice(-4);
  var chipsHtml = chipMonths.map(function (k) {
    var f = _nrrCoMonthFigures(model, cd, k);
    var progress = '';
    if (f && f.is_partial) {
      var w = Math.round(f.curr_days / f.days_in_month * 100);
      progress = '<span class="nrr-month-progress"><span style="width:' + w + '%"></span></span>';
    }
    return '<button class="nrr-month-chip' + (k === selKey ? ' on' : '') + '" data-mkey="' + k + '">' +
      nrrEsc((model.labels[k] || k).split(' ')[0]) + progress + '</button>';
  }).join('');

  // Composition strip — B2C / Chain / SA-MC of the selected month
  var compoItems = [
    { label: 'B2C', v: m.b2c.gmv, color: NRR_CO_COLORS.b2c },
    { label: 'Squad Chain', v: m.squads.chain.total, color: NRR_CO_COLORS.chain },
    { label: 'Squad SA/MC', v: m.squads.sa_mc.total, color: NRR_CO_COLORS.sa_mc }
  ].filter(function (x) { return x.v > 0; });
  var compoTotal = compoItems.reduce(function (s, x) { return s + x.v; }, 0);
  var compoHtml = '';
  if (compoTotal > 0) {
    compoHtml = '<div class="nrr-compo">' +
      '<div class="nrr-compo-lbl">องค์ประกอบของยอด ' + nrrEsc(model.labels[selKey] || selKey) + ' ' + nrrFmtGMV(m.total) + (fig.is_partial ? ' (MTD)' : '') + '</div>' +
      '<div class="nrr-compo-bar">' + compoItems.map(function (x) {
        return '<i style="width:' + (x.v / compoTotal * 100).toFixed(2) + '%;background:' + x.color + '" title="' + nrrEsc(x.label) + '"></i>';
      }).join('') + '</div>' +
      '<div class="nrr-compo-key">' + compoItems.map(function (x) {
        return '<span class="nrr-compo-k"><i style="background:' + x.color + '"></i>' + nrrEsc(x.label) + ' <b class="num">' + nrrFmtGMV(x.v) + '</b></span>';
      }).join('') + '</div>' +
      '</div>';
  }

  return '<div class="nrr-pulse">' +
    '  <div class="nrr-pulse-verdict">' +
    '    <div class="eyebrow">บริษัท · GMV ทุก SEGMENT · ' + nrrEsc(model.labels[selKey] || selKey) + '</div>' +
    '    <div class="nrr-pulse-pct num">' + (fig.is_partial ? '' : '') + nrrFmtGMV(fig.mtd) + '</div>' +
    '    <div class="nrr-verdict">' + verdict + '</div>' + satellitesHtml +
    '  </div>' +
    '  <div class="nrr-pulse-triple">' + tripleHtml + '</div>' +
    '  <div class="nrr-pulse-months">' + chipsHtml + '</div>' +
    '</div>' +
    compoHtml;
}

// ── §2 Squad trend charts — each squad's OWN growth, not a head-to-head ──
// (exec feedback: a paired comparison chart reads as "which squad wins" —
// wanted each squad's own trajectory instead). Two independent single-
// series charts, same div-column + hatch-projection language as before,
// placed side by side.

function _nrrCoSquadTrendChartHtml(model, cd, sq) {
  var months = _nrrCoWindowMonths(model, nrrCompanyState.chartWindow);
  if (!months.length) return '';
  var color = NRR_CO_COLORS[sq];
  var H = 150;

  var maxVal = 0;
  months.forEach(function (k) {
    var f = _nrrCoMonthFigures(model, cd, k);
    var v = model.by_month[k].squads[sq].total;
    if (f.is_partial && f.curr_days > 0) v = v / f.curr_days * f.days_in_month;
    if (v > maxVal) maxVal = v;
  });
  var pxPer = maxVal > 0 ? H / maxVal : 0;
  var lastKey = months[months.length - 1];

  var colsHtml = months.map(function (k) {
    var m = model.by_month[k];
    var f = _nrrCoMonthFigures(model, cd, k);
    var actual = m.squads[sq].total;
    var proj = f.is_partial && f.curr_days > 0 ? actual / f.curr_days * f.days_in_month : actual;
    var solidH = Math.max(3, Math.round(actual * pxPer));
    var hatchH = f.is_partial ? Math.max(0, Math.round((proj - actual) * pxPer)) : 0;
    var isLast = k === lastKey;
    var title = (model.labels[k] || k) + ': ' + nrrFmtGMVExact(actual) + (f.is_partial ? ' (MTD · คาดการณ์ ~' + nrrFmtGMV(proj) + ')' : '');
    // Every column gets its own value label (not just the latest) — the
    // latest still reads as the "headline" via bolder weight + squad color,
    // earlier months in muted ink so the eye still lands on "now" first.
    var capText = (f.is_partial ? '~' : '') + nrrFmtGMV(f.is_partial ? proj : actual);
    var capHtml = '<div class="nrr-cogroup-caps num" style="color:' + (isLast ? color : 'var(--ink2)') +
      ';font-weight:' + (isLast ? '700' : '600') + ';font-size:' + (isLast ? '12.5px' : '11px') + '">' + capText + '</div>';
    return '<div class="nrr-cogroup">' + capHtml +
      '<div class="nrr-cogroup-cols" style="height:' + H + 'px">' +
      '<div class="nrr-cocol" style="width:34px;max-width:42px" title="' + nrrEsc(title) + '">' +
      (hatchH > 0 ? '<div class="nrr-cocol-seg" style="height:' + hatchH + 'px;background:repeating-linear-gradient(-45deg, rgba(255,255,255,0.55) 0 3px, rgba(255,255,255,0) 3px 9px), ' + color + '"></div>' : '') +
      '<div class="nrr-cocol-seg" style="height:' + solidH + 'px;background:' + color + '"></div>' +
      '</div></div>' +
      '<div class="nrr-cogroup-label">' + nrrEsc((model.labels[k] || k).split(' ')[0]) + (f.is_partial ? '<span class="micro"> (MTD)</span>' : '') + '</div>' +
      '</div>';
  }).join('');

  // This squad's own MoM, for the header line above its chart
  var lastF = _nrrCoMonthFigures(model, cd, lastKey);
  var lastActual = model.by_month[lastKey].squads[sq].total;
  var lastProj = lastF.is_partial && lastF.curr_days > 0 ? lastActual / lastF.curr_days * lastF.days_in_month : lastActual;
  var prevKey = months.length >= 2 ? months[months.length - 2] : null;
  var prevTotal = prevKey ? model.by_month[prevKey].squads[sq].total : null;
  var momPct = prevTotal > 0 ? Math.round((lastProj - prevTotal) / prevTotal * 1000) / 10 : null;
  var momHtml = momPct == null ? '' : '<span class="tag ' + (momPct >= 0 ? 'green' : 'coral') + '" style="margin-left:8px">' + (momPct >= 0 ? '+' : '') + momPct + '% MoM</span>';

  return '<div>' +
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
    '<span class="nrr-sat-dot" style="background:' + color + '"></span>' +
    '<span style="font-weight:700;font-size:14.5px">' + (sq === 'chain' ? 'Squad Chain' : 'Squad SA/MC') + '</span>' + momHtml +
    '</div>' +
    '<div class="nrr-cochart">' + colsHtml + '</div>' +
    '</div>';
}

// ── §3 Squad cards ────────────────────────────────────────────────────────

function _nrrCoSquadCardsHtml(model, cd, selKey) {
  var m = model.by_month[selKey];
  var months = model.months;
  var idx = months.indexOf(selKey);
  var prevKey = idx > 0 ? months[idx - 1] : null;
  var fig = _nrrCoMonthFigures(model, cd, selKey);
  var pm = typeof nrrSalesPipelineModel === 'function' ? nrrSalesPipelineModel() : null;

  var cardsHtml = ['chain', 'sa_mc'].map(function (sq) {
    var s = m.squads[sq];
    var name = sq === 'chain' ? 'Squad Chain' : 'Squad SA/MC';
    var color = NRR_CO_COLORS[sq];
    var proj = fig.is_partial && fig.curr_days > 0 ? s.total / fig.curr_days * fig.days_in_month : s.total;
    var prevTotal = prevKey ? model.by_month[prevKey].squads[sq].total : null;
    var momPct = prevTotal > 0 ? Math.round((proj - prevTotal) / prevTotal * 1000) / 10 : null;
    var momTag = momPct == null ? '' :
      '<span class="tag ' + (momPct >= 0 ? 'green' : 'coral') + '">' + (momPct >= 0 ? '+' : '') + momPct + '% MoM</span>';

    // Sub-component stacked bar (Sales/KAM/PM/Admin — lightness ramp)
    var subTotal = NRR_CO_SUBS.reduce(function (t, d) { return t + s[d.key]; }, 0);
    var barHtml = '', keyHtml = '';
    if (subTotal > 0) {
      barHtml = '<div class="nrr-compo-bar" style="margin-top:12px">' + NRR_CO_SUBS.map(function (d) {
        var v = s[d.key];
        if (v <= 0) return '';
        return '<i style="width:' + (v / subTotal * 100).toFixed(2) + '%;background:rgba(' + NRR_CO_RGB[sq] + ',' + NRR_CO_RAMP[d.key] + ')" title="' + d.label + '"></i>';
      }).join('') + '</div>';
      keyHtml = '<div class="nrr-compo-key" style="margin-top:8px">' + NRR_CO_SUBS.map(function (d) {
        return '<span class="nrr-compo-k"><i style="background:rgba(' + NRR_CO_RGB[sq] + ',' + NRR_CO_RAMP[d.key] + ')"></i>' + d.label +
          ' <b class="num">' + nrrFmtGMV(s[d.key]) + '</b></span>';
      }).join('') + '</div>';
    }

    var pipelineGmv = pm && pm.bySquad ? pm.bySquad[sq] || 0 : 0;
    var handoverHtml = pipelineGmv > 0
      ? '<div class="nrr-squad-handover">รอส่งมอบจาก Sales <b class="num">' + nrrFmtGMV(pipelineGmv) + '</b> <a href="#/sales">ดู pipeline →</a></div>'
      : '';

    // The big number is always the MTD/actual — labeled explicitly above it
    // so it's never confused with the run-rate, which gets its own line in
    // the app's established projected-value style ("~" + dotted underline).
    var subLineHtml = fig.is_partial
      ? '<div class="nrr-team-sub nrr-rr-proj" style="display:inline-block">~' + nrrFmtGMV(proj) + ' run-rate เต็มเดือน</div>'
      : '<div class="nrr-team-sub">ทั้งเดือน</div>';

    return '<div class="nrr-team" style="border-top:3px solid ' + color + ';padding-top:14px">' +
      '<div class="nrr-team-top"><span class="nrr-sat-dot" style="background:' + color + '"></span><span class="nrr-team-nm">' + name + '</span>' + momTag + '</div>' +
      '<div class="micro" style="margin-top:6px">' + (fig.is_partial ? 'MTD' : 'ยอดจริง') + '</div>' +
      '<div class="nrr-team-pct num" style="color:' + color + '">' + nrrFmtGMV(s.total) + '</div>' +
      subLineHtml +
      barHtml + keyHtml + handoverHtml +
      '</div>';
  }).join('');

  // B2C gets its own row below — a slim horizontal bar, not a third card,
  // so the two squad cards can each spread full-width (exec feedback).
  var b2cPrev = prevKey ? model.by_month[prevKey].b2c.gmv : null;
  var b2cProj = fig.is_partial && fig.curr_days > 0 ? m.b2c.gmv / fig.curr_days * fig.days_in_month : m.b2c.gmv;
  var b2cMom = b2cPrev > 0 ? Math.round((b2cProj - b2cPrev) / b2cPrev * 1000) / 10 : null;
  var b2cRowHtml = '<div class="nrr-b2c-row">' +
    '<span class="nrr-sat-dot" style="background:' + NRR_CO_COLORS.b2c + '"></span>' +
    '<span style="font-weight:700">B2C</span>' +
    '<b class="num" style="font-size:20px">' + nrrFmtGMV(m.b2c.gmv) + '</b>' +
    (fig.is_partial ? '<span class="micro nrr-rr-proj">~' + nrrFmtGMV(b2cProj) + ' run-rate</span>' : '<span class="micro">ทั้งเดือน</span>') +
    '<span class="micro">' + m.b2c.orders.toLocaleString() + ' ออเดอร์</span>' +
    (b2cMom == null ? '' : '<span class="tag ' + (b2cMom >= 0 ? 'green' : 'coral') + '">' + (b2cMom >= 0 ? '+' : '') + b2cMom + '% MoM</span>') +
    '</div>';

  return '<div class="nrr-team-cards">' + cardsHtml + '</div>' + b2cRowHtml;
}

// ── §4 Audit table (sheet mirror) ─────────────────────────────────────────

function _nrrCoAuditTableHtml(model, cd) {
  var months = _nrrCoWindowMonths(model, nrrCompanyState.tableWindow);
  var lastKey = months[months.length - 1];
  var isMtd = cd && cd.currMonthKey && lastKey === cd.currMonthKey;
  var dim = isMtd ? _nrrCoDaysInMonth(lastKey) : null;
  var currDays = isMtd ? Math.min(_nrrCompanyMtdDay(), dim) : null;

  // The current (MTD) month becomes TWO real columns — actual MTD and
  // projected run-rate — instead of stacking two lines in one cell. Keeps
  // every row single-line (shorter rows) and each number independently
  // scannable/sortable-by-eye instead of visually paired.
  var cols = [];
  months.forEach(function (k) {
    if (isMtd && k === lastKey) { cols.push({ key: k, kind: 'mtd' }); cols.push({ key: k, kind: 'proj' }); }
    else cols.push({ key: k, kind: 'actual' });
  });

  function headHtml(col) {
    var lbl = nrrEsc(model.labels[col.key] || col.key);
    if (col.kind === 'actual') return '<th style="text-align:right;white-space:nowrap">' + lbl + '</th>';
    if (col.kind === 'mtd') return '<th style="text-align:right;white-space:nowrap">' + lbl + '<div class="micro" style="font-weight:400">MTD ถึงวันที่ ' + _nrrCompanyMtdDay() + '</div></th>';
    return '<th style="text-align:right;white-space:nowrap;color:var(--ink3)">Run-rate<div class="micro" style="font-weight:400">คาดการณ์เต็มเดือน</div></th>';
  }
  function cellHtml(col, v) {
    if (col.kind === 'proj') {
      if (!v || !currDays) return '<td class="num" style="text-align:right;color:var(--ink3)">—</td>';
      var proj = v / currDays * dim;
      return '<td class="num nrr-rr-proj" style="text-align:right;color:var(--ink2)">~' + nrrFmtGMV(proj) + '</td>';
    }
    return '<td class="num" style="text-align:right">' + (v ? nrrFmtGMVExact(v) : '—') + '</td>';
  }

  // Squad rows/sub-rows carry a colored left-border "stripe" (+ a dot on the
  // bold total row) in the squad's own hue, so the whole block scans as one
  // color at a glance — matches the trend-chart/squad-card colors exactly.
  function rowHtml(label, getter, opts) {
    opts = opts || {};
    // Squad total rows get a light tint of the squad's own color so they
    // pop above their Sales/KAM/PM/Admin sub-rows at a glance. Set on BOTH
    // the <tr> (covers ordinary cells) AND the label <td>'s own inline
    // style (an inline style always beats the sticky-column CSS class's
    // opaque background, which would otherwise hide the tint on that cell).
    var bg = opts.highlightRgb ? 'background:rgba(' + opts.highlightRgb + ',0.08);' : '';
    var cells = cols.map(function (col) { return cellHtml(col, getter(model.by_month[col.key])); }).join('');
    var style = (opts.bold ? 'font-weight:600;' : '') +
      'padding-left:' + (opts.indent ? '26px' : '12px') + ';' +
      (opts.squadColor ? 'border-left:3px solid ' + opts.squadColor + ';' : '') + bg;
    var dotHtml = opts.dot ? '<span class="nrr-sat-dot" style="background:' + opts.dot + ';margin-right:7px"></span>' : '';
    var rowStyle = (opts.topline ? 'border-top:1px solid var(--line);' : '') + bg;
    return '<tr' + (rowStyle ? ' style="' + rowStyle + '"' : '') + '>' +
      '<td style="' + style + 'white-space:nowrap">' + dotHtml + label + '</td>' + cells + '</tr>';
  }
  var headCells = cols.map(headHtml).join('');
  var hasUnassigned = months.some(function (k) { return model.by_month[k].unassigned > 0; });

  var rows =
    rowHtml('B2C', function (m) { return m.b2c.gmv; }) +
    rowHtml('Squad Chain', function (m) { return m.squads.chain.total; }, { bold: true, topline: true, dot: NRR_CO_COLORS.chain, squadColor: NRR_CO_COLORS.chain, highlightRgb: NRR_CO_RGB.chain }) +
    rowHtml('Sales', function (m) { return m.squads.chain.sales; }, { indent: true, squadColor: NRR_CO_COLORS.chain }) +
    rowHtml('KAM', function (m) { return m.squads.chain.kam; }, { indent: true, squadColor: NRR_CO_COLORS.chain }) +
    rowHtml('PM', function (m) { return m.squads.chain.pm; }, { indent: true, squadColor: NRR_CO_COLORS.chain }) +
    rowHtml('Admin', function (m) { return m.squads.chain.admin; }, { indent: true, squadColor: NRR_CO_COLORS.chain }) +
    rowHtml('Squad SA/MC', function (m) { return m.squads.sa_mc.total; }, { bold: true, topline: true, dot: NRR_CO_COLORS.sa_mc, squadColor: NRR_CO_COLORS.sa_mc, highlightRgb: NRR_CO_RGB.sa_mc }) +
    rowHtml('Sales', function (m) { return m.squads.sa_mc.sales; }, { indent: true, squadColor: NRR_CO_COLORS.sa_mc }) +
    rowHtml('KAM', function (m) { return m.squads.sa_mc.kam; }, { indent: true, squadColor: NRR_CO_COLORS.sa_mc }) +
    rowHtml('PM', function (m) { return m.squads.sa_mc.pm; }, { indent: true, squadColor: NRR_CO_COLORS.sa_mc }) +
    rowHtml('Admin', function (m) { return m.squads.sa_mc.admin; }, { indent: true, squadColor: NRR_CO_COLORS.sa_mc }) +
    (hasUnassigned ? rowHtml('ยังไม่จัดกลุ่ม (other/unassigned)', function (m) { return m.unassigned; }, { topline: true }) : '') +
    rowHtml('Total GMV', function (m) { return m.total; }, { bold: true, topline: true });

  return '<div style="overflow-x:auto;margin-top:12px">' +
    '<table class="nrr-table nrr-table-compact nrr-table-sticky-col"><thead><tr><th>Segment</th>' + headCells + '</tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>' +
    '<div class="micro" style="margin-top:10px">' +
    'ยอดจริงจาก DWH (gmv_ex_vat, ไม่ normalize) · KAM แบ่ง squad ตามพอร์ตของ TL (squad_params ใน Supabase) — ' +
    'ไม่ใช่ตาม account_type ของร้าน (ยกเว้นร้านที่หา KAM เจ้าของไม่เจอในทะเบียน จะแบ่งตาม account_type แทน) · ' +
    'Sales/PM/Admin แบ่งตาม account_type ตรงๆ · B2C = account_type Consumer/Enduser · ' +
    'เดือนล่าสุดแยกคอลัมน์ MTD (ยอดจริงถึงวันนี้) กับ Run-rate (คาดการณ์เต็มเดือน)</div>';
}
