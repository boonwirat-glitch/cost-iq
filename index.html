<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfolio Intelligence · Freshket</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ DARK (default — primary experience) ══ */
:root{
  --bg:#05070e;--sf:#0c1018;--sf2:#10161f;--sf3:#151d2a;
  --br:rgba(255,255,255,.09);--br2:rgba(255,255,255,.05);
  --tx:#e4ecfa;--tx2:#8fa3c0;--tx3:#4e6080;
  --ac:#5b9cf6;--ac-soft:rgba(91,156,246,.12);
  --gn:#23d18b;--gn-soft:rgba(35,209,139,.1);
  --rd:#f1506a;--rd-soft:rgba(241,80,106,.1);
  --am:#f9a825;--am-soft:rgba(249,168,37,.1);
  --teal:#22d3ee;--pu:#b39dfa;--bl:#5b9cf6;
  /* Segments */
  --sa-c:#7ab8fa;--sa-bg:rgba(122,184,250,.07);--sa-bd:rgba(122,184,250,.18);
  --mc-c:#4cd4a0;--mc-bg:rgba(76,212,160,.07);--mc-bd:rgba(76,212,160,.18);
  --ch-c:#fbbf24;--ch-bg:rgba(251,191,36,.07);--ch-bd:rgba(251,191,36,.18);
  --eu-c:#c4a3fc;--eu-bg:rgba(196,163,252,.07);
  /* Badges */
  --b-sa-bg:rgba(122,184,250,.1);--b-sa-c:#93c5fd;--b-sa-bd:rgba(122,184,250,.22);
  --b-mc-bg:rgba(76,212,160,.1);--b-mc-c:#6ee7b7;--b-mc-bd:rgba(76,212,160,.22);
  --b-ch-bg:rgba(251,191,36,.1);--b-ch-c:#fcd34d;--b-ch-bd:rgba(251,191,36,.22);
  --b-key-bg:rgba(249,168,37,.1);--b-key-c:#fbbf24;--b-key-bd:rgba(249,168,37,.2);
  --b-norm-bg:rgba(91,156,246,.1);--b-norm-c:#93c5fd;--b-norm-bd:rgba(91,156,246,.2);
  --b-bron-bg:rgba(241,80,106,.1);--b-bron-c:#fb7185;--b-bron-bd:rgba(241,80,106,.2);
  /* BCG */
  --bcg-star-bg:rgba(35,209,139,.09);--bcg-star-c:#23d18b;--bcg-star-bd:rgba(35,209,139,.22);
  --bcg-rising-bg:rgba(91,156,246,.09);--bcg-rising-c:#5b9cf6;--bcg-rising-bd:rgba(91,156,246,.22);
  --bcg-watch-bg:rgba(249,168,37,.09);--bcg-watch-c:#f9a825;--bcg-watch-bd:rgba(249,168,37,.22);
  --bcg-risk-bg:rgba(241,80,106,.09);--bcg-risk-c:#f1506a;--bcg-risk-bd:rgba(241,80,106,.22);
  /* Recency */
  --rec-ok-bg:rgba(35,209,139,.09);--rec-ok-c:#23d18b;--rec-ok-bd:rgba(35,209,139,.2);
  --rec-warn-bg:rgba(249,168,37,.09);--rec-warn-c:#f9a825;--rec-warn-bd:rgba(249,168,37,.2);
  --rec-risk-bg:rgba(241,80,106,.09);--rec-risk-c:#f1506a;--rec-risk-bd:rgba(241,80,106,.2);
  --rec-churn-bg:rgba(255,255,255,.04);--rec-churn-c:#4e6080;--rec-churn-bd:rgba(255,255,255,.08);
  --rec-closed-bg:rgba(179,157,250,.09);--rec-closed-c:#b39dfa;--rec-closed-bd:rgba(179,157,250,.2);
  --chart-zero:#182030;
  --sw:248px;
  --mono:'IBM Plex Mono',monospace;
  --body:'Sarabun',sans-serif;
  --r:8px; --r-sm:5px; --r-lg:12px;
  --shadow-card:0 1px 0 rgba(255,255,255,.04) inset, 0 4px 20px rgba(0,0,0,.35);
  --shadow-subtle:0 2px 12px rgba(0,0,0,.25);
}

/* ══ LIGHT THEME ══ */
html[data-theme="light"]{
  --bg:#f1f4f9;--sf:#ffffff;--sf2:#f7f8fc;--sf3:#eef1f8;
  --br:rgba(0,0,0,.08);--br2:rgba(0,0,0,.05);
  --tx:#0d1117;--tx2:#4a5568;--tx3:#9aa5b4;
  --ac:#2563eb;--ac-soft:#eff6ff;
  --gn:#16a34a;--gn-soft:#f0fdf4;
  --rd:#dc2626;--rd-soft:#fff1f2;
  --am:#d97706;--am-soft:#fffbeb;
  --teal:#0891b2;--pu:#7c3aed;--bl:#2563eb;
  --sa-c:#1d6fa4;--sa-bg:#eff8ff;--sa-bd:#bfdbfe;
  --mc-c:#0f766e;--mc-bg:#f0fdfa;--mc-bd:#99f6e4;
  --ch-c:#92400e;--ch-bg:#fffbeb;--ch-bd:#fcd34d;
  --eu-c:#7c3aed;--eu-bg:#faf5ff;
  --b-sa-bg:#dbeafe;--b-sa-c:#1e40af;--b-sa-bd:#93c5fd;
  --b-mc-bg:#d1fae5;--b-mc-c:#065f46;--b-mc-bd:#6ee7b7;
  --b-ch-bg:#fef3c7;--b-ch-c:#78350f;--b-ch-bd:#fcd34d;
  --b-key-bg:#fef3c7;--b-key-c:#78350f;--b-key-bd:#fcd34d;
  --b-norm-bg:#dbeafe;--b-norm-c:#1e40af;--b-norm-bd:#93c5fd;
  --b-bron-bg:#fee2e2;--b-bron-c:#7f1d1d;--b-bron-bd:#fca5a5;
  --bcg-star-bg:#dcfce7;--bcg-star-c:#15803d;--bcg-star-bd:#86efac;
  --bcg-rising-bg:#dbeafe;--bcg-rising-c:#1e40af;--bcg-rising-bd:#93c5fd;
  --bcg-watch-bg:#fef3c7;--bcg-watch-c:#78350f;--bcg-watch-bd:#fcd34d;
  --bcg-risk-bg:#fee2e2;--bcg-risk-c:#7f1d1d;--bcg-risk-bd:#fca5a5;
  --rec-ok-bg:#dcfce7;--rec-ok-c:#15803d;--rec-ok-bd:#86efac;
  --rec-warn-bg:#fef3c7;--rec-warn-c:#78350f;--rec-warn-bd:#fcd34d;
  --rec-risk-bg:#fee2e2;--rec-risk-c:#7f1d1d;--rec-risk-bd:#fca5a5;
  --rec-churn-bg:#f8fafc;--rec-churn-c:#64748b;--rec-churn-bd:#cbd5e1;
  --rec-closed-bg:#faf5ff;--rec-closed-c:#6d28d9;--rec-closed-bd:#c4b5fd;
  --chart-zero:#e2e8f0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--body);font-size:14px;-webkit-font-smoothing:antialiased}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.ld-logo{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--tx3)}
.ld-title{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.03em}
.ld-msg{font-family:var(--mono);font-size:10px;color:var(--tx2)}
.ld-bar-wrap{width:200px;height:1px;background:var(--br);overflow:hidden}
.ld-bar{height:100%;background:var(--ac);width:0%;transition:width .4s ease}
.ld-error{color:var(--rd);font-family:var(--mono);font-size:10px;text-align:center;max-width:400px;line-height:1.7}

/* ── SIDEBAR ── */
#sb{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column;z-index:100;overflow:hidden}
.sb-hdr{padding:18px 16px 14px;border-bottom:1px solid var(--br);flex-shrink:0}
.sb-logo{font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--tx3)}
.sb-title{font-size:13px;font-weight:700;color:var(--tx);margin-top:4px;letter-spacing:-.01em}
.sb-meta{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:3px}
.sb-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.theme-btn{font-family:var(--mono);font-size:8px;padding:4px 10px;border:1px solid var(--br);border-radius:20px;background:rgba(255,255,255,.04);color:var(--tx3);cursor:pointer;transition:all .2s;letter-spacing:.06em;text-transform:uppercase}
.theme-btn:hover{color:var(--tx);border-color:var(--ac)}
.ka-list{flex:1;overflow-y:auto;padding:8px 0 24px}
.ka-list::-webkit-scrollbar{width:2px}.ka-list::-webkit-scrollbar-thumb{background:var(--br);border-radius:1px}
.sec-hdr{padding:14px 16px 5px;font-family:var(--mono);font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;display:flex;align-items:center;gap:8px;color:var(--tx3)}
.sec-line{flex:1;height:1px;background:var(--br)}
.ovw-nav{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;margin:6px 8px 2px;border-radius:var(--r-sm);transition:all .12s;border:1px solid transparent}
.ovw-nav:hover{background:var(--sf2)}.ovw-nav.active{background:var(--ac-soft);border-color:rgba(91,156,246,.35);box-shadow:0 0 16px rgba(91,156,246,.1)}
.ovw-nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}.ovw-nav-text{font-size:11px;font-weight:600;color:var(--tx)}
.ovw-nav.active .ovw-nav-text{color:var(--ac)}
.kai{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.kai:hover{background:rgba(255,255,255,.03)}.kai.active{background:rgba(91,156,246,.07);border-left-color:var(--ac)}
.av{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--tx3);flex-shrink:0;background:var(--sf2);border:1px solid var(--br)}
.kai.active .av{color:var(--ac);border-color:rgba(79,142,247,.3);background:var(--ac-soft)}
.ki{flex:1;min-width:0}.kn{font-weight:600;font-size:11px;display:flex;align-items:center;gap:4px;white-space:nowrap;color:var(--tx)}
.kg{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── MAIN (Level 2 portfolio) ── */
#main{margin-left:var(--sw);height:100vh;display:flex;flex-direction:column;overflow:hidden;display:none}
#topbar{padding:10px 24px 9px;border-bottom:1px solid var(--br);background:var(--sf);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px}
#topbar-owner{font-size:17px;font-weight:700;letter-spacing:-.02em}
.ts{display:flex;gap:20px;flex-shrink:0}
.si{text-align:right}.sv{font-family:var(--mono);font-size:13px;font-weight:700}.sl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
#tabs{display:flex;border-bottom:1px solid var(--br);background:var(--sf);padding:0 24px;flex-shrink:0;align-items:center}
.tb3{padding:9px 14px 8px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--tx3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px;letter-spacing:.02em}
.tb3:hover{color:var(--tx2)}.tb3.active{color:var(--ac);border-bottom-color:var(--ac)}
.trend-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
.trend-lbl{font-family:var(--mono);font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em}
.trend-toggle{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--br);border-radius:20px;overflow:hidden;padding:2px}
.tt-btn{padding:3px 12px;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--tx3);background:none;border:none;cursor:pointer;transition:all .15s;letter-spacing:.04em;border-radius:16px}
.tt-btn:hover{color:var(--tx2)}.tt-btn.active{background:var(--ac);color:#fff;box-shadow:0 0 14px rgba(91,156,246,.45)}
#content{flex:1;overflow-y:auto;background:var(--bg)}
#content::-webkit-scrollbar{width:3px}#content::-webkit-scrollbar-thumb{background:var(--br)}
.panel{display:none;padding:20px 24px 48px}.panel.active{display:block}

/* ── OVERVIEW ── */
#overview-full{position:fixed;top:0;left:var(--sw);right:0;bottom:0;background:var(--bg);overflow-y:auto;display:none;z-index:50}
#overview-full::-webkit-scrollbar{width:3px}#overview-full::-webkit-scrollbar-thumb{background:var(--br)}
.ovw-inner{padding:0 0 64px;max-width:1400px}

/* HERO — full bleed, no card border */
.ovw-hero{padding:28px 36px 24px;border-bottom:1px solid var(--br);background:linear-gradient(160deg,rgba(91,156,246,.04) 0%,transparent 55%)}
.hero-eyebrow{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx3);display:flex;align-items:center;margin-bottom:10px}
.hero-number{font-family:var(--mono);font-size:64px;font-weight:600;letter-spacing:-.05em;color:var(--tx);line-height:.9;margin-bottom:14px;text-shadow:0 0 80px rgba(91,156,246,.18)}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.hero-pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.hero-pill-up{background:var(--gn-soft);color:var(--gn);border:1px solid rgba(35,209,139,.2);box-shadow:0 0 12px rgba(35,209,139,.08)}
.hero-pill-dn{background:var(--rd-soft);color:var(--rd);border:1px solid rgba(241,80,106,.2);box-shadow:0 0 12px rgba(241,80,106,.08)}
.hero-pill-neu{background:rgba(255,255,255,.05);color:var(--tx2);border:1px solid var(--br)}
html[data-theme="light"] .hero-pill-neu{background:var(--sf2);border-color:var(--br)}
.hero-pill-nrr{font-weight:700}
.hero-stats{display:flex;gap:24px;font-family:var(--mono);font-size:11px;color:var(--tx3)}
.hero-stat-val{color:var(--tx2);font-weight:700}

/* SECTION HEADER */
.ovw-section-hdr{padding:24px 36px 12px;display:flex;align-items:center;gap:12px}
.ovw-section-num{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:.1em}
.ovw-section-title{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--tx2)}
.ovw-section-rule{flex:1;height:1px;background:var(--br)}

/* SEGMENT SECTION */
.seg-wrap{padding:0 36px 24px}
.seg-propbar{display:flex;height:3px;margin-bottom:6px;border-radius:0;overflow:hidden}
.seg-propbar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;margin-bottom:20px}
.seg-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--br);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 4px 20px rgba(0,0,0,.35)}
.seg-col{padding:20px 22px;border-right:1px solid var(--br);transition:background .15s}
.seg-col:last-child{border-right:none}
.seg-col-label{font-family:var(--mono);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px}
.seg-col-gmv{font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:-.04em;line-height:1;margin-bottom:6px}
.seg-col-sub{font-size:11px;color:var(--tx2);margin-bottom:12px}
.seg-col-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--br);padding-top:12px;margin-top:4px}
.seg-col-stat{text-align:center;padding:4px 0}
.seg-col-stat-v{font-family:var(--mono);font-size:13px;font-weight:700}
.seg-col-stat-l{font-family:var(--mono);font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* GENERIC SECTION PADDING */
.ovw-section-body{padding:0 36px}

/* CARDS */
.ovw-card{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:20px 22px;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.ovw-split-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.ovw-prop-bar{display:flex;height:3px;border-radius:0;overflow:hidden;margin-bottom:28px}
.ovw-owner-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:28px;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 4px 20px rgba(0,0,0,.35)}
.ovw-owner-col{padding:20px 22px;border-right:1px solid var(--br)}
.ovw-owner-col:last-child{border-right:none}

/* TABLES */
.ovw-table-wrap{border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:28px;box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 4px 20px rgba(0,0,0,.35)}

/* ── BADGES ── */
.tb2{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.b-sa{background:var(--b-sa-bg);color:var(--b-sa-c);border:1px solid var(--b-sa-bd)}
.b-mc{background:var(--b-mc-bg);color:var(--b-mc-c);border:1px solid var(--b-mc-bd)}
.b-chain{background:var(--b-ch-bg);color:var(--b-ch-c);border:1px solid var(--b-ch-bd)}
.b-key{background:var(--b-key-bg);color:var(--b-key-c);border:1px solid var(--b-key-bd)}
.b-keyaccount{background:var(--b-key-bg);color:var(--b-key-c);border:1px solid var(--b-key-bd)}
.b-normal{background:var(--b-norm-bg);color:var(--b-norm-c);border:1px solid var(--b-norm-bd)}
.b-bronze{background:var(--b-bron-bg);color:var(--b-bron-c);border:1px solid var(--b-bron-bd)}
.bcg-star{background:var(--bcg-star-bg);color:var(--bcg-star-c);border:1px solid var(--bcg-star-bd);font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap}
.bcg-watch{background:var(--bcg-watch-bg);color:var(--bcg-watch-c);border:1px solid var(--bcg-watch-bd);font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap}
.bcg-rising{background:var(--bcg-rising-bg);color:var(--bcg-rising-c);border:1px solid var(--bcg-rising-bd);font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap}
.bcg-atrisk{background:var(--bcg-risk-bg);color:var(--bcg-risk-c);border:1px solid var(--bcg-risk-bd);font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap}

/* ── RECENCY ── */
.rec{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap}
.rec-ok{background:var(--rec-ok-bg);color:var(--rec-ok-c);border:1px solid var(--rec-ok-bd)}
.rec-warn{background:var(--rec-warn-bg);color:var(--rec-warn-c);border:1px solid var(--rec-warn-bd)}
.rec-risk{background:var(--rec-risk-bg);color:var(--rec-risk-c);border:1px solid var(--rec-risk-bd)}
.rec-churned{background:var(--rec-churn-bg);color:var(--rec-churn-c);border:1px solid var(--rec-churn-bd)}
.rec-closed{background:var(--rec-closed-bg);color:var(--rec-closed-c);border:1px solid var(--rec-closed-bd)}

/* ── FLAGS ── */
.fb{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;white-space:nowrap;display:block;margin-bottom:2px}
.fhw{background:var(--rec-closed-bg);color:var(--rec-closed-c);border:1px solid var(--rec-closed-bd)}
.ftr{background:var(--mc-bg);color:var(--mc-c);border:1px solid var(--mc-bd)}
.fnw{background:var(--ac-soft);color:var(--ac);border:1px solid rgba(79,142,247,.25)}

/* ── OUTLET EXPAND ── */
tr.or td{padding:0}
.ol{background:var(--sf2);border-top:1px solid var(--br2);display:none;padding:8px 12px 8px 28px}
tr.or.open .ol{display:block}
.olabel{font-family:var(--mono);font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.oi{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--br2)}
.oi:last-child{border-bottom:none}
.odot{width:4px;height:4px;border-radius:1px;flex-shrink:0}
.on{color:var(--tx);font-size:11px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ogmv{font-family:var(--mono);font-size:9px;color:var(--tx2);flex-shrink:0;text-align:right;min-width:36px}
.orec{flex-shrink:0;margin-left:4px}

/* ── BCG ── */
.bcg-slider-wrap{background:var(--sf2);border:1px solid var(--br);border-radius:4px;padding:14px 16px;margin-bottom:12px}

// Robust CSV parser — handles quoted fields, Thai names, BOM
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
  const lines = text.split('\n');
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, j) => { obj[h] = vals[j] !== undefined ? vals[j] : ''; });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else { cur += c; }
  }
  result.push(cur);
  return result;
}

// Strip thousand-separator commas that Google Sheets adds to numbers
function pNum(v) { return parseFloat(String(v||0).split(',').join('')) || 0; }
function pInt(v) { return parseInt(String(v||0).split(',').join('')) || 0; }

async function loadCSV(url, label, pct) {
  setLoading(label, pct);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} loading ${label}`);
  const text = await res.text();
  return parseCSV(text);
}
async function loadAll() {

    const [q1,q2,q3,q4] = await Promise.all([
      loadCSV(FILE_URLS.Q1,'Loading accounts…',20),
      loadCSV(FILE_URLS.Q2,'Loading categories…',40),

    buildNewOutletIndex(); // must run after Q1 (owner_type) + Q3 (outlets) both ready
    setLoading('Ready',100);
    await new Promise(r => setTimeout(r, 200));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('sb').style.display = 'flex';
    buildSidebar();
    showOverview();
  } catch(e) {
    document.getElementById('ld-msg').innerHTML = `<div class="ld-error">❌ ${e.message}<br><br>ตรวจสอบว่า Google Drive files เป็น public แล้ว</div>`;
    document.getElementById('ld-bar').style.display = 'none';
  }
}

function processQ1(rows) {
  // Q1 v8 grain: account × month × commercial_owner
  // Each account may have multiple rows per month (if owner changed mid-month)

  const latestOwner = {}; // id → {month, owner_display, owner_type} for sidebar/portfolio

  rows.forEach(r => {
    const id = r.account_id; if (!id) return;
    const owner_display = r.owner_display || (r.account_type || 'Unknown') + '-No Owner';
    const owner_type    = r.owner_type    || 'NO_OWNER';
    const m             = r.month;
    const gmv           = pNum(r.gmv_ex_vat);
    const mgn           = pNum(r.margin_ex_vat);

    // Create account record if not exists (use first row's metadata)
    if (!D.accounts[id]) {
      D.accounts[id] = {
        id, name: r.account_name, type: r.account_type,
        cls: r.account_class, owner: owner_display,
        owner_type: owner_type,
        status: r.account_status,
        first_dollar: r.first_dollar_date,
        tenure: pNum(r.tenure_months),
        new_exp: r.new_user_exp_date,
        // GMV/margin by month (total across all owners in that month)
        gmv: {}, margin: {}, orders: {}, outlets: {}, last_order: {},
        // GMV by month × owner_type (for owner type cards)
        gmv_by_owner: {},    // { month: { KAM: x, PM: y, SALE: z, NO_OWNER: w } }
        mgn_by_owner: {}
      };
    }

    const a = D.accounts[id];

    // Accumulate total GMV per month (sum across owners)
    a.gmv[m]     = (a.gmv[m]     || 0) + gmv;
    a.margin[m]  = (a.margin[m]  || 0) + mgn;
    a.orders[m]  = (a.orders[m]  || 0) + pInt(r.order_count);
    a.outlets[m] = (a.outlets[m] || 0) + pInt(r.outlet_count);
    if (r.last_order_date && (!a.last_order[m] || r.last_order_date > a.last_order[m]))
      a.last_order[m] = r.last_order_date;

    // Accumulate GMV per owner_type per month
    if (!a.gmv_by_owner[m]) a.gmv_by_owner[m] = {};
    if (!a.mgn_by_owner[m]) a.mgn_by_owner[m] = {};
    a.gmv_by_owner[m][owner_type] = (a.gmv_by_owner[m][owner_type] || 0) + gmv;
    a.mgn_by_owner[m][owner_type] = (a.mgn_by_owner[m][owner_type] || 0) + mgn;

    // Accumulate actual GMV per owner_display per month (used for portfolio bar chart)
    // This correctly captures GMV even after account handover
    if (!D.ownerMonthly[owner_display]) D.ownerMonthly[owner_display] = {};
    D.ownerMonthly[owner_display][m] = (D.ownerMonthly[owner_display][m] || 0) + gmv;

    // Track latest owner (latest month + highest GMV owner in that month)
    // Used for sidebar grouping and Level 2 portfolio view
    if (!latestOwner[id] || m > latestOwner[id].month ||
        (m === latestOwner[id].month && gmv > latestOwner[id].gmv)) {
      // Prefer KAM/PM over SALE/NO_OWNER for latest owner if same month
      const curType = latestOwner[id]?.owner_type;
      const priority = { KAM:4, PM:3, SALE:2, NO_OWNER:1 };
      if (!latestOwner[id] || m > latestOwner[id].month ||
          (m === latestOwner[id].month && (priority[owner_type]||0) > (priority[curType]||0))) {
        latestOwner[id] = { month: m, owner_display, owner_type, gmv };
      }
    }
  });

  // Pass 2: set latest owner on account + build D.owners for sidebar
  Object.entries(latestOwner).forEach(([id, ow]) => {
    const a = D.accounts[id];
    if (!a) return;
    a.owner      = ow.owner_display;
    a.owner_type = ow.owner_type;
    if (!D.owners[ow.owner_display]) D.owners[ow.owner_display] = new Set();
    D.owners[ow.owner_display].add(id);
  });
}

function processQ2(rows) {
  rows.forEach(r => {
    const id = r.account_id; if (!id) return;
    if (!D.categories[id]) D.categories[id] = {};
    const m = r.month;
    if (!D.categories[id][m]) D.categories[id][m] = {};
    D.categories[id][m][r.category] = {
      gmv: pNum(r.category_gmv),
      margin: pNum(r.margin_ex_vat)
    };
  });
}

function processQ3(rows) {
  rows.forEach(r => {
    const id = r.account_id, oid = String(r.outlet_id);
    if (!id || !oid) return;
    if (!D.outlets[id]) D.outlets[id] = {};
    if (!D.outlets[id][oid]) {
      D.outlets[id][oid] = {
        id: oid, name: r.outlet_name,
        first_dollar: r.first_dollar_date,
        gmv: {}, margin: {}, orders: {}, last_order: {}
      };
    }
    const o = D.outlets[id][oid], m = r.month;
    o.gmv[m]        = pNum(r.gmv_ex_vat);
    o.margin[m]     = pNum(r.margin_ex_vat);
    o.orders[m]     = pInt(r.order_count);
    o.last_order[m] = r.last_order_date;
  });
  // D.newOutlets built separately in buildNewOutletIndex() after Q1 owner_type is ready
}

// Called after BOTH processQ1 and processQ3 complete
// so acc.owner_type is correctly set before we classify Sales vs non-Sales
function buildNewOutletIndex() {
  D.newOutlets = {};
  Object.entries(D.outlets).forEach(([accId, outlets]) => {
    const acc = D.accounts[accId];
    Object.values(outlets).forEach(o => {
      const fdm = parseFdMonth(o.first_dollar);
      if (!fdm) return;
      if (!D.newOutlets[accId]) D.newOutlets[accId] = {};
      if (!D.newOutlets[accId][fdm]) D.newOutlets[accId][fdm] = { count:0, gmv:0, salesCount:0, salesGMV:0 };
      const entry   = D.newOutlets[accId][fdm];
      const gmvInM  = o.gmv[fdm] || 0;
      entry.count++;
      entry.gmv += gmvInM;
      if (acc && acc.owner_type === 'SALE') {
        entry.salesCount++;
        entry.salesGMV += gmvInM;
      }
    });
  });
}

function processQ4(rows) {
  rows.forEach(r => {
    const id = r.account_id; if (!id) return;
    if (!D.changes[id]) D.changes[id] = [];
    D.changes[id].push({ month: r.change_month, from: r.from_owner, from_type: r.from_owner_type, to: r.to_owner, to_type: r.to_owner_type, type: r.change_type });
  });
}

// ═══════════════════════════════════════════════
//  COMPUTED METRICS
// ═══════════════════════════════════════════════
function gmvArr(a) { return MONTHS.map(m => a.gmv[m] || 0); }

function trendPct(a) {
  const arr = gmvArr(a);
  const latest = arr[arr.length - 1];
  if (!latest) return null;
  if (TMODE === 'mom') {
    const prev = arr[arr.length - 2];
    if (!prev) return null;
    return Math.round((latest - prev) / prev * 100);
  }
  if (TMODE === '3m') {
    const slice = arr.slice(-4, -1).filter(v => v > 0);
    if (!slice.length) return null;
    const avg = slice.reduce((s, v) => s + v, 0) / slice.length;
    return Math.round((latest - avg) / avg * 100);
  }
  // 6m
  const slice = arr.slice(0, 6).filter(v => v > 0);
  if (!slice.length) return null;
  const avg = slice.reduce((s, v) => s + v, 0) / slice.length;
  return Math.round((latest - avg) / avg * 100);
}

function recency(a) {
  const dateStr = a.last_order[LATEST] || a.last_order[PREV] ||
    Object.entries(a.last_order).filter(([,v])=>v).sort(([m1],[m2])=>m2>m1?1:-1)[0]?.[1];
  if (!dateStr) return { status:'unknown', days: null, label:'—' };
  const days = Math.floor((new Date('2026-04-30') - new Date(dateStr)) / 86400000);
  if (!a.gmv[LATEST] && a.gmv[PREV]) return { status:'churned', days, label: days+'d ago' };
  if (['PERMANENTLY_CLOSE','CANCEL'].includes(a.status)) return { status:'closed', days, label:'Closed' };
  if (days <= 14) return { status:'ok',   days, label: days+'d ago' };
  if (days <= 30) return { status:'warn', days, label: days+'d ago' };
  return { status:'risk', days, label: days+'d ago' };
}

function recBadge(rec) {
  const map = { ok:'rec-ok', warn:'rec-warn', risk:'rec-risk', churned:'rec-churned', closed:'rec-closed', unknown:'rec-churned' };
  return `<span class="rec ${map[rec.status]||'rec-churned'}">${rec.label}</span>`;
}

function catsBought(id) {
  const s = new Set();
  MONTHS.slice(-3).forEach(m => { const c = D.categories[id]?.[m]; if(c) Object.keys(c).forEach(k => s.add(k)); });
  return s;
}

// Period helpers — all metrics respond to TMODE toggle
function periodMonths() {
  if (FILTER_MONTH) return [FILTER_MONTH];
  if (TMODE === 'mom') return [LATEST];
  if (TMODE === '3m')  return MONTHS.slice(-3);
  return MONTHS.slice(-6);
}
function prevPeriodMonths() {
  const pm = periodMonths(), idx = MONTHS.indexOf(pm[0]);
  return MONTHS.slice(Math.max(0, idx - pm.length), idx);
}
function periodGMV(a)     { return periodMonths().reduce((s,m) => s+(a.gmv[m]||0), 0); }
function prevPeriodGMV(a) { return prevPeriodMonths().reduce((s,m) => s+(a.gmv[m]||0), 0); }
function periodMargin(a)  { return periodMonths().reduce((s,m) => s+(a.margin[m]||0), 0); }

function isChurned(a) { return periodGMV(a) === 0 && prevPeriodGMV(a) > 0; }

// Parse date from Google Sheets CSV (handles YYYY-MM-DD and M/D/YYYY formats)
function parseFdMonth(fd) {
  if (!fd) return null;
  const s = String(fd);
  const iso = s.match(/^(\d{4})-(\d{2})/);
  if (iso) return `${iso[1]}-${iso[2]}`;
  const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (us) return `${us[3]}-${us[1].padStart(2,'0')}`;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d.toISOString().slice(0,7);
}
// ── New FD helpers (outlet-level, from Q3) ──────────────────────
// newOutletCount: outlets with first_dollar in periodMonths()
function newOutletCount(a) {
  const pm = periodMonths();
  const nb = D.newOutlets[a.id];
  if (!nb) return 0;
  return pm.reduce((s, m) => s + (nb[m] ? nb[m].count : 0), 0);
}
function newOutletGMV(a) {
  const pm = periodMonths();
  const nb = D.newOutlets[a.id];
  if (!nb) return 0;
  return pm.reduce((s, m) => s + (nb[m] ? nb[m].gmv : 0), 0);
}
function newOutletSalesCount(a) {
  const pm = periodMonths();
  const nb = D.newOutlets[a.id];
  if (!nb) return 0;
  return pm.reduce((s, m) => s + (nb[m] ? nb[m].salesCount : 0), 0);
}
function newOutletSalesGMV(a) {
  const pm = periodMonths();
  const nb = D.newOutlets[a.id];
  if (!nb) return 0;
  return pm.reduce((s, m) => s + (nb[m] ? nb[m].salesGMV : 0), 0);
}

// isNew at account level: ยังใช้ account first_dollar (สำหรับ account-level New FD)
function isNew(a) {
  const m = parseFdMonth(a.first_dollar);
  return m ? periodMonths().includes(m) : false;
}
// hasNewOutlet: outlet ใหม่ใน period (ครอบคลุมทั้ง account ใหม่ + สาขาใหม่)
function hasNewOutlet(a) { return newOutletCount(a) > 0; }
function isNewSales(a)    { return isNew(a) && a.owner_type === 'SALE'; }
function isNewExisting(a) { return isNew(a) && a.owner_type !== 'SALE'; }
function isSales(a)       { return a.owner_type === 'SALE'; }

function marginPct(a, m = LATEST) {
  const g = a.gmv[m], mg = a.margin[m];
  if (!g) return null;
  return (mg / g * 100).toFixed(1);
}

function aov(a, m = LATEST) {
  const g = a.gmv[m], ord = a.orders[m];
  if (!ord) return null;
  return Math.round(g / ord);
}

function freq(a, m = LATEST) {
  const ord = a.orders[m], out = a.outlets[m] || 1;
  if (!ord) return null;
  return (ord / out).toFixed(1);
}

function portMedianGMV(ids) {
  const gmvs = ids.map(id => D.accounts[id]?.gmv[LATEST] || 0).filter(v => v > 0).sort((a, b) => a - b);
  if (!gmvs.length) return 0;
  return gmvs[Math.floor(gmvs.length / 2)];
}

function bcgQ(a, medGMV, tThr = 5) {
  const g = a.gmv[LATEST], t = trendPct(a);
  if (!g || t === null) return null;
  if (MONTHS.filter(m => a.gmv[m] > 0).length < 2) return null;
  const hi = g >= medGMV, up = t >= tThr;
  if (hi && up)  return { key:'star',   badge:'<span class="bcg-star">🌟 Star</span>' };
  if (hi && !up) return { key:'watch',  badge:'<span class="bcg-watch">⚠️ Watch</span>' };
  if (!hi && up) return { key:'rising', badge:'<span class="bcg-rising">🚀 Rising</span>' };
  return             { key:'atrisk',    badge:'<span class="bcg-atrisk">🔴 At Risk</span>' };
}

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  const kamOwners = [], salesOwners = [], unmgd = [];

  Object.keys(D.owners).forEach(o => {
    if (!o || ['KAM','SALE','PM','ADMIN','NO_OWNER','UNMANAGED'].includes(o)) return;
    if (o.startsWith('Sales·') || o.startsWith('PM·')) salesOwners.push(o);
    else if (o.includes('No Owner') || o.includes('Unmanaged')) unmgd.push(o);
    else kamOwners.push(o);
  });
  const ownerGMV = o => [...(D.owners[o]||[])].reduce((s,id) => s+(D.accounts[id]?.gmv[LATEST]||0), 0);
  kamOwners.sort((a,b) => ownerGMV(b) - ownerGMV(a));
  salesOwners.sort((a,b) => ownerGMV(b) - ownerGMV(a));
  const order = ['SA-No Owner','MC-No Owner','Chain-No Owner','Enduser-No Owner','SA-Unmanaged','MC-Unmanaged','Chain-Unmanaged'];
  unmgd.sort((a,b) => order.indexOf(a) - order.indexOf(b));

  const row = (o, section) => {
    const ids = [...(D.owners[o]||[])];
    const active = ids.filter(id => periodGMV(D.accounts[id]||{}) > 0).length;
    const gmv = ids.reduce((s,id) => s+periodGMV(D.accounts[id]||{}), 0);
    const label = o.replace('Sales·','');
    const isAct = CUR.owner === o;
    const churn = ids.filter(id => isChurned(D.accounts[id]||{})).length;
    const churnStr = churn > 0 ? ` <span style="color:var(--rd);font-size:9px">-${churn}</span>` : '';
    const isSalesOwner = o.startsWith('Sales·');
    const avBg = isSalesOwner ? 'background:#2a1a3a;color:#bc8cff;border-color:#6a3a9a' : '';
    return `<div class="kai${isAct?' active':''}" onclick="selOwner(decodeURIComponent('${encodeURIComponent(o)}'))">
      <div class="av" style="${avBg}">${label.slice(0,2)}</div>
      <div class="ki">
        <div class="kn">${label}${churnStr}</div>
        <div class="kg">${fmtM(gmv)} · ${active}A</div>
      </div>
    </div>`;
  };

  const pmOwners    = salesOwners.filter(o => o.startsWith('PM·'));
  const saleOnlyOwners = salesOwners.filter(o => !o.startsWith('PM·'));

  let h = `<div class="ovw-nav${CUR.owner===null?' active':''}" id="ovw-btn" onclick="showOverview()">
    <span class="ovw-nav-icon">🏢</span><span class="ovw-nav-text">Commercial Overview</span>
  </div>`;
  h += `<div class="sec-hdr"><span>KAM</span><div class="sec-line"></div></div>`;
  kamOwners.forEach(o => h += row(o,'kam'));
  if (pmOwners.length) {
    h += `<div class="sec-hdr"><span>PM</span><div class="sec-line"></div></div>`;
    pmOwners.forEach(o => h += row(o,'pm'));
  }
  if (saleOnlyOwners.length) {
    h += `<div class="sec-hdr"><span>Sales</span><div class="sec-line"></div></div>`;
    saleOnlyOwners.forEach(o => h += row(o,'sales'));
  }
  h += `<div class="sec-hdr"><span>No Owner</span><div class="sec-line"></div></div>`;
  unmgd.filter(o => D.owners[o]).forEach(o => h += row(o,'unmgd'));
  document.getElementById('kal').innerHTML = h;
}

// ═══════════════════════════════════════════════
function showOverview() {
  CUR.owner = null; CUR.view = 'overview';
  document.getElementById('main').style.display = 'none';
  document.getElementById('overview-full').style.display = 'block';
  buildSidebar(); renderOverview();
}

function renderOverview() {
  const all = Object.values(D.accounts);
  const segs = {
    SA:       all.filter(a=>a.type==='SA'),
    MC:       all.filter(a=>a.type==='MC'),
    Chain:    all.filter(a=>a.type==='Chain'),
    Enduser:  all.filter(a=>a.type==='Enduser')
  };

  const pm = periodMonths();
  const fmIdx = FILTER_MONTH ? MONTHS.indexOf(FILTER_MONTH) : -1;
  const monthNames = ['Oct 2025','Nov 2025','Dec 2025','Jan 2026','Feb 2026','Mar 2026','Apr 2026'];
  const periodLabel = FILTER_MONTH
    ? monthNames[fmIdx] || FILTER_MONTH
    : TMODE==='mom'?'Apr 2026':TMODE==='3m'?'Feb–Apr 2026':'Nov–Apr 2026';
  const prevLabel = FILTER_MONTH
    ? (fmIdx > 0 ? ML[fmIdx-1] : '—')
    : TMODE==='mom'?'Mar':TMODE==='3m'?'Nov–Jan':'May–Oct';

  // ── GLOBAL TOTALS ──
  const b2bAll      = all.filter(a=>a.type!=='Enduser');
  const totalGMV    = all.reduce((s,a)=>s+periodGMV(a),0);
  const totalMgn    = all.reduce((s,a)=>s+periodMargin(a),0);
  const mgnPct      = totalGMV>0?(totalMgn/totalGMV*100).toFixed(1):'0.0';
  const prevTotal   = all.reduce((s,a)=>s+prevPeriodGMV(a),0);
  const totalTrend  = prevTotal>0?Math.round((totalGMV-prevTotal)/prevTotal*100):null;
  const gmv7all     = MONTHS.map(m=>all.reduce((s,a)=>s+(a.gmv[m]||0),0));
  const activeAll   = all.filter(a=>periodGMV(a)>0).length;
  const churnedAll  = all.filter(isChurned).length;
  const newFDCount  = b2bAll.reduce((s,a)=>s+newOutletCount(a),0);

  // Overall NRR
  const prevActive  = all.filter(a=>prevPeriodGMV(a)>0);
  const nrrNum      = prevActive.reduce((s,a)=>s+periodGMV(a),0);
  const nrrDen      = prevActive.reduce((s,a)=>s+prevPeriodGMV(a),0);
  const nrr         = nrrDen>0?Math.round(nrrNum/nrrDen*100):null;
  const nrrC        = nrr>=100?'var(--gn)':nrr>=90?'var(--am)':'var(--rd)';

  const trendStr = totalTrend!==null
    ? `<span style="font-weight:600;color:${totalTrend>=0?'var(--gn)':'var(--rd)'}">${totalTrend>=0?'▲':'▼'}${Math.abs(totalTrend)}% vs ${prevLabel}</span>`
    : '';

  // Segment colors — always use actual hex (SVG can't read CSS vars)
  const isDark = document.documentElement.dataset.theme !== 'light';
  const SC = isDark
    ? { SA:'#60a5fa', MC:'#34d399', Chain:'#fbbf24', Enduser:'#c084fc' }
    : { SA:'#1d6fa4', MC:'#0f766e', Chain:'#92400e', Enduser:'#7c3aed' };
  const acColor = isDark ? '#4f8ef7' : '#2563eb';
  const gnColor = isDark ? '#22c55e' : '#16a34a';
  const rdColor = isDark ? '#f43f5e' : '#dc2626';
  const amColor = isDark ? '#f59e0b' : '#d97706';

  let h = '';

  // ══════════════════════════════════════════
  // HERO — full bleed, no card, number dominates
  // ══════════════════════════════════════════
  const trendUp   = totalTrend !== null && totalTrend >= 0;
  const nrrClass  = nrr >= 100 ? 'hero-pill-up' : nrr >= 90 ? 'hero-pill-neu' : 'hero-pill-dn';

  // Interactive hero chart — clickable bars for month filter
  function heroChart(vals, w, h2) {
    const bw = Math.max(4, Math.floor((w - (vals.length-1)*6) / vals.length));
    const maxV = Math.max(...vals, 1);
    const isDk = document.documentElement.dataset.theme !== 'light';
    const baseC  = isDk ? '#4f8ef7' : '#2563eb';
    const selC   = isDk ? '#f59e0b' : '#d97706';
    const latC   = isDk ? '#22c55e' : '#16a34a';
    const dimC   = isDk ? 'rgba(79,142,247,.25)' : 'rgba(37,99,235,.2)';
    const hasFilter = FILTER_MONTH !== null;
    let s = `<svg width="${w}" height="${h2+24}" viewBox="0 0 ${w} ${h2+24}" style="cursor:pointer">`;
    vals.forEach((v, i) => {
      const m = MONTHS[i];
      const x = i * (bw + 6);
      const bh = v > 0 ? Math.max(3, (v / maxV) * h2) : 2;
      const y = h2 - bh;
      const isSelected = FILTER_MONTH === m;
      const isLatest = !hasFilter && i === MONTHS.length - 1;
      const c = isSelected ? selC : isLatest ? latC : hasFilter ? dimC : baseC;
      const op = (hasFilter && !isSelected) ? '.35' : '.9';
      s += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1" fill="${c}" opacity="${op}"
        onclick="setOverviewMonth('${m}')"
        onmouseover="showTT(event,'${ML[i]}: ${fmtM(v)}${isSelected?' (selected)':''}')" onmouseout="hideTT()"/>`;
      s += `<text x="${x+bw/2}" y="${h2+16}" text-anchor="middle" fill="${isSelected?selC:isDk?'#3d4d62':'#9ca3af'}"
        font-size="9" font-family="monospace" font-weight="${isSelected?'700':'400'}">${ML[i]}</text>`;
    });
    s += '</svg>';
    return s;
  }

  const filterBanner = FILTER_MONTH ? `
    <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:3px;padding:3px 10px;font-family:var(--mono);font-size:10px;color:#f59e0b;margin-left:12px">
      📅 ${periodLabel} <span onclick="setOverviewMonth(null)" style="cursor:pointer;margin-left:4px;opacity:.7;font-size:12px">✕</span>
    </div>` : '';

  h += `<div class="ovw-hero">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center">
        <div class="hero-eyebrow">TOTAL GMV · B2B+B2C${filterBanner}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${FILTER_MONTH ? `<span style="font-family:var(--mono);font-size:9px;color:var(--tx3)">click bar to change · click ✕ to clear</span>` : `<span style="font-family:var(--mono);font-size:9px;color:var(--tx3)">click bar to pin month</span>`}
        <div class="trend-toggle" style="${FILTER_MONTH?'opacity:.35;pointer-events:none':''}">
          <button class="tt-btn${!FILTER_MONTH&&TMODE==='mom'?' active':''}" onclick="setTrendOvw('mom',this)">MOM</button>
          <button class="tt-btn${!FILTER_MONTH&&TMODE==='3m'?' active':''}" onclick="setTrendOvw('3m',this)">3M</button>
          <button class="tt-btn${!FILTER_MONTH&&TMODE==='6m'?' active':''}" onclick="setTrendOvw('6m',this)">6M</button>
        </div>
      </div>
    </div>
    <div class="hero-number">฿${fmtM(totalGMV)}</div>
    <div class="hero-pills">
      ${totalTrend!==null?`<span class="hero-pill ${trendUp?'hero-pill-up':'hero-pill-dn'}">${trendUp?'▲':'▼'} ${Math.abs(totalTrend)}% vs ${prevLabel}</span>`:''}
      <span class="hero-pill hero-pill-neu">GP ${mgnPct}%</span>
      <span class="hero-pill ${nrrClass} hero-pill-nrr">NRR ${nrr!==null?nrr+'%':'—'}</span>
    </div>
    <div class="hero-stats" style="margin-bottom:18px">
      <span><span class="hero-stat-val">${activeAll.toLocaleString()}</span>&nbsp;<span style="color:var(--tx3)">active</span></span>
      <span style="width:1px;background:var(--br);height:12px;display:inline-block;align-self:center"></span>
      <span><span class="hero-stat-val" style="color:${rdColor}">${churnedAll}</span>&nbsp;<span style="color:var(--tx3)">churned</span></span>
      <span style="width:1px;background:var(--br);height:12px;display:inline-block;align-self:center"></span>
      <span><span class="hero-stat-val" style="color:${acColor}">${newFDCount}</span>&nbsp;<span style="color:var(--tx3)">new FD outlets</span></span>
    </div>
    ${heroChart(gmv7all, 760, 56)}
  </div>`;

  // ══════════════════════════════════════════
  // BY SEGMENT — proportion bar + column layout
  // ══════════════════════════════════════════
  const segGMVs = {
    SA:      segs.SA.reduce((s,a)=>s+periodGMV(a),0),
    MC:      segs.MC.reduce((s,a)=>s+periodGMV(a),0),
    Chain:   segs.Chain.reduce((s,a)=>s+periodGMV(a),0),
    Enduser: segs.Enduser.reduce((s,a)=>s+periodGMV(a),0)
  };
  const segT   = (segGMVs.SA + segGMVs.MC + segGMVs.Chain + segGMVs.Enduser) || 1;
  const saPct  = Math.round(segGMVs.SA/segT*100);
  const mcPct  = Math.round(segGMVs.MC/segT*100);
  const chPct  = Math.round(segGMVs.Chain/segT*100);
  const euPct  = 100 - saPct - mcPct - chPct;

  // Segment gradient backgrounds (rgba values matching SC hex)
  const segGrad = isDark
    ? {SA:'rgba(122,184,250,.06)',MC:'rgba(76,212,160,.06)',Chain:'rgba(251,191,36,.06)',Enduser:'rgba(196,163,252,.06)'}
    : {SA:'rgba(29,111,164,.04)',MC:'rgba(15,118,110,.04)',Chain:'rgba(138,58,10,.04)',Enduser:'rgba(124,58,237,.04)'};

  h += `<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">01</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">By Segment</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>
  <div style="padding:0 36px 6px">
    <div class="seg-propbar">
      <div style="width:${saPct}%;background:${SC.SA}"></div>
      <div style="width:${mcPct}%;background:${SC.MC}"></div>
      <div style="width:${chPct}%;background:${SC.Chain}"></div>
      <div style="width:${euPct}%;background:${SC.Enduser}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;margin-bottom:16px">
      <span style="color:${SC.SA}">SA ${saPct}%</span>
      <span style="color:${SC.MC}">MC ${mcPct}%</span>
      <span style="color:${SC.Chain}">Chain ${chPct}%</span>
      <span style="color:${SC.Enduser}">Enduser ${euPct}%</span>
    </div>
  </div>
  <div style="padding:0 36px 32px"><div class="seg-cols">`;

  [['SA',SC.SA],['MC',SC.MC],['Chain',SC.Chain],['Enduser',SC.Enduser]].forEach(([seg,color])=>{
    const accts   = segs[seg];
    const sGMV    = segGMVs[seg];
    const sMgn    = accts.reduce((s,a)=>s+periodMargin(a),0);
    const sMgnPct = sGMV>0?(sMgn/sGMV*100).toFixed(1):'0.0';
    const sPrev   = accts.filter(a=>prevPeriodGMV(a)>0);
    const sNRRn   = sPrev.reduce((s,a)=>s+periodGMV(a),0);
    const sNRRd   = sPrev.reduce((s,a)=>s+prevPeriodGMV(a),0);
    const sNRR    = sNRRd>0?Math.round(sNRRn/sNRRd*100):null;
    const sNRRC   = sNRR>=100?gnColor:sNRR>=90?amColor:rdColor;
    const sPrevGMV= accts.reduce((s,a)=>s+prevPeriodGMV(a),0);
    const sTrend  = sPrevGMV>0?Math.round((sGMV-sPrevGMV)/sPrevGMV*100):null;
    const sTrC    = sTrend>=0?gnColor:rdColor;
    const gmv7    = MONTHS.map(m=>accts.reduce((s,a)=>s+(a.gmv[m]||0),0));
    const grad    = segGrad[seg];
    let sActive, sChurn, sNewFD;
    if (seg === 'Enduser') {
      const eu = accts[0];
      sActive = eu ? (eu.outlets[LATEST]||0) : 0;
      sChurn = '—'; sNewFD = '—';
    } else {
      sActive = accts.filter(a=>periodGMV(a)>0).length;
      sChurn  = accts.filter(isChurned).length || '—';
      sNewFD  = accts.reduce((s,a)=>s+newOutletCount(a),0) || '—';
    }

    h += `<div class="seg-col" style="border-top:2px solid ${color};background:linear-gradient(180deg,${grad} 0%,transparent 60%)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:${color}">${seg}</div>
        ${sTrend!==null?`<div style="font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px;background:${sTrend>=0?'rgba(35,209,139,.1)':'rgba(241,80,106,.1)'};color:${sTrC}">${sTrend>=0?'+':''}${sTrend}%</div>`:''}
      </div>
      <div style="font-family:var(--mono);font-size:32px;font-weight:600;letter-spacing:-.04em;line-height:1;margin-bottom:6px;color:var(--tx)">฿${fmtM(sGMV)}</div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:12px">GP <strong style="color:var(--tx)">${sMgnPct}%</strong> · NRR <strong style="color:${sNRRC}">${sNRR!==null?sNRR+'%':'—'}</strong></div>
      ${barChartSVG(gmv7,180,28,color,MONTHS.length-1,MONTHS)}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--br);padding-top:12px;margin-top:10px">
        <div style="text-align:center">
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--tx)">${sActive}</div>
          <div style="font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:3px;letter-spacing:.06em;text-transform:uppercase">${seg==='Enduser'?'Users':'Accts'}</div>
        </div>
        <div style="text-align:center;border-left:1px solid var(--br)">
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:${sChurn==='—'?'var(--tx3)':rdColor}">${sChurn}</div>
          <div style="font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:3px;letter-spacing:.06em;text-transform:uppercase">Churned</div>
        </div>
        <div style="text-align:center;border-left:1px solid var(--br)">
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:${sNewFD==='—'?'var(--tx3)':acColor}">${sNewFD}</div>
          <div style="font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:3px;letter-spacing:.06em;text-transform:uppercase">New FD</div>
        </div>
      </div>
    </div>`;
  });
  h += `</div></div>`;

  // ══════════════════════════════════════════
  // 3. BY CLASS (Segment × Class matrix)
  // ══════════════════════════════════════════
  // Pre-compute class totals for the redesigned table
  const clsData = VALID_CLASSES.map(cls => {
    const segsData = ['SA','MC','Chain'].map(seg => {
      const a = all.filter(x=>x.type===seg&&x.cls===cls);
      return { active: a.filter(x=>periodGMV(x)>0).length, gmv: a.reduce((s,x)=>s+periodGMV(x),0) };
    });
    const allCls = all.filter(x=>x.cls===cls&&x.type!=='Enduser');
    const totalActive = segsData.reduce((s,r)=>s+r.active,0);
    const totalGMV    = segsData.reduce((s,r)=>s+r.gmv,0);
    const churned     = allCls.filter(isChurned).length;
    const newFD2      = allCls.filter(hasNewOutlet).length;
    return { cls, segsData, totalActive, totalGMV, churned, newFD2 };
  });
  const grandActive = clsData.reduce((s,r)=>s+r.totalActive,0);
  const grandGMV    = clsData.reduce((s,r)=>s+r.totalGMV,0);
  const grandChurn  = clsData.reduce((s,r)=>s+r.churned,0);
  const grandNewFD  = clsData.reduce((s,r)=>s+r.newFD2,0);
  // B2B TOTAL row — actual totals from all B2B accounts (not just sum of class rows)
  const b2bTotBySegs = ['SA','MC','Chain'].map(seg=>({
    active: all.filter(x=>x.type===seg&&periodGMV(x)>0).length,
    gmv: segs[seg].reduce((s,a)=>s+periodGMV(a),0)
  }));
  const b2bGrandActive = b2bTotBySegs.reduce((s,r)=>s+r.active,0);
  const b2bGrandGMV    = b2bTotBySegs.reduce((s,r)=>s+r.gmv,0);
  const b2bGrandChurn  = all.filter(a=>a.type!=='Enduser').filter(isChurned).length;
  const b2bGrandNewFD  = all.filter(a=>a.type!=='Enduser').filter(hasNewOutlet).length;
  const euActive = segs.Enduser.filter(a=>periodGMV(a)>0).length;
  const euGMV    = segs.Enduser.reduce((s,a)=>s+periodGMV(a),0);

  h += `<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">02</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">By Class</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>`;
  h += `
  <div class="ovw-section-body">
  <div class="ovw-table-wrap"><table class="ovw-rep-table" style="table-layout:fixed">
    <thead>
      <tr style="background:var(--sf2)">
        <th style="text-align:left;padding-left:16px;width:90px">Class</th>
        <th colspan="2" style="text-align:center;color:${SC.SA};border-bottom:1px solid var(--br);width:140px">SA</th>
        <th colspan="2" style="text-align:center;color:${SC.MC};border-bottom:1px solid var(--br);width:140px">MC</th>
        <th colspan="2" style="text-align:center;color:${SC.Chain};border-bottom:1px solid var(--br);width:140px">Chain</th>
        <th colspan="2" style="text-align:center;color:var(--tx2);border-bottom:1px solid var(--br);width:160px">B2B Total</th>
        <th style="color:var(--rd);border-bottom:1px solid var(--br);width:80px">Churned</th>
        <th style="color:var(--ac);border-bottom:1px solid var(--br);width:70px">New FD</th>
      </tr>
      <tr style="background:var(--sf2)">
        <th></th>
        <th style="text-align:right;color:${SC.SA}">Accts</th><th style="text-align:right;color:${SC.SA}">GMV</th>
        <th style="text-align:right;color:${SC.MC}">Accts</th><th style="text-align:right;color:${SC.MC}">GMV</th>
        <th style="text-align:right;color:${SC.Chain}">Accts</th><th style="text-align:right;color:${SC.Chain}">GMV</th>
        <th style="text-align:right;color:var(--tx2)">Accts</th><th style="text-align:right;color:var(--tx2)">GMV</th>
        <th></th><th></th>
      </tr>
    </thead><tbody>`;
  clsData.forEach(({cls, segsData, totalActive, totalGMV, churned, newFD2}) => {
    const clsColor = cls==='KEY_ACCOUNT'?'var(--am)':cls==='NORMAL'?'var(--ac)':'var(--rd)';
    const clsLabel = cls==='KEY_ACCOUNT'?'KEY ACCT':cls;
    h += `<tr>
      <td style="padding-left:16px;font-family:var(--mono);font-size:10px;font-weight:700;color:${clsColor}">${clsLabel}</td>
      ${segsData.map(r=>`<td style="text-align:right">${r.active||'—'}</td><td>${r.gmv>0?fmtM(r.gmv):'—'}</td>`).join('')}
      <td style="text-align:right;font-weight:600">${totalActive}</td>
      <td style="font-weight:700">${fmtM(totalGMV)}</td>
      <td style="color:var(--rd)">${churned||'—'}</td>
      <td style="color:var(--ac)">${newFD2||'—'}</td>
    </tr>`;
  });
  h += `<tr style="background:var(--sf2);border-top:2px solid var(--br)">
    <td style="padding-left:16px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--tx3)">B2B TOTAL</td>
    ${b2bTotBySegs.map(r=>`<td style="text-align:right;font-weight:700">${r.active}</td><td style="font-weight:700">${fmtM(r.gmv)}</td>`).join('')}
    <td style="text-align:right;font-weight:700">${b2bGrandActive}</td>
    <td style="font-weight:700">${fmtM(b2bGrandGMV)}</td>
    <td style="color:var(--rd);font-weight:700">${b2bGrandChurn||'—'}</td>
    <td style="color:var(--ac);font-weight:700">${b2bGrandNewFD||'—'}</td>
  </tr>
  <tr style="opacity:.65;border-top:1px dashed var(--br)">
    <td style="padding-left:16px;font-family:var(--mono);font-size:10px;color:${SC.Enduser}">ENDUSER (B2C)</td>
    <td colspan="8" style="text-align:center;font-size:10px;color:var(--tx3);font-family:var(--mono)">ไม่มี class breakdown · aggregate row · ${euActive} users active</td>
    <td style="font-family:var(--mono);font-size:10px;color:var(--tx3);text-align:center" title="B2C: churned ไม่ได้นับระดับ user">n/a</td>
    <td style="font-family:var(--mono);font-size:11px;font-weight:600;color:${SC.Enduser}">${fmtM(euGMV)}</td>
  </tr>`;
  h += '</tbody></table></div></div>'; // close table-wrap + section-body

  // ══════════════════════════════════════════
  // 4. BY ACCOUNT AGE (New vs Existing FD)
  // ══════════════════════════════════════════
  // New FD = outlet-level GMV (GMV of new outlets in their first month only) — correct definition
  // New FD = outlet-level first-month GMV only (correct definition)
  const newFDAccts2 = b2bAll.filter(hasNewOutlet);
  const newFDGMV_sales = b2bAll.reduce((s,a)=>s+newOutletSalesGMV(a),0);
  const newFDGMV_exist = b2bAll.reduce((s,a)=>s+newOutletGMV(a)-newOutletSalesGMV(a),0);
  const newFDGMV       = newFDGMV_sales + newFDGMV_exist;
  const newFDOutlets   = b2bAll.reduce((s,a)=>s+newOutletCount(a),0);
  const newFDSaleOut   = b2bAll.reduce((s,a)=>s+newOutletSalesCount(a),0);

  const totalB2BGMV = b2bAll.reduce((s,a)=>s+periodGMV(a),0);
  // existGMV = totalB2B − outlet-level new FD → reconciles: existGMV + newFDGMV = totalB2BGMV ✓
  const existGMV    = totalB2BGMV - newFDGMV;
  const existShare  = Math.round(existGMV/totalB2BGMV*100);
  const newFDShare  = 100 - existShare;

  h += `<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">03</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">By Account Age</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>`;
  h += `
  <div class="ovw-section-body">
  <div class="ovw-split-grid">
    <div class="ovw-card">
      <div style="font-size:8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;color:var(--tx3);margin-bottom:8px">EXISTING — Total B2B ลบ New FD outlet GMV</div>
      <div style="font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-.04em;color:var(--tx);margin-bottom:6px">฿${fmtM(existGMV)}</div>
      <div style="font-size:11px;color:var(--tx2)">${existShare}% of B2B · reconciles: ฿${fmtM(existGMV)}+฿${fmtM(newFDGMV)}=฿${fmtM(totalB2BGMV)}</div>
    </div>
    <div class="ovw-card" style="border-left:2px solid var(--ac)">
      <div style="font-size:8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.16em;color:var(--tx3);margin-bottom:8px">NEW FD — GMV ของ outlet ที่เปิด FD ใน period (first month only)</div>
      <div style="font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-.04em;color:var(--ac);margin-bottom:6px">฿${fmtM(newFDGMV)}</div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:10px">${newFDOutlets} new outlets · ${newFDAccts2.length} accounts</div>
      <div style="font-size:10px;font-family:var(--mono);display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--br);padding-top:8px">
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--pu)">Sales (new accounts)</span>
          <span>${newFDSaleOut} outlets · ฿${fmtM(newFDGMV_sales)}</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--tx3)">Existing acct expansion</span>
          <span>${newFDOutlets-newFDSaleOut} outlets · ฿${fmtM(newFDGMV_exist)}</span>
        </div>
      </div>
    </div>
  </div>
  <div class="ovw-prop-bar">
    <div style="width:${existShare}%;background:var(--tx3)"></div>
    <div style="width:${newFDShare}%;background:var(--ac)"></div>
    <div style="flex:1;background:var(--br2)"></div>
  </div>
  </div>`;

  // ══════════════════════════════════════════
  // 5. BY OWNER TYPE
  // ══════════════════════════════════════════
  const kamAccts  = all.filter(a=>a.owner_type==='KAM');
  const pmAccts   = all.filter(a=>a.owner_type==='PM');
  const saleAccts = all.filter(a=>a.owner_type==='SALE');
  const unmgAccts = all.filter(a=>['NO_OWNER','UNMANAGED',''].includes(a.owner_type));
  const unmgB2B   = unmgAccts.filter(a=>a.type!=='Enduser');
  const unmgB2C   = unmgAccts.filter(a=>a.type==='Enduser');

  // Helper: sum GMV for a specific owner_type across period months
  // Uses gmv_by_owner[month][owner_type] for accurate per-owner-type GMV
  function ownerTypeGMV(accts2, otype) {
    const pm = periodMonths();
    return accts2.reduce((s,a) => {
      return s + pm.reduce((s2,m) => s2 + ((a.gmv_by_owner[m]||{})[otype]||0), 0);
    }, 0);
  }
  function ownerTypeMGN(accts2, otype) {
    const pm = periodMonths();
    return accts2.reduce((s,a) => {
      return s + pm.reduce((s2,m) => s2 + ((a.mgn_by_owner[m]||{})[otype]||0), 0);
    }, 0);
  }

  // For owner type cards — use ALL accounts, sum by owner_type per month
  const allB2B = all.filter(a=>a.type!=='Enduser');
  const kamGMV  = ownerTypeGMV(allB2B,'KAM');
  const pmGMV   = ownerTypeGMV(allB2B,'PM');
  const saleGMV = ownerTypeGMV(allB2B,'SALE');
  const noGMV   = ownerTypeGMV(allB2B,'NO_OWNER');
  const kamMGN  = ownerTypeMGN(allB2B,'KAM');
  const pmMGN   = ownerTypeMGN(allB2B,'PM');
  const saleMGN = ownerTypeMGN(allB2B,'SALE');
  const noMGN   = ownerTypeMGN(allB2B,'NO_OWNER');

  function ownerTypeCard(label, accts2, color, desc, otype, preGMV, preMGN, extraLines='') {
    const g2  = preGMV !== undefined ? preGMV : accts2.reduce((s,a)=>s+periodGMV(a),0);
    const m2  = preMGN !== undefined ? preMGN : accts2.reduce((s,a)=>s+periodMargin(a),0);
    const mp2 = g2>0?(m2/g2*100).toFixed(1):'0.0';
    // Active: accounts that have any GMV from this owner_type in period
    const pm  = periodMonths();
    const a2  = otype
      ? allB2B.filter(a => pm.some(m=>(a.gmv_by_owner[m]||{})[otype]>0)).length
      : accts2.filter(a=>periodGMV(a)>0).length;
    // Churned/NRR: use latest-owner accounts for approximation
    const c2  = accts2.filter(isChurned).length;
    const p2  = accts2.filter(a=>prevPeriodGMV(a)>0);
    const n2  = p2.reduce((s,a)=>s+periodGMV(a),0);
    const d2  = p2.reduce((s,a)=>s+prevPeriodGMV(a),0);
    const nrr2 = d2>0?Math.round(n2/d2*100):null;
    const nC2 = nrr2>=100?'var(--gn)':nrr2>=90?'var(--am)':'var(--rd)';
    return `<div style="padding:20px 22px;height:100%;border-top:2px solid ${color};background:linear-gradient(180deg,${color}08 0%,transparent 55%)">
      <div style="font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:${color};margin-bottom:10px">${label}</div>
      <div style="font-family:var(--mono);font-size:28px;font-weight:600;letter-spacing:-.04em;color:var(--tx);margin-bottom:4px;line-height:1">฿${fmtM(g2)}</div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:14px">${desc}</div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:11px;font-family:var(--mono);border-top:1px solid var(--br);padding-top:12px">
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--tx3)">Active</span>
          <span style="font-weight:600;color:var(--tx)">${a2}</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--tx3)">GP</span>
          <span style="font-weight:600;color:var(--tx)">${mp2}%</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--tx3)">NRR</span>
          <span style="font-weight:700;color:${nC2}">${nrr2!==null?nrr2+'%':'—'}</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--tx3)">Churned</span>
          <span style="color:var(--rd)">${c2||'—'}</span>
        </div>
        ${extraLines}
      </div>
    </div>`;
  }

  // No Owner card: extra B2B vs B2C breakdown
  const noOwnerB2BGMV = ownerTypeGMV(allB2B.filter(a=>a.type!=='Enduser'),'NO_OWNER');
  const noOwnerB2CGMV = all.filter(a=>a.type==='Enduser').reduce((s,a)=>s+periodGMV(a),0);
  const noOwnerExtra  = `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--br2)">
    <div style="display:flex;justify-content:space-between"><span style="color:var(--tx3)">B2B</span><span>฿${fmtM(noOwnerB2BGMV)}</span></div>
    <div style="display:flex;justify-content:space-between"><span style="color:var(--tx3)">B2C (Enduser)</span><span>฿${fmtM(noOwnerB2CGMV)}</span></div>
  </div>`;

  h += `<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">04</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">By Owner Type</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>`;
  h += `
  <div class="ovw-section-body">
  <div class="ovw-owner-grid" style="grid-template-columns:repeat(4,1fr)">
    ${ownerTypeCard('KAM',  kamAccts,  acColor,  'Key Account Managers','KAM', kamGMV, kamMGN)}
    ${ownerTypeCard('PM',   pmAccts,   '#22d3ee','Portfolio Managers',   'PM',  pmGMV,  pmMGN)}
    ${ownerTypeCard('Sales',saleAccts, '#b39dfa','Sales · acquisition',  'SALE',saleGMV,saleMGN)}
    ${ownerTypeCard('No Owner',unmgAccts,'#4e6080','ไม่มี owner ที่ active','NO_OWNER',noGMV,noMGN,noOwnerExtra)}
  </div>
  </div>`;

  // ══════════════════════════════════════════
  // 6 & 7. LEADERBOARDS
  // ══════════════════════════════════════════
  const SKIP_EXACT = new Set(['','KAM','SALE','PM','ADMIN','NO_OWNER','UNMANAGED']);
  const isSkip = o => !o || SKIP_EXACT.has(o) || o.includes('No Owner') || o.includes('Unmanaged');
  const sortByGMV = keys => keys.sort((a,b)=>{
    const ga = [...D.owners[a]].reduce((s,id)=>s+periodGMV(D.accounts[id]||{}),0);
    const gb = [...D.owners[b]].reduce((s,id)=>s+periodGMV(D.accounts[id]||{}),0);
    return gb-ga;
  });
  const kamKeys      = sortByGMV(Object.keys(D.owners).filter(o=>o&&!o.startsWith('Sales·')&&!o.startsWith('PM·')&&!isSkip(o)));
  const pmKeys       = sortByGMV(Object.keys(D.owners).filter(o=>o&&o.startsWith('PM·')));
  const saleOnlyKeys = sortByGMV(Object.keys(D.owners).filter(o=>o&&o.startsWith('Sales·')));
  const periodShort  = FILTER_MONTH ? (ML[MONTHS.indexOf(FILTER_MONTH)]||FILTER_MONTH) : TMODE==='mom'?'Apr':TMODE==='3m'?'Feb–Apr':'Nov–Apr';

  const lbRow = (owner) => {
    const ids   = [...D.owners[owner]];
    const accts = ids.map(id=>D.accounts[id]).filter(Boolean);
    const active  = accts.filter(a=>periodGMV(a)>0);
    const totGMV  = accts.reduce((s,a)=>s+periodGMV(a),0);
    const totMgn  = accts.reduce((s,a)=>s+periodMargin(a),0);
    const mPct    = totGMV>0?(totMgn/totGMV*100).toFixed(1):'0.0';
    const prevA   = accts.filter(a=>prevPeriodGMV(a)>0);
    const nN = prevA.reduce((s,a)=>s+periodGMV(a),0);
    const nD = prevA.reduce((s,a)=>s+prevPeriodGMV(a),0);
    const nrr3 = nD>0?Math.round(nN/nD*100):null;
    const nC3  = nrr3>=100?'var(--gn)':nrr3>=90?'var(--am)':'var(--rd)';
    const churn3 = accts.filter(isChurned).length;
    const med    = portMedianGMV(ids);
    const bcgC   = {star:0,watch:0,rising:0,atrisk:0};
    active.forEach(a=>{ const q=bcgQ(a,med); if(q) bcgC[q.key]++; });
    const gmv7   = MONTHS.map(m => D.ownerMonthly[owner]?.[m] || 0);
    const name   = owner.replace('Sales·','').replace('PM·','');
    return `<tr onclick="selOwner(decodeURIComponent('${encodeURIComponent(owner)}'))">
      <td>${name}</td>
      <td>${miniBarSVG(gmv7,70,18)}</td>
      <td>${active.length}</td>
      <td style="color:var(--ac);font-weight:600">฿${fmtM(totGMV)}</td>
      <td>${mPct}%</td>
      <td style="color:${nC3};font-weight:600">${nrr3!==null?nrr3+'%':'—'}</td>
      <td style="color:var(--rd)">${churn3||'—'}</td>
      <td style="text-align:left">
        <div style="display:flex;gap:4px;font-size:10px;font-family:var(--mono);flex-wrap:wrap">
          ${bcgC.star?`<span style="color:var(--gn)">${bcgC.star}🌟</span>`:''}
          ${bcgC.rising?`<span style="color:var(--ac)">${bcgC.rising}🚀</span>`:''}
          ${bcgC.watch?`<span style="color:var(--am)">${bcgC.watch}⚠️</span>`:''}
          ${bcgC.atrisk?`<span style="color:var(--rd)">${bcgC.atrisk}🔴</span>`:''}
        </div>
      </td>
    </tr>`;
  };

  const lbHeader = `<thead><tr>
    <th style="text-align:left">Owner</th>
    <th style="text-align:left">Trend 7M</th>
    <th>Active</th>
    <th>GMV ${periodShort}</th>
    <th>GP%</th>
    <th>NRR</th>
    <th>Churned</th>
    <th style="text-align:left">BCG Mix</th>
  </tr></thead>`;

  h += `<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">05</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">KAM Leaderboard</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>`;
  h += `
  <div class="ovw-section-body">
  <div class="ovw-table-wrap">
    <table class="ovw-rep-table">${lbHeader}<tbody>${kamKeys.map(lbRow).join('')}</tbody></table>
  </div>
  </div>`;

  if (pmKeys.length) {
    h += `<div style="display:flex;align-items:center;gap:12px;padding:4px 36px 12px">
<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px">
    <span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">06</span>
    <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">PM Leaderboard</span>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div>
  </div>
    </div>
    <div class="ovw-section-body">
    <div class="ovw-table-wrap">
      <table class="ovw-rep-table">${lbHeader}<tbody>${pmKeys.map(lbRow).join('')}</tbody></table>
    </div>
    </div>`;
  }

  if (saleOnlyKeys.length) {
    h += `<div style="display:flex;align-items:center;gap:12px;padding:4px 36px 12px">
<div style="display:flex;align-items:center;gap:14px;padding:28px 36px 14px"><span style="font-family:var(--mono);font-size:8px;font-weight:700;color:var(--tx3);letter-spacing:.18em">${pmKeys.length?'07':'06'}</span><span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2)">Sales Leaderboard</span><div style="flex:1;height:1px;background:linear-gradient(90deg,var(--br),transparent)"></div></div>
    </div>
    <div class="ovw-section-body">
    <div class="ovw-table-wrap">
      <table class="ovw-rep-table">${lbHeader}<tbody>${saleOnlyKeys.map(lbRow).join('')}</tbody></table>
    </div>
    </div>`;
  }

  document.getElementById('ovw-inner').innerHTML = h;
}

function setTrendOvw(mode, btn) {
  TMODE = mode;
  FILTER_MONTH = null; // clear month filter when changing trend mode
  document.querySelectorAll('#ovw-inner .tt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOverview();
}

function setOverviewMonth(month) {
  FILTER_MONTH = (FILTER_MONTH === month) ? null : month; // toggle
  renderOverview();
}

function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.dataset.theme === 'light';
  html.dataset.theme = isLight ? '' : 'light';
  document.getElementById('theme-btn').textContent = isLight ? '☀️ Light' : '🌙 Dark';
  if (CUR.view === 'overview') renderOverview();
}

// ═══════════════════════════════════════════════
//  OWNER PORTFOLIO
// ═══════════════════════════════════════════════
function selOwner(owner) {
  CUR.owner = owner; CUR.view = 'portfolio';
  CUR.bcgFilter = null; CUR.monthFilter = null;
  document.getElementById('main').style.display = 'flex';
  document.getElementById('overview-full').style.display = 'none';
  document.getElementById('acct-detail').classList.remove('open');
  buildSidebar(); renderTopbar(); renderPortfolio(); renderBCG();
  swTab('portfolio');
}

function renderTopbar() {
  const owner = CUR.owner;
  const ids = [...(D.owners[owner]||[])];
  const accts = ids.map(id=>D.accounts[id]).filter(Boolean);
  const active = accts.filter(a=>periodGMV(a)>0);
  const totGMV = accts.reduce((s,a)=>s+periodGMV(a),0);
  const totMgn = accts.reduce((s,a)=>s+periodMargin(a),0);
  const mPct = totGMV>0?(totMgn/totGMV*100).toFixed(1):'0.0';
  const churned = accts.filter(isChurned).length;
  const newFD = accts.reduce((s,a)=>s+newOutletCount(a),0);
  const periodLabel = TMODE==='mom'?'Apr':TMODE==='3m'?'Feb–Apr':'Nov–Apr';
  document.getElementById('topbar-owner').textContent = owner.replace('Sales·','');
  document.getElementById('topbar-stats').innerHTML = `
    <div class="si"><div class="sv" style="color:var(--ac)">${fmtM(totGMV)}</div><div class="sl">GMV ${periodLabel}</div></div>
    <div class="si"><div class="sv">${active.length}</div><div class="sl">Active</div></div>
    <div class="si"><div class="sv" style="color:var(--tx2)">${mPct}%</div><div class="sl">GP</div></div>
    <div class="si"><div class="sv" style="color:var(--rd)">${churned||'—'}</div><div class="sl">Churned</div></div>
    <div class="si"><div class="sv" style="color:var(--bl)">${newFD||'—'}</div><div class="sl">New FD</div></div>
  `;
}

function renderPortfolio() {
  const owner = CUR.owner;
  const ids = [...(D.owners[owner]||[])];
  const accts = ids.map(id=>D.accounts[id]).filter(Boolean);
  if (!accts.length) { document.getElementById('panel-portfolio').innerHTML='<div style="color:var(--tx3);padding:20px;font-family:var(--mono)">No portfolio data</div>'; return; }

  const med = portMedianGMV(ids);
  const bcgCounts = {star:0,watch:0,rising:0,atrisk:0};
  const mf = CUR.monthFilter;
  const bf = CUR.bcgFilter;

  // Portfolio GMV chart — use ownerMonthly (actual GMV per month this owner was responsible for)
  // This correctly includes accounts that have since been handed over, critical for Sales reps
  const portGMV = MONTHS.map(m => D.ownerMonthly[owner]?.[m] || 0);
  const portMax = Math.max(...portGMV,1);
  let portBars = '<div class="pch-bars">';
  portGMV.forEach((v,i) => {
    const sel = mf===i, isLast = i===MONTHS.length-1;
    const bh = v>0?Math.max(4,Math.round((v/portMax)*44)):2;
    const c = sel?'#f0c040':isLast?'#3fb950':'#388bfd';
    const op = mf!==null&&!sel?'0.3':'0.85';
    portBars += `<div class="pcb-col" onclick="toggleMonthFilter(${i})">
      <div class="pcb-val" style="${sel?'color:#f0c040':''}">${sel?'▼':v>0?fmtM(v):''}</div>
      <div class="pcb-bar" style="height:${bh}px;background:${c};opacity:${op}"
        onmouseover="showTT(event,'${ML[i]}: ${fmtM(v)}')" onmouseout="hideTT()"></div>
      <div class="pcb-lbl" style="${sel?'color:#f0c040':''}">${ML[i]}</div>
    </div>`;
  });
  portBars += '</div>';
  if (mf!==null) portBars += `<div style="font-size:10px;font-family:var(--mono);color:#f0c040;margin-top:4px;cursor:pointer" onclick="CUR.monthFilter=null;renderPortfolio()">▼ Filter: ${ML[mf]}  ✕ clear</div>`;

  // BCG counts
  accts.filter(a=>a.gmv[LATEST]>0).forEach(a => { const q=bcgQ(a,med); if(q) bcgCounts[q.key]++; });
  const bfActive = bf !== null;

  let h = '';
  // Summary stats
  const active = accts.filter(a=>a.gmv[LATEST]>0);
  const totOutlets = active.reduce((s,a)=>s+(a.outlets[LATEST]||0),0);
  const avgCats = active.length ? (active.reduce((s,a)=>s+catsBought(a.id).size,0)/active.length).toFixed(1) : '—';
  const churned = accts.filter(isChurned);
  h += `<div class="ph-grid">
    <div class="ps"><div class="psv">${active.length}</div><div class="psl">Active Accounts</div></div>
    <div class="ps"><div class="psv" style="color:var(--ac)">${fmtM(accts.reduce((s,a)=>s+(a.gmv[LATEST]||0),0))}</div><div class="psl">GMV Apr</div></div>
    <div class="ps"><div class="psv">${totOutlets}</div><div class="psl">Total Outlets</div></div>
    <div class="ps"><div class="psv" style="color:var(--am)">${avgCats}/10</div><div class="psl">Avg Categories</div></div>
    <div class="ps"><div class="psv" style="color:var(--rd)">${churned.length}</div><div class="psl">Churned MoM</div></div>
  </div>`;

  h += `<div class="pch-wrap">
    <div class="pch-title"><span>GMV ทั้งพอร์ต — Oct 25 → Apr 26</span></div>
    ${portBars}
  </div>`;

  // BCG chips
  h += `<div class="bcg-summary">
    ${[['star','🌟 Star','#1a3a2a','#2a6a3a','#3fb950'],['rising','🚀 Rising','#1a2a3a','#1a4a8a','#58a6ff'],
       ['watch','⚠️ Watch','#3a2a0a','#6a5010','#d29922'],['atrisk','🔴 At Risk','var(--rd-soft)','#6a2a2a','#f85149']]
    .map(([key,label,bg,bdr,col]) => `<div class="bcg-chip" 
      style="background:${bg};border-color:${bfActive&&bf!==key?bdr:'transparent'};color:${col};
      ${bf===key?'box-shadow:0 0 8px '+col+';border-color:'+col:''};opacity:${bfActive&&bf!==key?'.4':'1'}"
      onclick="toggleBcgFilter('${key}')">
      ${label} <strong>${bcgCounts[key]}</strong>
    </div>`).join('')}
    ${bfActive?`<div style="font-size:10px;font-family:var(--mono);color:var(--tx3);cursor:pointer;margin:auto 0" onclick="CUR.bcgFilter=null;renderPortfolio()">✕ clear</div>`:''}
  </div>`;

  // Filter accounts
  let visible = accts.filter(a => {
    if (mf!==null && !a.gmv[MONTHS[mf]]) return false;
    if (bf!==null) { const q=bcgQ(a,med); if(!q||q.key!==bf) return false; }
    return true;
  });
  // Sort: churned last, then by GMV desc
  visible.sort((a,b) => {
    if (isChurned(a)&&!isChurned(b)) return 1;
    if (!isChurned(a)&&isChurned(b)) return -1;
    return (b.gmv[LATEST]||0)-(a.gmv[LATEST]||0);
  });

  h += `<table class="at"><thead><tr>
    <th>Account</th>
    <th class="r">GMV Apr</th>
    <th class="r">Trend</th>
    <th class="r">GP%</th>
    <th class="r">Cat</th>
    <th class="r">Last Order</th>
    <th class="r">BCG</th>
    <th class="r">Flags</th>
  </tr></thead><tbody>`;

  visible.forEach((a, idx) => {
    const t = trendPct(a);
    const tC = t===null?'tn':t>5?'tu':t<-5?'td2':'tn';
    const tS = t===null?'—':(t>0?'+':'')+t+'%';
    const mPct = marginPct(a);
    const cats = catsBought(a.id);
    const rec = recency(a);
    const q = bcgQ(a, med);
    const gmv7 = gmvArr(a);
    const typeBadge = `<span class="tb2 b-${a.type.toLowerCase()}">${a.type}</span>`;
    const clsBadge = VALID_CLASSES.includes(a.cls) ? `<span class="tb2 b-${a.cls.toLowerCase().replace('_','')}">${a.cls.replace('KEY_','').replace('KEY_ACCOUNT','KEY')}</span>` : '';

    let flags = '';
    if (isNew(a)) flags += '<span class="fb fnw">NEW FD</span>';
    const chgs = D.changes[a.id];
    if (chgs?.length) {
      const last = chgs[chgs.length-1];
      if (last.type==='HANDOVER') flags += `<span class="fb fhw">HANDOVER ${last.month}</span>`;
      else if (last.type==='TRANSFER') flags += `<span class="fb ftr">→${last.to} ${last.month}</span>`;
    }

    // Outlet list
    const outletList = D.outlets[a.id] ? Object.values(D.outlets[a.id]).sort((x,y)=>(y.gmv[LATEST]||0)-(x.gmv[LATEST]||0)) : [];
    const outCount = outletList.length;

    h += `<tr class="ar2 ${isChurned(a)?'xp':''}" onclick="togRow(${idx})" style="${isChurned(a)?'opacity:.6':''}">
      <td>
        <span class="ei" id="ei-${idx}">▶</span>
        <span class="an-link an" onclick="event.stopPropagation();openDetail(decodeURIComponent('${encodeURIComponent(a.id)}'))">${a.name}</span>
        <div class="ans" style="margin-left:16px">${typeBadge} ${clsBadge} · ${outCount} outlet${outCount!==1?'s':''}</div>
      </td>
      <td class="r">
        <div class="gv">${a.gmv[LATEST]?fmtM(a.gmv[LATEST]):'<span style="color:var(--tx3)">—</span>'}</div>
        ${barChartSVG(gmv7,80,22,'#388bfd',MONTHS.length-1,MONTHS)}
      </td>
      <td class="r"><span class="${tC}" style="font-family:var(--mono);font-size:11px;font-weight:600">${tS}</span></td>
      <td class="r"><span style="font-family:var(--mono);font-size:11px;color:var(--tx2)">${mPct!==null?mPct+'%':'—'}</span></td>
      <td class="r">
        <div style="font-family:var(--mono);font-size:11px;font-weight:600;color:${cats.size<5?'var(--am)':cats.size<8?'var(--ac)':'var(--gn)'}">${cats.size}/10</div>
      </td>
      <td class="r">${recBadge(rec)}</td>
      <td class="r">${q?q.badge:'<span style="color:var(--tx3);font-size:9px">—</span>'}</td>
      <td class="r">${flags||'<span style="color:var(--tx3);font-size:9px">—</span>'}</td>
    </tr>
    <tr class="or" id="or-${idx}"><td colspan="8"><div class="ol">
      <div class="olabel">Outlets</div>
      ${outletList.slice(0,20).map((o,oi) => {
        const oGMV7 = MONTHS.map(m=>o.gmv[m]||0);
        const oLatestGMV = o.gmv[LATEST]||0;
        const oRec = (() => {
          const ds = o.last_order[LATEST]||o.last_order[PREV]||Object.values(o.last_order).filter(Boolean).pop();
          if (!ds) return {status:'unknown',label:'—'};
          const days = Math.floor((new Date('2026-04-30')-new Date(ds))/86400000);
          if (!o.gmv[LATEST]) return {status:'churned',label:days+'d'};
          if (days<=14) return {status:'ok',label:days+'d'};
          if (days<=30) return {status:'warn',label:days+'d'};
          return {status:'risk',label:days+'d'};
        })();
        return `<div class="oi">
          <div class="odot" style="background:${OUTLET_COLORS[oi%OUTLET_COLORS.length]}"></div>
          <div class="on" title="${o.name}">${o.name}</div>
          ${miniBarSVG(oGMV7,60,16)}
          <div class="ogmv">${fmtM(oLatestGMV)}</div>
          <div class="orec">${recBadge(oRec)}</div>
        </div>`;
      }).join('')}
    </div></td></tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('panel-portfolio').innerHTML = h;
}

function togRow(idx) {
  const r = document.getElementById('or-'+idx);
  const ei = document.getElementById('ei-'+idx);
  const ar = r.previousElementSibling;
  const open = r.classList.toggle('open');
  ar.classList.toggle('xp', open);
  if (ei) ei.style.transform = open ? 'rotate(90deg)' : '';
}

function toggleMonthFilter(i) {
  CUR.monthFilter = CUR.monthFilter === i ? null : i;
  renderPortfolio();
}

function toggleBcgFilter(q) {
  CUR.bcgFilter = CUR.bcgFilter === q ? null : q;
  renderPortfolio();
}
