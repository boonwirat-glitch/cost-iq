function renderBCG() {
  const panel = document.getElementById('panel-bcg');
  const ids = [...(D.owners[CUR.owner]||[])];
  const accts = ids.map(id=>D.accounts[id]).filter(a=>a&&a.gmv[LATEST]>0&&MONTHS.filter(m=>a.gmv[m]>0).length>=2);
  if (!accts.length) { panel.innerHTML='<div style="color:var(--tx3);padding:20px;font-family:var(--mono)">Not enough data</div>'; return; }
  const sortedG = accts.map(a=>a.gmv[LATEST]).sort((a,b)=>a-b);
  if (!BCG_STATE[CUR.owner]) {
    const defPct = Math.round(sortedG.filter(v=>v<=200000).length/Math.max(sortedG.length,1)*100);
    BCG_STATE[CUR.owner] = { gmvPct: defPct, tThr: 5 };
  }
  const st = BCG_STATE[CUR.owner];
  panel.innerHTML = `<div class="bcg-slider-wrap">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:10px;color:var(--tx2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em">GMV Threshold</div>
        <div class="bcg-slider-row"><input type="range" id="sl-gmv" min="0" max="100" value="${st.gmvPct}" oninput="bcgUpdate()">
        <span id="sl-gmv-v" style="font-family:var(--mono);font-size:11px;min-width:54px;text-align:right"></span></div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--tx2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em">Trend Threshold (%)</div>
        <div class="bcg-slider-row"><input type="range" id="sl-trend" min="-50" max="100" value="${st.tThr}" oninput="bcgUpdate()">
        <span id="sl-trend-v" style="font-family:var(--mono);font-size:11px;min-width:40px;text-align:right"></span></div>
      </div>
    </div>
  </div>
  <div id="bcg-chips" class="bcg-summary"></div>
  <div class="bcg-scatter-wrap" id="bcg-svg"></div>
  <div class="bcg-lists" id="bcg-lists"></div>`;
  window._bcgAccts = accts;
  window._bcgSorted = sortedG;
  bcgUpdate();
}

function bcgUpdate() {
  const accts = window._bcgAccts, sortedG = window._bcgSorted;
  if (!accts) return;
  const pct = +document.getElementById('sl-gmv').value;
  const tThr = +document.getElementById('sl-trend').value;
  const idx = Math.round(pct/100*(sortedG.length-1));
  const gmvThr = sortedG[idx]||1;
  document.getElementById('sl-gmv-v').textContent = fmtM(gmvThr);
  document.getElementById('sl-trend-v').textContent = (tThr>0?'+':'')+tThr+'%';
  BCG_STATE[CUR.owner] = { gmvPct: pct, tThr };
  const qs = {star:[],watch:[],rising:[],atrisk:[]};
  accts.forEach(a => { const q = bcgQ(a, gmvThr, tThr); if (q) qs[q.key].push(a); });
  document.getElementById('bcg-chips').innerHTML = `
    <div class="bcg-chip" style="background:#1a3a2a;border-color:#2a6a3a;color:#3fb950">🌟 Star <strong>${qs.star.length}</strong></div>
    <div class="bcg-chip" style="background:#1a2a3a;border-color:#1a4a8a;color:#58a6ff">🚀 Rising <strong>${qs.rising.length}</strong></div>
    <div class="bcg-chip" style="background:#3a2a0a;border-color:#6a5010;color:#d29922">⚠️ Watch <strong>${qs.watch.length}</strong></div>
    <div class="bcg-chip" style="background:var(--rd-soft);border-color:#6a2a2a;color:#f85149">🔴 At Risk <strong>${qs.atrisk.length}</strong></div>`;
  document.getElementById('bcg-svg').innerHTML = bcgScatter(accts, gmvThr, tThr);
  const cards = [
    {key:'star',label:'🌟 Star',cls:'bcg-star',col:'#3fb950'},
    {key:'watch',label:'⚠️ Watch',cls:'bcg-watch',col:'#d29922'},
    {key:'rising',label:'🚀 Rising',cls:'bcg-rising',col:'#58a6ff'},
    {key:'atrisk',label:'🔴 At Risk',cls:'bcg-atrisk',col:'#f85149'},
  ];
  document.getElementById('bcg-lists').innerHTML = cards.map(c =>
    `<div class="bcg-qcard">
      <div class="bcg-qcard-title"><span class="${c.cls}">${c.label}</span>
        <span style="color:var(--tx3);font-family:var(--mono);font-size:10px">${qs[c.key].length} accounts</span></div>
      ${qs[c.key].slice(0,10).map(a=>{
        const t=trendPct(a);
        return `<div class="bcg-qitem" onclick="openDetail(decodeURIComponent('${encodeURIComponent(a.id)}'))">
          <span class="bcg-qname" title="${a.name}">${a.name}</span>
          <span class="bcg-qval">${fmtM(a.gmv[LATEST])} <span style="color:${t>=0?'var(--gn)':'var(--rd)'}">${t>=0?'+':''}${t??''}%</span></span>
        </div>`;
      }).join('')}
      ${qs[c.key].length>10?`<div style="font-size:10px;color:var(--tx3);margin-top:4px">+${qs[c.key].length-10} more</div>`:''}
    </div>`
  ).join('');
}

function bcgScatter(accts, gmvThr, tThr) {
  const W=580,H=300,PL=60,PT=22,PR=20,PB=44;
  const pw=W-PL-PR,ph=H-PT-PB;
  const gmvs=accts.map(a=>a.gmv[LATEST]).filter(v=>v>0);
  if (!gmvs.length) return '';
  const logMin=Math.log10(Math.min(...gmvs)*.85);
  const logMax=Math.log10(Math.max(...gmvs)*1.2);
  const yMin=-100,yMax=Math.min(400,Math.max(150,Math.max(...accts.map(a=>trendPct(a)||0))+20));
  const xp=v=>PL+(Math.log10(Math.max(v,1))-logMin)/(logMax-logMin)*pw;
  const yp=v=>PT+(1-(Math.max(yMin,Math.min(yMax,v))-yMin)/(yMax-yMin))*ph;
  const tx=xp(gmvThr),ty=yp(tThr);
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  s+=`<rect x="${PL}" y="${PT}" width="${tx-PL}" height="${ty-PT}" fill="#1a2a3a" opacity=".45"/>`;
  s+=`<rect x="${tx}" y="${PT}" width="${PL+pw-tx}" height="${ty-PT}" fill="#1a3a2a" opacity=".45"/>`;
  s+=`<rect x="${PL}" y="${ty}" width="${tx-PL}" height="${PT+ph-ty}" fill="#2a1a1a" opacity=".45"/>`;
  s+=`<rect x="${tx}" y="${ty}" width="${PL+pw-tx}" height="${PT+ph-ty}" fill="#2a1f0a" opacity=".45"/>`;
  [[( PL+tx)/2,PT+13,'🚀 Rising','#58a6ff'],[(tx+PL+pw)/2,PT+13,'🌟 Star','#3fb950'],
   [(PL+tx)/2,PT+ph-8,'🔴 At Risk','#f85149'],[(tx+PL+pw)/2,PT+ph-8,'⚠️ Watch','#d29922']]
  .forEach(([x,y,l,c])=>s+=`<text x="${x}" y="${y}" text-anchor="middle" fill="${c}" font-size="10" font-family="monospace" opacity=".8">${l}</text>`);
  s+=`<line x1="${tx}" y1="${PT}" x2="${tx}" y2="${PT+ph}" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  s+=`<line x1="${PL}" y1="${ty}" x2="${PL+pw}" y2="${ty}" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  const zy=yp(0);
  if(zy>PT&&zy<PT+ph) s+=`<line x1="${PL}" y1="${zy}" x2="${PL+pw}" y2="${zy}" stroke="#30363d" stroke-width="1"/>`;
  s+=`<line x1="${PL}" y1="${PT+ph}" x2="${PL+pw}" y2="${PT+ph}" stroke="#30363d"/>`;
  s+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+ph}" stroke="#30363d"/>`;
  [50000,200000,500000,1000000,5000000,10000000,50000000].forEach(v=>{
    const x=xp(v);if(x<PL||x>PL+pw)return;
    s+=`<text x="${x}" y="${PT+ph+13}" text-anchor="middle" fill="#484f58" font-size="9" font-family="monospace">${fmtM(v)}</text>`;
    s+=`<line x1="${x}" y1="${PT+ph}" x2="${x}" y2="${PT+ph+3}" stroke="#30363d"/>`;
  });
  [-50,0,50,100,200].forEach(v=>{
    if(v<yMin||v>yMax)return;
    const y=yp(v);if(y<PT||y>PT+ph)return;
    s+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" fill="#484f58" font-size="9" font-family="monospace">${v>0?'+':''}${v}%</text>`;
  });
  accts.forEach((a,i)=>{
    const t=trendPct(a); if(t===null)return;
    const x=xp(a.gmv[LATEST]),y=yp(t);
    if(x<PL||x>PL+pw||y<PT||y>PT+ph)return;
    const q=bcgQ(a,gmvThr,tThr);
    const col=q?{star:'#3fb950',watch:'#d29922',rising:'#58a6ff',atrisk:'#f85149'}[q.key]:'#484f58';
    const r=Math.min(7,Math.max(4,Math.sqrt(a.gmv[LATEST]/500000)*3));
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity=".75" style="cursor:pointer"
      onmouseover="showTT(event,'${a.name.replace(/'/g,'`')}\\n${fmtM(a.gmv[LATEST])} · ${t>=0?'+':''}${t}%')" onmouseout="hideTT()"
      onclick="openDetail(decodeURIComponent('${encodeURIComponent(a.id)}'))"/>`;
  });
  s+='</svg>';
  return s;
}

function openDetail(acct_id) {
  const a = D.accounts[acct_id];
  if (!a) return;
  const typeBadge = `<span class="tb2 b-${a.type.toLowerCase()}">${a.type}</span>`;
  const clsBadge = VALID_CLASSES.includes(a.cls) ? `<span class="tb2 b-${a.cls.toLowerCase().replace('key_account','key')}">${a.cls.replace('KEY_ACCOUNT','KEY ACCOUNT')}</span>` : '';
  const ownerBadge = `<span style="font-family:var(--mono);font-size:9px;color:var(--tx2);padding:2px 6px;background:var(--sf2);border:1px solid var(--br2);border-radius:3px">${a.owner}</span>`;
  const statusBadge = a.status&&a.status!=='NORMAL'?`<span style="font-family:var(--mono);font-size:9px;padding:2px 5px;background:var(--rd-soft);color:var(--rd);border:1px solid #6a2a2a;border-radius:3px">${a.status}</span>`:'';
  document.getElementById('ap-title').textContent = a.name;
  document.getElementById('ap-hdr-badges').innerHTML = `${typeBadge} ${clsBadge} ${ownerBadge} ${statusBadge}`;

  const gmv7 = gmvArr(a);
  const t = trendPct(a);
  const mPct = marginPct(a);
  const aovVal = aov(a);
  const freqVal = freq(a);
  const rec = recency(a);
  const tenure = Math.floor(a.tenure);
  const catsBuy = catsBought(a.id);
  const outletList = D.outlets[acct_id] ? Object.values(D.outlets[acct_id]).sort((x,y)=>(y.gmv[LATEST]||0)-(x.gmv[LATEST]||0)) : [];
  const isMultiOutlet = outletList.length > 1;

  // Margin 7 months
  const mgn7 = MONTHS.map(m => {
    const g=a.gmv[m],mg=a.margin[m];
    return g>0?Math.round(mg/g*100):0;
  });

  let b = '';
  // KPI cards
  b += `<div class="ap-grid-4">
    <div class="ap-stat">
      <div class="ap-stat-v" style="color:var(--ac)">${fmtM(a.gmv[LATEST]||0)}</div>
      <div class="ap-stat-l">GMV Apr</div>
      <div class="ap-stat-sub">${t!==null?`<span style="color:${t>=0?'var(--gn)':'var(--rd)'}">${t>=0?'+':''}${t}%</span> ${TMODE.toUpperCase()}`:''}</div>
    </div>
    <div class="ap-stat">
      <div class="ap-stat-v" style="color:var(--am)">${mPct!==null?mPct+'%':'—'}</div>
      <div class="ap-stat-l">GP</div>
      <div class="ap-stat-sub">${(() => {
        const prev = a.gmv[PREV]>0?Math.round((a.margin[PREV]||0)/a.gmv[PREV]*100):null;
        return prev!==null&&mPct!==null?`<span style="color:${mPct>=prev?'var(--gn)':'var(--rd)'}">${mPct>=prev?'▲':'▼'} vs ${prev}% Mar</span>`:'';
      })()}</div>
    </div>
    <div class="ap-stat">
      <div class="ap-stat-v">${aovVal?fmtM(aovVal):'—'}</div>
      <div class="ap-stat-l">AOV / Order</div>
      <div class="ap-stat-sub">${a.orders[LATEST]||0} orders Apr</div>
    </div>
    <div class="ap-stat">
      <div class="ap-stat-v">${freqVal||'—'}</div>
      <div class="ap-stat-l">Freq / Outlet</div>
      <div class="ap-stat-sub">${outletList.length} outlet${outletList.length!==1?'s':''} · ${recBadge(rec)}</div>
    </div>
  </div>`;

  // GMV Trend chart
  b += `<div class="ap-section">
    <div class="ap-section-title">GMV Trend — 7 Months</div>
    <div class="ap-chart-box">
      ${isMultiOutlet
        ? stackedOutletChart(acct_id, outletList, 540, 70)
        : barChartSVG(gmv7, 540, 70, '#388bfd', MONTHS.length-1, MONTHS, true)
      }
      ${isMultiOutlet?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        ${outletList.slice(0,8).map((o,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:9px;font-family:var(--mono);color:var(--tx2)">
          <div style="width:8px;height:8px;border-radius:2px;background:${OUTLET_COLORS[i%OUTLET_COLORS.length]}"></div>${o.name.slice(0,20)}
        </div>`).join('')}
      </div>`:''}
    </div>
  </div>`;

  // Margin Trend
  b += `<div class="ap-section">
    <div class="ap-section-title">GP % Trend</div>
    <div class="ap-chart-box">
      ${lineChartSVG(mgn7, 540, 50, MONTHS)}
    </div>
  </div>`;

  // Category Gap
  b += `<div class="ap-section">
    <div class="ap-section-title">Category Coverage — ${catsBuy.size}/10 categories bought (last 3 months)</div>
    <div class="cat-tiles">`;
  CATEGORIES.forEach(cat => {
    const hasCat = catsBuy.has(cat);
    const catGMV = MONTHS.slice(-3).reduce((s,m) => s+(D.categories[acct_id]?.[m]?.[cat]?.gmv||0),0);
    const col = CAT_COLOR[cat]||'#888';
    b += hasCat
      ? `<div class="cat-tile has" style="background:${col}20;border-color:${col}55">
           <div class="cat-tile-name" style="color:${col}">${cat}</div>
           <div class="cat-tile-gmv" style="color:${col}">${fmtM(catGMV)}</div>
         </div>`
      : `<div class="cat-tile empty">
           <div class="cat-tile-name" style="color:var(--tx3)">${cat}</div>
           <div class="cat-tile-empty-x">○</div>
         </div>`;
  });
  b += `</div></div>`;

  // Intelligence Signals
  const signals = buildSignals(a, acct_id, outletList, rec, catsBuy);
  if (signals.length) {
    b += `<div class="ap-section">
      <div class="ap-section-title">Signals · Pre-visit Briefing</div>
      <div class="signal-box">
        ${signals.map(s=>`<div class="signal-item"><div class="signal-icon">${s.icon}</div><div>${s.text}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // Outlet table
  if (outletList.length) {
    b += `<div class="ap-section">
      <div class="ap-section-title">Outlets (${outletList.length})</div>
      <table class="ap-outlet-table">
        <thead><tr>
          <th style="text-align:left">Outlet</th>
          <th>GMV Apr</th><th>Orders</th>
          <th>AOV</th><th>GP%</th><th>Last Order</th>
        </tr></thead><tbody>`;
    outletList.forEach((o, oi) => {
      const oGMV = o.gmv[LATEST]||0;
      const oOrd = o.orders[LATEST]||0;
      const oAOV = oOrd>0?Math.round(oGMV/oOrd):null;
      const oMgn = oGMV>0?Math.round((o.margin[LATEST]||0)/oGMV*100):null;
      const ods = o.last_order[LATEST]||o.last_order[PREV]||Object.values(o.last_order).filter(Boolean).pop();
      const oDays = ods?Math.floor((new Date('2026-04-30')-new Date(ods))/86400000):null;
      const oRec = oGMV?{status:oDays<=14?'ok':oDays<=30?'warn':'risk',label:oDays+'d'}:{status:'churned',label:oDays?oDays+'d':'—'};
      b += `<tr>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:2px;flex-shrink:0;background:${OUTLET_COLORS[oi%OUTLET_COLORS.length]}"></div>
          ${o.name}
        </div></td>
        <td>${fmtM(oGMV)||'—'}</td>
        <td>${oOrd||'—'}</td>
        <td>${oAOV?fmtM(oAOV):'—'}</td>
        <td>${oMgn!==null?oMgn+'%':'—'}</td>
        <td>${recBadge(oRec)}</td>
      </tr>`;
    });
    b += '</tbody></table></div>';
  }

  // Owner changes
  const chgs = D.changes[acct_id];
  if (chgs?.length) {
    b += `<div class="ap-section">
      <div class="ap-section-title">Owner Change History</div>
      <div style="background:var(--sf);border:1px solid var(--br2);border-radius:7px;padding:12px 14px">
        ${chgs.map(c=>`<div class="change-item">
          <span style="color:var(--tx3)">${c.month}</span>
          <span class="fb ${c.type==='HANDOVER'?'fhw':'ftr'}">${c.type}</span>
          <span style="color:var(--tx2)">${c.from||'—'}</span>
          <span style="color:var(--tx3)">→</span>
          <span style="color:var(--tx)">${c.to||'—'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // Tenure footer
  b += `<div style="font-family:var(--mono);font-size:10px;color:var(--tx3);margin-top:12px">
    First order: ${a.first_dollar||'—'} · Tenure: ${tenure} months
  </div>`;

  document.getElementById('ap-body').innerHTML = b;
  document.getElementById('ap-body').scrollTop = 0;
  document.getElementById('acct-detail').classList.add('open');
}

function buildSignals(a, id, outletList, rec, catsBuy) {
  const signals = [];
  // Churn risk
  if (rec.status === 'churned') signals.push({ icon:'🔴', text:`<strong>Churned MoM</strong> — ซื้อใน Mar แต่ไม่มี order ใน Apr (ล่าสุด ${rec.label})` });
  else if (rec.status === 'risk') signals.push({ icon:'⚠️', text:`<strong>Recency risk</strong> — ไม่ได้สั่งมา ${rec.days} วัน ควร follow up ก่อนสิ้นเดือน` });
  // GMV movement
  const t = trendPct(a);
  if (t !== null && Math.abs(t) >= 10) {
    if (t < 0) {
      // Find which outlet dropped
      const dropped = outletList.filter(o => (o.gmv[PREV]||0)>0 && !(o.gmv[LATEST]>0));
      if (dropped.length) signals.push({ icon:'📉', text:`<strong>GMV ลด ${t}%</strong> — outlet หลุด: ${dropped.map(o=>o.name).join(', ')}` });
      else signals.push({ icon:'📉', text:`<strong>GMV ลด ${t}% MoM</strong> — ตรวจสอบ order frequency และ basket size` });
    } else {
      signals.push({ icon:'📈', text:`<strong>GMV เพิ่ม +${t}% MoM</strong> — track ว่ามาจาก outlet ใหม่หรือ category ใหม่` });
    }
  }
  // Category gap
  const missing = CATEGORIES.filter(c => !catsBuy.has(c));
  if (missing.length >= 3) signals.push({ icon:'💡', text:`<strong>Category gap ${catsBuy.size}/10</strong> — ยังไม่ได้ซื้อ: ${missing.slice(0,4).join(', ')}${missing.length>4?` +${missing.length-4} อื่นๆ`:''}` });
  // Single outlet concentration
  if (outletList.length >= 3) {
    const top = outletList[0].gmv[LATEST]||0;
    const total = a.gmv[LATEST]||1;
    if (top/total > .7) signals.push({ icon:'📌', text:`<strong>Concentration risk</strong> — outlet "${outletList[0].name}" คิดเป็น ${Math.round(top/total*100)}% ของ GMV` });
  }
  // New FD
  if (isNew(a)) signals.push({ icon:'🆕', text:`<strong>New FD</strong> — first order ใน Apr 2026 ควร onboard ให้ครบ category ภายใน 60 วัน` });
  return signals.slice(0, 4);
}

function barChartSVG(vals, w, h, color, hiIdx, months, showLabels=false) {
  const isDark = document.documentElement.dataset.theme !== 'light';
  const zeroBg = isDark ? '#1a2235' : '#e2e8f0';
  const hiColor = isDark ? '#22c55e' : '#16a34a';
  const bw = Math.max(3, Math.floor((w-(vals.length-1)*3)/vals.length));
  const max = Math.max(...vals, 1);
  let s = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  vals.forEach((v, i) => {
    const bh = v>0?Math.max(2,(v/max)*(h-(showLabels?14:2))):1;
    const x = i*(bw+3), y = h-bh-(showLabels?12:0);
    const c = i===hiIdx?hiColor:v===0?zeroBg:color;
    const op = v===0?'0.5':'0.85';
    const tip = months?`${ML[i]}: ${fmtM(v)}`:fmtM(v);
    s += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1" fill="${c}" opacity="${op}"
      onmouseover="showTT(event,'${tip}')" onmouseout="hideTT()"/>`;
    if (showLabels && months) s += `<text x="${x+bw/2}" y="${h}" text-anchor="middle" fill="${isDark?'#525870':'#9aa3b0'}" font-size="8" font-family="monospace">${ML[i]}</text>`;
  });
  s += '</svg>';
  return s;
}

function miniBarSVG(vals, w, h) {
  return barChartSVG(vals, w, h, '#388bfd', vals.length-1);
}

function lineChartSVG(vals, w, h, months) {
  const max = Math.max(...vals, 1), min = 0;
  const pad = 20;
  const pw = w - pad*2, ph = h - 14;
  const xp = i => pad + i*(pw/(vals.length-1));
  const yp = v => ph - (v-min)/(max-min||1)*(ph-4);
  let s = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  // Area fill
  let points = vals.map((_,i)=>`${xp(i)},${yp(vals[i])}`).join(' ');
  s += `<polyline points="${points}" fill="none" stroke="var(--am)" stroke-width="1.5" stroke-linejoin="round"/>`;
  vals.forEach((v, i) => {
    s += `<circle cx="${xp(i)}" cy="${yp(v)}" r="3" fill="var(--am)"
      onmouseover="showTT(event,'${ML[i]}: ${v}%')" onmouseout="hideTT()"/>`;
    s += `<text x="${xp(i)}" y="${h}" text-anchor="middle" fill="#484f58" font-size="8" font-family="monospace">${ML[i]}</text>`;
    if (v>0) s += `<text x="${xp(i)}" y="${yp(v)-5}" text-anchor="middle" fill="var(--am)" font-size="8" font-family="monospace">${v}%</text>`;
  });
  s += '</svg>';
  return s;
}

function stackedOutletChart(acct_id, outletList, w, h) {
  const tops = outletList.slice(0, 8);
  const totals = MONTHS.map(m => tops.reduce((s,o)=>s+(o.gmv[m]||0),0));
  const maxV = Math.max(...totals, 1);
  const bw = Math.max(3, Math.floor((w-(MONTHS.length-1)*3)/MONTHS.length));
  let s = `<svg width="${w}" height="${h+14}" viewBox="0 0 ${w} ${h+14}">`;
  MONTHS.forEach((m, mi) => {
    const x = mi*(bw+3);
    let y = h;
    tops.forEach((o, oi) => {
      const v = o.gmv[m]||0;
      if (!v) return;
      const bh = Math.max(1, (v/maxV)*h);
      y -= bh;
      const c = OUTLET_COLORS[oi%OUTLET_COLORS.length];
      s += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${c}" opacity=".85"
        onmouseover="showTT(event,'${ML[mi]} · ${o.name.slice(0,20)}: ${fmtM(v)}')" onmouseout="hideTT()"/>`;
    });
    s += `<text x="${x+bw/2}" y="${h+12}" text-anchor="middle" fill="#484f58" font-size="8" font-family="monospace">${ML[mi]}</text>`;
  });
  s += '</svg>';
  return s;
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function fmtM(v) {
  if (!v&&v!==0) return '—';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return Math.round(v/1e3)+'K';
  return Math.round(v).toLocaleString();
}

function swTab(t) {
  document.querySelectorAll('.tb3').forEach((b,i)=>b.classList.toggle('active',['portfolio','bcg'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));
}

function setTrend(mode, btn) {
  TMODE = mode;
  document.querySelectorAll('#tabs .tt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (CUR.view==='overview') renderOverview();
  else { renderPortfolio(); renderBCG(); }
}

function showTT(e, text) {
  const tt = document.getElementById('tt');
  tt.textContent = text; tt.style.display = 'block';
  tt.style.left = (e.clientX+12)+'px';
  tt.style.top = (e.clientY-36)+'px';
}
function hideTT() { document.getElementById('tt').style.display='none'; }

    'Ning': 30, 'Mild': 21, 'Eyes': 14, 'Namtan': 13, 'Kan': 5,
    'Snow': 4, 'Max': 3
  };
  const kaRefTypes = { 'Faii': 'SALE' }; // Only Faii is SALE, rest are KA

  // Extract current owners, normalize to label (remove 'Sales·' prefix)
  const current = {};
  Object.keys(D.owners).forEach(o => {
    if (o && !['Unmanaged','SA-Unmanaged','MC-Unmanaged','Chain-Unmanaged','SA-No Owner','MC-No Owner','Chain-No Owner','Enduser-No Owner'].includes(o)) {
      const label = o.replace('Sales·','');
      const isSales = o.startsWith('Sales·');
      current[label] = { count: D.owners[o].size, isSales };
    }
  });

  console.log('=== OWNER COUNT COMPARISON ===');
  console.log('Current loaded owners:');
  Object.entries(current).forEach(([name, data]) => {
    console.log(`  ${name}: ${data.count} accounts ${data.isSales ? '(Sales)' : '(KA)'}`);
  });
  console.log('');

  const missing = Object.keys(kaRef).filter(k => !current[k]);
  const extra = Object.keys(current).filter(k => !kaRef[k]);
  const mismatch = Object.keys(kaRef).filter(k => current[k] && current[k].count !== kaRef[k]);

  if (missing.length > 0) console.log('❌ Missing owners:', missing);
  if (extra.length > 0) console.log('❌ Extra owners:', extra);

  if (mismatch.length > 0) {
    console.log('❌ Mismatched counts:');
    mismatch.forEach(k => {
      const diff = current[k].count - kaRef[k];
      console.log(`   ${k}: ka_assessment=${kaRef[k]}, current=${current[k].count} (${diff > 0 ? '+' : ''}${diff})`);
    });
  }

  if (missing.length === 0 && extra.length === 0 && mismatch.length === 0) {
    console.log('✅ All owners and counts match ka_assessment!');
  }

  return { kaRef, current, missing, extra, mismatch };
}
