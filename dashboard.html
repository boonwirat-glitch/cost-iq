<!-- Design tokens -->
<style>
/* ============================================================
   FRESHKET COMMERCIAL OS — DESIGN SYSTEM TOKENS
   design/tokens.css · v1.0

   Architecture:
   Layer 1 PRIMITIVE  — raw values, never reference directly in components
   Layer 2 SEMANTIC   — meaning-based aliases, what components use
   Layer 3 COMPONENT  — usage-specific tokens per component family

   Themes:
   Default             → Light (white canvas, Rausch red)
   [data-theme="dark"] → Dark (Sense dark, teal accent)

   Prefix convention:
   --p-*   primitive  (never use in component CSS)
   --*     semantic   (use in component CSS)
   --c-*   component  (use only within that component)

   Fonts:
   Display/data  → IBM Plex Mono (numbers, labels, mono)
   Body/UI       → Noto Sans Thai (all prose, buttons, nav)
   ============================================================ */


/* ============================================================
   LAYER 1 · PRIMITIVES
   ============================================================ */
:root {

  /* Red family — Rausch #FF385C (brand accent) */
  --p-red-900: #4A0011;
  --p-red-800: #7A001E;
  --p-red-700: #AA0029;
  --p-red-600: #CC1A3A;
  --p-red-500: #FF385C;   /* Rausch — primary accent */
  --p-red-400: #FF6B85;
  --p-red-300: #FF9AAD;
  --p-red-200: #FFC8D2;
  --p-red-100: #FFE8EC;
  --p-red-50:  #FFF5F7;

  /* Neutral family — warm not cool */
  --p-neutral-950: #0A0A0A;
  --p-neutral-900: #111111;
  --p-neutral-800: #222222;
  --p-neutral-700: #3D3D3D;
  --p-neutral-600: #5A5A5A;
  --p-neutral-500: #6A6A6A;
  --p-neutral-400: #9A9A9A;
  --p-neutral-300: #AEAEB2;
  --p-neutral-200: #C8C8C8;
  --p-neutral-150: #DCDCDC;
  --p-neutral-100: #EBEBEB;
  --p-neutral-75:  #F2F2F2;
  --p-neutral-50:  #F7F7F7;
  --p-neutral-25:  #FAFAFA;
  --p-neutral-0:   #FFFFFF;

  /* Green family — positive signal */
  --p-green-700: #005E39;
  --p-green-600: #007A4A;
  --p-green-500: #00A651;   /* ok default */
  --p-green-400: #34C759;   /* ok bright (iOS-style) */
  --p-green-300: #5EDB7E;
  --p-green-200: #A3EDB9;
  --p-green-100: #D4F7DF;
  --p-green-50:  #F0FDF4;

  /* Amber family — warning */
  --p-amber-700: #704D00;
  --p-amber-600: #996800;
  --p-amber-500: #C28400;
  --p-amber-400: #FF9500;   /* warn default (iOS-style) */
  --p-amber-300: #FFBB33;
  --p-amber-100: #FFF3CD;
  --p-amber-50:  #FFFBF0;

  /* Blue family — neutral/info */
  --p-blue-700: #003D99;
  --p-blue-600: #0055CC;
  --p-blue-500: #007AFF;    /* iOS blue */
  --p-blue-400: #409CFF;
  --p-blue-100: #D6EAFF;
  --p-blue-50:  #F0F7FF;

  /* Teal family — Sense dark theme accent */
  --p-teal-600: #1D4849;
  --p-teal-500: #008065;
  --p-teal-400: #00A882;
  --p-teal-300: #00C98A;
  --p-teal-200: #7FE8C7;
  --p-teal-100: #C7FFE7;

  /* Segment identity colors */
  --p-sa-500:  #1D57D8;   /* SA — blue */
  --p-mc-500:  #047A57;   /* MC — green */
  --p-ch-500:  #C97000;   /* Chain — amber */
  --p-eu-500:  #6D30D4;   /* End User — purple */

  /* Choropleth — 6-stop red scale for map density */
  --p-choro-0: #FFF5F7;
  --p-choro-1: #FFD5DC;
  --p-choro-2: #FFAAB8;
  --p-choro-3: #FF7090;
  --p-choro-4: #FF385C;
  --p-choro-5: #CC1A3A;

}


/* ============================================================
   LAYER 2 · SEMANTIC — LIGHT THEME (DEFAULT)
   ============================================================ */
:root,
[data-theme="light"] {

  /* Canvas */
  --bg:         var(--p-neutral-0);      /* page background */
  --surface:    var(--p-neutral-50);     /* card, band, input bg */
  --surface-2:  var(--p-neutral-75);     /* secondary surface, hover bg */
  --surface-3:  var(--p-neutral-100);    /* tertiary, pressed */
  --overlay:    var(--p-neutral-25);     /* overlay panels */

  /* Ink */
  --ink-1:      var(--p-neutral-900);    /* primary text, headings */
  --ink-2:      var(--p-neutral-700);    /* body text */
  --ink-3:      var(--p-neutral-500);    /* labels, muted */
  --ink-4:      var(--p-neutral-400);    /* placeholders, disabled */

  /* Border */
  --hair:       var(--p-neutral-100);    /* dividers, row separators */
  --hair-2:     var(--p-neutral-150);    /* borders on interactive */
  --hair-3:     var(--p-neutral-200);    /* strong border */

  /* Accent — Rausch red */
  --ac:         var(--p-red-500);
  --ac-hover:   var(--p-red-600);
  --ac-dim:     rgba(255, 56, 92, .07);
  --ac-mid:     rgba(255, 56, 92, .14);
  --ac-border:  rgba(255, 56, 92, .22);
  --ac-strong:  rgba(255, 56, 92, .35);

  /* Status — OK */
  --ok:         var(--p-green-500);
  --ok-bright:  var(--p-green-400);
  --ok-dim:     rgba(0, 166, 81, .07);
  --ok-border:  rgba(0, 166, 81, .20);
  --ok-text:    var(--p-green-600);

  /* Status — Warn */
  --warn:       var(--p-amber-400);
  --warn-dim:   rgba(255, 149, 0, .07);
  --warn-border:rgba(255, 149, 0, .22);
  --warn-text:  var(--p-amber-600);

  /* Status — Danger */
  --danger:     #FF3B30;
  --danger-dim: rgba(255, 59, 48, .07);
  --danger-border: rgba(255, 59, 48, .22);
  --danger-text: #C0392B;

  /* Status — Neutral/Info */
  --info:       var(--p-blue-500);
  --info-dim:   rgba(0, 122, 255, .07);
  --info-border:rgba(0, 122, 255, .20);

  /* Segment */
  --sa:         var(--p-sa-500);
  --mc:         var(--p-mc-500);
  --ch:         var(--p-ch-500);
  --eu:         var(--p-eu-500);

  /* Scrim */
  --scrim:      rgba(0, 0, 0, .40);

  /* Choropleth */
  --choro-0:    var(--p-choro-0);
  --choro-1:    var(--p-choro-1);
  --choro-2:    var(--p-choro-2);
  --choro-3:    var(--p-choro-3);
  --choro-4:    var(--p-choro-4);
  --choro-5:    var(--p-choro-5);

}


/* ============================================================
   LAYER 2 · SEMANTIC — DARK THEME
   (Sense: KAM, TL teamview, Echo)
   ============================================================ */
[data-theme="dark"] {

  --bg:         #0D0F0E;
  --surface:    #141816;
  --surface-2:  #1C2120;
  --surface-3:  #242B29;
  --overlay:    #1A1F1E;

  --ink-1:      #EEF5F2;
  --ink-2:      #A8C4BD;
  --ink-3:      #6A9490;
  --ink-4:      #3D6660;

  --hair:       rgba(0, 201, 138, .09);
  --hair-2:     rgba(0, 201, 138, .14);
  --hair-3:     rgba(0, 201, 138, .22);

  --ac:         var(--p-teal-300);    /* teal in dark */
  --ac-hover:   var(--p-teal-200);
  --ac-dim:     rgba(0, 201, 138, .10);
  --ac-mid:     rgba(0, 201, 138, .18);
  --ac-border:  rgba(0, 201, 138, .28);
  --ac-strong:  rgba(0, 201, 138, .42);

  --ok:         var(--p-green-400);
  --ok-bright:  var(--p-green-300);
  --ok-dim:     rgba(0, 208, 112, .10);
  --ok-border:  rgba(0, 208, 112, .22);
  --ok-text:    var(--p-green-300);

  --warn:       var(--p-amber-400);
  --warn-dim:   rgba(240, 165, 0, .10);
  --warn-border:rgba(240, 165, 0, .22);
  --warn-text:  var(--p-amber-300);

  --danger:     #FF6B3D;
  --danger-dim: rgba(255, 107, 61, .10);
  --danger-border: rgba(255, 107, 61, .22);
  --danger-text: #FF9A7A;

  --info:       #5B9CF6;
  --info-dim:   rgba(91, 156, 246, .10);
  --info-border:rgba(91, 156, 246, .20);

  --sa:         #5B9CF6;
  --mc:         #4CD4A0;
  --ch:         #FBBF24;
  --eu:         #C4A3FC;

  --scrim:      rgba(0, 0, 0, .70);

  --choro-0:    rgba(255, 56, 92, .05);
  --choro-1:    rgba(255, 56, 92, .18);
  --choro-2:    rgba(255, 56, 92, .35);
  --choro-3:    rgba(255, 56, 92, .55);
  --choro-4:    rgba(255, 56, 92, .75);
  --choro-5:    var(--p-red-500);

}


/* ============================================================
   LAYER 2 · SEMANTIC — TYPOGRAPHY
   ============================================================ */
:root {

  --font-body:  'Noto Sans Thai', -apple-system, sans-serif;
  --font-mono:  'IBM Plex Mono', 'Menlo', monospace;

  /* Type scale */
  --text-display:  48px;   /* hero numbers only */
  --text-hero:     36px;   /* large KPI */
  --text-h1:       28px;   /* page title */
  --text-h2:       22px;   /* section title */
  --text-h3:       18px;   /* card title */
  --text-lg:       16px;   /* prominent body */
  --text-body:     14px;   /* default body */
  --text-sm:       13px;   /* secondary */
  --text-xs:       12px;   /* table, meta */
  --text-2xs:      11px;   /* labels, caps */
  --text-3xs:      10px;   /* mono labels */
  --text-micro:     9px;   /* smallest readable */

  /* Weight */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --weight-extrabold:800;

  /* Line height */
  --lh-tight:   1.15;    /* display numbers */
  --lh-snug:    1.30;    /* headings */
  --lh-normal:  1.50;    /* body Thai (needs more than Latin) */
  --lh-relaxed: 1.65;    /* long-form Thai text */

  /* Letter spacing */
  --ls-tight:   -.03em;  /* display numbers */
  --ls-normal:  -.01em;  /* headings */
  --ls-wide:    .06em;   /* eyebrows */
  --ls-wider:   .10em;   /* all-caps labels */
  --ls-widest:  .16em;   /* mono micro labels */

}


/* ============================================================
   LAYER 2 · SEMANTIC — SPACING (4px base grid)
   ============================================================ */
:root {

  --space-1:   4px;
  --space-2:   8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* Named spacing roles */
  --gap-row:       var(--space-1);   /* between tight list items */
  --gap-section:   var(--space-6);   /* between page sections */
  --pad-card:      var(--space-4);   /* card inner padding */
  --pad-page-x:    var(--space-5);   /* page horizontal margin mobile */
  --pad-page-x-md: var(--space-8);   /* page horizontal margin desktop */

}


/* ============================================================
   LAYER 2 · SEMANTIC — SHAPE
   ============================================================ */
:root {

  /* Radius */
  --r-none:  0;
  --r-xs:    3px;    /* tags, micro chips */
  --r-sm:    6px;    /* buttons, inputs, small cards */
  --r-md:   10px;    /* cards, panels */
  --r-lg:   14px;    /* large cards, sheets */
  --r-xl:   20px;    /* hero cards, modals */
  --r-full: 999px;   /* pills, avatar */

  /* Radius rule: size determines radius
     Height < 28px  → --r-xs or --r-sm
     Height 28–44px → --r-sm or --r-md
     Height > 44px  → --r-md to --r-xl
     Always round, never sharp for interactive elements */

  /* Shadow — use border + shadow-sm as default, shadow-md only for elevation */
  --shadow-sm:  0 1px 2px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:  0 12px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
  --shadow-xl:  0 24px 64px rgba(0,0,0,.16), 0 8px 16px rgba(0,0,0,.08);

  /* Shadow rule: prefer border over shadow for components
     shadow-sm: tooltips, floating buttons
     shadow-md: drawers, dropdowns
     shadow-lg: modals
     shadow-xl: splash, critical overlays */

}


/* ============================================================
   LAYER 2 · SEMANTIC — MOTION
   ============================================================ */
:root {

  /* Duration */
  --dur-instant:  80ms;    /* micro: hover color, toggle */
  --dur-fast:    150ms;    /* normal interactive feedback */
  --dur-normal:  250ms;    /* panels, drawers, expand */
  --dur-slow:    400ms;    /* page transitions, charts */
  --dur-crawl:   600ms;    /* onboarding, first-load emphasis */

  /* Easing */
  --ease-out:    cubic-bezier(.16, 1, .3, 1);     /* enter: spring-like */
  --ease-in:     cubic-bezier(.4, 0, 1, 1);        /* exit: quick */
  --ease-inout:  cubic-bezier(.4, 0, .2, 1);       /* repositioning */
  --ease-linear: linear;                            /* progress bars, loading */
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);  /* playful spring */

  /* Motion rule:
     Enter  → --dur-normal + --ease-out (feels responsive)
     Exit   → --dur-fast + --ease-in (feels snappy, never lingers)
     Data   → --dur-slow + --ease-inout (charts, bar fills)
     Micro  → --dur-instant + --ease-out (hover, active)
     @media prefers-reduced-motion: set all durations to 0 */

}

@media (prefers-reduced-motion: reduce) {
  :root {
    --dur-instant: 0ms;
    --dur-fast:    0ms;
    --dur-normal:  0ms;
    --dur-slow:    0ms;
    --dur-crawl:   0ms;
  }
}


/* ============================================================
   LAYER 2 · SEMANTIC — LAYOUT
   ============================================================ */
:root {

  /* Breakpoints (use in JS, reference here as docs) */
  /* --bp-sm: 640px   mobile → tablet */
  /* --bp-md: 1024px  tablet → desktop */
  /* --bp-lg: 1440px  desktop → wide */

  /* Desktop layout */
  --sidebar-width:     280px;
  --detail-width:      340px;
  --topbar-height:      52px;
  --topbar-height-mob:  48px;
  --bnav-height:        72px;    /* mobile bottom nav */
  --content-max:      1440px;

  /* Z-index stack */
  --z-base:        1;
  --z-sticky:    100;    /* topbar, sticky headers */
  --z-dropdown:  200;    /* menus, tooltips, popovers */
  --z-sheet:     300;    /* bottom sheets, drawers */
  --z-overlay:   400;    /* dim backgrounds */
  --z-modal:     500;    /* dialogs */
  --z-toast:     600;    /* notifications */
  --z-splash:   9999;    /* loading screen */

}


/* ============================================================
   LAYER 3 · COMPONENT TOKENS
   ============================================================ */

/* Button */
:root {
  --c-btn-h:           40px;
  --c-btn-h-sm:        32px;
  --c-btn-h-lg:        48px;
  --c-btn-px:          var(--space-4);
  --c-btn-px-sm:       var(--space-3);
  --c-btn-r:           var(--r-sm);
  --c-btn-font:        var(--font-body);
  --c-btn-size:        var(--text-sm);
  --c-btn-weight:      var(--weight-semibold);
  /* primary */
  --c-btn-primary-bg:  var(--ac);
  --c-btn-primary-fg:  #FFFFFF;
  --c-btn-primary-hover: var(--ac-hover);
  /* secondary */
  --c-btn-sec-bg:      transparent;
  --c-btn-sec-fg:      var(--ink-1);
  --c-btn-sec-border:  var(--hair-2);
  --c-btn-sec-hover:   var(--surface-2);
  /* ghost */
  --c-btn-ghost-bg:    transparent;
  --c-btn-ghost-fg:    var(--ac);
  --c-btn-ghost-hover: var(--ac-dim);
  /* destructive */
  --c-btn-dest-bg:     var(--danger);
  --c-btn-dest-fg:     #FFFFFF;
}

/* Input */
:root {
  --c-input-h:       40px;
  --c-input-px:      var(--space-3);
  --c-input-r:       var(--r-sm);
  --c-input-bg:      var(--surface);
  --c-input-border:  var(--hair-2);
  --c-input-focus:   var(--ac);
  --c-input-font:    var(--font-body);
  --c-input-size:    var(--text-body);
  --c-input-fg:      var(--ink-1);
  --c-input-ph:      var(--ink-4);
}

/* Card */
:root {
  --c-card-bg:       var(--surface);
  --c-card-border:   1px solid var(--hair);
  --c-card-r:        var(--r-md);
  --c-card-pad:      var(--pad-card);
  --c-card-hover-bg: var(--surface-2);
  --c-card-hover-border: 1px solid var(--hair-2);
  --c-card-selected-bg:     var(--ac-dim);
  --c-card-selected-border: 1px solid var(--ac-border);
}

/* Badge / Chip */
:root {
  --c-badge-h:       20px;
  --c-badge-px:      6px;
  --c-badge-r:       var(--r-xs);
  --c-badge-size:    var(--text-micro);
  --c-badge-weight:  var(--weight-semibold);
  /* pill variant */
  --c-pill-h:        22px;
  --c-pill-px:       8px;
  --c-pill-r:        var(--r-full);
}

/* Table row */
:root {
  --c-row-h:         44px;
  --c-row-h-sm:      36px;
  --c-row-h-lg:      52px;
  --c-row-pad-x:     var(--space-4);
  --c-row-border:    1px solid var(--hair);
  --c-row-hover:     var(--surface);
  --c-row-selected:  var(--ac-dim);
}

/* Progress / Bar */
:root {
  --c-bar-h:        3px;
  --c-bar-h-md:     4px;
  --c-bar-h-lg:     6px;
  --c-bar-track:    var(--hair);
  --c-bar-r:        var(--r-full);
}

/* Tooltip */
:root {
  --c-tooltip-bg:     var(--bg);
  --c-tooltip-border: 1px solid var(--hair);
  --c-tooltip-r:      var(--r-md);
  --c-tooltip-pad:    var(--space-3) var(--space-4);
  --c-tooltip-shadow: var(--shadow-md);
}

/* Avatar */
:root {
  --c-avatar-sm:  24px;
  --c-avatar-md:  32px;
  --c-avatar-lg:  40px;
  --c-avatar-xl:  48px;
  --c-avatar-r:   var(--r-full);
  --c-avatar-bg:  var(--ac);
  --c-avatar-fg:  #FFFFFF;
}

/* Icon */
:root {
  --c-icon-sm:   14px;
  --c-icon-md:   18px;    /* default */
  --c-icon-lg:   22px;
  --c-icon-xl:   28px;
  /* Icons: SVG only, stroke-based, stroke-width 1.5
     Never use emoji as icons.
     Color via currentColor — inherits from parent. */
}

/* Segmented control */
:root {
  --c-seg-bg:      var(--surface);
  --c-seg-border:  1px solid var(--hair);
  --c-seg-r:       var(--r-md);
  --c-seg-item-h:  32px;
  --c-seg-item-px: var(--space-3);
  --c-seg-active-bg:     var(--bg);
  --c-seg-active-shadow: var(--shadow-sm);
  --c-seg-active-fg:     var(--ink-1);
  --c-seg-inactive-fg:   var(--ink-3);
}

/* Toast */
:root {
  --c-toast-bg:    var(--p-neutral-900);
  --c-toast-fg:    #FFFFFF;
  --c-toast-r:     var(--r-lg);
  --c-toast-pad:   var(--space-3) var(--space-5);
  --c-toast-shadow: var(--shadow-lg);
}

/* Map polygon */
:root {
  --c-poly-stroke:          #FFFFFF;
  --c-poly-stroke-w:        1px;
  --c-poly-stroke-hover:    1.5px;
  --c-poly-stroke-selected: var(--p-neutral-900);
  --c-poly-stroke-selected-w: 2px;
  --c-poly-muted-fill:      var(--p-neutral-75);
  --c-poly-muted-opacity:   .4;
}

</style>

<!-- Dashboard styles -->
<style>
/* ============================================================
   FRESHKET TL DASHBOARD — Component Styles
   src/dashboard/styles_dashboard.css · v702
   
   Uses design/tokens.css as foundation.
   Class prefix: td- (TL Dashboard)
   All values via var(--token) — no hardcoded colors.
   ============================================================ */

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink-1);
  font-size: 14px;
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}

/* ── Auth Overlay ── */
.auth-overlay {
  position: fixed; inset: 0;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  z-index: var(--z-splash);
}
.auth-card {
  background: var(--bg);
  border: 1px solid var(--hair-2);
  border-radius: var(--r-xl);
  padding: 36px 32px;
  width: 360px;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; gap: var(--space-3);
}
.auth-logo {
  display: flex; align-items: center; gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.auth-logo-name { font-size: var(--text-lg); font-weight: var(--weight-bold); color: var(--ink-1); }
.auth-title { font-size: var(--text-h2); font-weight: var(--weight-extrabold); color: var(--ink-1); letter-spacing: var(--ls-normal); }
.auth-sub { font-size: var(--text-sm); color: var(--ink-3); }
.auth-error {
  background: var(--danger-dim); border: 1px solid var(--danger-border);
  border-radius: var(--r-sm); padding: var(--space-2) var(--space-3);
  font-size: var(--text-sm); color: var(--danger-text);
}

/* ── App Shell ── */
.app { display: flex; flex-direction: column; height: 100vh; }

/* ── Topbar ── */
.topbar {
  height: var(--topbar-height);
  background: var(--bg);
  border-bottom: 1px solid var(--hair);
  display: flex; align-items: center;
  padding: 0 var(--space-5);
  gap: var(--space-4);
  flex-shrink: 0;
  z-index: var(--z-sticky);
  position: relative;
}
.topbar-left  { display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
.topbar-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: var(--space-3); }
.topbar-right { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; position: relative; }
.topbar-logo  { display: flex; align-items: center; gap: var(--space-2); }
.topbar-product { font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--ink-1); }
.topbar-sep   { width: 1px; height: 18px; background: var(--hair-2); }
.topbar-section { font-size: var(--text-sm); color: var(--ink-3); font-weight: var(--weight-medium); }
.topbar-user  {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) var(--space-2) var(--space-1) var(--space-1);
  border-radius: var(--r-md); cursor: pointer;
  transition: background var(--dur-instant) var(--ease-out);
}
.topbar-user:hover { background: var(--surface); }
.topbar-user-name { font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--ink-2); }

/* User menu */
.user-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--bg); border: 1px solid var(--hair-2);
  border-radius: var(--r-md); padding: var(--space-1) 0;
  min-width: 180px; box-shadow: var(--shadow-md);
  z-index: var(--z-dropdown);
}
.user-menu-item {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); color: var(--ink-2);
  cursor: pointer;
  transition: background var(--dur-instant) var(--ease-out);
}
.user-menu-item:hover { background: var(--surface); }
.user-menu-item.danger { color: var(--danger); }
.user-menu-divider { height: 1px; background: var(--hair); margin: var(--space-1) 0; }

/* ── Main body ── */
.main-body { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  border-right: 1px solid var(--hair);
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
}
.sidebar-nav {
  display: flex; flex-direction: column;
  padding: var(--space-3);
  gap: var(--space-1);
  border-bottom: 1px solid var(--hair);
  flex-shrink: 0;
}
.snav-btn {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--r-sm); border: none; background: none;
  font-family: var(--font-body); font-size: var(--text-sm);
  font-weight: var(--weight-medium); color: var(--ink-3);
  cursor: pointer; text-align: left;
  transition: all var(--dur-fast) var(--ease-out);
}
.snav-btn:hover { background: var(--surface); color: var(--ink-2); }
.snav-btn.active { background: var(--ac-dim); color: var(--ac); font-weight: var(--weight-semibold); }
.snav-btn svg { flex-shrink: 0; }

.sidebar-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: var(--space-4) var(--space-4) var(--space-8);
}
.sidebar-content::-webkit-scrollbar { width: 3px; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--hair-2); border-radius: 2px; }

.sidebar-shimmer { display: flex; flex-direction: column; gap: 0; }

/* Team summary in sidebar */
.td-team-hero {
  background: var(--surface); border-radius: var(--r-md);
  padding: var(--space-4); margin-bottom: var(--space-4);
  position: relative; overflow: hidden;
}
.td-team-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2.5px; background: var(--ac);
  border-radius: var(--r-md) var(--r-md) 0 0;
}
.td-team-pace-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: var(--space-2); }
.td-team-pace-num {
  font-family: var(--font-mono); font-size: var(--text-hero);
  font-weight: var(--weight-bold); letter-spacing: var(--ls-tight); line-height: 1;
}
.td-team-pace-num.ok     { color: var(--ok); }
.td-team-pace-num.warn   { color: var(--warn); }
.td-team-pace-num.danger { color: var(--danger); }
.td-team-pace-num.star   { color: var(--ac); }
.td-team-pace-meta { text-align: right; line-height: 1.3; }
.td-team-pace-gmv  { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--ink-1); }
.td-team-pace-sub  { font-size: var(--text-micro); color: var(--ink-4); }
.td-signal-row { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--space-2); margin-top: var(--space-3); }
.td-signal { text-align: center; }
.td-signal-val { font-family: var(--font-mono); font-size: var(--text-lg); font-weight: var(--weight-semibold); line-height: 1; }
.td-signal-val.danger { color: var(--danger); }
.td-signal-val.warn   { color: var(--warn); }
.td-signal-val.ok     { color: var(--ok); }
.td-signal-val.star   { color: var(--ac); }
.td-signal-lbl { font-size: var(--text-micro); color: var(--ink-4); margin-top: var(--space-1); letter-spacing: .04em; }

/* Rep list */
.td-rep-list-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--space-2);
}
.td-rep-list-hd .ds-eyebrow { color: var(--ink-4); }
.td-sort-btn { font-size: var(--text-micro); font-family: var(--font-mono); color: var(--ink-4); background: none; border: none; cursor: pointer; }
.td-sort-btn:hover { color: var(--ac); }

.td-rep-row {
  display: flex; align-items: center;
  padding: var(--space-2) 0;
  border-bottom: 1px solid var(--hair);
  cursor: pointer; gap: var(--space-2);
  transition: background var(--dur-instant) var(--ease-out);
  position: relative; margin: 0 calc(-1 * var(--space-4)); padding-left: var(--space-4); padding-right: var(--space-4);
}
.td-rep-row:hover { background: var(--surface); }
.td-rep-row.selected { background: var(--ac-dim); }
.td-rep-row.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--ac); }
.td-rep-row:last-child { border-bottom: none; }

.td-rep-body { flex: 1; min-width: 0; }
.td-rep-name { font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--ink-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.td-rep-bar-row { display: flex; align-items: center; gap: var(--space-2); }
.td-rep-bar-wrap { flex: 1; }
.td-rep-pace { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--weight-semibold); flex-shrink: 0; }
.td-rep-row.danger .td-rep-pace { color: var(--danger); }
.td-rep-row.warn   .td-rep-pace { color: var(--warn); }
.td-rep-row.ok     .td-rep-pace { color: var(--ok); }
.td-rep-row.star   .td-rep-pace { color: var(--ac); }
.td-rep-row.danger .ds-bar-fill { background: var(--danger); }
.td-rep-row.warn   .ds-bar-fill { background: var(--warn); }
.td-rep-row.ok     .ds-bar-fill { background: var(--ok); }
.td-rep-row.star   .ds-bar-fill { background: var(--ac); }
.td-rep-chip {
  font-size: 9px; font-family: var(--font-mono); font-weight: var(--weight-semibold);
  padding: 1px 5px; border-radius: var(--r-xs);
}
.td-rep-row.danger .td-rep-chip { background: var(--danger-dim); color: var(--danger); }
.td-rep-row.warn   .td-rep-chip { background: var(--warn-dim);   color: var(--warn); }
.td-rep-row.ok     .td-rep-chip { background: var(--ok-dim);     color: var(--ok); }
.td-rep-row.star   .td-rep-chip { background: var(--ac-dim);     color: var(--ac); }

/* ── Center panel ── */
.center-panel { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }

.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

.view-header { padding: var(--space-5) var(--space-8) var(--space-4); border-bottom: 1px solid var(--hair); flex-shrink: 0; }
.view-eyebrow { font-family: var(--font-mono); font-size: var(--text-3xs); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--ink-4); margin-bottom: var(--space-1); }
.view-title { font-size: var(--text-h2); font-weight: var(--weight-bold); color: var(--ink-1); letter-spacing: var(--ls-normal); }
.view-content { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }
.view-content::-webkit-scrollbar { width: 4px; }
.view-content::-webkit-scrollbar-thumb { background: var(--hair-2); border-radius: 2px; }

/* ── Map ── */
#view-map { background: var(--surface-2); }
.map-toolbar {
  position: absolute; top: var(--space-4); left: var(--space-4); right: var(--space-4);
  display: flex; align-items: center; gap: var(--space-3); z-index: var(--z-sticky);
  pointer-events: none;
}
.map-toolbar > * { pointer-events: auto; }
.map-container { position: relative; width: 100%; height: 100%; }

/* Map controls */
.map-zoom-ctrl {
  position: absolute; top: var(--space-4); right: var(--space-4);
  display: flex; flex-direction: column; gap: var(--space-1);
  z-index: var(--z-dropdown);
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--bg); border: 1px solid var(--hair-2);
  border-radius: var(--r-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: var(--weight-bold); color: var(--ink-2);
  box-shadow: var(--shadow-sm);
  transition: all var(--dur-fast) var(--ease-out);
}
.zoom-btn:hover { background: var(--surface); border-color: var(--hair-3); }

/* Map legend */
.map-legend {
  position: absolute; bottom: var(--space-5); left: var(--space-5);
  background: var(--bg); border: 1px solid var(--hair);
  border-radius: var(--r-md); padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-sm); min-width: 160px;
}
.map-legend-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--ink-4); margin-bottom: var(--space-2); }
.map-legend-gradient { height: 8px; border-radius: var(--r-full); background: linear-gradient(to right, var(--choro-0), var(--choro-3), var(--choro-5)); margin-bottom: var(--space-1); }
.map-legend-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); }

/* Map tooltip */
.map-tooltip {
  position: absolute; background: var(--bg); border: 1px solid var(--hair);
  border-radius: var(--r-md); padding: var(--space-3) var(--space-4);
  box-shadow: var(--shadow-md); pointer-events: none;
  opacity: 0; transition: opacity var(--dur-fast) var(--ease-out);
  min-width: 160px; z-index: var(--z-dropdown);
}
.map-tooltip.show { opacity: 1; }
.tt-name { font-size: var(--text-sm); font-weight: var(--weight-bold); color: var(--ink-1); margin-bottom: var(--space-1); }
.tt-zone { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); margin-bottom: var(--space-2); }
.tt-row { display: flex; justify-content: space-between; gap: var(--space-4); font-size: var(--text-xs); color: var(--ink-3); margin-bottom: 2px; }
.tt-val { font-family: var(--font-mono); font-weight: var(--weight-semibold); color: var(--ink-2); }

/* Map polygons (via D3) */
.td-poly { stroke: white; stroke-width: .8; cursor: pointer; transition: opacity .1s; }
.td-poly:hover { opacity: .75; stroke-width: 1.2; }
.td-poly.selected { stroke: var(--ink-1); stroke-width: 2; opacity: 1 !important; }
.td-poly-bg { fill: var(--surface-2); stroke: white; stroke-width: .5; pointer-events: none; }

/* ── Detail panel ── */
.detail-panel {
  width: var(--detail-width); flex-shrink: 0;
  border-left: 1px solid var(--hair); background: var(--bg);
  display: flex; flex-direction: column; overflow: hidden;
  transform: translateX(100%);
  transition: transform var(--dur-normal) var(--ease-out);
  position: absolute; right: 0;
  top: 0; bottom: 0;
}
.detail-panel.open { transform: translateX(0); }
.detail-close {
  position: absolute; top: var(--space-3); right: var(--space-4);
  width: 26px; height: 26px; border: 1px solid var(--hair-2);
  background: var(--surface); border-radius: var(--r-full);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
  transition: all var(--dur-fast) var(--ease-out); z-index: 1;
}
.detail-close:hover { background: var(--surface-2); color: var(--ink-1); }

/* Detail content */
.td-detail-hd {
  padding: var(--space-4) calc(var(--space-4) + 30px) var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--hair); flex-shrink: 0;
}
.td-detail-hd .ds-eyebrow { color: var(--ink-4); margin-bottom: var(--space-1); }
.td-detail-title { font-size: var(--text-h3); font-weight: var(--weight-extrabold); color: var(--ink-1); letter-spacing: var(--ls-normal); margin-bottom: 2px; }
.td-detail-sub { font-size: var(--text-xs); color: var(--ink-3); }
.td-detail-body { flex: 1; overflow-y: auto; }
.td-detail-body::-webkit-scrollbar { width: 3px; }
.td-detail-body::-webkit-scrollbar-thumb { background: var(--hair-2); border-radius: 2px; }

.td-detail-section { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--hair); }
.td-detail-section:last-child { border-bottom: none; }

/* Sparkline */
.td-spark-wrap { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--hair); }
.td-spark { display: flex; align-items: flex-end; gap: 4px; height: 44px; }
.td-spark-bar { flex: 1; min-height: 3px; border-radius: 2px 2px 0 0; background: var(--ac); opacity: .55; cursor: pointer; transition: opacity var(--dur-instant) var(--ease-out); }
.td-spark-bar:hover { opacity: 1; }
.td-spark-bar.cur { opacity: 1; outline: 1.5px solid var(--ink-2); outline-offset: 1px; }
.td-spark-labels { display: flex; gap: 4px; margin-top: 3px; }
.td-spark-labels span { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 8px; color: var(--ink-4); }

/* Account list in detail */
.td-acc-row {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--hair);
  cursor: pointer;
  transition: background var(--dur-instant) var(--ease-out);
}
.td-acc-row:hover { background: var(--surface); }
.td-acc-row:last-child { border-bottom: none; }
.td-acc-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.td-acc-dot.active   { background: var(--ok); }
.td-acc-dot.atrisk   { background: var(--warn); }
.td-acc-dot.inactive { background: var(--hair-3); }
.td-acc-name { flex: 1; font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--ink-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-acc-gmv { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); flex-shrink: 0; }

/* ── Toast ── */
.toast-container {
  position: fixed; bottom: var(--space-5); left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: var(--space-2);
  z-index: var(--z-toast); pointer-events: none;
}
.td-toast {
  background: var(--p-neutral-900); color: white;
  padding: var(--space-2) var(--space-5);
  border-radius: var(--r-lg); font-size: var(--text-sm);
  box-shadow: var(--shadow-lg); opacity: 0;
  transition: opacity var(--dur-fast) var(--ease-out);
  pointer-events: auto; white-space: nowrap;
}
.td-toast.show { opacity: 1; }
.td-toast.ok { background: var(--ok); }
.td-toast.error { background: var(--danger); }

/* ── DS Base components (shared) ── */
.ds-input {
  display: block; width: 100%;
  height: var(--c-input-h); padding: 0 var(--c-input-px);
  background: var(--c-input-bg); border: 1px solid var(--c-input-border);
  border-radius: var(--c-input-r);
  font-family: var(--c-input-font); font-size: var(--c-input-size);
  color: var(--c-input-fg); outline: none;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
}
.ds-input::placeholder { color: var(--c-input-ph); }
.ds-input:focus { border-color: var(--c-input-focus); box-shadow: 0 0 0 3px var(--ac-dim); }

.ds-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: var(--space-2); height: var(--c-btn-h); padding: 0 var(--c-btn-px);
  border-radius: var(--c-btn-r); font-family: var(--c-btn-font);
  font-size: var(--c-btn-size); font-weight: var(--c-btn-weight);
  border: none; cursor: pointer; text-decoration: none;
  transition: background var(--dur-fast) var(--ease-out);
  white-space: nowrap; user-select: none;
}
.ds-btn-primary { background: var(--c-btn-primary-bg); color: var(--c-btn-primary-fg); }
.ds-btn-primary:hover { background: var(--c-btn-primary-hover); }

.ds-avatar {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--c-avatar-r);
  background: var(--c-avatar-bg); color: var(--c-avatar-fg);
  font-family: var(--font-mono); font-weight: var(--weight-bold); flex-shrink: 0;
}
.ds-avatar.sm { width: var(--c-avatar-sm); height: var(--c-avatar-sm); font-size: 9px; }
.ds-avatar.md { width: var(--c-avatar-md); height: var(--c-avatar-md); font-size: 11px; }

.ds-eyebrow {
  font-family: var(--font-mono); font-size: var(--text-3xs);
  font-weight: var(--weight-semibold); letter-spacing: var(--ls-wider);
  text-transform: uppercase; color: var(--ink-4);
}
.ds-eyebrow.ac { color: var(--ac); }

.ds-bar-track { height: var(--c-bar-h); background: var(--c-bar-track); border-radius: var(--c-bar-r); overflow: hidden; }
.ds-bar-track.md { height: var(--c-bar-h-md); }
.ds-bar-fill { height: 100%; border-radius: var(--c-bar-r); transition: width var(--dur-slow) var(--ease-inout); }

.ds-skel { background: linear-gradient(90deg,var(--surface) 25%,var(--surface-2) 50%,var(--surface) 75%); background-size: 200% 100%; border-radius: var(--r-sm); animation: skel-shimmer 1.4s infinite; }
@keyframes skel-shimmer { 0%{background-position:200% center} 100%{background-position:-200% center} }

.ds-stat-row { display: flex; align-items: baseline; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid var(--hair); gap: var(--space-4); }
.ds-stat-row:last-child { border-bottom: none; }
.ds-stat-label { font-size: var(--text-sm); color: var(--ink-3); }
.ds-stat-value { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--ink-1); display: flex; align-items: center; gap: var(--space-2); }

.ds-delta { font-family: var(--font-mono); font-size: var(--text-micro); font-weight: var(--weight-semibold); padding: 1px 5px; border-radius: var(--r-xs); }
.ds-delta.up   { background: var(--ok-dim);     color: var(--ok-text); }
.ds-delta.down { background: var(--danger-dim);  color: var(--danger-text); }

.ds-seg-ctrl { display: inline-flex; background: var(--c-seg-bg); border: var(--c-seg-border); border-radius: var(--c-seg-r); padding: 3px; gap: 2px; }
.ds-seg-item { display: flex; align-items: center; height: var(--c-seg-item-h); padding: 0 var(--c-seg-item-px); border-radius: calc(var(--c-seg-r) - 2px); font-size: var(--text-2xs); font-family: var(--font-mono); font-weight: var(--weight-medium); color: var(--c-seg-inactive-fg); cursor: pointer; border: none; background: none; transition: all var(--dur-fast) var(--ease-out); white-space: nowrap; }
.ds-seg-item:hover { color: var(--ink-2); }

<script>
// ── dash_core.js — Auth, session, role guard ─────────────────
// Freshket TL Dashboard v702
// Supabase: menslbnyyvpxiyvjywcm.supabase.co

const DASH_VERSION = 'v705';
const SUPA_URL = 'https://menslbnyyvpxiyvjywcm.supabase.co';
const SUPA_KEY = 'sb_publishable_DRCzHd782Gry8Edu4ZIiHA_KuOgBIIG';
const ALLOWED_ROLES = ['tl', 'admin', 'sales_tl', 'ad_tl',
  'team_lead', 'team lead', 'ka team lead', 'sales team lead'];

let supa, currentProfile = null;

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);

  // Check existing session first
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    await onSessionReady(session);
  }

  // Watch auth state changes
  supa.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await onSessionReady(session);
    } else if (event === 'SIGNED_OUT') {
      showAuth();
    }
  });
});

async function onSessionReady(session) {
  // Fetch profile
  const { data: profile } = await supa
    .from('profiles')
    .select('*')
    .eq('id', session.user.id)
    .single();

  const role = normalizeRole(
    profile?.role || session.user.user_metadata?.role || ''
  );

  if (!ALLOWED_ROLES.includes(role)) {
    await supa.auth.signOut();
    showAuthError('บัญชีนี้ไม่มีสิทธิ์เข้าใช้ Dashboard — กรุณาใช้ Sense บนมือถือ');
    return;
  }

  currentProfile = { ...profile, role, email: session.user.email };
  showApp();
  initApp();
}

function normalizeRole(r) {
  const s = String(r || '').trim().toLowerCase();
  if (['kam','ka','key_account','key account','rep'].includes(s)) return 'rep';
  if (['team_lead','team lead','tl'].includes(s)) return 'tl';
  if (['sales_tl','sales_lead','sales team lead'].includes(s)) return 'sales_tl';
  if (['ad_tl','ad_lead','ad team lead'].includes(s)) return 'ad_tl';
  return s || 'rep';
}

// ── Auth UI ───────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('auth-btn');
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  document.getElementById('auth-error').style.display = 'none';

  if (!email || !pass) { showAuthError('กรุณากรอกอีเมลและรหัสผ่าน'); return; }

  btn.textContent = 'กำลังเข้าสู่ระบบ...';
  btn.disabled = true;

  const { error } = await supa.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'เข้าสู่ระบบ';
  btn.disabled = false;

  if (error) showAuthError(error.message || 'เข้าสู่ระบบไม่สำเร็จ');
}

async function doLogout() {
  await supa.auth.signOut();
  location.reload();
}

function openSense() {
  window.open('/', '_blank');
}

// Enter key on password
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'auth-pass') {
    doLogin();
  }
});

// ── User menu ─────────────────────────────────────────────────
function toggleUserMenu() {
  const m = document.getElementById('user-menu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#topbar-user')) {
    const m = document.getElementById('user-menu');
    if (m) m.style.display = 'none';
  }
});

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `td-toast${type ? ' ' + type : ''}`;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2800);
}

// ── Format helpers ────────────────────────────────────────────
function fmtGMV(v) {
  if (!v && v !== 0) return '—';
  if (v >= 1e6)  return '฿' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3)  return '฿' + Math.round(v/1e3) + 'K';
  return '฿' + Math.round(v).toLocaleString();
}
function fmtNum(v) { return v != null ? Number(v).toLocaleString() : '—'; }
function fmtPct(v) { return v != null ? v + '%' : '—'; }
function fmtDelta(curr, prev) {
  if (!prev) return '';
  const p = Math.round((curr - prev) / prev * 100);
  return (p >= 0 ? '+' : '') + p + '%';
}
function deltaCls(curr, prev) { return curr >= prev ? 'up' : 'down'; }
function paceCls(pct) {
  if (pct >= 105) return 'star';
  if (pct >= 95)  return 'ok';
  if (pct >= 90)  return 'warn';
  return 'danger';
}

<script>
// ── dash_data.js — Data pipeline (R2 CSV + Supabase) ─────────
// Freshket TL Dashboard v702
// Reuses same R2 URLs as Sense — no duplication

const R2_BASE = 'https://pub-12078d17646340808024e8cc95504995.r2.dev';
const MONTHS = ['Nov 25','Dec 25','Jan 26','Feb 26','Mar 26','Apr 26'];

// State
let portviewBulkData = [];
let currentMonth = 'Apr 26';
let currentMetric = 'gmv';   // gmv | accounts | outlets | new_accounts
let dataReady = false;

// ── Fetch pipeline ────────────────────────────────────────────
async function loadDashData() {
  try {
    const [pvResp] = await Promise.all([
      fetch(`${R2_BASE}/portview.csv?cb=${Date.now()}`)
    ]);

    if (pvResp.ok) {
      const csv = await pvResp.text();
      portviewBulkData = parsePortviewCSV(csv);
    }

    dataReady = true;
    onDataReady();
  } catch (e) {
    console.warn('Dashboard data load error:', e);
    // Render with empty data — don't block UI
    dataReady = true;
    onDataReady();
  }
}

function parsePortviewCSV(csv) {
  const lines = csv.trim().split('\n').slice(1).filter(l => l.trim());
  return lines.map(line => {
    const cols = line.split(',');
    return {
      id:         cols[0]?.trim(),
      name:       cols[1]?.trim(),
      kamEmail:   cols[2]?.trim(),
      tlEmail:    cols[3]?.trim(),
      kamName:    cols[4]?.trim(),
      type:       cols[5]?.trim(),
      cls:        cols[6]?.trim(),
      gmv:        parseGMVCols(cols, 7)
    };
  });
}

function parseGMVCols(cols, startIdx) {
  const result = {};
  MONTHS.forEach((m, i) => {
    const v = parseFloat(cols[startIdx + i]);
    if (!isNaN(v)) result[m] = v;
  });
  return result;
}

function onDataReady() {
  hideSidebarShimmer();
  renderSidebarTeam();
  renderCurrentView();
}

// ── Getters ───────────────────────────────────────────────────
function getMyAccounts() {
  if (!currentProfile) return [];
  const email = currentProfile.email;
  const role  = currentProfile.role;
  if (role === 'admin') return portviewBulkData;
  if (role === 'tl' || role === 'ad_tl') {
    const filtered = portviewBulkData.filter(r => r.tlEmail === email);
    return filtered.length ? filtered : portviewBulkData;
  }
  return portviewBulkData.filter(r => r.kamEmail === email);
}

function buildKamGroups() {
  const accounts = getMyAccounts();
  const groups = {};
  accounts.forEach(a => {
    const key = a.kamEmail || a.kamName || 'ไม่มี KAM';
    if (!groups[key]) groups[key] = { key, name: a.kamName || key, email: a.kamEmail || '', accounts: [] };
    groups[key].accounts.push(a);
  });

  return Object.values(groups).map(g => {
    const gmvArr = g.accounts.map(a => a.gmv[currentMonth] || 0);
    const totalGMV = gmvArr.reduce((s, v) => s + v, 0);
    const prevGMV  = g.accounts.reduce((s,a) => {
      const pi = MONTHS.indexOf(currentMonth) - 1;
      return s + (pi >= 0 ? (a.gmv[MONTHS[pi]] || 0) : 0);
    }, 0);
    // Simple pace: GMV vs 3-month baseline
    const baselineArr = g.accounts.map(a => {
      const vals = MONTHS.slice(0, MONTHS.indexOf(currentMonth))
        .slice(-3).map(m => a.gmv[m] || 0).filter(v => v > 0);
      return vals.length ? vals.reduce((s,v) => s+v,0) / vals.length : 0;
    });
    const baseline = baselineArr.reduce((s,v) => s+v, 0);
    const pace = baseline > 0 ? Math.round(totalGMV / baseline * 100) : 0;
    const cls  = paceCls(pace);
    return { ...g, totalGMV, prevGMV, baseline, pace, cls, count: g.accounts.length };
  }).sort((a,b) => {
    const o = { danger:0, warn:1, ok:2, star:3 };
    return (o[a.cls]??2) - (o[b.cls]??2);
  });
}
</script>

<script>
// ── dash_commission.js — Commission engine (Phase 4) ─────────
// Freshket TL Dashboard v704
//
// Architecture: query Supabase commission_payout_snapshots directly
// (pre-computed by Sense) — no need to re-implement computation logic.
// Falls back to local pace-based estimate when snapshots unavailable.

// ── State ─────────────────────────────────────────────────────
let commSnapshotData  = [];   // commission_payout_snapshots rows
let commPlanData      = {};   // planCode → plan
let commTierData      = {};   // ruleId → tiers[]
let commAssignments   = [];   // plan assignments per period
let commDataReady     = false;

// Month label format: "2026-04" (ISO) ↔ "Apr 26" (display)
const MONTH_ISO = {
  'Nov 25':'2025-11','Dec 25':'2025-12','Jan 26':'2026-01',
  'Feb 26':'2026-02','Mar 26':'2026-03','Apr 26':'2026-04'
};
const MONTH_DISPLAY = Object.fromEntries(
  Object.entries(MONTH_ISO).map(([d,iso]) => [iso, d])
);

// ── Load from Supabase ────────────────────────────────────────
async function loadCommissionData() {
  if (!supa) return;
  const periods = Object.values(MONTH_ISO);  // last 6 months

  try {
    // 1. Snapshots (pre-computed by Sense)
    const { data: snaps } = await supa
      .from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .in('period_month', periods);
    commSnapshotData = snaps || [];
  } catch(e) {
    console.warn('[Comm snapshots]', e.message);
    commSnapshotData = [];
  }

  try {
    // 2. Plans + tiers (for bracket display)
    const { data: plans } = await supa
      .from('commission_plans')
      .select('id,plan_code,plan_name,beneficiary_role,status')
      .in('beneficiary_role', ['tl','kam'])
      .neq('status','inactive');

    const planMap = {};
    const planIds = [];
    (plans || []).forEach(p => {
      if (!p?.plan_code) return;
      planMap[p.plan_code] = p;
      planIds.push(p.id);
    });
    // Fallback standard plans
    if (!planMap.TL_NRR_STD)  planMap.TL_NRR_STD  = { plan_code:'TL_NRR_STD',  plan_name:'TL NRR Standard',  beneficiary_role:'tl' };
    if (!planMap.KAM_NRR_STD) planMap.KAM_NRR_STD = { plan_code:'KAM_NRR_STD', plan_name:'KAM NRR Standard', beneficiary_role:'kam' };
    commPlanData = planMap;

    if (planIds.length) {
      const { data: rules } = await supa
        .from('commission_rules')
        .select('id,plan_id,metric_code,payout_type')
        .in('plan_id', planIds);

      const ruleIds = (rules || []).map(r => r.id);
      if (ruleIds.length) {
        const { data: tiers } = await supa
          .from('commission_rule_tiers')
          .select('id,rule_id,tier_order,min_value,max_value,payout_value,payout_label')
          .in('rule_id', ruleIds)
          .order('tier_order', { ascending: true });
        const tm = {};
        (tiers || []).forEach(t => {
          if (!tm[t.rule_id]) tm[t.rule_id] = [];
          tm[t.rule_id].push(t);
        });
        commTierData = tm;
      }
    }
  } catch(e) {
    console.warn('[Comm plans]', e.message);
  }

  commDataReady = true;
  if (currentView === 'commission') renderCommissionView();
}

// ── Getters ───────────────────────────────────────────────────
function getCommSnaps(periodMonth, role) {
  return commSnapshotData.filter(s =>
    s.period_month === periodMonth &&
    (!role || s.beneficiary_role === role)
  );
}

function getMyCommSnaps(role) {
  if (!currentProfile?.email) return [];
  return commSnapshotData.filter(s =>
    (s.beneficiary_email === currentProfile.email ||
     s.team_lead_email   === currentProfile.email) &&
    (!role || s.beneficiary_role === role)
  );
}

// TL payout for a given month (from snapshots)
function getTLPayoutForMonth(isoMonth) {
  const snap = getMyCommSnaps('tl').find(s => s.period_month === isoMonth);
  return snap ? (Number(snap.payout_amount) || 0) : null;
}

// All KAM payouts under this TL for a month
function getKAMPayoutsForMonth(isoMonth) {
  if (!currentProfile?.email) return [];
  return commSnapshotData.filter(s =>
    s.period_month === isoMonth &&
    s.team_lead_email === currentProfile.email &&
    s.beneficiary_role === 'kam'
  );
}

// ── Pace-based estimate (fallback when no snapshot) ───────────
function estimateTLCommission(groups) {
  const total    = groups.reduce((s,g) => s+g.totalGMV, 0);
  const baseline = groups.reduce((s,g) => s+g.baseline, 0);
  const pace     = baseline > 0 ? Math.round(total/baseline*100) : 0;
  // Sales TL bracket (from commission PDF)
  const bracket = [
    {min:0,   max:84,  rate:0,     label:'< 85%'},
    {min:85,  max:89,  rate:.0055, label:'85–90%'},
    {min:90,  max:94,  rate:.007,  label:'90–95%'},
    {min:95,  max:99,  rate:.008,  label:'95–100%'},
    {min:100, max:119, rate:.010,  label:'100–120%'},
    {min:120, max:999, rate:.012,  label:'≥ 120%'},
  ].find(b => pace >= b.min && pace <= b.max) || {min:0,max:84,rate:0,label:'< 85%'};
  return { pace, total, baseline, bracket, est: Math.round(total * bracket.rate) };
}

// ── Render: Commission view (Phase 4) ─────────────────────────
function renderCommissionView() {
  const el = document.getElementById('commission-content');
  if (!el) return;

  const groups = buildKamGroups();
  const isoNow = MONTH_ISO[currentMonth] || '2026-04';

  // TL own payout this month
  const tlSnap    = getMyCommSnaps('tl').find(s => s.period_month === isoNow);
  const tlPayout  = tlSnap ? Number(tlSnap.payout_amount||0) : null;
  const kamSnaps  = getKAMPayoutsForMonth(isoNow);
  const kamTotal  = kamSnaps.reduce((s,r) => s+Number(r.payout_amount||0), 0);

  // Fallback estimate
  const est = estimateTLCommission(groups);
  const showEst = tlPayout === null;

  // 6-month trend from snapshots
  const trend6 = Object.entries(MONTH_ISO).map(([disp, iso]) => {
    const snap = getMyCommSnaps('tl').find(s => s.period_month === iso);
    const v = snap ? Number(snap.payout_amount||0) : null;
    return { disp, iso, v };
  });
  const maxTrend = Math.max(1, ...trend6.map(t => t.v || 0));

  // Spark bars
  const sparks = trend6.map(t => {
    const h = t.v != null ? Math.max(4, Math.round((t.v/maxTrend)*44)) : 4;
    const isCur = t.disp === currentMonth;
    const opacity = t.v != null ? '' : 'opacity:.25';
    return `<div class="td-spark-bar${isCur?' cur':''}" style="height:${h}px;${opacity}"
      title="${t.disp}: ${t.v != null ? fmtGMV(t.v) : 'รอ snapshot'}"></div>`;
  }).join('');
  const sparkLabels = trend6.map(t =>
    `<span style="${t.disp===currentMonth?'color:var(--ac)':''}">${t.disp.split(' ')[0]}</span>`
  ).join('');

  // KAM breakdown rows
  const kamRows = kamSnaps.length
    ? kamSnaps.sort((a,b) => Number(b.payout_amount||0)-Number(a.payout_amount||0)).map(r => {
        const nrr = r.governed_nrr_pct ?? r.raw_nrr_pct;
        const nrrCls = nrr >= 100 ? 'ok' : nrr >= 95 ? 'warn' : 'danger';
        return `<tr style="border-bottom:1px solid var(--hair)">
          <td style="padding:9px 16px;font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${r.beneficiary_email?.split('@')[0] || '—'}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--${nrrCls})">${nrr != null ? nrr+'%' : '—'}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--ok)">${fmtGMV(Number(r.payout_amount||0))}</td>
          <td style="padding:9px 16px;font-size:10px;color:var(--ink-4)">${r.snapshot_status || '—'}</td>
        </tr>`;
      }).join('')
    : groups.map(g => {
        // Fallback: pace-based per KAM
        const kamEst = estimateTLCommission([g]);
        const nrrCls = paceCls(kamEst.pace);
        return `<tr style="border-bottom:1px solid var(--hair)">
          <td style="padding:9px 16px;font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${g.name}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--${nrrCls})">${kamEst.pace}% <span style="color:var(--ink-4);font-size:9px">est.</span></td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--ok)">${fmtGMV(kamEst.est)}</td>
          <td style="padding:9px 16px;font-size:10px;color:var(--ink-4)">estimate</td>
        </tr>`;
      }).join('');

  el.innerHTML = `<div style="max-width:680px">

    <!-- Hero: TL payout -->
    <div style="background:var(--surface);border-radius:var(--r-md);padding:var(--space-5);margin-bottom:var(--space-5);position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--ac)"></div>
      <div class="ds-eyebrow" style="margin-bottom:4px">TL COMMISSION ${currentMonth}${showEst?' · ESTIMATE':''}</div>
      <div style="font-family:var(--font-mono);font-size:var(--text-display);font-weight:700;letter-spacing:var(--ls-tight);line-height:1;color:var(--ok)">
        ${showEst ? fmtGMV(est.est) : fmtGMV(tlPayout)}
      </div>
      ${showEst
        ? `<div style="font-size:var(--text-sm);color:var(--ink-3);margin-top:6px">
            Team ${est.pace}% × ${(est.bracket.rate*100).toFixed(2)}% × ${fmtGMV(est.total)}
           </div>`
        : `<div style="font-size:var(--text-sm);color:var(--ink-3);margin-top:6px">
            KAM team ${fmtGMV(kamTotal)} · status: ${tlSnap?.snapshot_status || '—'}
           </div>`
      }
    </div>

    <!-- 6-month trend -->
    <div style="background:var(--surface);border-radius:var(--r-md);padding:var(--space-4);margin-bottom:var(--space-5)">
      <div class="ds-eyebrow" style="margin-bottom:var(--space-3)">Commission 6 เดือน</div>
      <div class="td-spark">${sparks}</div>
      <div class="td-spark-labels" style="margin-top:3px">${sparkLabels}</div>
      ${showEst ? `<div style="font-size:10px;color:var(--ink-4);margin-top:8px;font-family:var(--font-mono)">
        * ยังไม่มี snapshot — แสดงค่าประมาณจาก pace</div>` : ''}
    </div>

    <!-- Team summary stat row -->
    <div style="margin-bottom:var(--space-5)">
      <div class="ds-stat-row">
        <span class="ds-stat-label">Team GMV ${currentMonth}</span>
        <span class="ds-stat-value">${fmtGMV(est.total)}</span>
      </div>
      <div class="ds-stat-row">
        <span class="ds-stat-label">Pro Rate</span>
        <span class="ds-stat-value" style="color:var(--${paceCls(est.pace)})">${est.pace}%</span>
      </div>
      <div class="ds-stat-row">
        <span class="ds-stat-label">Rate bracket</span>
        <span class="ds-stat-value">${est.bracket.label} → ${(est.bracket.rate*100).toFixed(2)}%</span>
      </div>
      ${kamTotal > 0 ? `<div class="ds-stat-row">
        <span class="ds-stat-label">KAM team commission</span>
        <span class="ds-stat-value" style="color:var(--ok)">${fmtGMV(kamTotal)}</span>
      </div>` : ''}
    </div>

    <!-- Per-KAM breakdown -->
    <div class="ds-eyebrow" style="margin-bottom:var(--space-3)">Per KAM · ${currentMonth}</div>
    <div style="border-radius:var(--r-md);overflow:hidden;border:1px solid var(--hair)">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--surface-2)">
            <th style="padding:9px 16px;text-align:left;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">KAM</th>
            <th style="padding:9px 16px;text-align:right;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">NRR / Pace</th>
            <th style="padding:9px 16px;text-align:right;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">Commission</th>
            <th style="padding:9px 16px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">Status</th>
          </tr>
        </thead>
        <tbody>${kamRows}</tbody>
      </table>
    </div>

  </div>`;
}
</script>

<!-- Skills -->
<script>
// ── dash_skills.js — Skills dashboard (Phase 5) ──────────────
// Freshket TL Dashboard v705
// Tables: skill_definitions, user_skill_progress, echo_skill_observations, profiles

// ── State ─────────────────────────────────────────────────────
let skillDefs     = [];   // skill_definitions rows
let skillProg     = {};   // 'userId:skillId' → progress row
let skillEchoObs  = {};   // 'userId:skill_code' → obs[]
let skillMembers  = [];   // { id, email, full_name, role } squad members
let skillDataReady = false;
let skillView     = 'pending';   // 'pending' | 'matrix' | 'echo'

// ── Load ──────────────────────────────────────────────────────
async function loadSkillsData() {
  if (!supa || !currentProfile) return;
  const tlEmail = currentProfile.email;

  try {
    // 1. Squad members from profiles
    const { data: tlRow } = await supa
      .from('profiles')
      .select('squad, sale_team')
      .eq('email', tlEmail)
      .single();

    const squadName = tlRow?.squad || tlRow?.sale_team || null;
    if (squadName) {
      const { data: members } = await supa
        .from('profiles')
        .select('id, email, full_name, role')
        .eq('squad', squadName)
        .in('role', ['sales','rep','tl','sales_tl','ad','ad_tl']);
      skillMembers = (members || []).filter(m => m.email !== tlEmail);
    }

    // 2. Skill definitions
    const { data: defs } = await supa
      .from('skill_definitions')
      .select('id, skill_code, skill_name_en, skill_name_th, sort_order, gate_level')
      .order('sort_order', { ascending: true });
    skillDefs = defs || [];

    // 3. Progress for all squad members
    const memberEmails = skillMembers.map(m => m.email);
    if (memberEmails.length) {
      const { data: prog } = await supa
        .from('user_skill_progress')
        .select('id, user_id, skill_id, state, owner_email, tl_note, updated_at')
        .in('owner_email', memberEmails);
      skillProg = {};
      (prog || []).forEach(p => {
        const key = `${p.user_id}:${p.skill_id}`;
        skillProg[key] = p;
      });
    }

    // 4. Echo observations for squad
    const memberIds = skillMembers.map(m => m.id).filter(Boolean);
    if (memberIds.length) {
      const { data: obs } = await supa
        .from('echo_skill_observations')
        .select('id, user_id, skill_code, ai_score, evidence, observed_at, session_id')
        .in('user_id', memberIds)
        .order('observed_at', { ascending: false })
        .limit(500);
      skillEchoObs = {};
      (obs || []).forEach(o => {
        const key = `${o.user_id}:${o.skill_code}`;
        if (!skillEchoObs[key]) skillEchoObs[key] = [];
        skillEchoObs[key].push(o);
      });
    }

    skillDataReady = true;
  } catch(e) {
    console.warn('[Skills]', e.message);
    skillDataReady = true;
  }

  if (currentView === 'skills') renderSkillsView();
}

// ── Helpers ───────────────────────────────────────────────────
function getMemberName(member) {
  return member.full_name || member.email?.split('@')[0] || '—';
}
function getMemberInitials(member) {
  const name = getMemberName(member);
  return name.charAt(0).toUpperCase();
}
function getMemberProgress(memberId) {
  return Object.values(skillProg).filter(p => p.user_id === memberId);
}
function getSkillState(memberId, skillId) {
  return skillProg[`${memberId}:${skillId}`]?.state || 'locked';
}
function getLatestEcho(memberId, skillCode) {
  return (skillEchoObs[`${memberId}:${skillCode}`] || [])[0] || null;
}
function scoreCls(score) {
  if (score === 'pass')       return 'ok';
  if (score === 'developing') return 'warn';
  if (score === 'miss')       return 'danger';
  return 'neutral';
}
function scoreLabel(score) {
  if (score === 'pass')       return 'Pass';
  if (score === 'developing') return 'Developing';
  if (score === 'miss')       return 'Miss';
  return score || '—';
}
function stateCls(state) {
  if (state === 'unlocked' || state === 'mastered') return 'ok';
  if (state === 'training') return 'warn';
  return 'neutral';
}
function stateLabel(state) {
  if (state === 'unlocked' || state === 'mastered') return 'Pass';
  if (state === 'training') return 'Training';
  return 'Locked';
}

// ── Render ────────────────────────────────────────────────────
function renderSkillsView() {
  const el = document.getElementById('skills-content');
  if (!el) return;

  if (!skillDataReady) {
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;max-width:400px">
      ${[80,60,70,55,65].map(w =>
        `<div class="ds-skel" style="height:44px;border-radius:var(--r-md)"></div>`
      ).join('')}
    </div>`;
    return;
  }

  // Sub-nav tabs
  const tabs = [
    { key:'pending', label:`รอประเมิน${pendingCount()>0?` (${pendingCount()})`:''}`},
    { key:'matrix',  label:'ภาพรวมทีม' },
    { key:'echo',    label:'Echo สัปดาห์นี้' },
  ];
  const tabsHtml = `<div class="td-skills-tabs">
    ${tabs.map(t =>
      `<button class="td-skills-tab${skillView===t.key?' active':''}"
        onclick="setSkillView('${t.key}')">${t.label}</button>`
    ).join('')}
  </div>`;

  let body = '';
  if (skillView === 'pending')  body = renderSkillsPending();
  if (skillView === 'matrix')   body = renderSkillsMatrix();
  if (skillView === 'echo')     body = renderSkillsEcho();

  el.innerHTML = `<div style="max-width:780px">${tabsHtml}${body}</div>`;
}

function setSkillView(v) {
  skillView = v;
  renderSkillsView();
}

function pendingCount() {
  return Object.values(skillProg).filter(p => p.state === 'training').length;
}

// ── Tab: Pending evaluations ──────────────────────────────────
function renderSkillsPending() {
  const pending = Object.values(skillProg)
    .filter(p => p.state === 'training')
    .sort((a,b) => new Date(a.updated_at||0) - new Date(b.updated_at||0));

  if (!pending.length) return `
    <div class="ds-empty" style="padding:var(--space-10) 0">
      <svg class="ds-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/>
      </svg>
      <div class="ds-empty-title">ไม่มีรายการรอประเมิน</div>
      <div class="ds-empty-desc">ทุก rep อยู่ใน state ปัจจุบันแล้ว</div>
    </div>`;

  const rows = pending.map(p => {
    const def    = skillDefs.find(d => d.id === p.skill_id);
    if (!def) return '';
    const member = skillMembers.find(m => m.id === p.user_id);
    if (!member) return '';

    const daysAgo = p.updated_at
      ? Math.floor((Date.now() - new Date(p.updated_at)) / 86400000) : null;
    const dateLabel = daysAgo === null ? '' : daysAgo === 0 ? 'วันนี้' : `${daysAgo} วันที่แล้ว`;

    // Latest echo evidence
    const echo = getLatestEcho(p.user_id, def.skill_code);
    const echoHtml = echo ? `
      <div class="td-skill-echo-strip">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--${scoreCls(echo.ai_score)})" stroke-width="2">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
        </svg>
        <span class="td-skill-echo-score" style="color:var(--${scoreCls(echo.ai_score)})">${scoreLabel(echo.ai_score)}</span>
        <span class="td-skill-echo-date">${new Date(echo.observed_at).toLocaleDateString('th-TH',{day:'numeric',month:'short'})}</span>
        ${echo.evidence ? `<span class="td-skill-echo-ev">${echo.evidence.slice(0,72)}${echo.evidence.length>72?'…':''}</span>` : ''}
      </div>` : '';

    const gateLabel = def.gate_level ? `Gate ${def.gate_level}` : '';

    return `
      <div class="td-skill-pend-row">
        <div class="ds-avatar md">${getMemberInitials(member)}</div>
        <div class="td-skill-pend-body">
          <div class="td-skill-pend-name">${getMemberName(member)}</div>
          <div class="td-skill-pend-skill">
            ${def.skill_name_en}
            ${gateLabel ? `<span class="td-skill-gate">${gateLabel}</span>` : ''}
          </div>
          <div class="td-skill-pend-date">self-marked · ${dateLabel}</div>
          ${echoHtml}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="ds-pill ds-pill-warn">Training</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:var(--space-2)">
      <span class="ds-eyebrow">${pending.length} รายการ · เรียงตามรอนานสุด</span>
    </div>
    <div style="border-radius:var(--r-md);border:1px solid var(--hair);overflow:hidden">
      ${rows}
    </div>`;
}

// ── Tab: Team matrix ──────────────────────────────────────────
function renderSkillsMatrix() {
  if (!skillMembers.length || !skillDefs.length) {
    return `<div class="ds-empty"><div class="ds-empty-title">ยังไม่มีข้อมูล</div></div>`;
  }

  // Rep rows
  const memberRows = skillMembers.map(member => {
    const prog = getMemberProgress(member.id);
    const total    = skillDefs.length;
    const unlocked = prog.filter(p => p.state==='unlocked'||p.state==='mastered').length;
    const training = prog.filter(p => p.state==='training').length;
    const pct = total > 0 ? Math.round(unlocked/total*100) : 0;

    // Skill dots
    const dots = skillDefs.map(def => {
      const state = getSkillState(member.id, def.id);
      const echo  = getLatestEcho(member.id, def.skill_code);
      const dotCls = state==='unlocked'||state==='mastered' ? 'pass'
                   : state==='training' ? 'train' : 'lock';
      const echoDot = echo ? `<div class="td-skill-echo-dot ${scoreCls(echo.ai_score)}"></div>` : '';
      return `<div class="td-skill-matrix-cell" title="${def.skill_name_en} · ${stateLabel(state)}">
        <div class="td-skill-matrix-dot ${dotCls}">${echoDot}</div>
      </div>`;
    }).join('');

    const barPct = pct;
    return `
      <div class="td-skill-matrix-row">
        <div class="td-skill-matrix-rep">
          <div class="ds-avatar sm">${getMemberInitials(member)}</div>
          <div>
            <div style="font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${getMemberName(member)}</div>
            <div style="font-size:var(--text-micro);color:var(--ink-4);font-family:var(--font-mono)">${unlocked}/${total} · ${training > 0 ? training+' pending':''}  </div>
          </div>
        </div>
        <div class="td-skill-matrix-dots">${dots}</div>
        <div class="td-skill-matrix-bar">
          <div class="ds-bar-track" style="width:80px">
            <div class="ds-bar-fill ${pct>=80?'ok':pct>=50?'warn':'danger'}" style="width:${barPct}%"></div>
          </div>
          <span style="font-family:var(--font-mono);font-size:var(--text-micro);color:var(--ink-3);margin-left:6px">${pct}%</span>
        </div>
      </div>`;
  }).join('');

  // Skill headers
  const headers = skillDefs.map(def =>
    `<div class="td-skill-matrix-hd" title="${def.skill_name_en}">
      ${def.skill_code.split('_')[0]}
    </div>`
  ).join('');

  return `
    <div class="td-skill-matrix-wrap">
      <div class="td-skill-matrix-header">
        <div style="min-width:200px;flex-shrink:0"></div>
        <div class="td-skill-matrix-dots-hd">${headers}</div>
        <div style="width:120px;flex-shrink:0"></div>
      </div>
      ${memberRows}
    </div>
    <div style="margin-top:var(--space-4);display:flex;gap:var(--space-4);font-size:var(--text-xs);color:var(--ink-3)">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--ok);margin-right:4px;vertical-align:middle"></span>Pass</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--warn);margin-right:4px;vertical-align:middle"></span>Training</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--hair-3);margin-right:4px;vertical-align:middle"></span>Locked</span>
    </div>`;
}

// ── Tab: Echo this week ───────────────────────────────────────
function renderSkillsEcho() {
  const weekAgo = Date.now() - 7 * 86400000;
  const recentObs = Object.entries(skillEchoObs)
    .flatMap(([key, obs]) => obs.map(o => ({ ...o, _key: key })))
    .filter(o => new Date(o.observed_at) >= weekAgo)
    .sort((a,b) => new Date(b.observed_at) - new Date(a.observed_at))
    .slice(0, 30);

  if (!recentObs.length) return `
    <div class="ds-empty" style="padding:var(--space-10) 0">
      <svg class="ds-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
      </svg>
      <div class="ds-empty-title">ไม่มี Echo session สัปดาห์นี้</div>
      <div class="ds-empty-desc">Echo observations จะปรากฏที่นี่ภายใน 7 วัน</div>
    </div>`;

  const rows = recentObs.map(o => {
    const member = skillMembers.find(m => m.id === o.user_id);
    const def    = skillDefs.find(d => d.skill_code === o.skill_code);
    const cls    = scoreCls(o.ai_score);
    const dt     = new Date(o.observed_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
