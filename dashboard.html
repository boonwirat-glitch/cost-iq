<!-- Commission -->
<script>
// ── dash_commission.js — Commission engine (Phase 4) ─────────
// Freshket TL Dashboard v704
//
// Architecture: query Supabase commission_payout_snapshots directly
// (pre-computed by Sense) — no need to re-implement computation logic.
// Falls back to local pace-based estimate when snapshots unavailable.

// ── State ─────────────────────────────────────────────────────
let commSnapshotData  = [];   // commission_payout_snapshots rows
let commPlanData      = {};   // planCode → plan
let commTierData      = {};   // ruleId → tiers[]
let commAssignments   = [];   // plan assignments per period
let commDataReady     = false;

// Month label format: "2026-04" (ISO) ↔ "Apr 26" (display)
const MONTH_ISO = {
  'Nov 25':'2025-11','Dec 25':'2025-12','Jan 26':'2026-01',
  'Feb 26':'2026-02','Mar 26':'2026-03','Apr 26':'2026-04'
};
const MONTH_DISPLAY = Object.fromEntries(
  Object.entries(MONTH_ISO).map(([d,iso]) => [iso, d])
);

// ── Load from Supabase ────────────────────────────────────────
async function loadCommissionData() {
  if (!supa) return;
  const periods = Object.values(MONTH_ISO);  // last 6 months

  try {
    // 1. Snapshots (pre-computed by Sense)
    const { data: snaps } = await supa
      .from('commission_payout_snapshots')
      .select('id,period_month,beneficiary_role,beneficiary_email,team_lead_email,raw_nrr_pct,governed_nrr_pct,payout_amount,snapshot_status,breakdown,updated_at')
      .in('period_month', periods);
    commSnapshotData = snaps || [];
  } catch(e) {
    DashLog.error('commission_snapshots', e.message);
    commSnapshotData = [];
  }

  try {
    // 2. Plans + tiers (for bracket display)
    const { data: plans } = await supa
      .from('commission_plans')
      .select('id,plan_code,plan_name,beneficiary_role,status')
      .in('beneficiary_role', ['tl','kam'])
      .neq('status','inactive');

    const planMap = {};
    const planIds = [];
    (plans || []).forEach(p => {
      if (!p?.plan_code) return;
      planMap[p.plan_code] = p;
      planIds.push(p.id);
    });
    // Fallback standard plans
    if (!planMap.TL_NRR_STD)  planMap.TL_NRR_STD  = { plan_code:'TL_NRR_STD',  plan_name:'TL NRR Standard',  beneficiary_role:'tl' };
    if (!planMap.KAM_NRR_STD) planMap.KAM_NRR_STD = { plan_code:'KAM_NRR_STD', plan_name:'KAM NRR Standard', beneficiary_role:'kam' };
    commPlanData = planMap;

    if (planIds.length) {
      const { data: rules } = await supa
        .from('commission_rules')
        .select('id,plan_id,metric_code,payout_type')
        .in('plan_id', planIds);

      const ruleIds = (rules || []).map(r => r.id);
      if (ruleIds.length) {
        const { data: tiers } = await supa
          .from('commission_rule_tiers')
          .select('id,rule_id,tier_order,min_value,max_value,payout_value,payout_label')
          .in('rule_id', ruleIds)
          .order('tier_order', { ascending: true });
        const tm = {};
        (tiers || []).forEach(t => {
          if (!tm[t.rule_id]) tm[t.rule_id] = [];
          tm[t.rule_id].push(t);
        });
        commTierData = tm;
      }
    }
  } catch(e) {
    DashLog.error('commission_plans', e.message);
  }

  commDataReady = true;
  if (currentView === 'commission') renderCommissionView();
}

// ── Getters ───────────────────────────────────────────────────
function getCommSnaps(periodMonth, role) {
  return commSnapshotData.filter(s =>
    s.period_month === periodMonth &&
    (!role || s.beneficiary_role === role)
  );
}

function getMyCommSnaps(role) {
  if (!currentProfile?.email) return [];
  return commSnapshotData.filter(s =>
    (s.beneficiary_email === currentProfile.email ||
     s.team_lead_email   === currentProfile.email) &&
    (!role || s.beneficiary_role === role)
  );
}

// TL payout for a given month (from snapshots)
function getTLPayoutForMonth(isoMonth) {
  const snap = getMyCommSnaps('tl').find(s => s.period_month === isoMonth);
  return snap ? (Number(snap.payout_amount) || 0) : null;
}

// All KAM payouts under this TL for a month
function getKAMPayoutsForMonth(isoMonth) {
  if (!currentProfile?.email) return [];
  return commSnapshotData.filter(s =>
    s.period_month === isoMonth &&
    s.team_lead_email === currentProfile.email &&
    s.beneficiary_role === 'kam'
  );
}

// ── Pace-based estimate (fallback when no snapshot) ───────────
function estimateTLCommission(groups) {
  const total    = groups.reduce((s,g) => s+g.totalGMV, 0);
  const baseline = groups.reduce((s,g) => s+g.baseline, 0);
  const pace     = baseline > 0 ? Math.round(total/baseline*100) : 0;
  // Sales TL bracket (from commission PDF)
  const bracket = [
    {min:0,   max:84,  rate:0,     label:'< 85%'},
    {min:85,  max:89,  rate:.0055, label:'85–90%'},
    {min:90,  max:94,  rate:.007,  label:'90–95%'},
    {min:95,  max:99,  rate:.008,  label:'95–100%'},
    {min:100, max:119, rate:.010,  label:'100–120%'},
    {min:120, max:999, rate:.012,  label:'≥ 120%'},
  ].find(b => pace >= b.min && pace <= b.max) || {min:0,max:84,rate:0,label:'< 85%'};
  return { pace, total, baseline, bracket, est: Math.round(total * bracket.rate) };
}

// ── Render: Commission view (Phase 4) ─────────────────────────
function renderCommissionView() {
  const el = document.getElementById('commission-content');
  if (!el) return;
  if (!commDataReady) { el.innerHTML = skeletonBlock(4); return; }

  const groups = buildKamGroups();
  const isoNow = MONTH_ISO[currentMonth] || '2026-04';

  // TL own payout this month
  const tlSnap    = getMyCommSnaps('tl').find(s => s.period_month === isoNow);
  const tlPayout  = tlSnap ? Number(tlSnap.payout_amount||0) : null;
  const kamSnaps  = getKAMPayoutsForMonth(isoNow);
  const kamTotal  = kamSnaps.reduce((s,r) => s+Number(r.payout_amount||0), 0);

  // Fallback estimate
  const est = estimateTLCommission(groups);
  const showEst = tlPayout === null;

  // 6-month trend from snapshots
  const trend6 = Object.entries(MONTH_ISO).map(([disp, iso]) => {
    const snap = getMyCommSnaps('tl').find(s => s.period_month === iso);
    const v = snap ? Number(snap.payout_amount||0) : null;
    return { disp, iso, v };
  });
  const maxTrend = Math.max(1, ...trend6.map(t => t.v || 0));

  // Spark bars
  const sparks = trend6.map(t => {
    const h = t.v != null ? Math.max(4, Math.round((t.v/maxTrend)*44)) : 4;
    const isCur = t.disp === currentMonth;
    const opacity = t.v != null ? '' : 'opacity:.25';
    return `<div class="td-spark-bar${isCur?' cur':''}" style="height:${h}px;${opacity}"
      title="${t.disp}: ${t.v != null ? fmtGMV(t.v) : 'รอ snapshot'}"></div>`;
  }).join('');
  const sparkLabels = trend6.map(t =>
    `<span style="${t.disp===currentMonth?'color:var(--ac)':''}">${t.disp.split(' ')[0]}</span>`
  ).join('');

  // KAM breakdown rows
  const kamRows = kamSnaps.length
    ? kamSnaps.sort((a,b) => Number(b.payout_amount||0)-Number(a.payout_amount||0)).map(r => {
        const nrr = r.governed_nrr_pct ?? r.raw_nrr_pct;
        const nrrCls = nrr >= 100 ? 'ok' : nrr >= 95 ? 'warn' : 'danger';
        return `<tr style="border-bottom:1px solid var(--hair)">
          <td style="padding:9px 16px;font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${r.beneficiary_email?.split('@')[0] || '—'}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--${nrrCls})">${nrr != null ? nrr+'%' : '—'}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--ok)">${fmtGMV(Number(r.payout_amount||0))}</td>
          <td style="padding:9px 16px;font-size:10px;color:var(--ink-4)">${r.snapshot_status || '—'}</td>
        </tr>`;
      }).join('')
    : groups.map(g => {
        // Fallback: pace-based per KAM
        const kamEst = estimateTLCommission([g]);
        const nrrCls = paceCls(kamEst.pace);
        return `<tr style="border-bottom:1px solid var(--hair)">
          <td style="padding:9px 16px;font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${g.name}</td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--${nrrCls})">${kamEst.pace}% <span style="color:var(--ink-4);font-size:9px">est.</span></td>
          <td style="padding:9px 16px;font-family:var(--font-mono);font-size:var(--text-xs);text-align:right;color:var(--ok)">${fmtGMV(kamEst.est)}</td>
          <td style="padding:9px 16px;font-size:10px;color:var(--ink-4)">estimate</td>
        </tr>`;
      }).join('');

  el.innerHTML = `<div style="max-width:680px">

    <!-- Hero: TL payout -->
    <div style="background:var(--surface);border-radius:var(--r-md);padding:var(--space-5);margin-bottom:var(--space-5);position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--ac)"></div>
      <div class="ds-eyebrow" style="margin-bottom:4px">TL COMMISSION ${currentMonth}${showEst?' · ESTIMATE':''}</div>
      <div style="font-family:var(--font-mono);font-size:var(--text-display);font-weight:700;letter-spacing:var(--ls-tight);line-height:1;color:var(--ok)">
        ${showEst ? fmtGMV(est.est) : fmtGMV(tlPayout)}
      </div>
      ${showEst
        ? `<div style="font-size:var(--text-sm);color:var(--ink-3);margin-top:6px">
            Team ${est.pace}% × ${(est.bracket.rate*100).toFixed(2)}% × ${fmtGMV(est.total)}
           </div>`
        : `<div style="font-size:var(--text-sm);color:var(--ink-3);margin-top:6px">
            KAM team ${fmtGMV(kamTotal)} · status: ${tlSnap?.snapshot_status || '—'}
           </div>`
      }
    </div>

    <!-- 6-month trend -->
    <div style="background:var(--surface);border-radius:var(--r-md);padding:var(--space-4);margin-bottom:var(--space-5)">
      <div class="ds-eyebrow" style="margin-bottom:var(--space-3)">Commission 6 เดือน</div>
      <div class="td-spark">${sparks}</div>
      <div class="td-spark-labels" style="margin-top:3px">${sparkLabels}</div>
      ${showEst ? `<div style="font-size:10px;color:var(--ink-4);margin-top:8px;font-family:var(--font-mono)">
        * ยังไม่มี snapshot — แสดงค่าประมาณจาก pace</div>` : ''}
    </div>

    <!-- Team summary stat row -->
    <div style="margin-bottom:var(--space-5)">
      <div class="ds-stat-row">
        <span class="ds-stat-label">Team GMV ${currentMonth}</span>
        <span class="ds-stat-value">${fmtGMV(est.total)}</span>
      </div>
      <div class="ds-stat-row">
        <span class="ds-stat-label">Pro Rate</span>
        <span class="ds-stat-value" style="color:var(--${paceCls(est.pace)})">${est.pace}%</span>
      </div>
      <div class="ds-stat-row">
        <span class="ds-stat-label">Rate bracket</span>
        <span class="ds-stat-value">${est.bracket.label} → ${(est.bracket.rate*100).toFixed(2)}%</span>
      </div>
      ${kamTotal > 0 ? `<div class="ds-stat-row">
        <span class="ds-stat-label">KAM team commission</span>
        <span class="ds-stat-value" style="color:var(--ok)">${fmtGMV(kamTotal)}</span>
      </div>` : ''}
    </div>

    <!-- Per-KAM breakdown -->
    <div class="ds-eyebrow" style="margin-bottom:var(--space-3)">Per KAM · ${currentMonth}</div>
    <div style="border-radius:var(--r-md);overflow:hidden;border:1px solid var(--hair)">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--surface-2)">
            <th style="padding:9px 16px;text-align:left;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">KAM</th>
            <th style="padding:9px 16px;text-align:right;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">NRR / Pace</th>
            <th style="padding:9px 16px;text-align:right;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">Commission</th>
            <th style="padding:9px 16px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;border-bottom:1px solid var(--hair)">Status</th>
          </tr>
        </thead>
        <tbody>${kamRows}</tbody>
      </table>
    </div>

  </div>`;
}
</script>

<!-- Skills -->
<script>
// ── dash_skills.js — Skills dashboard (Phase 5) ──────────────
// Freshket TL Dashboard v705
// Tables: skill_definitions, user_skill_progress, echo_skill_observations, profiles

// ── State ─────────────────────────────────────────────────────
let skillDefs     = [];   // skill_definitions rows
let skillProg     = {};   // 'userId:skillId' → progress row
let skillEchoObs  = {};   // 'userId:skill_code' → obs[]
let skillMembers  = [];   // { id, email, full_name, role } squad members
let skillDataReady = false;
let skillView     = 'pending';   // 'pending' | 'matrix' | 'echo'

// ── Load ──────────────────────────────────────────────────────
async function loadSkillsData() {
  if (!supa || !currentProfile) return;
  const tlEmail = currentProfile.email;

  try {
    // 1. Squad members from profiles
    const { data: tlRow } = await supa
      .from('profiles')
      .select('squad, sale_team')
      .eq('email', tlEmail)
      .single();

    const squadName = tlRow?.squad || tlRow?.sale_team || null;
    if (squadName) {
      const { data: members } = await supa
        .from('profiles')
        .select('id, email, full_name, role')
        .eq('squad', squadName)
        .in('role', ['sales','rep','tl','sales_tl','ad','ad_tl']);
      skillMembers = (members || []).filter(m => m.email !== tlEmail);
    }

    // 2. Skill definitions
    const { data: defs } = await supa
      .from('skill_definitions')
      .select('id, skill_code, skill_name_en, skill_name_th, sort_order, gate_level')
      .order('sort_order', { ascending: true });
    skillDefs = defs || [];

    // 3. Progress for all squad members
    const memberEmails = skillMembers.map(m => m.email);
    if (memberEmails.length) {
      const { data: prog } = await supa
        .from('user_skill_progress')
        .select('id, user_id, skill_id, state, owner_email, tl_note, updated_at')
        .in('owner_email', memberEmails);
      skillProg = {};
      (prog || []).forEach(p => {
        const key = `${p.user_id}:${p.skill_id}`;
        skillProg[key] = p;
      });
    }

    // 4. Echo observations for squad
    const memberIds = skillMembers.map(m => m.id).filter(Boolean);
    if (memberIds.length) {
      const { data: obs } = await supa
        .from('echo_skill_observations')
        .select('id, user_id, skill_code, ai_score, evidence, observed_at, session_id')
        .in('user_id', memberIds)
        .order('observed_at', { ascending: false })
        .limit(500);
      skillEchoObs = {};
      (obs || []).forEach(o => {
        const key = `${o.user_id}:${o.skill_code}`;
        if (!skillEchoObs[key]) skillEchoObs[key] = [];
        skillEchoObs[key].push(o);
      });
    }

    skillDataReady = true;
  } catch(e) {
    DashLog.error('skills_load', e.message);
    skillDataReady = true;
  }

  if (currentView === 'skills') renderSkillsView();
}

// ── Helpers ───────────────────────────────────────────────────
function getMemberName(member) {
  return member.full_name || member.email?.split('@')[0] || '—';
}
function getMemberInitials(member) {
  const name = getMemberName(member);
  return name.charAt(0).toUpperCase();
}
function getMemberProgress(memberId) {
  return Object.values(skillProg).filter(p => p.user_id === memberId);
}
function getSkillState(memberId, skillId) {
  return skillProg[`${memberId}:${skillId}`]?.state || 'locked';
}
function getLatestEcho(memberId, skillCode) {
  return (skillEchoObs[`${memberId}:${skillCode}`] || [])[0] || null;
}
function scoreCls(score) {
  if (score === 'pass')       return 'ok';
  if (score === 'developing') return 'warn';
  if (score === 'miss')       return 'danger';
  return 'neutral';
}
function scoreLabel(score) {
  if (score === 'pass')       return 'Pass';
  if (score === 'developing') return 'Developing';
  if (score === 'miss')       return 'Miss';
  return score || '—';
}
function stateCls(state) {
  if (state === 'unlocked' || state === 'mastered') return 'ok';
  if (state === 'training') return 'warn';
  return 'neutral';
}
function stateLabel(state) {
  if (state === 'unlocked' || state === 'mastered') return 'Pass';
  if (state === 'training') return 'Training';
  return 'Locked';
}

// ── Render ────────────────────────────────────────────────────
function renderSkillsView() {
  const el = document.getElementById('skills-content');
  if (!el) return;

  if (!skillDataReady) {
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;max-width:400px">
      ${[80,60,70,55,65].map(w =>
        `<div class="ds-skel" style="height:44px;border-radius:var(--r-md)"></div>`
      ).join('')}
    </div>`;
    return;
  }

  // Sub-nav tabs
  const tabs = [
    { key:'pending', label:`รอประเมิน${pendingCount()>0?` (${pendingCount()})`:''}`},
    { key:'matrix',  label:'ภาพรวมทีม' },
    { key:'echo',    label:'Echo สัปดาห์นี้' },
  ];
  const tabsHtml = `<div class="td-skills-tabs">
    ${tabs.map(t =>
      `<button class="td-skills-tab${skillView===t.key?' active':''}"
        onclick="setSkillView('${t.key}')">${t.label}</button>`
    ).join('')}
  </div>`;

  let body = '';
  if (skillView === 'pending')  body = renderSkillsPending();
  if (skillView === 'matrix')   body = renderSkillsMatrix();
  if (skillView === 'echo')     body = renderSkillsEcho();

  el.innerHTML = `<div style="max-width:780px">${tabsHtml}${body}</div>`;
}

function setSkillView(v) {
  skillView = v;
  renderSkillsView();
}

function pendingCount() {
  return Object.values(skillProg).filter(p => p.state === 'training').length;
}

// ── Tab: Pending evaluations ──────────────────────────────────
function renderSkillsPending() {
  const pending = Object.values(skillProg)
    .filter(p => p.state === 'training')
    .sort((a,b) => new Date(a.updated_at||0) - new Date(b.updated_at||0));

  if (!pending.length) return `
    <div class="ds-empty" style="padding:var(--space-10) 0">
      <svg class="ds-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/>
      </svg>
      <div class="ds-empty-title">ไม่มีรายการรอประเมิน</div>
      <div class="ds-empty-desc">ทุก rep อยู่ใน state ปัจจุบันแล้ว</div>
    </div>`;

  const rows = pending.map(p => {
    const def    = skillDefs.find(d => d.id === p.skill_id);
    if (!def) return '';
    const member = skillMembers.find(m => m.id === p.user_id);
    if (!member) return '';

    const daysAgo = p.updated_at
      ? Math.floor((Date.now() - new Date(p.updated_at)) / 86400000) : null;
    const dateLabel = daysAgo === null ? '' : daysAgo === 0 ? 'วันนี้' : `${daysAgo} วันที่แล้ว`;

    // Latest echo evidence
    const echo = getLatestEcho(p.user_id, def.skill_code);
    const echoHtml = echo ? `
      <div class="td-skill-echo-strip">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--${scoreCls(echo.ai_score)})" stroke-width="2">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
        </svg>
        <span class="td-skill-echo-score" style="color:var(--${scoreCls(echo.ai_score)})">${scoreLabel(echo.ai_score)}</span>
        <span class="td-skill-echo-date">${new Date(echo.observed_at).toLocaleDateString('th-TH',{day:'numeric',month:'short'})}</span>
        ${echo.evidence ? `<span class="td-skill-echo-ev">${echo.evidence.slice(0,72)}${echo.evidence.length>72?'…':''}</span>` : ''}
      </div>` : '';

    const gateLabel = def.gate_level ? `Gate ${def.gate_level}` : '';

    return `
      <div class="td-skill-pend-row">
        <div class="ds-avatar md">${getMemberInitials(member)}</div>
        <div class="td-skill-pend-body">
          <div class="td-skill-pend-name">${getMemberName(member)}</div>
          <div class="td-skill-pend-skill">
            ${def.skill_name_en}
            ${gateLabel ? `<span class="td-skill-gate">${gateLabel}</span>` : ''}
          </div>
          <div class="td-skill-pend-date">self-marked · ${dateLabel}</div>
          ${echoHtml}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <span class="ds-pill ds-pill-warn">Training</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="1.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:var(--space-2)">
      <span class="ds-eyebrow">${pending.length} รายการ · เรียงตามรอนานสุด</span>
    </div>
    <div style="border-radius:var(--r-md);border:1px solid var(--hair);overflow:hidden">
      ${rows}
    </div>`;
}

// ── Tab: Team matrix ──────────────────────────────────────────
function renderSkillsMatrix() {
  if (!skillMembers.length || !skillDefs.length) {
    return `<div class="ds-empty"><div class="ds-empty-title">ยังไม่มีข้อมูล</div></div>`;
  }

  // Rep rows
  const memberRows = skillMembers.map(member => {
    const prog = getMemberProgress(member.id);
    const total    = skillDefs.length;
    const unlocked = prog.filter(p => p.state==='unlocked'||p.state==='mastered').length;
    const training = prog.filter(p => p.state==='training').length;
    const pct = total > 0 ? Math.round(unlocked/total*100) : 0;

    // Skill dots
    const dots = skillDefs.map(def => {
      const state = getSkillState(member.id, def.id);
      const echo  = getLatestEcho(member.id, def.skill_code);
      const dotCls = state==='unlocked'||state==='mastered' ? 'pass'
                   : state==='training' ? 'train' : 'lock';
      const echoDot = echo ? `<div class="td-skill-echo-dot ${scoreCls(echo.ai_score)}"></div>` : '';
      return `<div class="td-skill-matrix-cell" title="${def.skill_name_en} · ${stateLabel(state)}">
        <div class="td-skill-matrix-dot ${dotCls}">${echoDot}</div>
      </div>`;
    }).join('');

    const barPct = pct;
    return `
      <div class="td-skill-matrix-row">
        <div class="td-skill-matrix-rep">
          <div class="ds-avatar sm">${getMemberInitials(member)}</div>
          <div>
            <div style="font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${getMemberName(member)}</div>
            <div style="font-size:var(--text-micro);color:var(--ink-4);font-family:var(--font-mono)">${unlocked}/${total} · ${training > 0 ? training+' pending':''}  </div>
          </div>
        </div>
        <div class="td-skill-matrix-dots">${dots}</div>
        <div class="td-skill-matrix-bar">
          <div class="ds-bar-track" style="width:80px">
            <div class="ds-bar-fill ${pct>=80?'ok':pct>=50?'warn':'danger'}" style="width:${barPct}%"></div>
          </div>
          <span style="font-family:var(--font-mono);font-size:var(--text-micro);color:var(--ink-3);margin-left:6px">${pct}%</span>
        </div>
      </div>`;
  }).join('');

  // Skill headers
  const headers = skillDefs.map(def =>
    `<div class="td-skill-matrix-hd" title="${def.skill_name_en}">
      ${def.skill_code.split('_')[0]}
    </div>`
  ).join('');

  return `
    <div class="td-skill-matrix-wrap">
      <div class="td-skill-matrix-header">
        <div style="min-width:200px;flex-shrink:0"></div>
        <div class="td-skill-matrix-dots-hd">${headers}</div>
        <div style="width:120px;flex-shrink:0"></div>
      </div>
      ${memberRows}
    </div>
    <div style="margin-top:var(--space-4);display:flex;gap:var(--space-4);font-size:var(--text-xs);color:var(--ink-3)">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--ok);margin-right:4px;vertical-align:middle"></span>Pass</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--warn);margin-right:4px;vertical-align:middle"></span>Training</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--hair-3);margin-right:4px;vertical-align:middle"></span>Locked</span>
    </div>`;
}

// ── Tab: Echo this week ───────────────────────────────────────
function renderSkillsEcho() {
  const weekAgo = Date.now() - 7 * 86400000;
  const recentObs = Object.entries(skillEchoObs)
    .flatMap(([key, obs]) => obs.map(o => ({ ...o, _key: key })))
    .filter(o => new Date(o.observed_at) >= weekAgo)
    .sort((a,b) => new Date(b.observed_at) - new Date(a.observed_at))
    .slice(0, 30);

  if (!recentObs.length) return `
    <div class="ds-empty" style="padding:var(--space-10) 0">
      <svg class="ds-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
      </svg>
      <div class="ds-empty-title">ไม่มี Echo session สัปดาห์นี้</div>
      <div class="ds-empty-desc">Echo observations จะปรากฏที่นี่ภายใน 7 วัน</div>
    </div>`;

  const rows = recentObs.map(o => {
    const member = skillMembers.find(m => m.id === o.user_id);
    const def    = skillDefs.find(d => d.skill_code === o.skill_code);
    const cls    = scoreCls(o.ai_score);
    const dt     = new Date(o.observed_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

    return `
      <div style="display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) 0;border-bottom:1px solid var(--hair)">
        <div class="ds-avatar sm" style="margin-top:2px">${member ? getMemberInitials(member) : '?'}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:2px">
            <span style="font-size:var(--text-sm);font-weight:600;color:var(--ink-1)">${member ? getMemberName(member) : o.user_id}</span>
            <span class="ds-badge ds-badge-${cls === 'ok'?'ok':cls==='warn'?'warn':cls==='danger'?'danger':'neutral'}">${scoreLabel(o.ai_score)}</span>
          </div>
          <div style="font-size:var(--text-xs);color:var(--ink-3)">${def?.skill_name_en || o.skill_code} · ${dt}</div>
          ${o.evidence ? `<div style="font-size:var(--text-xs);color:var(--ink-2);margin-top:3px;line-height:1.5">${o.evidence.slice(0,120)}${o.evidence.length>120?'…':''}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:var(--space-2)">
      <span class="ds-eyebrow">${recentObs.length} observations · 7 วันล่าสุด</span>
    </div>
    ${rows}`;
}
</script>

<!-- Echo -->
<script>
// ── dash_echo.js — Echo session feed (Phase 6) ───────────────
// Freshket TL Dashboard v706
// Table: ci_sessions, covisit_events

// ── State ─────────────────────────────────────────────────────
let echoSessions     = [];
let echoDataReady    = false;
let echoFilter       = 'pending_review';  // 'pending_review' | 'all' | 'covisit'
let echoSelectedId   = null;
let echoDetailData   = null;

// ── Load ──────────────────────────────────────────────────────
async function loadEchoData() {
  if (!supa || !currentProfile) return;
  try {
    // Get team emails — reuse skillMembers if loaded, else derive from portview
    const teamEmails = getTeamEmails();

    let q = supa.from('ci_sessions')
      .select('id,owner_email,account_id,account_name,visited_at,duration_secs,skill_scores,tone_signals,transcript_summary,tl_reviewed_at,tl_note,covisit_verified,status')
      .order('visited_at', { ascending: false })
      .limit(120);

    if (teamEmails.length) q = q.in('owner_email', teamEmails);

    const { data, error } = await q;
    if (error) throw error;

    // Dedupe (same logic as Sense)
    echoSessions = (data || []).filter((s, i, arr) =>
      !arr.slice(0,i).some(prev =>
        prev.owner_email === s.owner_email &&
        (prev.account_id||prev.account_name) === (s.account_id||s.account_name) &&
        prev.duration_secs === s.duration_secs &&
        Math.abs(new Date(prev.visited_at)-new Date(s.visited_at)) < 60000
      )
    );
    echoDataReady = true;
  } catch(e) {
    DashLog.error('echo_load', e.message);
    echoDataReady = true;
  }
  if (currentView === 'echo') renderEchoView();
}

function getTeamEmails() {
  // 1. Use skillMembers if available (Phase 5 data)
  if (skillMembers?.length) return skillMembers.map(m => m.email).filter(Boolean);
  // 2. Derive from portviewBulkData (same as Sense _getTeamEmails)
  const tlEmail = (currentProfile?.email||'').toLowerCase();
  const emails = new Set();
  (portviewBulkData||[]).forEach(r => {
    if (r.tlEmail?.toLowerCase()===tlEmail && r.kamEmail)
      emails.add(r.kamEmail.toLowerCase());
  });
  return [...emails];
}

// ── Format helpers ────────────────────────────────────────────
function fmtDuration(secs) {
  if (!secs) return '';
  const m = Math.floor(secs/60), s = secs%60;
  return m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `${s}s`;
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
}
function fmtDateTime(iso) {
  return new Date(iso).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// ── Filters ───────────────────────────────────────────────────
function getFilteredSessions() {
  switch (echoFilter) {
    case 'pending_review': return echoSessions.filter(s => !s.tl_reviewed_at);
    case 'covisit':        return echoSessions.filter(s => s.covisit_verified);
    default:               return echoSessions;
  }
}

// ── Render view ───────────────────────────────────────────────
function renderEchoView() {
  const el = document.getElementById('echo-content');
  if (!el) return;

  if (!echoDataReady) {
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px;max-width:560px">
      ${[1,2,3,4,5].map(()=>`<div class="ds-skel" style="height:80px;border-radius:var(--r-md)"></div>`).join('')}
    </div>`;
    return;
  }

  const all      = echoSessions.length;
  const pending  = echoSessions.filter(s => !s.tl_reviewed_at).length;
  const covisits = echoSessions.filter(s => s.covisit_verified).length;

  const tabs = [
    { key:'pending_review', label:`รอรีวิว (${pending})` },
    { key:'all',            label:`ทั้งหมด (${all})` },
    { key:'covisit',        label:`Co-visit (${covisits})` },
  ];

  const tabsHtml = `<div class="td-skills-tabs">
    ${tabs.map(t =>
      `<button class="td-skills-tab${echoFilter===t.key?' active':''}"
        onclick="setEchoFilter('${t.key}')">${t.label}</button>`
    ).join('')}
  </div>`;

  const sessions = getFilteredSessions();

  const feedHtml = sessions.length
    ? `<div class="td-echo-feed">${sessions.map(renderEchoCard).join('')}</div>`
    : `<div class="ds-empty" style="padding:var(--space-10) 0">
        <svg class="ds-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0M12 19v3M9 22h6"/>
        </svg>
        <div class="ds-empty-title">ไม่มี session ที่ตรงกับ filter</div>
      </div>`;

  el.innerHTML = `<div style="max-width:680px">${tabsHtml}${feedHtml}</div>`;
}

function setEchoFilter(f) {
  echoFilter = f;
  renderEchoView();
}

// ── Session card ──────────────────────────────────────────────
function renderEchoCard(s) {
  const repName   = s.owner_email ? s.owner_email.split('@')[0] : '—';
  const initials  = repName.slice(0,2).toUpperCase();
  const date      = fmtDate(s.visited_at);
  const dur       = fmtDuration(s.duration_secs);
  const reviewed  = !!s.tl_reviewed_at;
  const isSelected = s.id === echoSelectedId;

  // Skill dots
  const skills = s.skill_scores?.skills || [];
  const dots = skills.slice(0,8).map(sk => {
    const sc = sk.tl_override || sk.score;
    const cls = sc==='pass'?'ok':sc==='developing'?'warn':'neutral';
    return `<span class="td-echo-dot ${cls}"></span>`;
  }).join('');

  // Tone badge
  let toneBadge = '';
  if (s.tone_signals?.rep_confidence) {
    const c = s.tone_signals.rep_confidence;
    const cls = c==='high'?'ok':c==='medium'?'warn':'danger';
    const lbl = c==='high'?'Confident':c==='medium'?'Steady':'Hesitant';
    toneBadge = `<span class="ds-badge ds-badge-${cls}">${lbl}</span>`;
  }

  // Status badge
  const statusBadge = reviewed
    ? `<span class="ds-badge ds-badge-ok">รีวิวแล้ว</span>`
    : `<span class="ds-badge ds-badge-warn">รอรีวิว</span>`;

  // Co-visit badge
  const cvBadge = s.covisit_verified
    ? `<span class="ds-badge ds-badge-ok">Co-visit ✓</span>` : '';

  // TL note preview
  const noteHtml = s.tl_note
    ? `<div class="td-echo-note">${s.tl_note.length>80?s.tl_note.slice(0,80)+'…':s.tl_note}</div>` : '';

  // Transcript summary preview
  const summaryHtml = (!s.tl_note && s.transcript_summary)
    ? `<div class="td-echo-summary">${s.transcript_summary.slice(0,100)}${s.transcript_summary.length>100?'…':''}</div>` : '';

  return `
    <div class="td-echo-card${isSelected?' selected':''}" onclick="openEchoDetail('${s.id}')">
      <div class="td-echo-card-top">
        <div class="td-echo-card-left">
          <div class="ds-avatar sm">${initials}</div>
          <div>
            <div class="td-echo-rep">${repName}</div>
            <div class="td-echo-acct">${s.account_name || '—'}</div>
          </div>
        </div>
        <div class="td-echo-card-right">
          <div class="td-echo-meta">${date}${dur?' · '+dur:''}</div>
        </div>
      </div>
      <div class="td-echo-badges">
        <div class="td-echo-dots">${dots}</div>
        ${toneBadge}${cvBadge}${statusBadge}
      </div>
      ${noteHtml}${summaryHtml}
    </div>`;
}

// ── Session detail (right panel) ─────────────────────────────
async function openEchoDetail(sessionId) {
  if (echoSelectedId === sessionId) {
    echoSelectedId = null;
    closeDetail();
    renderEchoView();
    return;
  }
  echoSelectedId = sessionId;
  renderEchoView();  // re-render to show selected state

  // Fetch full session
  try {
    const { data, error } = await supa.from('ci_sessions')
      .select('*')
      .eq('id', sessionId)
      .single();
    if (error) throw error;
    echoDetailData = data;
    openDetail(renderEchoDetailPanel(data));
  } catch(e) {
    DashLog.error('echo_detail', e.message);
  }
}

function renderEchoDetailPanel(s) {
  const repName = s.owner_email ? s.owner_email.split('@')[0] : '—';
  const dur     = fmtDuration(s.duration_secs);
  const dt      = fmtDateTime(s.visited_at);
  const reviewed = !!s.tl_reviewed_at;

  // Skill scores table
  const skills = s.skill_scores?.skills || [];
  const skillRows = skills.map(sk => {
    const score = sk.tl_override || sk.score;
    const cls   = score==='pass'?'ok':score==='developing'?'warn':score==='miss'?'danger':'neutral';
    return `<div class="ds-stat-row" style="align-items:center">
      <span class="ds-stat-label" style="flex:1">${sk.skill_name||sk.skill_code||'—'}</span>
      <span class="ds-badge ds-badge-${cls}">${score||'—'}</span>
    </div>`;
  }).join('') || `<div style="font-size:var(--text-xs);color:var(--ink-4);padding:var(--space-2) 0">ยังไม่มีข้อมูล skill</div>`;

  // Tone signals
  const tone = s.tone_signals || {};
  const toneRows = Object.entries({
    'Confidence': tone.rep_confidence,
    'Clarity':    tone.rep_clarity,
    'Energy':     tone.rep_energy,
  }).filter(([,v])=>v).map(([k,v]) => {
    const cls = v==='high'?'ok':v==='medium'?'warn':'danger';
    return `<div class="ds-stat-row">
      <span class="ds-stat-label">${k}</span>
      <span class="ds-badge ds-badge-${cls}">${v}</span>
    </div>`;
  }).join('');

  // Next actions
  const actions = (s.next_actions||[]).slice(0,3).map(a =>
    `<div style="font-size:var(--text-xs);color:var(--ink-2);padding:var(--space-1) 0;border-bottom:1px solid var(--hair);line-height:1.5">
      <span style="color:var(--ac);margin-right:4px">→</span>${a}
    </div>`
  ).join('');

  // TL note section
  const noteSection = `
    <div class="td-detail-section">
      <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">TL Note</div>
      <textarea id="echo-note-input" class="td-echo-note-input"
        placeholder="เพิ่ม coaching note...">${s.tl_note||''}</textarea>
      <div style="display:flex;gap:var(--space-2);margin-top:var(--space-2)">
        <button class="ds-btn ds-btn-primary" style="height:32px;font-size:var(--text-xs)"
          onclick="saveEchoNote('${s.id}')">บันทึก Note</button>
        ${!reviewed
          ? `<button class="ds-btn ds-btn-secondary" style="height:32px;font-size:var(--text-xs)"
              onclick="markEchoReviewed('${s.id}')">Mark รีวิวแล้ว</button>`
          : `<span style="font-size:var(--text-micro);color:var(--ink-4);padding:var(--space-2) 0;display:flex;align-items:center">
              รีวิวแล้ว ${fmtDateTime(s.tl_reviewed_at)}</span>`
        }
      </div>
    </div>`;

  return `
    <div class="td-detail-hd">
      <div class="ds-eyebrow">ECHO SESSION</div>
      <div class="td-detail-title">${repName}</div>
      <div class="td-detail-sub">${s.account_name||'—'} · ${dt}${dur?' · '+dur:''}</div>
    </div>
    <div class="td-detail-body">

      ${s.transcript_summary ? `
        <div class="td-detail-section">
          <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">Summary</div>
          <div style="font-size:var(--text-sm);color:var(--ink-2);line-height:1.6">${s.transcript_summary}</div>
        </div>` : ''}

      ${skills.length ? `
        <div class="td-detail-section">
          <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">Skill Scores</div>
          ${skillRows}
        </div>` : ''}

      ${toneRows ? `
        <div class="td-detail-section">
          <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">Tone</div>
          ${toneRows}
        </div>` : ''}

      ${actions ? `
        <div class="td-detail-section">
          <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">Next Actions</div>
          ${actions}
        </div>` : ''}

      ${noteSection}
    </div>`;
}

// ── TL actions ────────────────────────────────────────────────
async function saveEchoNote(sessionId) {
  const note = document.getElementById('echo-note-input')?.value || '';
  try {
    const { error } = await supa.from('ci_sessions')
      .update({ tl_note: note || null })
      .eq('id', sessionId);
    if (error) throw error;
    // Update local cache
    const s = echoSessions.find(s => s.id === sessionId);
    if (s) s.tl_note = note || null;
    if (echoDetailData?.id === sessionId) echoDetailData.tl_note = note || null;
    showToast('บันทึก note แล้ว', 'ok');
    renderEchoView();
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  }
}

async function markEchoReviewed(sessionId) {
  const now = new Date().toISOString();
  try {
    const { error } = await supa.from('ci_sessions')
      .update({ tl_reviewed_at: now, tl_reviewed_by: currentProfile?.email || null })
      .eq('id', sessionId);
    if (error) throw error;
    const s = echoSessions.find(s => s.id === sessionId);
    if (s) { s.tl_reviewed_at = now; }
    showToast('Mark รีวิวแล้ว', 'ok');
    // Re-fetch detail and re-render
    if (echoDetailData?.id === sessionId) {
      echoDetailData.tl_reviewed_at = now;
      openDetail(renderEchoDetailPanel(echoDetailData));
    }
    renderEchoView();
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
  }
}
</script>

<!-- Map -->
<script>
// ── dash_map.js — D3 choropleth map ─────────────────────────
// Freshket TL Dashboard v707
// GeoJSON: fetched lazily from geo/ folder

let BKK_GEO = null;
let SUR_GEO = null;

async function loadGeoJSON() {
  if (BKK_GEO && SUR_GEO) return true;  // already loaded
  try {
    const [bkkResp, surResp] = await Promise.all([
      fetch('/geo/bangkok_khet.geojson'),
      fetch('/geo/surrounding_provinces.geojson'),
    ]);
    if (!bkkResp.ok || !surResp.ok) throw new Error('GeoJSON fetch failed');
    [BKK_GEO, SUR_GEO] = await Promise.all([bkkResp.json(), surResp.json()]);
    DashLog.info('map', 'GeoJSON loaded');
    return true;
  } catch(e) {
    DashLog.error('map_geojson', e.message);
    return false;
  }
}


// Mock district data until real CSV arrives (Phase 3)
const MOCK_DISTRICT = (() => {
  const districts = BKK_GEO.features.map(f => f.properties.name_th);
  const seed = (s) => { let x=s; return () => { x=(x*1664525+1013904223)&0xFFFFFFFF; return (x>>>0)/0xFFFFFFFF; }; };
  const data = {};
  districts.forEach((name, idx) => {
    const r = seed(idx * 7919 + 42);
    const base = r() * 8 + 0.5; // 0.5M – 8.5M
    data[name] = { hub_zone: 'Hub ' + (Math.floor(idx/5)+1), months: {} };
    let trend = base;
    ['Nov 25','Dec 25','Jan 26','Feb 26','Mar 26','Apr 26'].forEach(m => {
      trend *= (1 + (r()-0.45)*0.15);
      data[name].months[m] = {
        gmv: Math.round(trend * 1e6),
        accounts: Math.round(r()*150+15),
        outlets: Math.round(r()*300+30),
        new_accounts: Math.round(r()*6)
      };
    });
  });
  return data;
})();

// ── Map state ─────────────────────────────────────────────────
let mapSvg, mapProjection, mapPath, mapZoomBehavior, mapG;
let mapScope = 'bkk';

const METRIC_LABELS = {
  gmv: 'GMV ฿', accounts: 'Accounts', outlets: 'Outlets', new_accounts: 'New Acc'
};

// ── Init ──────────────────────────────────────────────────────
async function initMap() {
  const ok = await loadGeoJSON();
  if (!ok) {
    const container = document.getElementById('map-container');
    if (container) container.innerHTML = errorPanel('map', 'โหลดแผนที่ไม่ได้ — กรุณา refresh');
    return;
  }
  const container = document.getElementById('map-container');
  const W = container.clientWidth  || 800;
  const H = container.clientHeight || 600;

  mapProjection = d3.geoMercator()
    .center([100.52, 13.75])
    .scale(W * 5.5)
    .translate([W/2, H/2]);

  mapPath = d3.geoPath().projection(mapProjection);

  mapZoomBehavior = d3.zoom()
    .scaleExtent([0.4, 14])
    .on('zoom', e => { mapG.attr('transform', e.transform); });

  mapSvg = d3.select('#map-svg').call(mapZoomBehavior);
  mapG   = mapSvg.append('g');

  // Surrounding (background)
  mapG.append('g').attr('class', 'g-sur')
    .selectAll('path').data(SUR_GEO.features).join('path')
    .attr('class','td-poly-bg').attr('d', mapPath);

  // Bangkok districts
  mapG.append('g').attr('class', 'g-bkk')
    .selectAll('path').data(BKK_GEO.features).join('path')
    .attr('class','td-poly')
    .attr('d', mapPath)
    .on('mousemove', onPolyHover)
    .on('mouseleave', onPolyLeave)
    .on('click', onPolyClick);

  updateMapColors();
  renderMapToolbar();
  renderMapLegend();
  if (DashState?.salesOverlay) renderSalesOverlay();
}

// ── Colors ────────────────────────────────────────────────────
function getDistrictValue(nameTh) {
  const d = MOCK_DISTRICT[nameTh];
  if (!d) return 0;
  return d.months[currentMonth]?.[currentMetric] || 0;
}

function updateMapColors() {
  if (!mapG) return;
  const values = BKK_GEO.features.map(f => getDistrictValue(f.properties.name_th));
  const max = d3.max(values) || 1;
  const min = d3.min(values.filter(v => v > 0)) || 0;

  // Read CSS vars for choropleth
  const cs = getComputedStyle(document.documentElement);
  const c0 = cs.getPropertyValue('--choro-0').trim() || '#FFF5F7';
  const c5 = cs.getPropertyValue('--choro-5').trim() || '#CC1A3A';

  const colorScale = d3.scaleSequential()
    .domain([min, max])
    .interpolator(d3.interpolateRgb(c0, c5));

  mapG.select('.g-bkk').selectAll('path')
    .transition().duration(300)
    .attr('fill', d => {
      const v = getDistrictValue(d.properties.name_th);
      return v > 0 ? colorScale(v) : '#F5F5F5';
    });

  // Update legend labels
  const fmtVal = currentMetric === 'gmv'
    ? v => fmtGMV(v)
    : v => fmtNum(Math.round(v));
  const legMin = document.getElementById('map-leg-min');
  const legMax = document.getElementById('map-leg-max');
  if (legMin) legMin.textContent = fmtVal(0);
  if (legMax) legMax.textContent = fmtVal(max);
}

// ── Toolbar ───────────────────────────────────────────────────
function renderMapToolbar() {
  const tb = document.getElementById('map-toolbar');
  if (!tb) return;
  tb.innerHTML = `
    <div class="ds-seg-ctrl">
      <button class="ds-seg-item active" onclick="setMapScope('bkk',this)">กรุงเทพฯ</button>
      <button class="ds-seg-item" onclick="setMapScope('metro',this)">กทม.+ปริมณฑล</button>
    </div>`;
}

function setMapScope(scope, btn) {
  mapScope = scope;
  document.querySelectorAll('#map-toolbar .ds-seg-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('map-container');
  const W = container.clientWidth, H = container.clientHeight;
  if (scope === 'bkk') {
    mapProjection.center([100.52,13.75]).scale(W*5.5);
  } else {
    mapProjection.center([100.40,13.80]).scale(W*3.0);
  }
  mapPath = d3.geoPath().projection(mapProjection);
  mapSvg.call(mapZoomBehavior.transform, d3.zoomIdentity);
  mapG.selectAll('path').transition().duration(400).attr('d', mapPath);
}

// ── Legend ────────────────────────────────────────────────────
function renderMapLegend() {
  const leg = document.getElementById('map-legend');
  if (!leg) return;
  leg.innerHTML = `
    <div class="map-legend-title" id="map-leg-title">${METRIC_LABELS[currentMetric] || currentMetric}</div>
    <div class="map-legend-gradient"></div>
    <div class="map-legend-labels">
      <span id="map-leg-min">0</span>
      <span id="map-leg-max">—</span>
    </div>`;
}

// ── Hover ─────────────────────────────────────────────────────
function onPolyHover(event, d) {
  const name = d.properties.name_th;
  const dist = MOCK_DISTRICT[name];
  const entry = dist?.months[currentMonth];
  const prevM = MONTHS[MONTHS.indexOf(currentMonth)-1];
  const prev  = dist?.months[prevM];

  const tt = document.getElementById('map-tooltip');
  if (!entry) return;

  const delta = prev ? fmtDelta(entry[currentMetric], prev[currentMetric]) : '';
  const dcls  = prev ? deltaCls(entry[currentMetric], prev[currentMetric]) : '';

  tt.innerHTML = `
    <div class="tt-name">${name}</div>
    <div class="tt-zone">${dist.hub_zone || '—'}</div>
    <div class="tt-row"><span>GMV</span><span class="tt-val">${fmtGMV(entry.gmv)} ${delta ? `<span class="ds-delta ${dcls}">${delta}</span>` : ''}</span></div>
    <div class="tt-row"><span>Accounts</span><span class="tt-val">${fmtNum(entry.accounts)}</span></div>
    <div class="tt-row"><span>Outlets</span><span class="tt-val">${fmtNum(entry.outlets)}</span></div>`;

  const [mx,my] = d3.pointer(event, document.getElementById('map-container'));
  const aw = document.getElementById('map-container').clientWidth;
  const ah = document.getElementById('map-container').clientHeight;
  tt.style.left = (mx+14+170 > aw ? mx-174 : mx+14) + 'px';
  tt.style.top  = (my+14+110 > ah ? my-114 : my+14) + 'px';
  tt.classList.add('show');

  d3.select(event.target).style('opacity', '0.7');
}

function onPolyLeave(event) {
  document.getElementById('map-tooltip').classList.remove('show');
  if (!d3.select(event.target).classed('selected'))
    d3.select(event.target).style('opacity', null);
}

// ── Click ─────────────────────────────────────────────────────
function onPolyClick(event, d) {
  const name = d.properties.name_th;
  DashState.selectDistrict(name);
  if (!DashState.selectedDistrictName) {
    // was deselected — close detail
    closeDetail();
    return;
  }
  // Update polygon selected state
  mapG.select('.g-bkk').selectAll('path')
    .classed('selected', dd => dd.properties.name_th === name)
    .style('opacity', null);  // clear rep-dim when zone selected
  openDetailForDistrict(name, d.properties);
}

function openDetailForDistrict(name, props) {
  const dist  = MOCK_DISTRICT[name];
  const entry = dist?.months[currentMonth] || {};
  const prevM = MONTHS[MONTHS.indexOf(currentMonth)-1];
  const prev  = dist?.months[prevM] || {};

  const delta = prev.gmv ? fmtDelta(entry.gmv, prev.gmv) : '';
  const dcls  = prev.gmv ? deltaCls(entry.gmv, prev.gmv) : '';

  // Sparkline
  const maxGMV = Math.max(...Object.values(dist?.months||{}).map(m=>m.gmv||0)) || 1;
  const sparks = MONTHS.map(m => {
    const v = dist?.months[m]?.gmv || 0;
    const h = Math.max(4, Math.round((v/maxGMV)*44));
    const cur = m === currentMonth;
    return `<div class="td-spark-bar${cur?' cur':''}" style="height:${h}px" title="${m}: ${fmtGMV(v)}"></div>`;
  }).join('');
  const sparkLabels = MONTHS.map(m =>
    `<span style="${m===currentMonth?'color:var(--ac)':''}">${m.split(' ')[0]}</span>`
  ).join('');

  // Mock accounts
  const mockAccounts = [
    { name:'ร้านอาหารสุขุมวิท', seg:'SA', status:'active', gmv:280000 },
    { name:'The Coffee Club', seg:'Chain', status:'active', gmv:420000 },
    { name:'Local Bistro', seg:'MC', status:'atrisk', gmv:95000 },
    { name:'Hotel Kitchen', seg:'Chain', status:'active', gmv:780000 },
    { name:'Mini Mart', seg:'SA', status:'inactive', gmv:12000 },
  ].slice(0, Math.max(2, Math.floor(Math.random()*5)+2));

  const accRows = mockAccounts.map(a => `
    <div class="td-acc-row">
      <div class="td-acc-dot ${a.status}"></div>
      <div class="td-acc-name">${a.name}</div>
      <span class="ds-seg-sa" style="flex-shrink:0">${a.seg}</span>
      <div class="td-acc-gmv">${fmtGMV(a.gmv)}</div>
    </div>`).join('');

  openDetail(`
    <div class="td-detail-hd">
      <div class="ds-eyebrow">${dist?.hub_zone || 'DISTRICT'}</div>
      <div class="td-detail-title">${name}</div>
      <div class="td-detail-sub">${props.name_en || ''} · กรุงเทพมหานคร</div>
    </div>
    <div class="td-detail-body">
      <div class="td-spark-wrap">
        <div class="ds-eyebrow" style="margin-bottom:var(--space-2)">GMV 6 เดือน</div>
        <div class="td-spark">${sparks}</div>
        <div class="td-spark-labels" style="margin-top:3px">${sparkLabels}</div>
      </div>
      <div class="td-detail-section">
        <div class="ds-eyebrow" style="margin-bottom:var(--space-3)">Metrics · ${currentMonth}</div>
        <div class="ds-stat-row">
          <span class="ds-stat-label">GMV</span>
          <span class="ds-stat-value">${fmtGMV(entry.gmv)} ${delta ? `<span class="ds-delta ${dcls}">${delta}</span>` : ''}</span>
        </div>
        <div class="ds-stat-row">
          <span class="ds-stat-label">Active Accounts</span>
          <span class="ds-stat-value">${fmtNum(entry.accounts)}</span>
        </div>
        <div class="ds-stat-row">
          <span class="ds-stat-label">Outlets</span>
          <span class="ds-stat-value">${fmtNum(entry.outlets)}</span>
        </div>
        <div class="ds-stat-row">
          <span class="ds-stat-label">New Accounts (Sales)</span>
          <span class="ds-stat-value">${fmtNum(entry.new_accounts)}</span>
        </div>
      </div>
      <div class="td-detail-section">
        <div class="ds-eyebrow" style="margin-bottom:0">Accounts ใน District</div>
      </div>
      ${accRows}
    </div>`);
}

// ── Zoom controls ─────────────────────────────────────────────
function mapZoom(factor) {
  if (!mapSvg) return;
  mapSvg.transition().duration(280).call(mapZoomBehavior.scaleBy, factor);
}
function mapReset() {
  if (!mapSvg) return;
  mapSvg.transition().duration(380).call(mapZoomBehavior.transform, d3.zoomIdentity);
}

// ── Boot: init map when map view becomes active ───────────────
function checkInitMap() {
  if (!mapG && document.getElementById('view-map')?.classList.contains('active')) {
    setTimeout(initMap, 0);
  }
}
// Called from setView override
const _origSetView = typeof setView === 'function' ? setView : null;

// Watch for map view — init on first show
let _mapInited = false;
const _mapObserver = new MutationObserver(() => {
  const mapView = document.getElementById('view-map');
  if (mapView?.classList.contains('active') && !_mapInited) {
    _mapInited = true;
    setTimeout(initMap, 60);
  }
});
document.addEventListener('DOMContentLoaded', () => {
  const mapView = document.getElementById('view-map');
  if (mapView) {
    _mapObserver.observe(mapView, { attributes: true, attributeFilter: ['class'] });
    // If already active on load
    if (mapView.classList.contains('active')) {
      _mapInited = true;
      setTimeout(initMap, 80);
    }
  }
});


// ── Sales overlay (Phase 3) ───────────────────────────────────
function renderSalesOverlay() {
  // Remove existing overlay
  mapG?.selectAll('.td-sales-dot').remove();
  if (!DashState.salesOverlay || !mapG) return;

  // Mock: generate acquisition dots across Bangkok
  // Phase 2: replace with real first_dollar_date + lat/lng from R2
  const mockDots = BKK_GEO.features.flatMap(f => {
    const centroid = mapPath?.centroid(f);
    if (!centroid || isNaN(centroid[0])) return [];
    const dist = MOCK_DISTRICT?.[f.properties.name_th];
    const count = dist?.months[currentMonth]?.new_accounts || 0;
    return Array.from({length: Math.min(count, 6)}, (_, i) => ({
      x: centroid[0] + (Math.random()-0.5) * 20,
      y: centroid[1] + (Math.random()-0.5) * 20,
      name: f.properties.name_th,
      gmv: Math.round(Math.random() * 200000 + 50000)
    }));
  });

  mapG.append('g').attr('class', 'td-sales-dot-group')
    .selectAll('circle').data(mockDots).join('circle')
    .attr('class', 'td-sales-dot')
    .attr('cx', d => d.x)
    .attr('cy', d => d.y)
    .attr('r', 5)
    .style('fill', 'var(--info)')
    .style('stroke', 'white')
    .style('stroke-width', '1.5')
    .style('opacity', '0')
    .style('cursor', 'pointer')
    .on('mousemove', (event, d) => {
      const tt = document.getElementById('map-tooltip');
      tt.innerHTML = `<div class="tt-name" style="color:var(--info)">New Account (Sales)</div>
        <div class="tt-zone">${d.name}</div>
        <div class="tt-row"><span>GMV</span><span class="tt-val">${fmtGMV(d.gmv)}</span></div>`;
      const [mx,my] = d3.pointer(event, document.getElementById('map-container'));
      tt.style.left = (mx+14) + 'px'; tt.style.top = (my+14) + 'px';
      tt.classList.add('show');
    })
    .on('mouseleave', () => document.getElementById('map-tooltip').classList.remove('show'))
    .transition().duration(300)
    .style('opacity', '0.85');
}

// Window resize
window.addEventListener('resize', () => {
  if (!_mapInited || !mapSvg) return;
  const container = document.getElementById('map-container');
  if (!container) return;
  const W = container.clientWidth, H = container.clientHeight;
  mapProjection.translate([W/2, H/2]);
  mapPath = d3.geoPath().projection(mapProjection);
  mapG.selectAll('path').attr('d', mapPath);
});
</script>
